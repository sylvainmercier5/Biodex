function NouvelleObservation({ onSauver, onAnnuler, base, mode, observations }) {
  const modeTri = !!base && mode !== "edition";
  const modeEdition = mode === "edition";
  const [photoBlob, setPhotoBlob] = useState(base ? base.photo : null);
  const [photosSupp, setPhotosSupp] = useState(base && Array.isArray(base.photosSupp) ? base.photosSupp : []);
  const [nom, setNom] = useState(base ? base.nom || "" : "");
  const [nomSci, setNomSci] = useState(base ? base.nomSci || "" : "");
  const [confiance, setConfiance] = useState(base ? (base.confiance !== undefined ? base.confiance : null) : null);
  const [notable, setNotable] = useState(base ? base.notable || "" : "");
  const [biotope, setBiotope] = useState(base ? base.biotope || "" : "");
  const [moment, setMoment] = useState(base ? (base.moment || momentDepuisDate(base.date || Date.now())) : momentDepuisDate(new Date()));
  const [spots, setSpots] = useState(() => lireSpots());
  const [spot, setSpot] = useState(base ? base.spot || "" : "");
  const [nouveauSpot, setNouveauSpot] = useState("");
  const [ajoutSpot, setAjoutSpot] = useState(false);
  const [ciel, setCiel] = useState(base ? base.ciel || "" : "");
  const [temp, setTemp] = useState(base ? base.temp || "" : "");
  const [meteoAuto, setMeteoAuto] = useState(base ? !!base.meteoAuto : false);
  const [meteoEtat, setMeteoEtat] = useState(""); // "" | recherche | ok | echec
  const [notes, setNotes] = useState(base ? base.notes || "" : "");
  const [gps, setGps] = useState(base ? base.gps || null : null);
  const [gpsEtat, setGpsEtat] = useState(base ? (base.gps ? "ok" : "refuse") : "attente");
  const [infoGpsPhoto, setInfoGpsPhoto] = useState(false);
  const [enregistrement, setEnregistrement] = useState(false);
  const [erreur, setErreur] = useState("");
  const [cloudEtat, setCloudEtat] = useState(""); // "" | recherche | ok | echec
  const [cloudResultat, setCloudResultat] = useState(null);
  const [cloudErreur, setCloudErreur] = useState("");
  const [affinageActif, setAffinageActif] = useState(false);
  const [affinageEtat, setAffinageEtat] = useState(""); // "" | recherche | question | final | echec
  const [affinageQuestion, setAffinageQuestion] = useState(null);
  const [affinageHisto, setAffinageHisto] = useState([]);
  const [affinageFinal, setAffinageFinal] = useState(null);
  const [affinageLibre, setAffinageLibre] = useState("");
  const [ciblage, setCiblage] = useState(false);
  const [zone, setZone] = useState({ x: 0.2, y: 0.2, w: 0.6, h: 0.6 });
  const [montrerZoom, setMontrerZoom] = useState(false);
  const [choixPoint, setChoixPoint] = useState(false);
  const [suggestions, setSuggestions] = useState([]);
  const [sugEtat, setSugEtat] = useState(""); // "" | recherche | ok | echec
  const [sugVisible, setSugVisible] = useState(false);
  const [brouillonPropose, setBrouillonPropose] = useState(false);
  const photoUrl = useBlobUrl(photoBlob);
  const nomFocusRef = useRef(false);

  useEffect(() => {
    if (modeTri) {
      // Position déjà figée. On rattrape la météo si elle manquait — à la DATE DE LA PHOTO, pas celle du jour.
      if (base && base.meteoARattraper && base.gps) {
        setMeteoEtat("recherche");
        meteoHistorique(base.gps, base.date)
          .then((m) => {
            if (m && (m.temp || m.ciel)) {
              if (m.ciel) setCiel(m.ciel);
              if (m.temp) setTemp(m.temp);
              setMeteoAuto(true);
              setMeteoEtat("ok");
            } else {
              setMeteoEtat("echec");
            }
          })
          .catch(() => setMeteoEtat("echec"));
      }
      return;
    }
    if (modeEdition) return; // en édition, on garde la position existante (modifiable à la main)
    if (!navigator.geolocation) { setGpsEtat("refuse"); return; }
    navigator.geolocation.getCurrentPosition(
      (pos) => {
        const g = {
          lat: Math.round(pos.coords.latitude * 100000) / 100000,
          lon: Math.round(pos.coords.longitude * 100000) / 100000,
          precision: Math.round(pos.coords.accuracy),
        };
        setGps(g);
        setGpsEtat("ok");
        chercherMeteo(g);
      },
      () => setGpsEtat("refuse"),
      { enableHighAccuracy: true, timeout: 15000 }
    );
  }, []);

  // --- Brouillon : restauration au montage (hors photo, non sérialisable simplement) ---
  useEffect(() => {
    if (modeTri || modeEdition) return;
    try {
      const brut = localStorage.getItem("biodex:brouillon");
      if (brut) {
        const b = JSON.parse(brut);
        if (b && (b.nom || b.nomSci || b.biotope || b.notes)) setBrouillonPropose(b);
      }
    } catch {}
  }, []);

  function restaurerBrouillon() {
    const b = brouillonPropose;
    if (!b) return;
    if (b.nom) setNom(b.nom);
    if (b.nomSci) setNomSci(b.nomSci);
    if (b.biotope) setBiotope(b.biotope);
    if (b.ciel) setCiel(b.ciel);
    if (b.temp) setTemp(b.temp);
    if (b.notes) setNotes(b.notes);
    setBrouillonPropose(false);
  }
  function ignorerBrouillon() {
    setBrouillonPropose(false);
    try { localStorage.removeItem("biodex:brouillon"); } catch {}
  }

  // --- Brouillon : sauvegarde à chaque changement de champ texte ---
  useEffect(() => {
    if (modeTri || modeEdition) return;
    const b = { nom, nomSci, biotope, ciel, temp, notes };
    const vide = !nom && !nomSci && !biotope && !ciel && !temp && !notes;
    try {
      if (vide) localStorage.removeItem("biodex:brouillon");
      else localStorage.setItem("biodex:brouillon", JSON.stringify(b));
    } catch {}
  }, [nom, nomSci, biotope, ciel, temp, notes]);

  // --- Autocomplétion iNaturalist (debounce 350 ms, annulation de la requête précédente) ---
  useEffect(() => {
    const terme = nom.trim();
    if (!nomFocusRef.current || terme.length < 3) { setSuggestions([]); setSugEtat(""); return; }
    const ctrl = new AbortController();
    setSugEtat("recherche");
    const t = setTimeout(async () => {
      try {
        const res = await chercherTaxons(terme, ctrl.signal);
        setSuggestions(res);
        setSugEtat("ok");
        setSugVisible(true);
      } catch (e) {
        if (e.name !== "AbortError") setSugEtat("echec");
      }
    }, 350);
    return () => { clearTimeout(t); ctrl.abort(); };
  }, [nom]);

  function choisirSuggestion(s) {
    if (s.commun) setNom(s.commun);
    if (s.sci) setNomSci(s.sci);
    setSugVisible(false);
    setSuggestions([]);
  }

  async function chercherMeteo(g) {
    setMeteoEtat("recherche");
    try {
      const r = await fetch(
        `https://api.open-meteo.com/v1/forecast?latitude=${g.lat}&longitude=${g.lon}&current=temperature_2m,weather_code,relative_humidity_2m,wind_speed_10m`
      );
      if (!r.ok) throw new Error("http");
      const d = await r.json();
      const cur = d.current || {};
      const cielId = wmoVersCiel(cur.weather_code);
      if (cielId) setCiel(cielId);
      if (typeof cur.temperature_2m === "number") setTemp(String(Math.round(cur.temperature_2m)));
      setMeteoAuto(true);
      setMeteoEtat("ok");
    } catch {
      setMeteoEtat("echec");
    }
  }

  async function choisirPhoto(e) {
    const f = e.target.files && e.target.files[0];
    if (!f) return;
    setErreur("");
    try {
      // Lire la position GPS dans les métadonnées de la photo (avant compression, qui les efface)
      const gpsExif = await lireGpsExif(f);
      const blob = await compresserImage(f);
      setPhotoBlob(blob);
      setCiblage(false);
      // Si la photo contient une position ET qu'on n'en a pas déjà une fiable, on la pré-remplit
      if (gpsExif && (!gps || gps.manuel || gpsEtat !== "ok")) {
        setGps({ lat: gpsExif.lat, lon: gpsExif.lon, precision: 0, depuisPhoto: true });
        setGpsEtat("ok");
        setInfoGpsPhoto(true);
        setTimeout(() => setInfoGpsPhoto(false), 6000);
      }
    } catch {
      setErreur("Impossible de lire cette image. Essaie avec un autre fichier.");
    }
  }

  // Sélection multiple depuis la galerie : 1re photo = principale, suivantes = vues d'appoint (max 2).
  // Traitement SÉQUENTIEL pour ne jamais garder plusieurs grosses images décodées en même temps.
  async function choisirPhotosGalerie(e) {
    const files = Array.from((e.target.files) || []);
    e.target.value = "";
    if (!files.length) return;
    setErreur("");
    try {
      // Photo principale : première du lot, qualité pleine + lecture GPS.
      const gpsExif = await lireGpsExif(files[0]);
      const principale = await compresserImage(files[0]);
      setPhotoBlob(principale);
      setCiblage(false);
      if (gpsExif && (!gps || gps.manuel || gpsEtat !== "ok")) {
        setGps({ lat: gpsExif.lat, lon: gpsExif.lon, precision: 0, depuisPhoto: true });
        setGpsEtat("ok");
        setInfoGpsPhoto(true);
        setTimeout(() => setInfoGpsPhoto(false), 6000);
      }
      // Vues d'appoint : les 2 suivantes, fortement compressées (1280px), une par une.
      const supp = [];
      for (const f of files.slice(1, 3)) {
        try { supp.push(await compresserImage(f, 1280, 0.8)); } catch {}
      }
      setPhotosSupp(supp);
    } catch {
      setErreur("Impossible de lire ces images. Essaie avec d'autres fichiers.");
    }
  }

  async function lancerIdentificationCloud(utiliserZone) {
    if (!photoBlob || cloudEtat === "recherche") return;
    setCloudEtat("recherche");
    setCloudResultat(null);
    setCloudErreur("");
    try {
      const contexte = contexteTerrain();
      const res = await identifierCloud(photoBlob, utiliserZone ? zone : null, contexte, photosSupp);
      setCloudResultat(res);
      setCloudEtat("ok");
    } catch (e) {
      setCloudErreur(String(e.message || e).includes("configur") ? "Clé API non configurée sur le serveur (voir réglages Netlify)." : "Identification précise indisponible (réseau, ou service non configuré).");
      setCloudEtat("echec");
    }
  }

  function appliquerCloud(source) {
    const res = source || cloudResultat;
    if (!res) return;
    if (res.nom) setNom(res.nom);
    if (res.nomSci) setNomSci(res.nomSci);
    if (res.confiance !== undefined) setConfiance(res.confiance);
    if (res.inhabituel && String(res.inhabituel).trim().length > 3) setNotable(String(res.inhabituel).trim());
  }

  function contexteTerrain() {
    return {
      biotope: biotope ? biotopeOf(biotope).label : "",
      mois: new Date().toLocaleDateString("fr-FR", { month: "long" }),
      region: regionApprox(gps),
      indice: nom || "",
    };
  }

  async function demarrerAffinage() {
    if (!photoBlob) return;
    setAffinageActif(true);
    setAffinageEtat("recherche");
    setAffinageQuestion(null);
    setAffinageFinal(null);
    setAffinageHisto([]);
    setAffinageLibre("");
    try {
      const res = await tourAffinage(photoBlob, ciblage ? zone : null, contexteTerrain(), []);
      traiterTourAffinage(res, []);
    } catch (e) {
      setAffinageEtat("echec");
    }
  }

  function traiterTourAffinage(res, histo) {
    if (res && res.type === "final") {
      setAffinageFinal(res);
      setAffinageEtat("final");
    } else if (res && res.type === "question") {
      setAffinageQuestion(res);
      setAffinageEtat("question");
    } else {
      setAffinageEtat("echec");
    }
  }

  async function repondreAffinage(reponse) {
    if (!affinageQuestion || affinageEtat === "recherche") return;
    const histo = [...affinageHisto, { question: affinageQuestion.question, reponse }];
    setAffinageHisto(histo);
    setAffinageQuestion(null);
    setAffinageLibre("");
    setAffinageEtat("recherche");
    try {
      const res = await tourAffinage(photoBlob, ciblage ? zone : null, contexteTerrain(), histo);
      traiterTourAffinage(res, histo);
    } catch (e) {
      setAffinageEtat("echec");
    }
  }

  function appliquerAffinage() {
    if (!affinageFinal) return;
    if (affinageFinal.nom) setNom(affinageFinal.nom);
    if (affinageFinal.nomSci) setNomSci(affinageFinal.nomSci);
    if (affinageFinal.confiance !== undefined) setConfiance(affinageFinal.confiance);
    setAffinageActif(false);
  }

  function fermerAffinage() {
    setAffinageActif(false);
    setAffinageEtat("");
    setAffinageQuestion(null);
    setAffinageFinal(null);
  }

  async function sauver() {
    if (!photoBlob) {
      setErreur("Ajoute une photo pour enregistrer l'observation.");
      return;
    }
    setEnregistrement(true);
    const obs = modeEdition
      ? {
          ...base,
          nom: nom.trim(),
          nomSci: nomSci.trim(),
          confiance: confiance,
          biotope: biotope || "autre",
          moment: moment || "",
          spot: spot || "",
          ciel: ciel || "",
          temp: temp.trim(),
          meteoAuto,
          notes: notes.trim(),
          notable: notable || "",
          gps: gpsEtat === "ok" ? gps : null,
          photo: photoBlob,
          photosSupp: photosSupp,
          // id et date d'origine conservés via ...base
        }
      : modeTri
      ? {
          ...base,
          nom: nom.trim(),
          nomSci: nomSci.trim(),
          confiance: confiance,
          biotope: biotope || "autre",
          moment: moment || "",
          spot: spot || "",
          ciel: ciel || "",
          temp: temp.trim(),
          meteoAuto,
          meteoARattraper: false,
          notes: notes.trim(),
          notable: notable || "",
          photo: photoBlob,
          photosSupp: photosSupp,
          // id, date, gps d'origine conservés via ...base
        }
      : {
          id: `${Date.now()}-${Math.floor(Math.random() * 9999)}`,
          nom: nom.trim(),
          nomSci: nomSci.trim(),
          confiance: confiance,
          biotope: biotope || "autre",
          moment: moment || "",
          spot: spot || "",
          ciel: ciel || "",
          temp: temp.trim(),
          meteoAuto,
          notes: notes.trim(),
          notable: notable || "",
          gps: gpsEtat === "ok" ? gps : null,
          date: new Date().toISOString(),
          photo: photoBlob,
          photosSupp: photosSupp,
        };
    const ok = await onSauver(obs);
    setEnregistrement(false);
    if (ok) { try { if (!modeTri && !modeEdition) localStorage.removeItem("biodex:brouillon"); } catch {} }
    else setErreur("Échec de l'enregistrement. Réessaie — si ça persiste, dis-le au développeur 😉");
  }

              <div style={{ fontFamily: sans, fontSize: 12.5, fontWeight: 700, color: C.papier }}>

            </div>

          {/* Affinage : proposé dès qu'une photo est là, mis en avant si l'ID cloud hésite */}
          {photoBlob && !affinageActif && (
            <Bouton
              variante={cloudResultat && pourcentConfiance(cloudResultat.confiance) !== null && pourcentConfiance(cloudResultat.confiance) < 70 ? "primaire" : "normal"}
              onClick={demarrerAffinage} style={{ width: "100%", marginBottom: 8 }}>
              🔍 Affiner l'identification (questions)
            </Bouton>
          )}

          {affinageActif && (
            <div style={{ marginBottom: 12, padding: "12px 14px", background: "linear-gradient(#242E1C, #1B2216)", border: `1px solid #A8863A`, borderRadius: 10 }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
                <div style={{ fontFamily: sans, fontSize: 12, fontWeight: 700, letterSpacing: 0.6, textTransform: "uppercase", color: C.ambreClair }}>🔍 Détermination guidée</div>
                <button onClick={fermerAffinage} style={{ background: "none", border: "none", color: C.papierSombre, fontSize: 18, cursor: "pointer", lineHeight: 1 }}>✕</button>
              </div>

              {affinageHisto.length > 0 && (
                <div style={{ marginBottom: 10 }}>
                  {affinageHisto.map((h, i) => (
                    <div key={i} style={{ fontFamily: sans, fontSize: 12, color: C.papierSombre, marginBottom: 3 }}>
                      <span style={{ color: C.lichen }}>Q:</span> {h.question} <span style={{ color: C.ambre }}>→ {h.reponse}</span>
                    </div>
                  ))}
                </div>
              )}

              {affinageEtat === "recherche" && (
                <div style={{ fontFamily: sans, fontSize: 14, color: C.papierSombre, fontStyle: "italic", padding: "8px 0" }}>Analyse…</div>
              )}

              {affinageEtat === "question" && affinageQuestion && (
                <div>
                  <div style={{ fontFamily: sans, fontSize: 15, fontWeight: 600, color: C.papier, lineHeight: 1.4, marginBottom: 4 }}>{affinageQuestion.question}</div>
                  {affinageQuestion.pourquoi && <div style={{ fontFamily: sans, fontSize: 12, color: C.papierSombre, fontStyle: "italic", marginBottom: 10 }}>{affinageQuestion.pourquoi}</div>}
                  <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                    {(affinageQuestion.options || []).map((opt, i) => (
                      <button key={i} onClick={() => repondreAffinage(opt)}
                        style={{ fontFamily: sans, fontSize: 14, textAlign: "left", padding: "10px 12px", borderRadius: 8, border: `1px solid ${C.bordure}`, background: C.panneau, color: C.papier, cursor: "pointer" }}>
                        {opt}
                      </button>
                    ))}
                    <button onClick={() => repondreAffinage("Je ne sais pas")}
                      style={{ fontFamily: sans, fontSize: 13, padding: "8px 12px", borderRadius: 8, border: `1px dashed ${C.bordure}`, background: "transparent", color: C.papierSombre, cursor: "pointer" }}>
                      Je ne sais pas
                    </button>
                  </div>
                  <div style={{ display: "flex", gap: 6, marginTop: 8 }}>
                    <input value={affinageLibre} onChange={(e) => setAffinageLibre(e.target.value)} placeholder="…ou décris toi-même"
                      style={{ flex: 1, boxSizing: "border-box", background: C.fond, color: C.papier, border: `1px solid ${C.bordure}`, borderRadius: 8, padding: "9px 10px", fontFamily: sans, fontSize: 14, outline: "none" }} />
                    <Bouton onClick={() => affinageLibre.trim() && repondreAffinage(affinageLibre.trim())} disabled={!affinageLibre.trim()}>Envoyer</Bouton>
                  </div>
                </div>
              )}

              {affinageEtat === "final" && affinageFinal && (
                <div>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: 8, marginBottom: 6 }}>
                    <span style={{ fontFamily: sans, fontSize: 12, fontWeight: 700, letterSpacing: 0.6, textTransform: "uppercase", color: C.lichen }}>Conclusion</span>
                    <JaugeConfiance confiance={affinageFinal.confiance} niveau={affinageFinal.niveau} compact />
                  </div>
                  <div style={{ fontFamily: sans, fontSize: 16, fontWeight: 700, color: C.papier }}>{affinageFinal.nom || "—"}</div>
                  <div style={{ fontFamily: serif, fontStyle: "italic", fontSize: 14, color: C.ambreClair, marginBottom: 6 }}>{affinageFinal.nomSci || ""}</div>
                  {affinageFinal.note && <div style={{ fontFamily: sans, fontSize: 13, color: C.papier, lineHeight: 1.5, marginBottom: 10 }}>{affinageFinal.note}</div>}
                  <Bouton variante="primaire" onClick={appliquerAffinage} style={{ width: "100%" }}>Utiliser ce résultat</Bouton>
                </div>
              )}

              {affinageEtat === "echec" && (
                <div style={{ fontFamily: sans, fontSize: 13, color: "#E8A88F" }}>Affinage indisponible (réseau, ou service non configuré).</div>
              )}
            </div>
          )}

        </div>
      )}

      {/* Identification */}
      <div style={{ marginBottom: 14, position: "relative" }}>
        <label style={libelle}>
          Nom (vernaculaire)
          {sugEtat === "recherche" && <span style={{ color: C.papierSombre, textTransform: "none", fontWeight: 400 }}> · recherche…</span>}
          {sugEtat === "echec" && <span style={{ color: C.papierSombre, textTransform: "none", fontWeight: 400 }}> · suggestions indisponibles (hors ligne ?)</span>}
        </label>
        <input style={champ} value={nom}
          onChange={(e) => setNom(e.target.value)}
          onFocus={() => { nomFocusRef.current = true; if (suggestions.length) setSugVisible(true); }}
          onBlur={() => { nomFocusRef.current = false; setTimeout(() => setSugVisible(false), 180); }}
          placeholder="ex : Lucane cerf-volant" autoComplete="off" />
        {sugVisible && suggestions.length > 0 && (
          <div style={{ position: "absolute", left: 0, right: 0, top: "100%", zIndex: 10, marginTop: 4, background: C.panneauClair, border: `1px solid ${C.bordure}`, borderRadius: 10, overflow: "hidden", boxShadow: "0 8px 20px rgba(0,0,0,.4)" }}>
            {suggestions.map((s) => (
              <button key={s.id} type="button"
                onMouseDown={(e) => { e.preventDefault(); choisirSuggestion(s); }}
                style={{ display: "block", width: "100%", textAlign: "left", padding: "9px 12px", background: "transparent", border: "none", borderBottom: `1px solid ${C.bordure}`, cursor: "pointer" }}>
                <div style={{ fontFamily: sans, fontSize: 14, color: C.papier }}>{s.commun || s.sci}</div>
                <div style={{ fontFamily: serif, fontStyle: "italic", fontSize: 12.5, color: C.ambre }}>{s.sci}{s.rang ? ` · ${s.rang}` : ""}</div>
              </button>
            ))}
          </div>
        )}
      </div>
      <div style={{ marginBottom: 14 }}>
        <label style={libelle}>Nom scientifique (optionnel)</label>
        <input style={{ ...champ, fontFamily: serif, fontStyle: "italic" }} value={nomSci} onChange={(e) => setNomSci(e.target.value)} placeholder="ex : Lucanus cervus" />
      </div>

      {/* Indicateur : nouvelle espèce ou déjà photographiée */}
      {(() => {
        const cle = cleEspeceMur({ nom, nomSci });
        if (!cle) return null;
        const n = compteEspeceCollection(cle, observations, base ? base.id : null);
        const nouvelle = n === 0;
        return (
          <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 14, padding: "11px 14px", borderRadius: 10,
            background: nouvelle ? "linear-gradient(135deg,#2A2417,#201B12)" : "linear-gradient(#1E2617,#171D12)",
            border: `1px solid ${nouvelle ? "#6B5A2E" : C.bordure}` }}>
            <span style={{ fontSize: 20 }}>{nouvelle ? "🌟" : "📸"}</span>
            <div style={{ fontFamily: sans, fontSize: 13, color: C.papier, lineHeight: 1.45 }}>
              {nouvelle
                ? <b style={{ color: "#E4C878" }}>Nouvelle espèce pour ta collection !</b>
                : <span>Déjà dans ta collection — ce sera ta <b style={{ color: C.ambreClair }}>{n + 1}<sup>e</sup></b> observation de cette espèce.</span>}
            </div>
          </div>
        );
      })()}

      {/* Biotope */}
      <div style={{ marginBottom: 14 }}>
        <label style={libelle}>Biotope</label>
        <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
          {BIOTOPES.map((b) => (
            <button key={b.id} onClick={() => setBiotope(b.id)}
              style={{
                fontFamily: sans, fontSize: 13, padding: "7px 12px", borderRadius: 20, cursor: "pointer",
                border: `1px solid ${biotope === b.id ? C.ambre : C.bordure}`,
                background: biotope === b.id ? C.ambre : C.panneau,
                color: biotope === b.id ? C.encre : C.papier,
                fontWeight: biotope === b.id ? 700 : 400,
              }}>
              {b.emoji} {b.label}
            </button>
          ))}
        </div>
      </div>

      {/* Moment de la journée */}
      <div style={{ marginBottom: 14 }}>
        <label style={libelle}>Moment de la journée</label>
        <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
          {MOMENTS.map((m) => (
            <button key={m.id} onClick={() => setMoment(m.id === moment ? "" : m.id)}
              style={{
                fontFamily: sans, fontSize: 13, padding: "7px 12px", borderRadius: 20, cursor: "pointer",
                border: `1px solid ${moment === m.id ? C.ambre : C.bordure}`,
                background: moment === m.id ? C.ambre : C.panneau,
                color: moment === m.id ? C.encre : C.papier,
                fontWeight: moment === m.id ? 700 : 400,
              }}>
              {m.emoji} {m.label}
            </button>
          ))}
        </div>
      </div>

      {/* Lieu d'observation (spot favori) */}
      <div style={{ marginBottom: 14 }}>
        <label style={libelle}>Lieu d'observation <span style={{ fontWeight: 400, color: C.papierSombre }}>(optionnel)</span></label>
        {spots.length > 0 && (
          <div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginBottom: 8 }}>
            {spots.map((s) => (
              <span key={s.id} style={{ display: "inline-flex", alignItems: "center", borderRadius: 20, border: `1px solid ${spot === s.nom ? C.ambre : C.bordure}`, background: spot === s.nom ? C.ambre : C.panneau, overflow: "hidden" }}>
                <button onClick={() => setSpot(s.nom === spot ? "" : s.nom)}
                  style={{ fontFamily: sans, fontSize: 13, padding: "7px 4px 7px 12px", cursor: "pointer", border: "none", background: "transparent", color: spot === s.nom ? C.encre : C.papier, fontWeight: spot === s.nom ? 700 : 400 }}>
                  📍 {s.nom}
                </button>
                <button onClick={() => { const maj = supprimerSpot(s.id); setSpots(maj); if (spot === s.nom) setSpot(""); }}
                  title="Supprimer ce lieu"
                  style={{ fontFamily: sans, fontSize: 13, padding: "7px 10px 7px 4px", cursor: "pointer", border: "none", background: "transparent", color: spot === s.nom ? C.encre : C.papierSombre, opacity: 0.75 }}>
                  ✕
                </button>
              </span>
            ))}
          </div>
        )}
        {!ajoutSpot ? (
          <button onClick={() => setAjoutSpot(true)}
            style={{ fontFamily: sans, fontSize: 12.5, fontWeight: 600, padding: "7px 12px", borderRadius: 20, cursor: "pointer", border: `1px dashed ${C.bordure}`, background: "transparent", color: C.lichen }}>
            ＋ Nouveau lieu
          </button>
        ) : (
          <div style={{ display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap" }}>
            <input value={nouveauSpot} onChange={(e) => setNouveauSpot(e.target.value)} maxLength={40}
              placeholder="ex : Bois de chez moi"
              style={{ ...champ, flex: 1, minWidth: 160, marginBottom: 0 }} />
            <Bouton onClick={() => {
              const n = nouveauSpot.trim();
              if (!n) { setAjoutSpot(false); return; }
              const maj = ajouterSpot(n, gpsEtat === "ok" ? gps : null);
              setSpots(maj);
              setSpot(n);
              setNouveauSpot("");
              setAjoutSpot(false);
            }}>✓ Ajouter</Bouton>
            <Bouton onClick={() => { setNouveauSpot(""); setAjoutSpot(false); }}>✕</Bouton>
          </div>
        )}
        {spot && !ajoutSpot && (
          <div style={{ fontFamily: sans, fontSize: 11, color: C.papierSombre, marginTop: 6, fontStyle: "italic" }}>
            Tes lieux sont enregistrés sur ton téléphone et réutilisables. Retape sur un lieu pour le désélectionner.
          </div>
        )}
      </div>

      {/* Météo */}
      <div style={{ marginBottom: 14 }}>
        <label style={libelle}>
          Météo
          {meteoEtat === "recherche" && <span style={{ color: C.papierSombre, textTransform: "none", fontWeight: 400 }}> · récupération en cours…</span>}
          {meteoEtat === "ok" && <span style={{ color: C.ambre, textTransform: "none", fontWeight: 400 }}> · remplie automatiquement ✓</span>}
          {meteoEtat === "echec" && <span style={{ color: C.papierSombre, textTransform: "none", fontWeight: 400 }}> · auto indisponible, renseigne à la main</span>}
        </label>
        <div style={{ display: "flex", gap: 8, flexWrap: "wrap", alignItems: "center" }}>
          {CIELS.map((c) => (
            <button key={c.id} onClick={() => { setCiel(ciel === c.id ? "" : c.id); setMeteoAuto(false); }}
              style={{
                fontFamily: sans, fontSize: 13, padding: "7px 12px", borderRadius: 20, cursor: "pointer",
                border: `1px solid ${ciel === c.id ? C.ambre : C.bordure}`,
                background: ciel === c.id ? C.ambre : C.panneau,
                color: ciel === c.id ? C.encre : C.papier,
              }}>
              {c.emoji} {c.label}
            </button>
          ))}
          <input style={{ ...champ, width: 90 }} value={temp}
            onChange={(e) => { setTemp(e.target.value); setMeteoAuto(false); }}
            placeholder="°C" inputMode="numeric" />
        </div>
      </div>

      {/* Notes */}
      <div style={{ marginBottom: 18 }}>
        <label style={libelle}>Notes de terrain</label>
        <textarea style={{ ...champ, minHeight: 70, resize: "vertical" }} value={notes} onChange={(e) => setNotes(e.target.value)} placeholder="Comportement, plante hôte, taille estimée…" />
      </div>

      {erreur && (
        <div style={{ marginBottom: 14, padding: "10px 12px", borderRadius: 8, background: "#3A241C", color: "#E8A88F", fontFamily: sans, fontSize: 14 }}>
          {erreur}
        </div>
      )}

      <div style={{ display: "flex", gap: 10 }}>
        <Bouton onClick={onAnnuler} style={{ flex: 1 }}>Annuler</Bouton>
        <Bouton variante="primaire" onClick={sauver} disabled={enregistrement} style={{ flex: 2 }}>
          {enregistrement ? "Enregistrement…" : (modeEdition ? "Enregistrer les modifications" : (modeTri ? "Classer dans la collection" : "Épingler dans la collection"))}
        </Bouton>
      </div>
    </div>
  );
}

function CarteInsecte({ obs, taille = "normal", onClick }) {
  const c = obs.carte;
  if (!c) return null;
  const pal = palierRarete(c.rarete);
  const el = elementInfo(c.element);
  const compact = taille === "compact";
  const holo = Number(c.rarete) >= 65;        // Rare : reflet fixe
  const legendaire = Number(c.rarete) >= 85;  // Légendaire : shimmer animé + lueur + étoiles
  const stat = (label, val, emoji, couleur) => (
    <div style={{ display: "flex", alignItems: "center", gap: 6, padding: compact ? "1.5px 0" : "2.5px 0" }}>
      <span style={{ fontFamily: sans, fontSize: compact ? 9.5 : 11, color: "#2A2416", fontWeight: 700, width: compact ? 58 : 72, flexShrink: 0 }}>{emoji} {label}</span>
      <div style={{ flex: 1, height: compact ? 5 : 7, background: "rgba(42,36,22,.18)", borderRadius: 4, overflow: "hidden" }}>
        <div style={{ width: `${Math.min(100, Math.max(3, Number(val) || 0))}%`, height: "100%", background: couleur, borderRadius: 4 }} />
      </div>
      <span style={{ fontFamily: sans, fontSize: compact ? 10.5 : 12.5, color: "#2A2416", fontWeight: 800, width: compact ? 18 : 24, textAlign: "right", flexShrink: 0 }}>{val}</span>
    </div>
  );
  return (
    <div onClick={onClick}
      className={[onClick ? "bd-card" : "", legendaire ? "bd-carte-legendaire" : ""].join(" ").trim()}
      style={{
        width: "100%", borderRadius: 15, cursor: onClick ? "pointer" : "default",
        background: `linear-gradient(150deg, ${pal.bord} 0%, ${pal.couleur} 45%, ${pal.bord} 100%)`,
        border: `1px solid rgba(42,36,22,.4)`,
        boxShadow: pal.lueur === "none" ? "0 4px 12px rgba(0,0,0,.4)" : `${pal.lueur}, 0 4px 12px rgba(0,0,0,.4)`,
        padding: compact ? 4 : 5, position: "relative", overflow: "hidden",
      }}>
      {/* Reflet : fixe pour Rare, balayage animé pour Légendaire */}
      {legendaire ? (
        <div className="bd-holo-anim" />
      ) : holo ? (
        <div style={{ position: "absolute", inset: 0, pointerEvents: "none", background: "linear-gradient(115deg, transparent 30%, rgba(255,255,255,.28) 45%, rgba(255,255,255,.05) 52%, transparent 65%)", mixBlendMode: "soft-light" }} />
      ) : null}
      {/* Étoiles scintillantes (Légendaire) */}
      {legendaire && !compact && (
        <React.Fragment>
          <span className="bd-etoile" style={{ top: 8, left: 10, fontSize: 11 }}>✦</span>
          <span className="bd-etoile" style={{ top: "38%", right: 8, fontSize: 9, animationDelay: ".9s" }}>✦</span>
          <span className="bd-etoile" style={{ bottom: 14, left: "22%", fontSize: 10, animationDelay: "1.7s" }}>✦</span>
        </React.Fragment>
      )}
      {/* Cadre intérieur */}
      <div style={{ borderRadius: 11, border: "1px solid rgba(42,36,22,.35)", background: "linear-gradient(rgba(255,255,255,.16), rgba(255,255,255,.02))", padding: compact ? 4 : 6, position: "relative" }}>
        {/* Bandeau titre */}
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: 6, padding: compact ? "0 2px 4px" : "1px 3px 6px" }}>
          <span style={{ fontFamily: serif, fontSize: compact ? 12 : 15, fontWeight: 700, color: "#2A2416", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", textShadow: "0 1px 0 rgba(255,255,255,.25)" }}>{obs.nom || "Spécimen"}</span>
          <span style={{ flexShrink: 0, display: "inline-flex", alignItems: "center", gap: 3, background: "rgba(42,36,22,.85)", border: `1px solid ${el.c}`, color: el.c, fontFamily: sans, fontSize: compact ? 8.5 : 9.5, fontWeight: 800, letterSpacing: 0.4, padding: compact ? "1px 5px" : "2px 7px", borderRadius: 10 }}>
            {el.emoji}{!compact && <span>{c.element}</span>}
          </span>
        </div>
        {/* Illustration (recadrée si un cadre a été défini) */}
        <div style={{ position: "relative", borderRadius: 8, overflow: "hidden", border: "2px solid rgba(42,36,22,.45)", boxShadow: "inset 0 0 12px rgba(0,0,0,.35)" }}>
          <PhotoBlobRecadree blob={obs.photo} zone={obs.cadreCarte} alt={obs.nom} style={{ width: "100%", aspectRatio: compact ? "1" : "4/3", objectFit: "cover", display: "block" }} />
          <div style={{ position: "absolute", inset: 0, pointerEvents: "none", background: "radial-gradient(ellipse at center, transparent 62%, rgba(0,0,0,.28) 100%)" }} />
          <div style={{ position: "absolute", top: 5, right: 5, background: "rgba(42,36,22,.88)", color: pal.couleur, border: `1px solid ${pal.bord}`, fontFamily: sans, fontSize: compact ? 8 : 9.5, fontWeight: 800, letterSpacing: 0.6, textTransform: "uppercase", padding: "2px 7px", borderRadius: 10 }}>{pal.nom}</div>
          {c.authentique === false && (
            <div title={c.authenticite_raison || "Authenticité douteuse"} style={{ position: "absolute", top: 5, left: 5, background: "rgba(140,40,30,.92)", color: "#FFDDD4", border: "1px solid #E5603E", fontFamily: sans, fontSize: compact ? 8 : 9, fontWeight: 800, letterSpacing: 0.3, padding: "2px 6px", borderRadius: 10 }}>⚠ NON VÉRIFIÉE</div>
          )}
        </div>
        {/* Nom latin */}
        {!compact && (
          <div style={{ fontFamily: serif, fontStyle: "italic", fontSize: 11, color: "#4A4228", textAlign: "center", padding: "5px 0 3px", borderBottom: "1px solid rgba(42,36,22,.18)", marginBottom: 3 }}>{obs.nomSci || "—"}</div>
        )}
        {/* Stats en barres */}
        <div style={{ padding: compact ? "3px 2px 1px" : "4px 3px 2px" }}>
          {stat("Attaque", c.attaque, "⚔️", "#B0563C")}
          {stat("Défense", c.defense, "🛡️", "#5A7A4A")}
          {stat("Vitesse", c.vitesse, "💨", "#5A7AA8")}
        </div>
        {/* Capacité */}
        {!compact && c.capacite && (
          <div style={{ margin: "5px 2px 2px", padding: "6px 9px", background: "rgba(42,36,22,.14)", border: "1px solid rgba(42,36,22,.2)", borderRadius: 7 }}>
            <div style={{ fontFamily: sans, fontSize: 11, fontWeight: 800, color: "#2A2416" }}>✦ {c.capacite.nom}</div>
            <div style={{ fontFamily: sans, fontSize: 10.5, color: "#3A3220", lineHeight: 1.35 }}>{c.capacite.effet}</div>
          </div>
        )}
        {!compact && c.citation && (
          <div style={{ fontFamily: serif, fontStyle: "italic", fontSize: 10.5, color: "#4A4228", textAlign: "center", padding: "3px 8px 3px" }}>« {c.citation} »</div>
        )}
      </div>
    </div>
  );
}

function Detail({ obs, observations, onFermer, onSupprimer, onModifier, onMajFiche, onMajCarte, onMajCadre, prenom, onDefinirPrenom, utilisateur, onAllerConnexion }) {
  const [confirme, setConfirme] = useState(false);
  const [ficheEtat, setFicheEtat] = useState(""); // "" | recherche | echec
  const [ficheErreur, setFicheErreur] = useState("");
  const [carteEtat, setCarteEtat] = useState(""); // "" | recherche | echec
  const [carteErreur, setCarteErreur] = useState("");
  const [avertAuth, setAvertAuth] = useState("");
  const [murEtat, setMurEtat] = useState(""); // "" | envoi | ok | echec
  const [murErreur, setMurErreur] = useState("");
  const [prenomSaisi, setPrenomSaisi] = useState(prenom || "");
  const [precisionPos, setPrecisionPos] = useState(() => {
    try { return localStorage.getItem("biodex_precision_pos") || "approx"; } catch { return "approx"; }
  });
  const [profilEtat, setProfilEtat] = useState(""); // "" | envoi | ok | echec
  const [profilErreur, setProfilErreur] = useState("");
  const [cadrage, setCadrage] = useState(false);
  const [cadreZone, setCadreZone] = useState({ x: 0.2, y: 0.2, w: 0.6, h: 0.6 });
  const [cadrageMur, setCadrageMur] = useState(false); // panneau de recadrage ouvert (partage au mur)
  const [cadreMur, setCadreMur] = useState(null); // null = photo entière
  const photoDetailUrl = useBlobUrl(obs.photo);
  const ligne = { display: "flex", justifyContent: "space-between", padding: "10px 0", borderBottom: `1px solid ${C.bordure}`, fontFamily: sans, fontSize: 14 };
  const cle = { color: C.lichen, fontWeight: 600 };
  const val = { color: C.papier, textAlign: "right" };
  const meteo = cielOf(obs.ciel);
  const identifie = !!(obs.nom || obs.nomSci);
  const fiche = obs.fiche || null;

  async function lancerFiche() {
    if (ficheEtat === "recherche") return;
    setFicheEtat("recherche");
    setFicheErreur("");
    try {
      const f = await genererFiche(obs.nom, obs.nomSci);
      await onMajFiche(obs.id, f);
      setFicheEtat("");
    } catch (e) {
      setFicheErreur("Génération indisponible (réseau, ou service non configuré).");
      setFicheEtat("echec");
    }
  }

  async function lancerCarte() {
    if (carteEtat === "recherche") return;
    setCarteEtat("recherche");
    setCarteErreur("");
    setAvertAuth("");
    try {
      const c = await genererCarte(obs.nom, obs.nomSci, obs.photo);
      // Rareté de carte basée sur les vraies données iNaturalist (IA en secours si indispo).
      try {
        const count = await chargerRareteInat(obs.nomSci || obs.nom);
        const rData = rareteDepuisCount(count);
        if (rData != null && c) c.rarete = rData;
      } catch {}
      await onMajCarte(obs.id, c);
      setCarteEtat("");
      if (c && c.authentique === false) {
        setAvertAuth(c.authenticite_raison || "Cette photo ne semble pas être une photo d'insecte prise sur le terrain.");
      }
    } catch (e) {
      setCarteErreur("Forge indisponible (réseau, ou service non configuré).");
      setCarteEtat("echec");
    }
  }

  async function partagerAuMur() {
    if (murEtat === "envoi") return;
    const auteur = (prenomSaisi || "").trim();
    if (!auteur) { setMurErreur("Indique ton prénom avant de partager."); return; }
    onDefinirPrenom(auteur);
    setMurEtat("envoi");
    setMurErreur("");
    try {
      await publierAuMur(obs, auteur, precisionPos, cadreMur);
      try { localStorage.setItem("biodex_precision_pos", precisionPos); } catch {}
      setMurEtat("ok");
    } catch (e) {
      setMurErreur(String(e.message || "Partage impossible") + ".");
      setMurEtat("echec");
    }
  }

  async function ajouterProfil() {
    if (profilEtat === "envoi") return;
    setProfilEtat("envoi");
    setProfilErreur("");
    try {
      const auteur = (prenomSaisi || prenom || (utilisateur && utilisateur.email ? utilisateur.email.split("@")[0] : "")).trim();
      await ajouterAuProfil(obs, auteur);
      setProfilEtat("ok");
    } catch (e) {
      setProfilErreur(String(e.message || "Ajout impossible") + ".");
      setProfilEtat("echec");
    }
  }

  const champFiche = (label, valeur) => valeur ? (
    <div style={{ marginBottom: 10 }}>
      <div style={{ fontFamily: sans, fontSize: 11, fontWeight: 700, letterSpacing: 0.6, textTransform: "uppercase", color: C.lichen, marginBottom: 3 }}>{label}</div>
      <div style={{ fontFamily: sans, fontSize: 14, color: C.papier, lineHeight: 1.5 }}>{valeur}</div>
    </div>
  ) : null;

  return (
    <div style={{ padding: 16, maxWidth: 560, margin: "0 auto" }}>
      <Bouton onClick={onFermer} style={{ marginBottom: 14 }}>← Collection</Bouton>
      <PhotoBlob blob={obs.photo} alt={obs.nom} style={{ width: "100%", borderRadius: 12, display: "block", border: `1px solid ${C.bordure}`, boxShadow: "0 4px 14px rgba(0,0,0,.35)" }} />
      {Array.isArray(obs.photosSupp) && obs.photosSupp.length > 0 && (
        <div style={{ display: "flex", gap: 8, marginTop: 8, flexWrap: "wrap" }}>
          {obs.photosSupp.map((b, i) => (
            <PhotoBlob key={i} blob={b} alt={"Vue complémentaire " + (i + 2)}
              style={{ width: 78, height: 78, objectFit: "cover", borderRadius: 9, border: `1px solid ${C.bordure}`, display: "block" }} />
          ))}
        </div>
      )}
      <h2 style={{ fontFamily: serif, color: C.papier, fontSize: 25, fontWeight: 600, margin: "18px 0 2px", letterSpacing: 0.2 }}>
        {obs.nom || "Spécimen non identifié"}
      </h2>
      <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap", marginBottom: 16 }}>
        <span style={{ fontFamily: serif, fontStyle: "italic", fontSize: 17, color: C.ambre }}>
          {obs.nomSci || "Identification à préciser"}
        </span>
        {(() => { const c = litCacheRarete(cleEspeceMur(obs)); return c && typeof c.count === "number" ? <BadgeRarete count={c.count} /> : null; })()}
      </div>

      {(() => {
        const cle = cleEspeceMur(obs);
        if (!cle) return null;
        const n = compteEspeceCollection(cle, observations, null);
        if (n <= 1) return null;
        return (
          <div style={{ display: "inline-flex", alignItems: "center", gap: 6, marginBottom: 16, padding: "5px 11px", borderRadius: 16, background: C.panneau, border: `1px solid ${C.bordure}`, fontFamily: sans, fontSize: 12.5, color: C.papierSombre }}>
            📸 Ta <b style={{ color: C.papier }}>{n}</b>ᵉ observation de cette espèce
          </div>
        );
      })()}

      {obs.notable && String(obs.notable).trim().length > 3 && (
        <div style={{ display: "flex", gap: 8, alignItems: "flex-start", padding: "11px 13px", marginBottom: 16, borderRadius: 10, background: "linear-gradient(#2E2410, #241C0C)", border: "1px solid #B8862E", boxShadow: "0 2px 8px rgba(0,0,0,.25)" }}>
          <span style={{ fontSize: 19, flexShrink: 0, lineHeight: 1.2 }}>🌟</span>
          <div>
            <div style={{ fontFamily: sans, fontSize: 12, fontWeight: 800, letterSpacing: 0.4, textTransform: "uppercase", color: "#E4C878", marginBottom: 2 }}>Observation notable</div>
            <div style={{ fontFamily: sans, fontSize: 13.5, color: C.papier, lineHeight: 1.45 }}>{obs.notable}</div>
          </div>
        </div>
      )}

      <div style={ligne}><span style={cle}>Date</span><span style={val}>{formatDate(obs.date)}</span></div>
      <div style={ligne}><span style={cle}>Biotope</span><span style={val}>{biotopeOf(obs.biotope).emoji} {biotopeOf(obs.biotope).label}</span></div>
      {obs.moment && momentOf(obs.moment) && (
        <div style={ligne}><span style={cle}>Moment</span><span style={val}>{momentOf(obs.moment).emoji} {momentOf(obs.moment).label}</span></div>
      )}
      {obs.spot && (
        <div style={ligne}><span style={cle}>Lieu</span><span style={val}>📍 {obs.spot}</span></div>
      )}
      <div style={ligne}>
        <span style={cle}>Météo{obs.meteoAuto ? " (auto)" : ""}</span>
        <span style={val}>{meteo ? `${meteo.emoji} ${meteo.label}` : "—"}{obs.temp ? ` · ${obs.temp}°C` : ""}</span>
      </div>
      <div style={ligne}>
        <span style={cle}>Position</span>
        {obs.gps ? (
          <a href={`https://www.openstreetmap.org/?mlat=${obs.gps.lat}&mlon=${obs.gps.lon}#map=16/${obs.gps.lat}/${obs.gps.lon}`}
             target="_blank" rel="noopener noreferrer" style={{ ...val, color: C.ambre, textDecoration: "underline" }}>
            {obs.gps.lat}, {obs.gps.lon} 🗺️
          </a>
        ) : (
          <span style={val}>Non enregistrée</span>
        )}
      </div>
      {obs.notes && (
        <div style={{ padding: "12px 0", fontFamily: sans, fontSize: 14, color: C.papier, lineHeight: 1.5 }}>
          <div style={{ color: C.lichen, fontWeight: 600, marginBottom: 4 }}>Notes de terrain</div>
          {obs.notes}
        </div>
      )}

      {/* Passerelle science participative (OPIE + iNaturalist), repliable */}
      {identifie && (
        <div style={{ marginTop: 16 }}>
          <SectionPliable titre="🔬 Contribuer à la science" ouvertParDefaut={!!enqueteOpiePour(obs)}>
            <PasserelleInat obs={obs} />
          </SectionPliable>
        </div>
      )}

      {/* Fiche naturaliste */}
      <div style={{ marginTop: 18 }}>
        {!fiche && identifie && (
          <div>
            <Bouton variante="primaire" onClick={lancerFiche} disabled={ficheEtat === "recherche"} style={{ width: "100%" }}>
              {ficheEtat === "recherche" ? "📖 Génération de la fiche…" : "📖 Générer la fiche naturaliste"}
            </Bouton>
            {ficheErreur && <div style={{ fontFamily: sans, fontSize: 13, color: "#E8A88F", marginTop: 8 }}>{ficheErreur}</div>}
          </div>
        )}
        {!fiche && !identifie && (
          <div style={{ fontFamily: sans, fontSize: 13, color: C.papierSombre, fontStyle: "italic", padding: "10px 0" }}>
            Identifie d'abord ce spécimen (nom ou nom scientifique) pour pouvoir générer sa fiche.
          </div>
        )}

        {fiche && (
          <div style={{ padding: "14px 16px", background: "linear-gradient(#212A1B, #1A2015)", border: `1px solid ${C.bordure}`, borderRadius: 12, boxShadow: "0 3px 10px rgba(0,0,0,.25)" }}>
            <div style={{ fontFamily: serif, fontSize: 18, fontWeight: 600, color: C.ambreClair, marginBottom: 12 }}>📖 Fiche naturaliste</div>

            {fiche.role_ecosysteme && String(fiche.role_ecosysteme).trim().length > 3 && (
              <div style={{ marginBottom: 10, padding: "12px 14px", background: "linear-gradient(#1E2A18, #182213)", border: "1px solid #6F9450", borderRadius: 10 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 7, marginBottom: 5 }}>
                  <span style={{ fontSize: 17 }}>🌿</span>
                  <span style={{ fontFamily: sans, fontSize: 12.5, fontWeight: 800, letterSpacing: 0.4, textTransform: "uppercase", color: "#A6CC82" }}>Pourquoi il compte</span>
                </div>
                <div style={{ fontFamily: sans, fontSize: 14, color: C.papier, lineHeight: 1.55 }}>{fiche.role_ecosysteme}</div>
              </div>
            )}

            {fiche.geste && String(fiche.geste).trim().length > 3 && (
              <div style={{ marginBottom: 14, padding: "12px 14px", background: "linear-gradient(#2A2410, #221C0C)", border: "1px solid #B8862E", borderRadius: 10 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 7, marginBottom: 5 }}>
                  <span style={{ fontSize: 17 }}>🤲</span>
                  <span style={{ fontFamily: sans, fontSize: 12.5, fontWeight: 800, letterSpacing: 0.4, textTransform: "uppercase", color: "#E4C878" }}>Un geste pour l'aider</span>
                </div>
                <div style={{ fontFamily: sans, fontSize: 14, color: C.papier, lineHeight: 1.55 }}>{fiche.geste}</div>
              </div>
            )}

            {champFiche("Description", fiche.description)}
            {champFiche("Alimentation", fiche.alimentation)}
            {champFiche("Période d'apparition", fiche.periode)}
            {champFiche("Habitat", fiche.habitat)}
            {champFiche("Répartition", fiche.repartition)}
            {champFiche("Statut de conservation", fiche.conservation)}
            {champFiche("À savoir", fiche.faits)}

            <div style={{ marginTop: 12, padding: "10px 12px", background: "rgba(0,0,0,.2)", borderRadius: 8 }}>
              <div style={{ fontFamily: sans, fontSize: 12, color: C.papierSombre, lineHeight: 1.5 }}>
                ⚠️ Fiche générée par IA, à titre indicatif{fiche.fiabilite ? ` (fiabilité estimée : ${fiche.fiabilite})` : ""}. Le statut de conservation notamment doit être vérifié sur une source officielle.
              </div>
              <a href={lienINaturalist(obs.nomSci, obs.nom)} target="_blank" rel="noopener noreferrer"
                 style={{ display: "inline-block", marginTop: 8, fontFamily: sans, fontSize: 13, fontWeight: 600, color: C.ambre, textDecoration: "underline" }}>
                🔗 Vérifier sur iNaturalist
              </a>
            </div>

            <button onClick={lancerFiche} disabled={ficheEtat === "recherche"} className={"bd-refresh" + (ficheEtat === "recherche" ? " bd-spinning" : "")} style={{ marginTop: 10 }}>
              <span className="bd-refresh-ico">↻</span>{ficheEtat === "recherche" ? "Régénération…" : "Régénérer la fiche"}
            </button>
          </div>
        )}
      </div>

      {/* Carte de collection */}
      <div style={{ marginTop: 18 }}>
        {obs.carte ? (
          <div>
            <div style={{ fontFamily: sans, fontSize: 12, fontWeight: 700, letterSpacing: 0.6, textTransform: "uppercase", color: C.lichen, marginBottom: 10 }}>🎴 Carte de collection</div>
            {cadrage ? (
              <div>
                <div style={{ fontFamily: sans, fontSize: 13, color: C.papier, marginBottom: 8, lineHeight: 1.45 }}>
                  Déplace et redimensionne le cadre pour centrer l'insecte (le coin en bas à droite redimensionne) :
                </div>
                <SelecteurZone photoUrl={photoDetailUrl} zone={cadreZone} onChange={setCadreZone} />
                <div style={{ display: "flex", gap: 8, marginTop: 10 }}>
                  <Bouton onClick={() => setCadrage(false)} style={{ flex: 1 }}>Annuler</Bouton>
                  <Bouton variante="primaire" onClick={() => { onMajCadre(obs.id, cadreZone); setCadrage(false); }} style={{ flex: 1 }}>✓ Valider le cadre</Bouton>
                </div>
              </div>
            ) : (
              <div>
                <div style={{ maxWidth: 300, margin: "0 auto" }}>
                  <CarteInsecte obs={obs} />
                </div>
                <div style={{ display: "flex", gap: 8, justifyContent: "center", marginTop: 12, flexWrap: "wrap" }}>
                  <button onClick={() => { setCadreZone(obs.cadreCarte || { x: 0.2, y: 0.2, w: 0.6, h: 0.6 }); setCadrage(true); }}
                    style={{ fontFamily: sans, fontSize: 12, fontWeight: 600, padding: "6px 12px", borderRadius: 6, border: `1px solid ${C.bordure}`, background: C.panneauClair, color: C.papierSombre, cursor: "pointer" }}>
                    🖼️ Cadrer l'insecte
                  </button>
                  {obs.cadreCarte && (
                    <button onClick={() => onMajCadre(obs.id, null)}
                      style={{ fontFamily: sans, fontSize: 12, fontWeight: 600, padding: "6px 12px", borderRadius: 6, border: `1px solid ${C.bordure}`, background: "transparent", color: C.papierSombre, cursor: "pointer" }}>
                      ✕ Retirer le cadre
                    </button>
                  )}
                  <button onClick={lancerCarte} disabled={carteEtat === "recherche"} className={"bd-refresh" + (carteEtat === "recherche" ? " bd-spinning" : "")}>
                    <span className="bd-refresh-ico">↻</span>{carteEtat === "recherche" ? "Reforge…" : "Reforger"}
                  </button>
                </div>
              </div>
            )}
          </div>
        ) : identifie ? (
          <div>
            <Bouton variante="primaire" onClick={lancerCarte} disabled={carteEtat === "recherche"} style={{ width: "100%" }}>
              {carteEtat === "recherche" ? "🎴 Forge de la carte…" : "🎴 Forger une carte de collection"}
            </Bouton>
            {carteErreur && <div style={{ fontFamily: sans, fontSize: 13, color: "#E8A88F", marginTop: 8 }}>{carteErreur}</div>}
            {avertAuth && (
              <div style={{ marginTop: 10, padding: "10px 12px", background: "linear-gradient(#2E1815, #241310)", border: "1px solid #E5603E", borderRadius: 8, fontFamily: sans, fontSize: 12.5, color: "#FFDDD4", lineHeight: 1.5 }}>
                ⚠️ <b>Carte marquée « non vérifiée »</b><br />
                {avertAuth}<br />
                <span style={{ color: "#D8A090", fontSize: 11.5 }}>La carte est utilisable, mais elle portera un badge « non vérifiée » dans la ligue. Pour une carte vérifiée, forge-la depuis une photo que tu as prise toi-même sur le terrain.</span>
              </div>
            )}
          </div>
        ) : (
          <div style={{ fontFamily: sans, fontSize: 13, color: C.papierSombre, fontStyle: "italic" }}>
            Identifie ce spécimen pour pouvoir forger sa carte de collection.
          </div>
        )}
      </div>

      {/* Partage au mur commun */}
      {MUR_ACTIF && (
        <div style={{ marginTop: 18 }}>
          {murEtat === "ok" ? (
            <div style={{ padding: "12px 14px", background: "linear-gradient(#2C3623, #232B1D)", border: `1px solid #A8863A`, borderRadius: 10, fontFamily: sans, fontSize: 14, color: C.papier, textAlign: "center" }}>
              ✅ Partagé sur le mur de la bande !
            </div>
          ) : (
            <div style={{ padding: "12px 14px", background: C.panneau, border: `1px solid ${C.bordure}`, borderRadius: 10 }}>
              <div style={{ fontFamily: sans, fontSize: 12, fontWeight: 700, letterSpacing: 0.6, textTransform: "uppercase", color: C.lichen, marginBottom: 8 }}>🌐 Mur commun</div>
              <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 10 }}>
                <span style={{ fontFamily: sans, fontSize: 13, color: C.papierSombre, whiteSpace: "nowrap" }}>Ton prénom :</span>
                <input value={prenomSaisi} onChange={(e) => setPrenomSaisi(e.target.value)} placeholder="ex : Sylvain" maxLength={40}
                  style={{ flex: 1, boxSizing: "border-box", background: C.fond, color: C.papier, border: `1px solid ${C.bordure}`, borderRadius: 8, padding: "8px 10px", fontFamily: sans, fontSize: 14, outline: "none" }} />
              </div>

              {obs.gps && (
                <div style={{ marginBottom: 10 }}>
                  <div style={{ fontFamily: sans, fontSize: 12, color: C.papierSombre, marginBottom: 6 }}>Position partagée sur la carte de la bande :</div>
                  <div style={{ display: "flex", gap: 6 }}>
                    {[["exacte", "📍", "Exacte"], ["approx", "🌫️", "~1 km"], ["masquee", "🚫", "Masquée"]].map(([val, emo, lab]) => (
                      <button key={val} onClick={() => setPrecisionPos(val)}
                        style={{ flex: 1, padding: "8px 4px", borderRadius: 8, cursor: "pointer", fontFamily: sans, fontSize: 12.5, fontWeight: 700,
                          border: `1px solid ${precisionPos === val ? "#A8863A" : C.bordure}`,
                          background: precisionPos === val ? "linear-gradient(#2C3623, #232B1D)" : C.fond,
                          color: precisionPos === val ? C.ambreClair : C.papierSombre }}>
                        <span style={{ display: "block", fontSize: 15, marginBottom: 2 }}>{emo}</span>{lab}
                      </button>
                    ))}
                  </div>
                  <div style={{ fontFamily: sans, fontSize: 11, color: C.papierSombre, marginTop: 5, fontStyle: "italic", lineHeight: 1.4 }}>
                    {precisionPos === "exacte" && "L'endroit précis de ta trouvaille sera visible par la bande."}
                    {precisionPos === "approx" && "Une zone d'environ 1 km sera montrée, pas le point exact."}
                    {precisionPos === "masquee" && "Aucune position ne sera partagée pour cette trouvaille."}
                  </div>
                </div>
              )}

              {/* Recadrage de la photo publiée */}
              {obs.photo && (
                <div style={{ marginBottom: 12 }}>
                  {!cadrageMur ? (
                    <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
                      <Bouton onClick={() => { setCadreZone(cadreMur || { x: 0.15, y: 0.15, w: 0.7, h: 0.7 }); setCadrageMur(true); }} style={{ flex: 1 }}>
                        ✂️ {cadreMur ? "Modifier le cadrage" : "Recadrer la photo"}
                      </Bouton>
                      {cadreMur && (
                        <Bouton onClick={() => setCadreMur(null)}>↺ Photo entière</Bouton>
                      )}
                    </div>
                  ) : (
                    <div style={{ padding: 12, borderRadius: 10, background: C.panneau, border: `1px solid ${C.bordure}` }}>
                      <div style={{ fontFamily: sans, fontSize: 12.5, color: C.papierSombre, marginBottom: 8, lineHeight: 1.5 }}>
                        ✂️ Déplace et redimensionne le cadre pour choisir ce qui sera publié sur le mur.
                      </div>
                      <SelecteurZone photoUrl={photoDetailUrl} zone={cadreZone} onChange={setCadreZone} />
                      <div style={{ display: "flex", gap: 8, marginTop: 10 }}>
                        <Bouton variante="primaire" onClick={() => { setCadreMur(cadreZone); setCadrageMur(false); }} style={{ flex: 1 }}>✓ Valider le cadrage</Bouton>
                        <Bouton onClick={() => setCadrageMur(false)}>Annuler</Bouton>
                      </div>
                    </div>
                  )}
                  {cadreMur && !cadrageMur && (
                    <div style={{ fontFamily: sans, fontSize: 11, color: C.lichen, marginTop: 6, fontStyle: "italic" }}>
                      ✂️ La photo sera publiée recadrée.
                    </div>
                  )}
                </div>
              )}

              <Bouton variante="primaire" onClick={partagerAuMur} disabled={murEtat === "envoi"} style={{ width: "100%" }}>
                {murEtat === "envoi" ? "📤 Partage en cours…" : "📤 Partager au mur"}
              </Bouton>
              {murErreur && <div style={{ fontFamily: sans, fontSize: 13, color: "#E8A88F", marginTop: 8 }}>{murErreur}</div>}
              <div style={{ fontFamily: sans, fontSize: 11, color: C.papierSombre, marginTop: 8, fontStyle: "italic" }}>
                Ta photo, l'espèce et le biotope seront visibles par toute la bande.{!obs.gps && " Cette observation n'a pas de position enregistrée."}
              </div>
            </div>
          )}
        </div>
      )}

      {/* Ajouter à mon profil public (collection partagée) */}
      {MUR_ACTIF && identifie && (
        <div style={{ marginTop: 18 }}>
          {profilEtat === "ok" ? (
            <div style={{ padding: "12px 14px", background: "linear-gradient(#2C3623, #232B1D)", border: `1px solid #A8863A`, borderRadius: 10, fontFamily: sans, fontSize: 14, color: C.papier, textAlign: "center" }}>
              ✅ Ajouté à ton profil de collectionneur !
            </div>
          ) : (
            <div style={{ padding: "12px 14px", background: C.panneau, border: `1px solid ${C.bordure}`, borderRadius: 10 }}>
              <div style={{ fontFamily: sans, fontSize: 12, fontWeight: 700, letterSpacing: 0.6, textTransform: "uppercase", color: C.lichen, marginBottom: 8 }}>🏆 Mon profil de collectionneur</div>
              {utilisateur ? (
                <div>
                  <Bouton variante="primaire" onClick={ajouterProfil} disabled={profilEtat === "envoi"} style={{ width: "100%" }}>
                    {profilEtat === "envoi" ? "Ajout…" : "🏆 Ajouter cette espèce à mon profil"}
                  </Bouton>
                  {profilErreur && <div style={{ fontFamily: sans, fontSize: 13, color: "#E8A88F", marginTop: 8 }}>{profilErreur}</div>}
                  <div style={{ fontFamily: sans, fontSize: 11, color: C.papierSombre, marginTop: 8, fontStyle: "italic" }}>
                    Seules les infos (espèce, date, biotope) sont partagées sur ton profil — pas la photo. Visible par la bande.
                  </div>
                </div>
              ) : (
                <div>
                  <div style={{ fontFamily: sans, fontSize: 13, color: C.papierSombre, lineHeight: 1.5, marginBottom: 10 }}>
                    Connecte-toi pour construire ton profil de collectionneur et te comparer à la bande.
                  </div>
                  <Bouton onClick={onAllerConnexion} style={{ width: "100%" }}>👤 Se connecter</Bouton>
                </div>
              )}
            </div>
          )}
        </div>
      )}

      <div style={{ marginTop: 20 }}>
        {!confirme && (
          <Bouton variante="primaire" onClick={() => onModifier && onModifier(obs.id)} style={{ width: "100%", marginBottom: 10 }}>✏️ Modifier cette observation</Bouton>
        )}
        {confirme ? (
          <div style={{ display: "flex", gap: 10, alignItems: "center" }}>
            <span style={{ fontFamily: sans, fontSize: 14, color: C.papierSombre, flex: 1 }}>Supprimer définitivement ?</span>
            <Bouton onClick={() => setConfirme(false)}>Non</Bouton>
            <Bouton variante="danger" onClick={() => onSupprimer(obs.id)}>Oui, supprimer</Bouton>
          </div>
        ) : (
          <Bouton variante="danger" onClick={() => setConfirme(true)}>Supprimer cette observation</Bouton>
        )}
      </div>
    </div>
  );
}

// ---------- Sélecteur de point sur carte (pour photo importée sans GPS) ----------
function SelecteurPoint({ point, onChange, onFermer }) {
  const divRef = useRef(null);
  const carteRef = useRef(null);
  const marqueurRef = useRef(null);

  useEffect(() => {
    if (!divRef.current || typeof L === "undefined") return;
    // Centre initial : point existant, sinon France
    const centre = point ? [point.lat, point.lon] : [46.6, 2.5];
    const zoom = point ? 13 : 5;
    const carte = L.map(divRef.current, { zoomControl: true }).setView(centre, zoom);
    carteRef.current = carte;
    L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png", { maxZoom: 19, attribution: "© OpenStreetMap" }).addTo(carte);

    function poser(lat, lon) {
      if (marqueurRef.current) marqueurRef.current.setLatLng([lat, lon]);
      else marqueurRef.current = L.circleMarker([lat, lon], { radius: 9, color: "#2A2519", weight: 2, fillColor: "#C9A24B", fillOpacity: 0.95 }).addTo(carte);
      onChange({ lat: Math.round(lat * 100000) / 100000, lon: Math.round(lon * 100000) / 100000, precision: 0, manuel: true });
    }
    if (point) poser(point.lat, point.lon);
    carte.on("click", (e) => poser(e.latlng.lat, e.latlng.lng));

    setTimeout(() => carte.invalidateSize(), 100);
    return () => carte.remove();
  }, []);

  return (
    <div style={{ marginTop: 10 }}>
      <div style={{ fontFamily: sans, fontSize: 13, color: C.papier, marginBottom: 8, lineHeight: 1.4 }}>
        Touche la carte à l'endroit où tu as fait l'observation :
      </div>
      <div ref={divRef} style={{ width: "100%", height: 240, borderRadius: 10, overflow: "hidden", border: `1px solid ${C.bordure}` }} />
      <div style={{ display: "flex", gap: 8, marginTop: 8 }}>
        <Bouton onClick={onFermer} style={{ flex: 1 }}>Terminé</Bouton>
      </div>
    </div>
  );
}

// ---------- Vue : Ligue (défis sociaux) ----------
function Ligue({ observations, prenom, onDefinirPrenom, onDefier, onFermer, embarque }) {
  const [onglet, setOnglet] = useState("champions"); // champions | mescartes | classement
  const [ligue, setLigue] = useState([]);
  const [scores, setScores] = useState([]);
  const [etat, setEtat] = useState("chargement");
  const [saisiePrenom, setSaisiePrenom] = useState(prenom || "");
  const [enCours, setEnCours] = useState(null);
  const [message, setMessage] = useState("");

  const mesCartesForgees = observations.filter((o) => o.carte);
  const moi = (prenom || "").trim().toLowerCase();

  async function rafraichir() {
    if (!MUR_ACTIF) { setEtat("inactif"); return; }
    setEtat("chargement");
    try {
      const [l, s] = await Promise.all([chargerLigue(), chargerScores()]);
      setLigue(l); setScores(s); setEtat("ok");
    } catch { setEtat("echec"); }
  }
  useEffect(() => { rafraichir(); }, []);

  const mesCartesEngagees = ligue.filter((c) => (c.proprietaire || "").trim().toLowerCase() === moi);
  const championsAdverses = ligue.filter((c) => (c.proprietaire || "").trim().toLowerCase() !== moi);

  async function engager(obs) {
    const p = (saisiePrenom || prenom || "").trim();
    if (!p) { setMessage("Indique ton prénom d'abord."); return; }
    if (mesCartesEngagees.length >= 3) { setMessage("Tu as déjà 3 cartes dans la ligue (le maximum)."); return; }
    onDefinirPrenom(p);
    setEnCours("engager-" + obs.id);
    setMessage("");
    try {
      await engagerCarte(obs, p);
      await rafraichir();
      setMessage("✓ " + (obs.nom || "Carte") + " engagée dans la ligue !");
    } catch (e) { setMessage(String(e.message || "Échec")); }
    setEnCours(null);
  }

  async function retirer(carte) {
    setEnCours("retirer-" + carte.id);
    try { await retirerCarteLigue(carte.proprietaire, carte.carte_id); await rafraichir(); }
    catch {}
    setEnCours(null);
  }

  const dejaEngagee = (obsId) => mesCartesEngagees.some((c) => c.carte_id === String(obsId));

  return (
    <div style={embarque ? {} : { padding: 16, maxWidth: 560, margin: "0 auto" }}>
      {!embarque && <Bouton onClick={onFermer} style={{ marginBottom: 14 }}>← Retour</Bouton>}

      <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 4 }}>
        <span style={{ fontSize: 28 }}>🏆</span>
        <div className="serif" style={{ fontFamily: serif, fontSize: 22, fontWeight: 600, color: C.papier }}>La Ligue</div>
      </div>
      <div style={{ fontFamily: sans, fontSize: 13, color: C.papierSombre, marginBottom: 14, lineHeight: 1.5 }}>
        Engage tes meilleures cartes, défie celles de la bande. Quand tu défies une carte, son propriétaire n'a pas besoin d'être là : l'appli la joue pour lui.
      </div>

      {/* Prénom */}
      {MUR_ACTIF && (
        <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 14, padding: "10px 12px", background: C.panneau, border: `1px solid ${C.bordure}`, borderRadius: 10 }}>
          <span style={{ fontFamily: sans, fontSize: 13, color: C.papierSombre, whiteSpace: "nowrap" }}>Ton prénom :</span>
          <input value={saisiePrenom} onChange={(e) => setSaisiePrenom(e.target.value)} onBlur={() => onDefinirPrenom((saisiePrenom || "").trim())} placeholder="ex : Sylvain" maxLength={40}
            style={{ flex: 1, boxSizing: "border-box", background: C.fond, color: C.papier, border: `1px solid ${C.bordure}`, borderRadius: 8, padding: "7px 10px", fontFamily: sans, fontSize: 14, outline: "none" }} />
        </div>
      )}

      {!MUR_ACTIF && (
        <div style={{ padding: 14, background: C.panneau, border: `1px solid ${C.bordure}`, borderRadius: 10, fontFamily: sans, fontSize: 14, color: C.papierSombre }}>

      {message && <div style={{ fontFamily: sans, fontSize: 13, color: message.startsWith("✓") ? "#A6CC82" : "#E8A88F", marginBottom: 12, textAlign: "center" }}>{message}</div>}

      {etat === "echec" && <div style={{ textAlign: "center", color: "#E8A88F", padding: 20 }}>Impossible de charger la ligue.</div>}

      {/* ONGLET DÉFIER */}
      {etat === "ok" && onglet === "champions" && (
        <div>

            <div style={{ textAlign: "center", color: C.papierSombre, fontSize: 14, padding: "24px 16px", background: C.panneau, borderRadius: 10, lineHeight: 1.6 }}>

            </div>
          ) : (
            championsAdverses.map((c) => {

// Chaque semaine, 3 défis tirés au sort (mêmes défis pour toute la bande : tirage par n° de semaine).
// Ils se valident tout seuls dès qu'une observation de la semaine remplit la condition.
const DEFIS = [
  { id: "rouge", emoji: "🔴", titre: "Le rouge est mis", texte: "Trouve un insecte à dominante rouge ou orange.", test: (o) => /coccinel|rouge|orange|carmin|pyrrhocor|gendarme|vulcain|cardinal/i.test(sansAccents(o.nom + " " + o.nomSci)) },
  { id: "noir", emoji: "⚫", titre: "Tout de noir vêtu", texte: "Déniche un insecte noir (carabe, fourmi, bousier…).", test: (o) => /carab|noir|fourmi|bousier|scarab|blaps|charbon/i.test(sansAccents(o.nom + " " + o.nomSci)) },
  { id: "aile", emoji: "🦋", titre: "Sur des ailes", texte: "Photographie un insecte aux ailes déployées ou en vol.", test: (o) => deduireOrdre(o) === "lepidopteres" || deduireOrdre(o) === "odonates" },
  { id: "nuit", emoji: "🌙", titre: "Chasseur nocturne", texte: "Fais une observation de nuit (ou au crépuscule).", test: (o) => o.moment === "nuit" || o.moment === "soir" },
  { id: "matin", emoji: "🌅", titre: "L'insecte du matin", texte: "Sors observer avant midi.", test: (o) => o.moment === "matin" },

  { id: "foret", emoji: "🌳", titre: "Au cœur des bois", texte: "Rapporte une trouvaille de forêt.", test: (o) => o.biotope === "foret" },
  { id: "jardin", emoji: "🏡", titre: "Trésor de jardin", texte: "La biodiversité commence chez toi : trouve un insecte dans un jardin.", test: (o) => o.biotope === "jardin" },
  { id: "pollinisateur", emoji: "🐝", titre: "Ami des fleurs", texte: "Immortalise un pollinisateur (abeille, bourdon, syrphe, papillon).", test: (o) => ["hymenopteres", "lepidopteres", "dipteres"].includes(deduireOrdre(o)) },

  { id: "trio", emoji: "🎯", titre: "Le triplé", texte: "Fais 3 observations d'espèces différentes cette semaine.", multi: (obs) => new Set(obs.map((o) => cleEspeceMur(o)).filter(Boolean)).size >= 3 },
