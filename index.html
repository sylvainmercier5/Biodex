// ============================================================
//   CONFIGURATION DU MUR COMMUN (Supabase)
//   La config (URL + clé publishable) est récupérée au démarrage depuis
//   la fonction serveur /.netlify/functions/config, qui les lit dans les
//   variables d'environnement Netlify. Plus besoin de coller la clé ici.

let SUPABASE_URL = "";
let SUPABASE_KEY = "";
let MUR_ACTIF = false;

// Récupère la config depuis la fonction serveur. Renseigne les variables ci-dessus.
async function chargerConfig() {
  try {
    const r = await fetch("/.netlify/functions/config", { cache: "no-store" });
    if (r.ok) {
      const j = await r.json();
      SUPABASE_URL = j.supabaseUrl || "";
      SUPABASE_KEY = j.supabaseKey || "";
      MUR_ACTIF = SUPABASE_URL.length > 0 && SUPABASE_KEY.length > 0;
    }
  } catch {
    // Pas de config disponible : le mur reste simplement désactivé.
  }
}


const C = {

// Moments de la journée (donnée naturaliste utile : la faune diffère selon l'heure).
const MOMENTS = [
  { id: "matin", label: "Matin", emoji: "🌅", plage: [5, 11] },
  { id: "midi", label: "Midi", emoji: "☀️", plage: [11, 14] },
  { id: "apresmidi", label: "Après-midi", emoji: "🌤️", plage: [14, 18] },
  { id: "soir", label: "Soir", emoji: "🌆", plage: [18, 22] },
  { id: "nuit", label: "Nuit", emoji: "🌙", plage: [22, 5] },
];
const momentOf = (id) => MOMENTS.find((m) => m.id === id) || null;
// Déduit le moment à partir d'une date (pré-remplissage automatique).
function momentDepuisDate(d) {
  const h = (d instanceof Date ? d : new Date(d)).getHours();
  if (h >= 5 && h < 11) return "matin";
  if (h >= 11 && h < 14) return "midi";
  if (h >= 14 && h < 18) return "apresmidi";
  if (h >= 18 && h < 22) return "soir";
  return "nuit";
}

// Spots : lieux d'observation favoris, créés par l'utilisateur et réutilisables.
// Stockés en local (localStorage), rien n'est envoyé au serveur.
function lireSpots() {
  try {
    const brut = localStorage.getItem("biodex_spots");
    const l = brut ? JSON.parse(brut) : [];
    return Array.isArray(l) ? l : [];
  } catch { return []; }
}
function ecrireSpots(spots) {
  try { localStorage.setItem("biodex_spots", JSON.stringify(spots.slice(0, 40))); } catch {}
}
function ajouterSpot(nom, gps) {
  const propre = (nom || "").trim().slice(0, 40);
  if (!propre) return lireSpots();
  const spots = lireSpots();
  if (spots.some((s) => s.nom.toLowerCase() === propre.toLowerCase())) return spots;
  const nouveau = { id: "sp_" + Date.now().toString(36), nom: propre, gps: gps || null };
  const maj = [nouveau, ...spots];
  ecrireSpots(maj);
  return maj;
}
function supprimerSpot(id) {
  const maj = lireSpots().filter((s) => s.id !== id);
  ecrireSpots(maj);
  return maj;
}

// Codes météo WMO (Open-Meteo) → catégorie de ciel
function wmoVersCiel(code) {
  if (code === 0) return "soleil";
  if (code === 1 || code === 2) return "peu-nuageux";
  if (code === 3) return "couvert";
  if (code === 45 || code === 48) return "brouillard";
  if ((code >= 51 && code <= 67) || (code >= 80 && code <= 82)) return "pluie";
  if ((code >= 71 && code <= 77) || code === 85 || code === 86) return "neige";
  if (code >= 95) return "orage";
  return "";
}

// ---------- IndexedDB ----------
const DB_NOM = "biodex";
const DB_STORE = "observations";

function ouvrirDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NOM, 1);
    req.onupgradeneeded = () => {
      const db = req.result;
      if (!db.objectStoreNames.contains(DB_STORE)) {
        db.createObjectStore(DB_STORE, { keyPath: "id" });
      }
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function dbToutes() {
  const db = await ouvrirDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(DB_STORE, "readonly");
    const req = tx.objectStore(DB_STORE).getAll();
    req.onsuccess = () => resolve(req.result || []);
    req.onerror = () => reject(req.error);
  });
}

async function dbAjouter(obs) {
  const db = await ouvrirDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(DB_STORE, "readwrite");
    tx.objectStore(DB_STORE).put(obs);
    tx.oncomplete = () => resolve(true);
    tx.onerror = () => reject(tx.error);
  });
}

async function dbSupprimer(id) {
  const db = await ouvrirDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(DB_STORE, "readwrite");
    tx.objectStore(DB_STORE).delete(id);
    tx.oncomplete = () => resolve(true);
    tx.onerror = () => reject(tx.error);
  });
}

// ---------- Compression photo (qualité conservée : 1600px max) ----------
// Lit la position GPS dans les métadonnées EXIF d'un fichier JPEG (sans bibliothèque externe).
// Renvoie { lat, lon } ou null. Utile pour récupérer le lieu d'une photo prise avec l'appli native.
function lireGpsExif(file) {
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = function (e) {
      try {
        const view = new DataView(e.target.result);
        if (view.getUint16(0, false) !== 0xFFD8) { resolve(null); return; } // pas un JPEG
        const length = view.byteLength;
        let offset = 2;
        while (offset < length) {
          const marker = view.getUint16(offset, false);
          offset += 2;
          if (marker === 0xFFE1) {
            // APP1 (EXIF)
            if (view.getUint32(offset + 2, false) !== 0x45786966) { resolve(null); return; } // "Exif"
            const tiffOffset = offset + 8;
            const little = view.getUint16(tiffOffset, false) === 0x4949;
            const dirStart = tiffOffset + view.getUint32(tiffOffset + 4, little);
            const entries = view.getUint16(dirStart, little);
            let gpsIFD = null;
            for (let i = 0; i < entries; i++) {
              const entryOffset = dirStart + 2 + i * 12;
              if (view.getUint16(entryOffset, little) === 0x8825) { // GPSInfo tag
                gpsIFD = tiffOffset + view.getUint32(entryOffset + 8, little);
                break;
              }
            }
            if (gpsIFD === null) { resolve(null); return; }
            // Lecture du GPS IFD
            const gpsEntries = view.getUint16(gpsIFD, little);
            let latRef = null, lonRef = null, lat = null, lon = null;
            const lireRational3 = (off) => {
              const val = [];
              for (let k = 0; k < 3; k++) {
                const num = view.getUint32(off + k * 8, little);
                const den = view.getUint32(off + k * 8 + 4, little);
                val.push(den ? num / den : 0);
              }
              return val[0] + val[1] / 60 + val[2] / 3600;
            };
            for (let i = 0; i < gpsEntries; i++) {
              const entryOffset = gpsIFD + 2 + i * 12;
              const tag = view.getUint16(entryOffset, little);
              const valOffset = tiffOffset + view.getUint32(entryOffset + 8, little);
              if (tag === 0x0001) latRef = String.fromCharCode(view.getUint8(entryOffset + 8)); // N/S
              else if (tag === 0x0003) lonRef = String.fromCharCode(view.getUint8(entryOffset + 8)); // E/W
              else if (tag === 0x0002) lat = lireRational3(valOffset);
              else if (tag === 0x0004) lon = lireRational3(valOffset);
            }
            if (lat === null || lon === null) { resolve(null); return; }
            if (latRef === "S") lat = -lat;
            if (lonRef === "W") lon = -lon;
            // Arrondi à 5 décimales (précision GPS classique)
            resolve({ lat: Math.round(lat * 100000) / 100000, lon: Math.round(lon * 100000) / 100000 });
            return;
          } else if ((marker & 0xFF00) !== 0xFF00) {
            break;
          } else {
            offset += view.getUint16(offset, false);
          }
        }
        resolve(null);
      } catch { resolve(null); }
    };
    reader.onerror = () => resolve(null);
    // On ne lit que les premiers 128 Ko (l'EXIF est au début du fichier)
    reader.readAsArrayBuffer(file.slice(0, 131072));
  });
}

function compresserImage(file, maxDim = 2560, qualite = 0.85) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        let { width, height } = img;
        if (width > height && width > maxDim) {
          height = Math.round((height * maxDim) / width);
          width = maxDim;
        } else if (height > maxDim) {
          width = Math.round((width * maxDim) / height);
          height = maxDim;
        }
        const canvas = document.createElement("canvas");
        canvas.width = width;
        canvas.height = height;
        canvas.getContext("2d").drawImage(img, 0, 0, width, height);
        canvas.toBlob(
          (blob) => (blob ? resolve(blob) : reject(new Error("compression"))),
          "image/jpeg",
          qualite
        );
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

// ---------- Identification "cloud" précise (via la fonction serveur + Claude) ----------
// Découpe éventuellement la zone ciblée, encode en base64, appelle /.netlify/functions/identifier.
function blobVersCanvasBase64(blob, zone, dimMax, qualite) {
  return new Promise((resolve, reject) => {
    const url = URL.createObjectURL(blob);
    const img = new Image();
    img.onload = () => {
      try {
        let sx = 0, sy = 0, sw = img.naturalWidth, sh = img.naturalHeight;
        if (zone && zone.w > 0.05 && zone.h > 0.05) {
          sx = Math.round(zone.x * img.naturalWidth);
          sy = Math.round(zone.y * img.naturalHeight);
          sw = Math.round(zone.w * img.naturalWidth);
          sh = Math.round(zone.h * img.naturalHeight);
        }
        // On plafonne (1024px par défaut) pour limiter la taille envoyée (coût + rapidité)
        const maxDim = dimMax || 1024;
        let dw = sw, dh = sh;
        if (dw > dh && dw > maxDim) { dh = Math.round(dh * maxDim / dw); dw = maxDim; }
        else if (dh > maxDim) { dw = Math.round(dw * maxDim / dh); dh = maxDim; }
        const canvas = document.createElement("canvas");
        canvas.width = dw; canvas.height = dh;
        canvas.getContext("2d").drawImage(img, sx, sy, sw, sh, 0, 0, dw, dh);
        const dataUrl = canvas.toDataURL("image/jpeg", qualite || 0.85);
        URL.revokeObjectURL(url);
        resolve(dataUrl.split(",")[1]); // base64 sans préfixe
      } catch (e) { URL.revokeObjectURL(url); reject(e); }
    };
    img.onerror = () => { URL.revokeObjectURL(url); reject(new Error("image")); };
    img.src = url;
  });
}

async function identifierCloud(blob, zone, contexte, blobsSupp) {
  // Photo principale (recadrée si une zone est fournie) + éventuelles vues complémentaires.
  const image = await blobVersCanvasBase64(blob, zone);
  const images = [{ data: image, media_type: "image/jpeg" }];
  // Vues secondaires : on limite à 2 et on les compresse davantage (elles servent d'appoint).
  for (const b of (blobsSupp || []).slice(0, 2)) {
    try {
      const d = await blobVersCanvasBase64(b, null, 768, 0.75);
      if (d) images.push({ data: d, media_type: "image/jpeg" });
    } catch {}
  }
  // On n'envoie "images" QUE s'il y a plusieurs photos (sinon on garde l'ancien format,
  // plus léger et compatible avec un serveur non mis à jour).
  const corps = images.length > 1
    ? { mode: "identification", images, media_type: "image/jpeg", contexte }
    : { mode: "identification", image, media_type: "image/jpeg", contexte };
  const r = await fetch("/.netlify/functions/identifier", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(corps),
  });
  const j = await r.json().catch(() => ({}));
  if (!r.ok || j.erreur) throw new Error(j.erreur || "Service indisponible");
  return j.resultat; // { nom, nomSci, confiance, niveau, note, alternatives:[...] }
}

// Normalise une confiance (nombre 0..1, nombre 0..100, ou texte "élevée/moyenne/faible") en pourcentage 0..100, ou null si inconnu.
function pourcentConfiance(confiance) {
  if (confiance === null || confiance === undefined || confiance === "") return null;
  if (typeof confiance === "number") {
    if (confiance <= 1) return Math.round(confiance * 100); // 0..1 (test local)
    return Math.round(Math.min(100, confiance));            // 0..100 (IA)
  }
  const c = String(confiance).toLowerCase();
  if (c.includes("élev") || c.includes("elev") || c.includes("haut")) return 85;
  if (c.includes("moy")) return 60;
  if (c.includes("faib") || c.includes("bas")) return 35;
  const n = parseInt(c, 10);
  return isNaN(n) ? null : Math.min(100, n);
}

// Couleur d'un pourcentage : dégradé continu rouge (bas) -> orange -> vert (haut).
function couleurPourcent(pct) {
  if (pct === null || pct === undefined) return "#8A8065";
  const p = Math.max(0, Math.min(100, pct)) / 100;
  // interpolation rouge (0) -> jaune (0.5) -> vert (1)
  let r, g, b = 60;
  if (p < 0.5) { r = 210; g = Math.round(90 + (185 - 90) * (p / 0.5)); }      // rouge -> jaune
  else { r = Math.round(210 - (210 - 110) * ((p - 0.5) / 0.5)); g = 185; }     // jaune -> vert
  return `rgb(${r},${g},${b})`;
}

// Traduit une confiance ("élevée/moyenne/faible" ou un nombre 0..1) en visuel clair
function infoConfiance(confiance, niveau) {
  let cle = "";
  if (typeof confiance === "number") {
    cle = confiance >= 0.75 ? "elevee" : confiance >= 0.45 ? "moyenne" : "faible";
  } else {
    const c = String(confiance || "").toLowerCase();
    if (c.includes("élev") || c.includes("elev") || c.includes("haut")) cle = "elevee";
    else if (c.includes("moy")) cle = "moyenne";
    else if (c.includes("faib") || c.includes("bas")) cle = "faible";
  }
  const table = {
    elevee: { label: "Identification solide", court: "Fiable", couleur: "#7BAE5A", barres: 3, emoji: "✓" },
    moyenne: { label: "Probable, à confirmer", court: "Probable", couleur: "#D9A441", barres: 2, emoji: "≈" },
    faible: { label: "Incertain — à vérifier", court: "À vérifier", couleur: "#C97A54", barres: 1, emoji: "?" },
  };
  const base = table[cle] || { label: "Certitude inconnue", court: "—", couleur: "#8A8065", barres: 0, emoji: "·" };
  const suffixeNiveau = niveau ? ` · au niveau ${niveau}` : "";
  return { ...base, label: base.label + suffixeNiveau };
}

// Redimensionne + compresse une photo (blob) pour l'upload : max 1280px, JPEG qualité 0.7 (~léger)
// Compresse pour le mur. Si "zone" est fournie ({x,y,w,h} en fractions 0-1),
// l'image est d'abord recadrée sur cette zone.
function compresserPourMur(blob, zone) {
  return new Promise((resolve, reject) => {
    const url = URL.createObjectURL(blob);
    const img = new Image();
    img.onload = () => {
      try {
        const maxDim = 1280;
        // Zone source (recadrage) : par défaut l'image entière
        let sx = 0, sy = 0, sw = img.naturalWidth, sh = img.naturalHeight;
        if (zone && zone.w > 0 && zone.h > 0) {
          sx = Math.max(0, Math.round(zone.x * img.naturalWidth));
          sy = Math.max(0, Math.round(zone.y * img.naturalHeight));
          sw = Math.min(img.naturalWidth - sx, Math.round(zone.w * img.naturalWidth));
          sh = Math.min(img.naturalHeight - sy, Math.round(zone.h * img.naturalHeight));
          if (sw < 8 || sh < 8) { sx = 0; sy = 0; sw = img.naturalWidth; sh = img.naturalHeight; }
        }
        let w = sw, h = sh;
        if (w > h && w > maxDim) { h = Math.round(h * maxDim / w); w = maxDim; }
        else if (h > maxDim) { w = Math.round(w * maxDim / h); h = maxDim; }
        const cv = document.createElement("canvas");
        cv.width = w; cv.height = h;
        cv.getContext("2d").drawImage(img, sx, sy, sw, sh, 0, 0, w, h);
        URL.revokeObjectURL(url);
        cv.toBlob((b) => b ? resolve(b) : reject(new Error("compression")), "image/jpeg", 0.7);
      } catch (e) { URL.revokeObjectURL(url); reject(e); }
    };
    img.onerror = () => { URL.revokeObjectURL(url); reject(new Error("image")); };
    img.src = url;
  });
}

// Publie une observation sur le mur commun (upload photo + insertion du post)
// Floute une position à environ 1 km (2 décimales) pour la carte commune :
// on partage une zone approximative, jamais le point exact (vie privée).
// Applique le niveau de précision choisi à une position, pour le partage au mur.
// "exacte" : position précise · "approx" : floutée à ~1 km (2 décimales) · "masquee" : rien.
function positionSelonPrecision(gps, precision) {
  if (precision === "masquee") return { lat: null, lon: null };
  if (!gps || typeof gps.lat !== "number" || typeof gps.lon !== "number") return { lat: null, lon: null };
  if (precision === "exacte") return { lat: gps.lat, lon: gps.lon };
  // défaut : approximative ~1 km
  return { lat: Math.round(gps.lat * 100) / 100, lon: Math.round(gps.lon * 100) / 100 };
}

async function publierAuMur(obs, auteur, precision, cadreMur) {
  const sb = clientSupabase();
  if (!sb) throw new Error("Mur non configuré");
  // 1) upload de la photo compressée (recadrée si un cadre est fourni)
  let photoUrl = "";
  if (obs.photo) {
    const compresse = await compresserPourMur(obs.photo, cadreMur);
    const nomFichier = `post-${Date.now()}-${Math.random().toString(36).slice(2, 8)}.jpg`;
    const { error: errUp } = await sb.storage.from("photos").upload(nomFichier, compresse, { contentType: "image/jpeg", upsert: false });
    if (errUp) throw new Error("Envoi de la photo impossible");
    const { data: pub } = sb.storage.from("photos").getPublicUrl(nomFichier);
    photoUrl = pub ? pub.publicUrl : "";
  }
  // 2) insertion du post — position selon le niveau de précision choisi par l'auteur
  const niveau = precision || "approx";
  const pos = positionSelonPrecision(obs.gps, niveau);
  const post = {
    auteur: (auteur || "Anonyme").slice(0, 40),
    espece: obs.nom || "",
    espece_sci: obs.nomSci || "",
    confiance: (obs.confiance === undefined || obs.confiance === null || obs.confiance === "") ? null : obs.confiance,
    lieu: obs.biotope ? biotopeOf(obs.biotope).label : "",
    lat: pos.lat,
    lon: pos.lon,
    precision: niveau,
    photo_url: photoUrl,
    note: (obs.notes || "").slice(0, 500),
  };
  const { error: errIns } = await sb.from("posts").insert(post);
  if (errIns) throw new Error("Publication impossible");
  return true;
}

// Les 4 réactions thématiques disponibles
// Journal des nouveautés de l'appli (le plus récent en premier).
// Sert au "Quoi de neuf" du centre de notifications.
// ---------- Missions saisonnières ----------
// La saison est déduite du mois (hémisphère nord). Chaque saison a son jeu de missions,
// identiques pour toute la bande. La validation auto s'appuie sur des données fiables
// de la collection locale (biotope, nombre, diversité, période, notable).
function saisonActuelle(d = new Date()) {
  const m = d.getMonth(); // 0 = janvier
  const annee = d.getFullYear();
  if (m >= 2 && m <= 4) return { cle: annee + "-printemps", label: "Printemps", emoji: "🌸", debut: new Date(annee, 2, 1), fin: new Date(annee, 5, 1) };
  if (m >= 5 && m <= 7) return { cle: annee + "-ete", label: "Été", emoji: "☀️", debut: new Date(annee, 5, 1), fin: new Date(annee, 8, 1) };
  if (m >= 8 && m <= 10) return { cle: annee + "-automne", label: "Automne", emoji: "🍂", debut: new Date(annee, 8, 1), fin: new Date(annee, 11, 1) };
  // Hiver : déc-fév (à cheval sur deux années)
  const anneeHiver = m === 11 ? annee : annee - 1;
  return { cle: anneeHiver + "-hiver", label: "Hiver", emoji: "❄️", debut: new Date(anneeHiver, 11, 1), fin: new Date(anneeHiver + 1, 2, 1) };
}

// Vérifie si une mission est remplie par la collection, sur la fenêtre de la saison.
function missionRemplie(mission, observations, saison) {
  const dansSaison = observations.filter((o) => {
    if (!o.date) return false;
    const d = new Date(o.date);
    return d >= saison.debut && d < saison.fin;
  });
  const c = mission.cond;
  if (c.type === "nombre") return dansSaison.length >= c.n;
  if (c.type === "diversite") {
    const set = new Set(dansSaison.map((o) => (o.nomSci || o.nom || "").trim().toLowerCase()).filter(Boolean));
    return set.size >= c.n;
  }
  if (c.type === "notable") return dansSaison.some((o) => o.notable && String(o.notable).trim().length > 3);
  if (c.type === "biotope") {
    const cibles = Array.isArray(c.biotope) ? c.biotope : [c.biotope];
    return dansSaison.some((o) => cibles.includes(o.biotope));
  }
  return false;
}

// Progression chiffrée (pour l'affichage "3/5")
function missionProgres(mission, observations, saison) {
  const dansSaison = observations.filter((o) => {
    if (!o.date) return false;
    const d = new Date(o.date);
    return d >= saison.debut && d < saison.fin;
  });
  const c = mission.cond;
  if (c.type === "nombre") return { actuel: Math.min(dansSaison.length, c.n), cible: c.n };
  if (c.type === "diversite") {
    const set = new Set(dansSaison.map((o) => (o.nomSci || o.nom || "").trim().toLowerCase()).filter(Boolean));
    return { actuel: Math.min(set.size, c.n), cible: c.n };
  }
  return null; // biotope/notable : binaire, pas de barre
}

// Engage une carte (observation) dans la ligue. Copie ses stats de combat + photo.
async function engagerCarte(obs, proprietaire) {
  const sb = clientSupabase();
  if (!sb) throw new Error("Service non configuré");
  const c = obs.carte || {};
  const combattant = prepCombattant(obs);
  // Upload de la photo (comme le mur) pour que les autres la voient
  let photoUrl = "";
  if (obs.photo) {
    try {
      const compresse = await compresserPourMur(obs.photo);
      const nomFichier = `ligue-${Date.now()}-${Math.random().toString(36).slice(2, 8)}.jpg`;
      const { error: errUp } = await sb.storage.from("photos").upload(nomFichier, compresse, { contentType: "image/jpeg", upsert: false });
      if (!errUp) { const { data: pub } = sb.storage.from("photos").getPublicUrl(nomFichier); photoUrl = pub ? pub.publicUrl : ""; }
    } catch {}
  }
  const ligne = {
    proprietaire: (proprietaire || "Anonyme").slice(0, 40),
    carte_id: String(obs.id),
    nom: obs.nom || "Spécimen",
    nom_sci: obs.nomSci || "",
    type: combattant.type,
    attaque: combattant.attaque,
    defense: combattant.defense,
    vitesse: combattant.vitesse,
    rarete: c.rarete || 30,
    capacite_nom: (c.capacite && c.capacite.nom) || "Coup spécial",
    capacite_effet: (c.capacite && c.capacite.effet) || "",
    photo_url: photoUrl,
    authentique: c.authentique === false ? false : true,
  };
  const { error } = await sb.from("cartes_ligue").upsert(ligne, { onConflict: "proprietaire,carte_id", ignoreDuplicates: true });
  if (error) throw new Error("Impossible d'engager cette carte");
  return true;
}

async function retirerCarteLigue(proprietaire, carteId) {
  const sb = clientSupabase();
  if (!sb) throw new Error("Service non configuré");
  const { error } = await sb.from("cartes_ligue").delete().eq("proprietaire", proprietaire).eq("carte_id", String(carteId));
  if (error) throw new Error("Retrait impossible");

}

// Enregistre le résultat d'un défi : met à jour les compteurs de la carte défendue et les scores des deux joueurs.
async function enregistrerResultatDefi(carteLigue, defieur, defieurGagne) {
  const sb = clientSupabase();
  if (!sb) return;
  try {
    // 1) Compteurs de la carte défendue (en défense)
    const majCarte = defieurGagne
      ? { defaites: (carteLigue.defaites || 0) + 1 }
      : { victoires: (carteLigue.victoires || 0) + 1 };
    await sb.from("cartes_ligue").update(majCarte).eq("id", carteLigue.id);

    // 2) Scores des deux joueurs (upsert incrémental)
    async function majScore(proprietaire, gagne) {
      const { data } = await sb.from("ligue_scores").select("*").eq("proprietaire", proprietaire).maybeSingle();
      const v = (data ? data.victoires : 0) + (gagne ? 1 : 0);
      const d = (data ? data.defaites : 0) + (gagne ? 0 : 1);
      await sb.from("ligue_scores").upsert({ proprietaire, victoires: v, defaites: d, maj: new Date().toISOString() }, { onConflict: "proprietaire" });
    }
    await majScore(defieur, defieurGagne);
    await majScore(carteLigue.proprietaire, !defieurGagne);
  } catch {}
}

const REACTIONS = [
  { type: "feu", emoji: "🔥", titre: "Belle trouvaille" },
  { type: "amour", emoji: "😍", titre: "Magnifique" },
  { type: "waouh", emoji: "🤯", titre: "Incroyable / rare" },
  { type: "oeil", emoji: "🔍", titre: "Bien observé" },
];

// Réactions d'enthousiasme pour la boîte à idées (jauger l'intérêt de la bande).
const IDEE_REACTIONS = [
  { type: "pouce", emoji: "👍", titre: "Bonne idée" },
  { type: "coeur", emoji: "❤️", titre: "Coup de cœur" },
  { type: "fusee", emoji: "🚀", titre: "Vivement !" },
];
// Les réactions d'idées sont stockées dans reactions_detail avec un post_id préfixé.
function cleReactionIdee(id) { return "idee:" + id; }

// Somme le nombre de réactions d'un objet { type: [auteurs] } OU { type: compteur } (rétro-compat).
function nbReacts(parType) {
  if (!parType) return 0;
  return Object.values(parType).reduce((a, v) => a + (Array.isArray(v) ? v.length : (v || 0)), 0);
}

// Charge les réactions détaillées et les regroupe : { [post_id]: { [type]: [auteurs] } }
async function chargerReactions() {
  const sb = clientSupabase();
  if (!sb) return {};
  try {
    const { data, error } = await sb.from("reactions_detail").select("post_id, type, auteur");
    if (error || !data) return {};
    const parPost = {};
    for (const r of data) {
      if (!parPost[r.post_id]) parPost[r.post_id] = {};
      if (!parPost[r.post_id][r.type]) parPost[r.post_id][r.type] = [];
      parPost[r.post_id][r.type].push(r.auteur || "Anonyme");
    }
    return parPost;
  } catch { return {}; }
}

// Ajoute ou retire une réaction selon dejaReagi (toggle). Enregistre le prénom.
async function reagir(postId, type, auteur, dejaReagi) {
  const sb = clientSupabase();
  if (!sb) throw new Error("Service non configuré");
  const nom = (auteur || "Anonyme").slice(0, 40);
  if (dejaReagi) {
    const { error } = await sb.from("reactions_detail").delete().match({ post_id: postId, type, auteur: nom });
    if (error) throw new Error("Réaction impossible");
  } else {
    const { error } = await sb.from("reactions_detail").insert({ post_id: postId, type, auteur: nom });
    // 23505 = doublon (déjà réagi) : on ignore silencieusement
    if (error && error.code !== "23505") throw new Error("Réaction impossible");
  }
  return true;
}

// Calcule les notifications du centre : nouveautés mur, réactions reçues, nouvelles idées.
// S'appuie sur des repères "vu" stockés en local (dates ISO / totaux).
// Charge les réactions brutes (avec date) pour détecter les nouvelles.
async function chargerReactionsRaw() {
  const sb = clientSupabase();
  if (!sb) return [];
  try {
    const { data, error } = await sb.from("reactions_detail").select("post_id, type, auteur, created_at");
    if (error || !data) return [];
    return data;
  } catch { return []; }
}

async function calculerNotifications(prenom) {
  const sb = clientSupabase();
  const vide = { total: 0, murNouveaux: 0, ideesNouvelles: 0, reactionsRecues: 0, murDetail: [], ideesDetail: [], reactionsDetail: [] };
  if (!sb) return vide;

  const lire = (cle) => { try { return localStorage.getItem(cle); } catch { return null; } };
  const ecrire = (cle, v) => { try { localStorage.setItem(cle, v); } catch {} };
  let murNouveaux = 0, ideesNouvelles = 0, reactionsRecues = 0;
  let murDetail = [], ideesDetail = [], reactionsDetail = [];

  try {
    const posts = await chargerMur(200);
    // 1) Nouveaux posts depuis la dernière visite du mur
    const vuMur = lire("biodex_mur_vu");
    const nouveauxPosts = vuMur ? posts.filter((p) => p.created_at && new Date(p.created_at) > new Date(vuMur)) : posts.slice(0, 20);
    murNouveaux = nouveauxPosts.length;
    murDetail = nouveauxPosts.slice(0, 6).map((p) => ({ espece: p.espece || "Spécimen", auteur: p.auteur || "Anonyme" }));

    // 2) Réactions reçues sur MES posts (nouvelles, d'après leur date)
    if (prenom) {
      const moi = prenom.trim().toLowerCase();
      const mesPosts = posts.filter((p) => (p.auteur || "").trim().toLowerCase() === moi);
      const mapEspece = {}; mesPosts.forEach((p) => { mapEspece[p.id] = p.espece || "ta trouvaille"; });
      const idsMoi = new Set(mesPosts.map((p) => p.id));
      if (idsMoi.size > 0) {
        const raw = await chargerReactionsRaw();
        let vuDate = lire("biodex_reactions_vu_date");
        if (!vuDate) { vuDate = new Date().toISOString(); ecrire("biodex_reactions_vu_date", vuDate); }
        const nouvelles = raw.filter((r) => idsMoi.has(r.post_id) && (r.auteur || "").trim().toLowerCase() !== moi && r.created_at && new Date(r.created_at) > new Date(vuDate));
        reactionsRecues = nouvelles.length;
        reactionsDetail = nouvelles.slice(0, 6).map((r) => ({ qui: r.auteur || "Quelqu'un", emoji: (REACTIONS.find((x) => x.type === r.type) || {}).emoji || "❤️", espece: mapEspece[r.post_id] || "ta trouvaille" }));
      }
    }
  } catch {}

  try {
    // 3) Nouvelles idées depuis la dernière visite
    const idees = await chargerIdees();
    const vuIdees = lire("biodex_idees_vu");
    const nouvelles = vuIdees ? idees.filter((i) => i.created_at && new Date(i.created_at) > new Date(vuIdees)) : idees.slice(0, 20);
    ideesNouvelles = nouvelles.length;
    ideesDetail = nouvelles.slice(0, 6).map((i) => ({ auteur: i.auteur || "Anonyme", idee: (i.idee || "").slice(0, 70) }));
  } catch {}

  // 4) Nouveauté d'appli
  const vuVersion = lire("biodex_nouveautes_vu");
  const versionRecente = NOUVEAUTES.length ? NOUVEAUTES[0].v : "";
  const nouvelleVersion = versionRecente && vuVersion !== versionRecente ? 1 : 0;

  const total = murNouveaux + ideesNouvelles + reactionsRecues + nouvelleVersion;
  return { total, murNouveaux, ideesNouvelles, reactionsRecues, nouvelleVersion, versionRecente, murDetail, ideesDetail, reactionsDetail };
}

// Récupère la date de création du post le plus récent (léger, pour la pastille "nouveau")
async function dernierPostMur() {
  const sb = clientSupabase();
  if (!sb) return null;
  try {
    const { data, error } = await sb.from("posts").select("created_at").order("created_at", { ascending: false }).limit(1);
    if (error || !data || !data.length) return null;
    return data[0].created_at;
  } catch { return null; }
}

// ---------- Boîte à idées ----------
async function chargerIdees() {
  const sb = clientSupabase();
  if (!sb) throw new Error("Service non configuré");
  const { data, error } = await sb.from("idees").select("*").order("created_at", { ascending: false }).limit(100);
  if (error) throw new Error("Lecture des idées impossible");
  return data || [];
}

async function proposerIdee(auteur, idee) {
  const sb = clientSupabase();
  if (!sb) throw new Error("Service non configuré");

  if (error) throw new Error("Envoi impossible");

async function supprimerIdee(id) {
  const sb = clientSupabase();
  if (!sb) throw new Error("Service non configuré");
  const { error } = await sb.from("idees").delete().eq("id", id);
  if (error) throw new Error("Suppression impossible");
  return true;
}

// Marque une idée comme réalisée (ou non). Partagé avec toute la bande.
async function marquerIdeeRealisee(id, realisee) {
  const sb = clientSupabase();
  if (!sb) throw new Error("Service non configuré");
  const { error } = await sb.from("idees").update({ realisee: !!realisee }).eq("id", id);
  if (error) throw new Error("Mise à jour impossible");
  return true;
}

// Supprime un post du mur (et sa photo associée dans le stockage, pour ne pas encombrer)
async function supprimerPost(post) {
  const sb = clientSupabase();
  if (!sb) throw new Error("Mur non configuré");
  // 1) supprimer la photo du bucket si présente
  if (post.photo_url) {
    try {
      // extrait le nom de fichier après ".../photos/"
      const marqueur = "/photos/";
      const idx = post.photo_url.indexOf(marqueur);
      if (idx !== -1) {
        const nomFichier = decodeURIComponent(post.photo_url.slice(idx + marqueur.length).split("?")[0]);
        await sb.storage.from("photos").remove([nomFichier]);
      }
    } catch { /* on continue même si la photo ne peut pas être retirée */ }
  }
  // 2) supprimer la ligne du post
  const { error } = await sb.from("posts").delete().eq("id", post.id);
  if (error) throw new Error("Suppression impossible");
  return true;
}

// ---------- Sélecteur de zone (cadre tactile sur la photo) ----------
// Visionneuse plein écran avec zoom (boutons +/− et déplacement au doigt).
function VisionneuseZoom({ url, onFermer }) {
  const [z, setZ] = useState(1);
  const [pos, setPos] = useState({ x: 0, y: 0 });
  const drag = useRef(null);
  const zoomer = (d) => setZ((v) => { const nv = Math.min(5, Math.max(1, +(v + d).toFixed(2))); if (nv === 1) setPos({ x: 0, y: 0 }); return nv; });
  const onDown = (e) => { if (z > 1) { drag.current = { x: e.clientX - pos.x, y: e.clientY - pos.y }; } };
  const onMove = (e) => { if (!drag.current || z <= 1) return; setPos({ x: e.clientX - drag.current.x, y: e.clientY - drag.current.y }); };
  const onUp = () => { drag.current = null; };
  const btn = { width: 46, height: 46, borderRadius: 23, border: `1px solid ${C.bordure}`, background: C.panneau, color: C.papier, fontSize: 20, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center" };
  return (
    <div style={{ position: "fixed", inset: 0, zIndex: 10001, background: "rgba(8,10,6,.97)", display: "flex", flexDirection: "column" }} onPointerMove={onMove} onPointerUp={onUp} onPointerLeave={onUp}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "14px 16px" }}>
        <span style={{ fontFamily: sans, fontSize: 14, fontWeight: 700, color: C.papier }}>🔍 Zoom · double-tape le − pour réinitialiser</span>
        <button onClick={onFermer} style={{ background: "none", border: "none", color: C.papier, fontSize: 26, cursor: "pointer", lineHeight: 1 }}>✕</button>
      </div>
      <div style={{ flex: 1, overflow: "hidden", display: "flex", alignItems: "center", justifyContent: "center", touchAction: "none" }}>
        <img src={url} alt="zoom" draggable={false} onPointerDown={onDown}
          style={{ maxWidth: "100%", maxHeight: "100%", transform: `translate(${pos.x}px, ${pos.y}px) scale(${z})`, transition: drag.current ? "none" : "transform .12s ease", cursor: z > 1 ? "grab" : "default", userSelect: "none", touchAction: "none" }} />

function SelecteurZone({ photoUrl, zone, onChange }) {
  const boxRef = useRef(null);
  const dragRef = useRef(null); // { mode, startX, startY, zone0 }

  function pointFrac(e) {
    const r = boxRef.current.getBoundingClientRect();
    const t = e.touches && e.touches[0] ? e.touches[0] : e;
    return {
      x: Math.min(1, Math.max(0, (t.clientX - r.left) / r.width)),
      y: Math.min(1, Math.max(0, (t.clientY - r.top) / r.height)),
    };
  }

  function debut(mode, e) {
    e.preventDefault();
    e.stopPropagation();
    const p = pointFrac(e);
    dragRef.current = { mode, startX: p.x, startY: p.y, zone0: { ...zone } };
    window.addEventListener("mousemove", bouge);
    window.addEventListener("mouseup", fin);
    window.addEventListener("touchmove", bouge, { passive: false });
    window.addEventListener("touchend", fin);
  }

  function bouge(e) {
    if (!dragRef.current) return;
    e.preventDefault();
    const p = pointFrac(e);
    const d = dragRef.current;
    const dx = p.x - d.startX;
    const dy = p.y - d.startY;
    let z = { ...d.zone0 };
    if (d.mode === "move") {
      z.x = Math.min(1 - d.zone0.w, Math.max(0, d.zone0.x + dx));
      z.y = Math.min(1 - d.zone0.h, Math.max(0, d.zone0.y + dy));
    } else if (d.mode === "resize") {
      z.w = Math.min(1 - d.zone0.x, Math.max(0.08, d.zone0.w + dx));
      z.h = Math.min(1 - d.zone0.y, Math.max(0.08, d.zone0.h + dy));
    }
    onChange(z);
  }

  function fin() {
    dragRef.current = null;
    window.removeEventListener("mousemove", bouge);
    window.removeEventListener("mouseup", fin);
    window.removeEventListener("touchmove", bouge);
    window.removeEventListener("touchend", fin);
  }

  const pct = (v) => `${v * 100}%`;

  return (
    <div ref={boxRef} style={{ position: "relative", width: "100%", borderRadius: 10, overflow: "hidden", border: `1px solid ${C.bordure}`, touchAction: "none", userSelect: "none" }}>
      <img src={photoUrl} alt="spécimen" style={{ width: "100%", display: "block", pointerEvents: "none" }} />
      {/* Voile sombre autour de la zone */}
      <div style={{ position: "absolute", inset: 0, boxShadow: "0 0 0 9999px rgba(0,0,0,0.45)", clipPath: `polygon(0 0, 0 100%, ${pct(zone.x)} 100%, ${pct(zone.x)} ${pct(zone.y)}, ${pct(zone.x + zone.w)} ${pct(zone.y)}, ${pct(zone.x + zone.w)} ${pct(zone.y + zone.h)}, ${pct(zone.x)} ${pct(zone.y + zone.h)}, ${pct(zone.x)} 100%, 100% 100%, 100% 0)`, pointerEvents: "none" }} />
      {/* Cadre */}
      <div
        onMouseDown={(e) => debut("move", e)}
        onTouchStart={(e) => debut("move", e)}
        style={{ position: "absolute", left: pct(zone.x), top: pct(zone.y), width: pct(zone.w), height: pct(zone.h), border: `2px solid ${C.ambre}`, boxSizing: "border-box", cursor: "move" }}
      >
        {/* Poignée de redimensionnement (coin bas-droit) */}
        <div
          onMouseDown={(e) => debut("resize", e)}
          onTouchStart={(e) => debut("resize", e)}
          style={{ position: "absolute", right: -12, bottom: -12, width: 28, height: 28, borderRadius: "50%", background: C.ambre, border: "2px solid #12160F", cursor: "nwse-resize", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 13 }}
        >⤡</div>
      </div>
    </div>
  );
}

function trierObservations(liste, tri) {
  const copie = [...liste];
  if (tri === "ancien") {
    copie.sort((a, b) => (a.date > b.date ? 1 : -1));
  } else if (tri === "nom") {
    copie.sort((a, b) =>
      (a.nom || "zzz").localeCompare(b.nom || "zzz", "fr", { sensitivity: "base" })
    );
  } else if (tri === "biotope") {
    copie.sort((a, b) => {
      const ba = biotopeOf(a.biotope).label, bb = biotopeOf(b.biotope).label;
      if (ba !== bb) return ba.localeCompare(bb, "fr");
      return a.date < b.date ? 1 : -1;
    });
  } else {
    copie.sort((a, b) => (a.date < b.date ? 1 : -1)); // "recent" (défaut)
  }
  return copie;
}

// Hook : URL d'objet pour un Blob (avec nettoyage)
function useBlobUrl(blob) {
  const [url, setUrl] = useState(null);
  useEffect(() => {
    if (!blob) { setUrl(null); return; }
    const u = URL.createObjectURL(blob);
    setUrl(u);
    return () => URL.revokeObjectURL(u);
  }, [blob]);
  return url;
}

// Photo recadrée sur une zone {x,y,w,h} normalisée (0..1). Sans zone : photo entière.
function PhotoBlobRecadree({ blob, zone, alt, style }) {
  const [urlRecadree, setUrlRecadree] = useState(null);
  useEffect(() => {
    let revoque = null;
    let annule = false;
    if (!blob || !zone || !(zone.w > 0.05 && zone.h > 0.05)) { setUrlRecadree(null); return; }
    const src = URL.createObjectURL(blob);
    const img = new Image();
    img.onload = () => {
      try {
        const sx = Math.round(zone.x * img.naturalWidth);
        const sy = Math.round(zone.y * img.naturalHeight);
        const sw = Math.max(1, Math.round(zone.w * img.naturalWidth));
        const sh = Math.max(1, Math.round(zone.h * img.naturalHeight));
        const cv = document.createElement("canvas");
        // limite la taille pour rester léger
        const maxDim = 800;
        let cw = sw, ch = sh;
        if (cw > ch && cw > maxDim) { ch = Math.round(ch * maxDim / cw); cw = maxDim; }
        else if (ch > maxDim) { cw = Math.round(cw * maxDim / ch); ch = maxDim; }
        cv.width = cw; cv.height = ch;
        cv.getContext("2d").drawImage(img, sx, sy, sw, sh, 0, 0, cw, ch);
        cv.toBlob((b) => {
          URL.revokeObjectURL(src);
          if (!b || annule) return;
          const u = URL.createObjectURL(b);
          revoque = u;
          setUrlRecadree(u);
        }, "image/jpeg", 0.85);
      } catch { URL.revokeObjectURL(src); }
    };
    img.onerror = () => URL.revokeObjectURL(src);
    img.src = src;
    return () => { annule = true; if (revoque) URL.revokeObjectURL(revoque); };
  }, [blob, zone && zone.x, zone && zone.y, zone && zone.w, zone && zone.h]);

  if (urlRecadree) return <img src={urlRecadree} alt={alt} style={style} />;
  return <PhotoBlob blob={blob} alt={alt} style={style} />;
}

// Déduit l'ordre d'une observation à partir de son nom français et/ou scientifique.
// Marche sur les observations existantes (aucune donnée serveur requise).
function deduireOrdre(obs) {
  if (!obs) return "autres";
  // 1) champ explicite éventuel (identifications futures)
  if (obs.ordre) {
    const direct = ORDRES.find((o) => o.id === obs.ordre || sansAccents(o.label) === sansAccents(obs.ordre));
    if (direct) return direct.id;
  }
  const nom = sansAccents(obs.nom);
  const sci = sansAccents(obs.nomSci);
  // 2) mots-clés dans le nom français
  if (nom) {
    for (const o of ORDRES) {
      if (o.mots.some((m) => nom.includes(sansAccents(m)))) return o.id;
    }
  }
  // 3) genre latin (premier mot du nom scientifique)
  const genre = sci.split(/\s+/)[0];
  if (genre) {
    for (const o of ORDRES) {
      if (o.genres.includes(genre)) return o.id;
    }
  }
  // 4) mots-clés aussi dans le nom scientifique (familles en -idae parfois parlantes)
  if (sci) {
    for (const o of ORDRES) {
      if (o.mots.some((m) => sci.includes(sansAccents(m)))) return o.id;
    }
  }
  return "autres";
}

function filtrerObservations(liste, f) {
  return liste.filter((o) => {
    if (f.biotope && o.biotope !== f.biotope) return false;
    if (f.mois && moisDe(o.date) !== f.mois) return false;
    if (f.ordre && deduireOrdre(o) !== f.ordre) return false;
    if (f.texte) {
      const t = f.texte.toLowerCase();
      const cible = `${o.nom || ""} ${o.nomSci || ""}`.toLowerCase();
      if (!cible.includes(t)) return false;
    }
    return true;
  });
}

// ---------- Vue : statistiques ----------
function Stats({ observations, raretes, onFermer }) {
  const total = observations.length;
  const identifies = observations.filter((o) => o.nom || o.nomSci).length;
  const positionnees = observations.filter((o) => o.gps).length;

  // Espèces uniques (par nom scientifique en priorité, sinon nom commun normalisé)
  const cleEspece = (o) => (o.nomSci || o.nom || "").trim().toLowerCase();
  const especesSet = new Set(observations.map(cleEspece).filter(Boolean));
  const especesUniques = especesSet.size;

  // Diversité : compter les biotopes distincts explorés
  const biotopesSet = new Set(observations.map((o) => o.biotope).filter(Boolean));

  // Comptage par espèce → l'espèce la plus observée
  const parEspece = {};
  observations.forEach((o) => { const c = cleEspece(o); if (c) parEspece[c] = (parEspece[c] || 0) + 1; });
  const especesTri = Object.entries(parEspece).sort((a, b) => b[1] - a[1]);
  const star = especesTri.length ? especesTri[0] : null;
  const nomStar = star ? (observations.find((o) => cleEspece(o) === star[0]) || {}) : {};

  // Répartition par ordre taxonomique (déduit du nom)
  const parOrdre = {};
  observations.forEach((o) => { const id = deduireOrdre(o); parOrdre[id] = (parOrdre[id] || 0) + 1; });
  const ordresTri = Object.entries(parOrdre).sort((a, b) => b[1] - a[1]);
  const maxOrdre = ordresTri.length ? ordresTri[0][1] : 0;
  const nbOrdres = Object.keys(parOrdre).filter((id) => id !== "autres").length;

  // Confiance moyenne d'identification (sur les observations qui ont un pourcentage)
  const confiances = observations.map((o) => pourcentConfiance(o.confiance)).filter((v) => v !== null && v !== undefined);
  const confianceMoy = confiances.length ? Math.round(confiances.reduce((a, b) => a + b, 0) / confiances.length) : null;

  // Espèces rares (via la rareté iNaturalist chargée en amont) — comptées une fois par espèce.
  const rar = raretes || {};
  const especesRaresSet = new Set();
  observations.forEach((o) => {
    const k = cleEspeceMur(o);
    const niv = niveauRarete(rar[k]);
    if (k && niv && niv.bonus > 0) especesRaresSet.add(k);
  });
  const nbEspecesRares = especesRaresSet.size;

  // Autres indicateurs
  const notables = observations.filter((o) => o.notable && String(o.notable).trim().length > 3).length;
  const cartesForgees = observations.filter((o) => o.carte).length;
  const fichesGenerees = observations.filter((o) => o.fiche).length;

  // --- Rythme : répartition par moment de la journée ---
  const parMoment = {};
  observations.forEach((o) => { if (o.moment) parMoment[o.moment] = (parMoment[o.moment] || 0) + 1; });
  const momentsTri = MOMENTS.map((m) => ({ ...m, n: parMoment[m.id] || 0 })).filter((m) => m.n > 0).sort((a, b) => b.n - a.n);
  const maxMoment = momentsTri.length ? momentsTri[0].n : 0;
  const totalMoments = momentsTri.reduce((s, m) => s + m.n, 0);

  // --- Spots : lieux d'observation, classés par richesse (nb d'espèces) ---
  const parSpot = {};
  observations.forEach((o) => {
    if (!o.spot) return;
    if (!parSpot[o.spot]) parSpot[o.spot] = { obs: 0, especes: new Set() };
    parSpot[o.spot].obs += 1;
    const c = cleEspece(o);
    if (c) parSpot[o.spot].especes.add(c);
  });
  const spotsTri = Object.entries(parSpot)
    .map(([nom, d]) => ({ nom, obs: d.obs, especes: d.especes.size }))
    .sort((a, b) => b.especes - a.especes || b.obs - a.obs);

  // --- Conditions : température moyenne et ciel dominant ---
  const temps = observations
    .map((o) => parseFloat(String(o.temp || "").replace(",", ".").replace(/[^0-9.\-]/g, "")))
    .filter((v) => !isNaN(v) && v > -30 && v < 55);
  const tempMoy = temps.length ? Math.round(temps.reduce((a, b) => a + b, 0) / temps.length) : null;
  const parCiel = {};
  observations.forEach((o) => { if (o.ciel) parCiel[o.ciel] = (parCiel[o.ciel] || 0) + 1; });
  const cielsTri = Object.entries(parCiel).sort((a, b) => b[1] - a[1]);
  const cielTop = cielsTri.length ? cielOf(cielsTri[0][0]) : null;

  // --- Corrélations : ce que révèlent tes données (température × ordre, moment × ordre) ---
  const tempDe = (o) => {
    const v = parseFloat(String(o.temp || "").replace(",", ".").replace(/[^0-9.\-]/g, ""));
    return !isNaN(v) && v > -30 && v < 55 ? v : null;
  };
  // Température moyenne par ordre (min. 2 observations avec température)
  const parOrdreTemp = {};
  observations.forEach((o) => {
    const t = tempDe(o);
    if (t === null) return;
    const id = deduireOrdre(o);
    if (!id || id === "autres") return;
    if (!parOrdreTemp[id]) parOrdreTemp[id] = [];
    parOrdreTemp[id].push(t);
  });
  const tempsParOrdre = Object.entries(parOrdreTemp)
    .filter(([, arr]) => arr.length >= 2)
    .map(([id, arr]) => ({ id, n: arr.length, moy: arr.reduce((a, b) => a + b, 0) / arr.length }))
    .sort((a, b) => b.moy - a.moy);

  // Moment favori par ordre (min. 2 observations avec moment)
  const parOrdreMoment = {};
  observations.forEach((o) => {
    if (!o.moment) return;
    const id = deduireOrdre(o);
    if (!id || id === "autres") return;
    if (!parOrdreMoment[id]) parOrdreMoment[id] = {};
    parOrdreMoment[id][o.moment] = (parOrdreMoment[id][o.moment] || 0) + 1;
  });
  const momentsParOrdre = Object.entries(parOrdreMoment)
    .map(([id, m]) => {
      const tri = Object.entries(m).sort((a, b) => b[1] - a[1]);
      const total = tri.reduce((s, [, n]) => s + n, 0);
      return { id, moment: tri[0][0], n: tri[0][1], total };
    })
    .filter((x) => x.total >= 2 && x.n / x.total >= 0.6) // un vrai penchant, pas du bruit
    .sort((a, b) => b.total - a.total);

  // Les enseignements à afficher (on ne montre que ce qui est statistiquement honnête)
  const enseignements = [];
  if (tempsParOrdre.length >= 2) {
    const chaud = tempsParOrdre[0], froid = tempsParOrdre[tempsParOrdre.length - 1];
    if (Math.abs(chaud.moy - froid.moy) >= 2) {
      enseignements.push({
        emoji: ordreInfo(chaud.id).emoji,
        texte: <span>Tes <b style={{ color: C.papier }}>{ordreInfo(chaud.id).label.toLowerCase()}</b> sortent par les températures les plus chaudes (<b style={{ color: C.ambreClair }}>{Math.round(chaud.moy)}°C</b> en moyenne), tandis que tes <b style={{ color: C.papier }}>{ordreInfo(froid.id).label.toLowerCase()}</b> se contentent de <b style={{ color: C.ambreClair }}>{Math.round(froid.moy)}°C</b>.</span>,
      });
    }
  }
  momentsParOrdre.slice(0, 2).forEach((x) => {
    const mi = momentOf(x.moment);
    if (!mi) return;
    enseignements.push({
      emoji: mi.emoji,
      texte: <span>Tu croises surtout tes <b style={{ color: C.papier }}>{ordreInfo(x.id).label.toLowerCase()}</b> <b style={{ color: C.ambreClair }}>{mi.label.toLowerCase()}</b> ({x.n} fois sur {x.total}).</span>,
    });
  });
  if (temps.length >= 4) {
    const min = Math.min(...temps), max = Math.max(...temps);
    if (max - min >= 5) {
      enseignements.push({
        emoji: "🌡️",
        texte: <span>Tes observations s'étalent de <b style={{ color: C.ambreClair }}>{Math.round(min)}°C</b> à <b style={{ color: C.ambreClair }}>{Math.round(max)}°C</b> — les insectes sont actifs sur une belle plage !</span>,
      });
    }
  }
  if (spotsTri.length >= 2 && spotsTri[0].especes > spotsTri[1].especes) {
    enseignements.push({
      emoji: "📍",
      texte: <span><b style={{ color: C.papier }}>{spotsTri[0].nom}</b> est ton spot le plus riche : <b style={{ color: C.ambreClair }}>{spotsTri[0].especes} espèces</b>, contre {spotsTri[1].especes} pour {spotsTri[1].nom}.</span>,
    });
  }


  // Répartition par biotope
  const parBiotope = {};
  observations.forEach((o) => { parBiotope[o.biotope] = (parBiotope[o.biotope] || 0) + 1; });
  const biotopesTri = Object.entries(parBiotope).sort((a, b) => b[1] - a[1]);
  const maxBio = biotopesTri.length ? biotopesTri[0][1] : 0;

  // Activité par mois (6 derniers mois présents)
  const parMois = {};
  observations.forEach((o) => { const m = moisDe(o.date); parMois[m] = (parMois[m] || 0) + 1; });
  const moisTri = Object.entries(parMois).sort((a, b) => (a[0] < b[0] ? -1 : 1)).slice(-6);
  const maxMois = moisTri.reduce((mx, [, n]) => Math.max(mx, n), 0);

  // Badges de progression (paliers de découverte)
  const badges = [
    { seuil: 1, emoji: "🥚", label: "Premier spécimen", atteint: total >= 1 },
    { seuil: 5, emoji: "🐛", label: "5 observations", atteint: total >= 5 },
    { seuil: 10, emoji: "🦋", label: "10 espèces différentes", atteint: especesUniques >= 10, valeur: especesUniques },
    { seuil: 25, emoji: "🔬", label: "25 observations", atteint: total >= 25 },
    { seuil: 4, emoji: "🌍", label: "4 biotopes explorés", atteint: biotopesSet.size >= 4, valeur: biotopesSet.size },
    { seuil: 1, emoji: "🌟", label: "Une observation notable", atteint: notables >= 1 },
    { seuil: 3, emoji: "🗂️", label: "3 ordres différents", atteint: nbOrdres >= 3, valeur: nbOrdres },
    { seuil: 6, emoji: "🧭", label: "6 ordres différents", atteint: nbOrdres >= 6, valeur: nbOrdres },
    { seuil: 50, emoji: "🏆", label: "50 observations", atteint: total >= 50 },
    { seuil: 20, emoji: "💎", label: "20 espèces différentes", atteint: especesUniques >= 20, valeur: especesUniques },
    { seuil: 5, emoji: "🎴", label: "5 cartes forgées", atteint: cartesForgees >= 5, valeur: cartesForgees },
    { seuil: 1, emoji: "🌟", label: "Une espèce rare", atteint: nbEspecesRares >= 1, valeur: nbEspecesRares },
    { seuil: 5, emoji: "💠", label: "5 espèces rares", atteint: nbEspecesRares >= 5, valeur: nbEspecesRares },
    { seuil: 100, emoji: "👑", label: "100 observations", atteint: total >= 100 },
  ];
  const badgesGagnes = badges.filter((b) => b.atteint).length;

  const carte = { background: "linear-gradient(#212A1B, #1A2015)", border: `1px solid ${C.bordure}`, borderRadius: 12, padding: "16px", boxShadow: "0 3px 10px rgba(0,0,0,.25)" };
  const titre = { fontFamily: sans, fontSize: 12, fontWeight: 700, letterSpacing: 0.8, textTransform: "uppercase", color: C.lichen, marginBottom: 12 };

  if (total === 0) {
    return (
      <div style={{ padding: 16, maxWidth: 560, margin: "0 auto" }}>
        <div style={{ ...carte, textAlign: "center", color: C.papierSombre, fontFamily: sans, fontSize: 14, padding: "40px 24px" }}>
          <div style={{ fontSize: 40, marginBottom: 12 }}>📊</div>
          Ajoute des observations pour voir ta collection prendre forme ici — espèces, diversité, badges de découverte…
        </div>
      </div>
    );
  }

  return (
    <div style={{ padding: 16, maxWidth: 560, margin: "0 auto" }}>
      {/* Chiffres clés — 4 tuiles */}
      <div style={{ display: "grid", gridTemplateColumns: "repeat(2, 1fr)", gap: 10, marginBottom: 12 }}>
        {[["Spécimens", total, "🗃️"], ["Espèces différentes", especesUniques, "🦋"], ["Identifiés", identifies, "🔖"], ["Localisés", positionnees, "📍"]].map(([lab, val, emo]) => (
          <div key={lab} style={{ ...carte, padding: "14px 12px", display: "flex", alignItems: "center", gap: 12 }}>
            <span style={{ fontSize: 24 }}>{emo}</span>
            <div>
              <div style={{ fontFamily: serif, fontSize: 26, fontWeight: 600, color: C.ambreClair, lineHeight: 1 }}>{val}</div>
              <div style={{ fontFamily: sans, fontSize: 10.5, letterSpacing: 0.3, textTransform: "uppercase", color: C.papierSombre, marginTop: 4 }}>{lab}</div>
            </div>

        ))}
      </div>

      {/* Ligne d'indicateurs secondaires */}
      <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 10, marginBottom: 16 }}>
        {[["Notables", notables, "🌟"], ["Cartes", cartesForgees, "🎴"], ["Fiches", fichesGenerees, "📖"]].map(([lab, val, emo]) => (
          <div key={lab} style={{ ...carte, padding: "12px 8px", textAlign: "center" }}>

      {/* Confiance moyenne d'identification */}
      {confianceMoy !== null && (
        <div style={{ ...carte, marginBottom: 16 }}>

      )}

      {/* Répartition par ordre taxonomique */}
      {ordresTri.length > 0 && (
        <div style={{ ...carte, marginBottom: 16 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 12 }}>
            <span style={titre}>Par ordre d'insecte</span>

          {ordresTri.map(([id, n]) => {
            const info = ordreInfo(id);
            const pct = Math.round((n / total) * 100);
            return (
              <div key={id} style={{ marginBottom: 10 }}>

                <div style={{ height: 8, borderRadius: 4, background: "#0F130C", overflow: "hidden" }}>
                  <div style={{ height: "100%", width: `${(n / maxOrdre) * 100}%`, borderRadius: 4, background: "linear-gradient(90deg, #6E8B4E, #A8C97E)", transition: "width .5s ease" }} />
                </div>
              </div>

          })}
        </div>
      )}

      {/* Rythme : moments de la journée */}
      {totalMoments > 0 && (
        <div style={{ ...carte, marginBottom: 16 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 4 }}>
            <span style={titre}>Ton rythme d'observation</span>
          </div>
          <div style={{ fontFamily: sans, fontSize: 12.5, color: C.papierSombre, marginBottom: 12, lineHeight: 1.5 }}>

              <div style={{ display: "flex", justifyContent: "space-between", fontFamily: sans, fontSize: 13, color: C.papier, marginBottom: 4 }}>
                <span>{m.emoji} {m.label}</span>
                <span style={{ color: C.papierSombre }}>{m.n} · {Math.round((m.n / totalMoments) * 100)}%</span>
              </div>
              <div style={{ height: 8, borderRadius: 4, background: "#0F130C", overflow: "hidden" }}>
                <div style={{ height: "100%", width: `${(m.n / maxMoment) * 100}%`, borderRadius: 4, background: "linear-gradient(90deg, #8A6E3A, #E4C878)", transition: "width .5s ease" }} />
              </div>

      {/* Spots : lieux d'observation */}
      {spotsTri.length > 0 && (
        <div style={{ ...carte, marginBottom: 16 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 4 }}>
            <span style={titre}>Tes lieux d'observation</span>
            <span style={{ fontFamily: sans, fontSize: 12, fontWeight: 700, color: C.ambreClair }}>{spotsTri.length} lieu{spotsTri.length > 1 ? "x" : ""}</span>
          </div>
          <div style={{ fontFamily: sans, fontSize: 12.5, color: C.papierSombre, marginBottom: 12, lineHeight: 1.5 }}>
            Ton spot le plus riche : <b style={{ color: C.ambreClair }}>📍 {spotsTri[0].nom}</b> ({spotsTri[0].especes} espèce{spotsTri[0].especes > 1 ? "s" : ""}).
          </div>
          {spotsTri.slice(0, 6).map((s) => (
            <div key={s.nom} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "9px 11px", borderRadius: 9, background: C.fond, border: `1px solid ${C.bordure}`, marginBottom: 7 }}>
              <span style={{ fontFamily: sans, fontSize: 13.5, color: C.papier }}>📍 {s.nom}</span>
              <span style={{ fontFamily: sans, fontSize: 12, color: C.papierSombre }}>
                <b style={{ color: C.lichen }}>{s.especes}</b> espèce{s.especes > 1 ? "s" : ""} · {s.obs} obs.

      {/* Ce que révèlent tes données (corrélations) */}
      {enseignements.length > 0 && (
        <div style={{ ...carte, marginBottom: 16, background: "linear-gradient(135deg, #1A2820, #14201A)", border: "1px solid #2E4A3A" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4 }}>
            <span style={{ fontSize: 17 }}>🔬</span>
            <span style={{ fontFamily: sans, fontSize: 11, fontWeight: 800, letterSpacing: 0.6, textTransform: "uppercase", color: "#7FC79B" }}>Ce que révèlent tes données</span>
          </div>
          <div style={{ fontFamily: sans, fontSize: 12, color: C.papierSombre, marginBottom: 13, lineHeight: 1.5, fontStyle: "italic" }}>

          </div>
          <div style={{ display: "grid", gap: 10 }}>
            {enseignements.map((e, i) => (
              <div key={i} style={{ display: "flex", alignItems: "flex-start", gap: 10, padding: "10px 12px", borderRadius: 9, background: "rgba(0,0,0,.22)", border: `1px solid ${C.bordure}` }}>

          <div style={{ fontFamily: sans, fontSize: 10.5, color: C.papierSombre, marginTop: 11, lineHeight: 1.45, fontStyle: "italic" }}>
            ⚠️ Ce sont des tendances personnelles, pas des vérités scientifiques : elles reflètent tes habitudes de sortie autant que la biologie des insectes !
          </div>

      )}

      {/* Conditions fétiches */}
      {(tempMoy !== null || cielTop) && (
        <div style={{ ...carte, marginBottom: 16 }}>
          <div style={{ marginBottom: 12 }}><span style={titre}>Tes conditions fétiches</span></div>
          <div style={{ display: "flex", gap: 10 }}>
            {tempMoy !== null && (

                <div style={{ fontFamily: sans, fontSize: 10, textTransform: "uppercase", color: C.papierSombre, marginTop: 2 }}>Ciel le plus fréquent</div>

      {/* Activité par mois */}
      {/* Espèces rares */}
      {nbEspecesRares > 0 && (
        <div style={{ ...carte, marginBottom: 16, display: "flex", alignItems: "center", gap: 12, background: "linear-gradient(#2A2417, #201B12)", border: "1px solid #4A3E22" }}>
          <span style={{ fontSize: 30 }}>🌟</span>
          <div style={{ flex: 1 }}>
            <div style={{ fontFamily: sans, fontSize: 11, letterSpacing: 0.5, textTransform: "uppercase", color: "#D2A24A" }}>Espèces rares dénichées</div>
            <div style={{ fontFamily: sans, fontSize: 12, color: C.papierSombre, marginTop: 2 }}>peu communes à très rares (données iNaturalist)</div>
          </div>
          <div style={{ fontFamily: serif, fontSize: 26, fontWeight: 700, color: "#E5B84B", lineHeight: 1 }}>{nbEspecesRares}</div>
        </div>
      )}

      {/* Espèce star */}
      {star && star[1] > 1 && (
        <div style={{ ...carte, marginBottom: 16, display: "flex", alignItems: "center", gap: 12 }}>
          <span style={{ fontSize: 30 }}>⭐</span>
          <div style={{ flex: 1 }}>
            <div style={{ fontFamily: sans, fontSize: 11, letterSpacing: 0.5, textTransform: "uppercase", color: C.lichen }}>Ton espèce star</div>
            <div style={{ fontFamily: serif, fontSize: 17, fontWeight: 600, color: C.papier }}>{nomStar.nom || nomStar.nomSci || "—"}</div>
          </div>
          <div style={{ textAlign: "center" }}>
            <div style={{ fontFamily: serif, fontSize: 24, fontWeight: 600, color: C.ambreClair, lineHeight: 1 }}>{star[1]}</div>
            <div style={{ fontFamily: sans, fontSize: 10, color: C.papierSombre }}>fois</div>
          </div>
        </div>
      )}

      {/* Badges de découverte */}
      <div style={{ ...carte, marginBottom: 16 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 12 }}>
          <span style={titre}>Badges de découverte</span>
          <span style={{ fontFamily: sans, fontSize: 12, fontWeight: 700, color: C.ambreClair }}>{badgesGagnes}/{badges.length}</span>
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 10 }}>
          {badges.map((b, i) => (
            <div key={i} style={{ textAlign: "center", opacity: b.atteint ? 1 : 0.32, filter: b.atteint ? "none" : "grayscale(1)" }} title={b.label}>
              <div style={{ fontSize: 26, lineHeight: 1.1 }}>{b.emoji}</div>
              <div style={{ fontFamily: sans, fontSize: 9.5, color: b.atteint ? C.papier : C.papierSombre, marginTop: 3, lineHeight: 1.2 }}>{b.label}</div>
            </div>
          ))}
        </div>
      </div>

      {/* Répartition par biotope */}
      {biotopesTri.length > 0 && (
        <div style={{ ...carte, marginBottom: 16 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 12 }}>
            <span style={titre}>Par biotope</span>
            <span style={{ fontFamily: sans, fontSize: 12, fontWeight: 700, color: C.ambreClair }}>{biotopesSet.size} exploré{biotopesSet.size > 1 ? "s" : ""}</span>
          </div>
          {biotopesTri.map(([id, n]) => (
            <div key={id} style={{ marginBottom: 10 }}>
              <div style={{ display: "flex", justifyContent: "space-between", fontFamily: sans, fontSize: 13, color: C.papier, marginBottom: 4 }}>
                <span>{biotopeOf(id).emoji} {biotopeOf(id).label}</span>
                <span style={{ color: C.papierSombre }}>{n} · {Math.round((n / total) * 100)}%</span>
              </div>
              <div style={{ height: 8, borderRadius: 4, background: "#0F130C", overflow: "hidden" }}>
                <div style={{ height: "100%", width: `${(n / maxBio) * 100}%`, borderRadius: 4, background: `linear-gradient(90deg, ${C.ambre}, ${C.ambreClair})`, transition: "width .5s ease" }} />
              </div>
            </div>
          ))}
        </div>
      )}

      {/* Activité par mois */}
      {moisTri.length > 0 && (
        <div style={{ ...carte, marginBottom: 16 }}>
          <div style={titre}>Activité récente</div>
          <div style={{ display: "flex", alignItems: "flex-end", gap: 8, height: 120 }}>
            {moisTri.map(([m, n]) => (
              <div key={m} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 6 }}>
                <div style={{ fontFamily: sans, fontSize: 12, fontWeight: 700, color: C.ambreClair }}>{n}</div>
                <div style={{ width: "100%", maxWidth: 44, height: `${maxMois ? (n / maxMois) * 84 : 0}px`, minHeight: 4, borderRadius: "5px 5px 0 0", background: `linear-gradient(${C.ambreClair}, ${C.ambre})`, transition: "height .5s ease" }} />
                <div style={{ fontFamily: sans, fontSize: 10, color: C.papierSombre, textAlign: "center", lineHeight: 1.2 }}>{moisLisible(m)}</div>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

// Déduit une indication biogéographique mondiale approximative depuis le GPS
// (sans révéler la position exacte, sans API). Aide l'IA à privilégier la faune locale.
function regionApprox(gps) {
  if (!gps || typeof gps.lat !== "number" || typeof gps.lon !== "number") return "";
  const { lat, lon } = gps;

  // Cas fin : France métropolitaine (indice précis, utile pour l'usage principal)
  if (lat >= 41 && lat <= 51.5 && lon >= -5.5 && lon <= 10) {
    let ns;
    if (lat >= 48.5) ns = "nord de la France";
    else if (lat >= 46) ns = "centre de la France";
    else if (lat >= 43.5) ns = "sud de la France";
    else ns = "extrême sud de la France (zone méditerranéenne)";
    const alt = lon > 6 && lat < 46.5 ? " (secteur alpin/montagnard possible)" : "";
    return ns + alt;
  }

  // Zone climatique par latitude
  const absLat = Math.abs(lat);
  let climat;
  if (absLat < 23.5) climat = "zone tropicale";
  else if (absLat < 35) climat = "zone subtropicale";
  else if (absLat < 55) climat = "zone tempérée";
  else climat = "zone froide (boréale/polaire)";
  const hemisphere = lat < 0 ? "hémisphère sud" : "hémisphère nord";

  // Grand ensemble continental (bornes larges, approximatives)
  let continent = "";
  if (lat >= 34 && lat <= 72 && lon >= -12 && lon <= 45) continent = "Europe";
  else if (lat >= -35 && lat <= 38 && lon >= -18 && lon <= 52) continent = "Afrique";
  else if (lat >= 5 && lat <= 82 && lon >= 25 && lon <= 180) continent = "Asie";
  else if (lat >= -48 && lat <= 12 && lon >= 95 && lon <= 180) continent = "Océanie / Asie du Sud-Est";
  else if (lat >= 12 && lat <= 84 && lon >= -170 && lon <= -52) continent = "Amérique du Nord";
  else if (lat >= -56 && lat < 14 && lon >= -92 && lon <= -34) continent = "Amérique du Sud / centrale";

  return continent ? `${continent}, ${climat} (${hemisphere})` : `${climat}, ${hemisphere}`;
}


// ---------- Autocomplétion des noms via iNaturalist (recherche de taxons, gratuite) ----------
// N.B. : c'est l'API de RECHERCHE de noms (ouverte), pas la reconnaissance photo.
async function chercherTaxons(terme, signal) {
  const url = "https://api.inaturalist.org/v1/taxa/autocomplete?locale=fr&per_page=8&q=" + encodeURIComponent(terme);
  const r = await fetch(url, { signal });
  if (!r.ok) throw new Error("http");
  const d = await r.json();
  // On garde jusqu'au niveau famille et plus fin (rank_level <= 60)
  return (d.results || [])
    .filter((t) => t.rank_level == null || t.rank_level <= 60)
    .map((t) => ({
      id: t.id,
      // nom commun (FR si dispo) et nom scientifique
      commun: t.preferred_common_name || "",
      sci: t.name || "",
      rang: t.rank || "",
      groupe: t.iconic_taxon_name || "",
    }));
}

// ---------- Rareté d'une espèce via iNaturalist (nombre d'observations mondiales) ----------
// Mise en cache dans le navigateur : chaque espèce n'est interrogée qu'une fois.
// Seuils ajustables selon ce qui te semble juste pour ta faune.
// "peuCommune" abaissé à 80000 : une espèce vue 80 000+ fois dans le monde est vraiment commune.
const SEUILS_RARETE = { tresRare: 2000, rare: 20000, peuCommune: 80000 };

// Valeur "forcée" pour les banalités notoires (voir ESPECES_COMMUNES) : garantit "commune".
const COMMUNE_SENTINELLE = 999999;

// Espèces ultra-communes mais peu photographiées sur iNaturalist (donc faussement "rares").
// On les force à "commune". Liste facile à compléter (mots-clés, nom scientifique ou français).
const ESPECES_COMMUNES = [
  "musca domestica", "mouche domestique",
  "culex", "aedes", "anopheles", "moustique",
  "aphidoidea", "aphididae", "puceron",
  "drosophila", "drosophile",
  "calliphora", "lucilia",
  "blattella germanica", "blatta orientalis",
  "fannia canicularis",
];
function estEspeceCommune(nom) {
  const n = sansAccents(nom || "");
  if (!n) return false;
  return ESPECES_COMMUNES.some((k) => n.includes(sansAccents(k)));
}

// Convertit un nombre d'observations mondiales iNaturalist en rareté de carte (1-100).
// Aligné sur les paliers du jeu : holographique >= 65 (rare), légendaire >= 85 (très rare).
function rareteDepuisCount(count) {
  if (count == null || typeof count !== "number") return null;
  const lc = Math.log10(Math.max(1, count));
  const seg = (loMin, loMax, rMin, rMax) => {
    const t = Math.min(1, Math.max(0, (lc - loMin) / (loMax - loMin)));
    return Math.round(rMax - t * (rMax - rMin));
  };
  const S = SEUILS_RARETE;
  if (count < S.tresRare) return seg(1, Math.log10(S.tresRare), 85, 100);
  if (count < S.rare) return seg(Math.log10(S.tresRare), Math.log10(S.rare), 65, 84);
  if (count < S.peuCommune) return seg(Math.log10(S.rare), Math.log10(S.peuCommune), 45, 64);
  return seg(Math.log10(S.peuCommune), 7, 15, 44);
}

function niveauRarete(count) {
  if (count == null || typeof count !== "number") return null;
  if (count < SEUILS_RARETE.tresRare) return { id: "tresrare", label: "Très rare", emoji: "🌟", bonus: 3, couleur: "#E5B84B" };
  if (count < SEUILS_RARETE.rare) return { id: "rare", label: "Rare", emoji: "✨", bonus: 2, couleur: "#D2A24A" };
  if (count < SEUILS_RARETE.peuCommune) return { id: "peucommune", label: "Peu commune", emoji: "🍃", bonus: 1, couleur: "#8AAE6B" };
  return { id: "commune", label: "Commune", emoji: "", bonus: 0, couleur: "#7C8568" };
}

function BadgeRarete({ count, style }) {
  const niv = niveauRarete(count);
  if (!niv || niv.bonus <= 0) return null;
  return (
    <span title={`${niv.label} (${count.toLocaleString("fr-FR")} observations mondiales sur iNaturalist)`}
      style={{ display: "inline-flex", alignItems: "center", gap: 3, fontFamily: sans, fontSize: 10.5, fontWeight: 800, color: "#12160D", background: niv.couleur, borderRadius: 7, padding: "1px 6px", whiteSpace: "nowrap", ...style }}>

  );
}

function litCacheRarete(sci) {
  try {
    const brut = localStorage.getItem("biodex:rarete:v2:" + sci.toLowerCase().trim());
    if (!brut) return undefined;
    return JSON.parse(brut);
  } catch { return undefined; }
}
function ecritCacheRarete(sci, count) {
  try { localStorage.setItem("biodex:rarete:v2:" + sci.toLowerCase().trim(), JSON.stringify({ count, maj: Date.now() })); } catch {}
}

// Renvoie le nombre d'observations mondiales (number), ou null si inconnu/indispo.
async function chargerRareteInat(sci) {
  if (!sci || !sci.trim()) return null;
  const cle = sci.trim();
  // Banalités notoires : forcées à "commune" sans même interroger le réseau.
  if (estEspeceCommune(cle)) { ecritCacheRarete(cle, COMMUNE_SENTINELLE); return COMMUNE_SENTINELLE; }
  const cache = litCacheRarete(cle);
  if (cache && typeof cache.count === "number") return cache.count;
  try {
    const url = "https://api.inaturalist.org/v1/taxa/autocomplete?per_page=5&q=" + encodeURIComponent(cle);
    const r = await fetch(url);
    if (!r.ok) throw new Error("http");
    const d = await r.json();
    const results = d.results || [];
    const norm = (s) => (s || "").toLowerCase().trim();
    let match = results.find((t) => norm(t.name) === norm(cle)) || results[0];
    const count = match && typeof match.observations_count === "number" ? match.observations_count : null;
    if (count != null) ecritCacheRarete(cle, count);
    return count;
  } catch {
    return null; // réseau/API indispo -> pas de rareté iNat (on retombera sur la rareté "bande")
  }
}

// Clé d'espèce normalisée : nom scientifique de préférence, sinon nom commun.
// Marche pour les observations (nomSci/nom) comme pour les posts du mur (espece_sci/espece).
function cleEspeceMur(p) {
  return (p.nomSci || p.espece_sci || p.nom || p.espece || "").toLowerCase().trim();
}

// Compte combien d'observations de la collection correspondent à une espèce donnée (par clé).
function compteEspeceCollection(cle, observations, exclureId) {
  if (!cle || !observations) return 0;
  return observations.filter((o) => (exclureId ? o.id !== exclureId : true) && cleEspeceMur(o) === cle).length;
}

// Hook : charge la rareté iNaturalist d'une liste d'items (cache d'abord, réseau en arrière-plan).
function useRaretes(items) {
  const [raretes, setRaretes] = useState({});
  const cles = Array.from(new Set((items || []).map(cleEspeceMur).filter(Boolean))).sort();
  const signature = cles.join("|");
  useEffect(() => {
    let annule = false;
    (async () => {
      const especesMap = {};
      (items || []).forEach((o) => { const k = cleEspeceMur(o); if (k && !(k in especesMap)) especesMap[k] = o.nomSci || o.espece_sci || o.nom || o.espece || ""; });
      const map = {};
      Object.keys(especesMap).forEach((k) => { const c = litCacheRarete(k); if (c && typeof c.count === "number") map[k] = c.count; });
      if (!annule) setRaretes((prev) => ({ ...prev, ...map }));
      for (const k of Object.keys(especesMap)) {
        if (k in map) continue;
        const c = await chargerRareteInat(especesMap[k]);
        if (annule) return;
        map[k] = c;
        setRaretes((prev) => ({ ...prev, [k]: c }));
      }
    })();
    return () => { annule = true; };
  }, [signature]);
  return raretes;
}

// Points d'un post : +1 base, +2 nouvelle espèce sur le mur, + bonus rareté (iNat ou "bande").
function pointsDunPost(p, premiereApparition, compteEspece, raretes) {
  const k = cleEspeceMur(p);
  let pts = 1;
  const detail = { base: 1, nouveaute: 0, rarete: 0 };
  if (k && premiereApparition[k] === p.id) { pts += 2; detail.nouveaute = 2; }
  const count = k ? raretes[k] : undefined;
  const niv = (typeof count === "number") ? niveauRarete(count) : null;
  if (niv && niv.bonus > 0) { pts += niv.bonus; detail.rarete = niv.bonus; }
  else if ((count === undefined || count === null) && k && compteEspece[k] <= 2) { pts += 1; detail.rarete = 1; }
  return { pts, detail };
}

// Classement des chasseurs sur une période ("semaine" = 7 j, "mois" = 30 j glissants).
function calculerClassement(posts, periode, raretes) {
  if (!posts || !posts.length) return [];
  const maintenant = Date.now();
  const seuil = (periode === "mois" ? 30 : 7) * 864e5;
  const dansPeriode = (p) => {
    const t = new Date(p.created_at).getTime();
    return !isNaN(t) && (maintenant - t) <= seuil;
  };
  const premiereApparition = {};
  [...posts].sort((a, b) => new Date(a.created_at) - new Date(b.created_at)).forEach((p) => {
    const k = cleEspeceMur(p);
    if (k && !(k in premiereApparition)) premiereApparition[k] = p.id;
  });
  const compteEspece = {};
  posts.forEach((p) => { const k = cleEspeceMur(p); if (k) compteEspece[k] = (compteEspece[k] || 0) + 1; });
  const parAuteur = {};
  posts.filter(dansPeriode).forEach((p) => {
    const a = (p.auteur || "Anonyme").trim() || "Anonyme";
    if (!parAuteur[a]) parAuteur[a] = { auteur: a, points: 0, trouvailles: 0 };
    const { pts } = pointsDunPost(p, premiereApparition, compteEspece, raretes);
    parAuteur[a].points += pts;
    parAuteur[a].trouvailles += 1;
  });
  return Object.values(parAuteur).sort((x, y) => y.points - x.points || y.trouvailles - x.trouvailles);
}

// Écran d'édition de son propre profil (visible par toute la bande).
function MonProfil({ prenom, onDefinirPrenom, observations, onFermer }) {
  const [nom, setNom] = useState(prenom || "");
  const [embleme, setEmbleme] = useState(EMBLEME_DEFAUT);
  const [bio, setBio] = useState("");
  const [region, setRegion] = useState("");
  const [fetiche, setFetiche] = useState("");
  const [etat, setEtat] = useState("chargement");
  const [message, setMessage] = useState("");
  const [enregistrement, setEnregistrement] = useState(false);

  useEffect(() => {
    let vivant = true;
    (async () => {
      if (!prenom) { setEtat("ok"); return; }
      const profils = await chargerProfils(true);
      if (!vivant) return;
      const p = profilDe(prenom, profils);
      if (p) {
        setEmbleme(p.embleme || EMBLEME_DEFAUT);
        setBio(p.bio || "");
        setRegion(p.region || "");
        setFetiche(p.fetiche || "");
      }
      setEtat("ok");
    })();
    return () => { vivant = false; };
  }, [prenom]);

  // Espèces de sa collection (pour choisir son insecte fétiche)
  const especes = [...new Set(observations.filter((o) => o.nom).map((o) => o.nom.trim()))].sort();

  async function sauver() {
    const p = nom.trim();
    if (!p) { setMessage("Indique ton prénom."); return; }
    setEnregistrement(true);
    setMessage("");
    try {
      await enregistrerProfil(p, { embleme, bio, region, fetiche });
      onDefinirPrenom(p);
      setMessage("✓ Profil enregistré ! Toute la bande le verra.");
      setTimeout(() => setMessage(""), 3500);
    } catch (e) {
      setMessage("Échec : " + (e.message || "réseau ?"));
    }
    setEnregistrement(false);
  }

  const champ = { width: "100%", boxSizing: "border-box", background: C.fond, border: `1px solid ${C.bordure}`, borderRadius: 9, padding: "10px 12px", fontFamily: sans, fontSize: 14.5, color: C.papier, outline: "none" };
  const libelle = { display: "block", fontFamily: sans, fontSize: 12, fontWeight: 700, letterSpacing: 0.5, textTransform: "uppercase", color: C.lichen, marginBottom: 7 };
  const carte = { background: C.panneau, border: `1px solid ${C.bordure}`, borderRadius: 12, padding: 14, marginBottom: 14 };

  return (
    <div style={{ padding: 16, maxWidth: 560, margin: "0 auto" }}>
      <Bouton onClick={onFermer} style={{ marginBottom: 16 }}>← Retour</Bouton>

      {/* Aperçu */}
      <div style={{ textAlign: "center", marginBottom: 18 }}>
        <div style={{ fontSize: 52, lineHeight: 1.1 }}>{embleme}</div>
        <div style={{ fontFamily: serif, fontSize: 24, fontWeight: 700, color: C.papier, marginTop: 4 }}>{nom.trim() || "Ton prénom"}</div>
        {region.trim() && <div style={{ fontFamily: sans, fontSize: 12.5, color: C.lichen, marginTop: 2 }}>📍 {region.trim()}</div>}
        {bio.trim() && <div style={{ fontFamily: serif, fontStyle: "italic", fontSize: 13.5, color: C.papierSombre, marginTop: 6, lineHeight: 1.5 }}>« {bio.trim()} »</div>}
      </div>

      {etat === "chargement" ? (
        <div style={{ fontFamily: sans, fontSize: 14, color: C.papierSombre, fontStyle: "italic", textAlign: "center", padding: "20px 0" }}>Chargement…</div>
      ) : (
        <div>
          {/* Prénom */}
          <div style={carte}>
            <label style={libelle}>Ton prénom (visible par la bande)</label>
            <input style={champ} value={nom} onChange={(e) => setNom(e.target.value)} maxLength={24} placeholder="ex : Sylvain" />
          </div>

          {/* Emblème */}
          <div style={carte}>
            <label style={libelle}>Ton emblème</label>

              {EMBLEMES.map((e) => (
                <button key={e} onClick={() => setEmbleme(e)}
