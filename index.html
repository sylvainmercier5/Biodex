function MurCommun({ prenom, onDefinirPrenom, onMarquerReactionsVues, onOuvrirProfil }) {
  const [profils, setProfils] = useState({});
  useEffect(() => { let v = true; chargerProfils().then((p) => { if (v) setProfils(p); }).catch(() => {}); return () => { v = false; }; }, []);
  const [posts, setPosts] = useState([]);
  const [etat, setEtat] = useState("chargement"); // chargement | ok | echec | inactif
  const [saisiePrenom, setSaisiePrenom] = useState(prenom || "");
  const [confirmSuppr, setConfirmSuppr] = useState(null); // id du post en attente de confirmation
  const [supprEnCours, setSupprEnCours] = useState(null); // id du post en cours de suppression
  const [postDetail, setPostDetail] = useState(null); // post ouvert en détail
  const [reactions, setReactions] = useState({}); // { post_id: { type: compteur } }
  const [raretes, setRaretes] = useState({}); // { cleEspece: count|null }
  const [besoinPrenom, setBesoinPrenom] = useState(false); // true si on tente de réagir sans prénom

  // Charge les raretés iNaturalist (cache d'abord, réseau ensuite) pour une liste de posts.
  async function chargerRaretes(liste) {
    const especesMap = {};
    liste.forEach((p) => { const k = cleEspeceMur(p); if (k && !(k in especesMap)) especesMap[k] = p.espece_sci || p.espece || ""; });
    const map = {};
    Object.keys(especesMap).forEach((k) => { const c = litCacheRarete(k); if (c && typeof c.count === "number") map[k] = c.count; });
    setRaretes((prev) => ({ ...prev, ...map }));
    for (const k of Object.keys(especesMap)) {
      if (k in map) continue;
      const c = await chargerRareteInat(especesMap[k]);
      map[k] = c;
      setRaretes((prev) => ({ ...prev, [k]: c }));
    }
  }

  async function lancerSuppression(post) {
    setSupprEnCours(post.id);
    try {
      await supprimerPost(post);
      setPosts((prev) => prev.filter((x) => x.id !== post.id));
    } catch (e) {
      // en cas d'échec, on rafraîchit pour refléter l'état réel
      rafraichir(true);
    }
    setSupprEnCours(null);
    setConfirmSuppr(null);
  }

  async function rafraichir(silencieux = false) {
    if (!MUR_ACTIF) { setEtat("inactif"); return; }
    if (!silencieux) setEtat("chargement");
    try {
      const p = await chargerMur(50);
      setPosts(p);
      chargerRaretes(p);
      chargerReactions().then((r) => {
        setReactions(r);
        // Marque les réactions reçues comme vues, à partir des données déjà chargées (pas de requête en plus)
        if (prenom && onMarquerReactionsVues) {
          const moi = prenom.trim().toLowerCase();
          let total = 0;
          p.filter((x) => (x.auteur || "").trim().toLowerCase() === moi).forEach((x) => {
            total += nbReacts(r[x.id]);
          });
          onMarquerReactionsVues(total);
        }
      });
      setEtat("ok");
    } catch (e) {
      if (!silencieux) setEtat("echec");
    }
  }

  // Réagir à un post (toggle) : met à jour en local tout de suite, puis envoie au serveur.
  async function surReaction(postId, type) {
    const moi = (prenom || "").trim();
    if (!moi) { setBesoinPrenom(true); return; } // il faut un prénom pour réagir
    const listeActuelle = (reactions[postId] && reactions[postId][type]) || [];
    const dejaReagi = listeActuelle.map((n) => n.toLowerCase()).includes(moi.toLowerCase());
    setReactions((prev) => {
      const copie = { ...prev };
      copie[postId] = { ...(copie[postId] || {}) };
      const liste = [...(copie[postId][type] || [])];
      if (dejaReagi) copie[postId][type] = liste.filter((n) => n.toLowerCase() !== moi.toLowerCase());
      else copie[postId][type] = [...liste, moi];
      return copie;
    });
    try { await reagir(postId, type, moi, dejaReagi); }
    catch { chargerReactions().then(setReactions); } // si échec, on resynchronise
  }

  useEffect(() => {
    rafraichir();
    // Rafraîchissement auto toutes les 20 s tant qu'on est sur le mur (silencieux)
    const intervalle = setInterval(() => { rafraichir(true); }, 20000);
    // Rafraîchit aussi quand l'app/l'onglet redevient visible (silencieux)
    const surVisibilite = () => { if (!document.hidden) rafraichir(true); };
    document.addEventListener("visibilitychange", surVisibilite);
    return () => {
      clearInterval(intervalle);
      document.removeEventListener("visibilitychange", surVisibilite);
    };
  }, []);

  if (!MUR_ACTIF) {
    return (
      <div style={{ padding: 16, maxWidth: 560, margin: "0 auto" }}>
        <div style={{ textAlign: "center", padding: "48px 24px", border: `1px solid ${C.bordure}`, borderRadius: 14, background: "linear-gradient(#191F15, #14180F)" }}>
          <div style={{ fontSize: 38, marginBottom: 12 }}>🌐</div>
          <div style={{ fontFamily: serif, fontSize: 19, fontWeight: 600, color: C.papier, marginBottom: 6 }}>Mur commun non configuré</div>
          <div style={{ fontFamily: sans, fontSize: 14, color: C.papierSombre, lineHeight: 1.5 }}>La clé de connexion n'est pas encore renseignée dans l'application.</div>
        </div>
      </div>
    );
  }

  return (
    <div style={{ padding: 16, maxWidth: 560, margin: "0 auto" }}>
      {/* Prénom de l'auteur */}
      <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: besoinPrenom ? 6 : 14, padding: "10px 12px", background: C.panneau, border: `1px solid ${besoinPrenom ? C.ambre : C.bordure}`, borderRadius: 10 }}>
        <span style={{ fontFamily: sans, fontSize: 13, color: C.lichen, fontWeight: 600, whiteSpace: "nowrap" }}>Je poste en tant que</span>
        <input value={saisiePrenom} onChange={(e) => { setSaisiePrenom(e.target.value); if (e.target.value.trim()) setBesoinPrenom(false); }} onBlur={() => onDefinirPrenom(saisiePrenom.trim())}
          placeholder="ton prénom" maxLength={40}
          style={{ flex: 1, boxSizing: "border-box", background: C.fond, color: C.papier, border: `1px solid ${C.bordure}`, borderRadius: 8, padding: "8px 10px", fontFamily: sans, fontSize: 14, outline: "none" }} />
      </div>
      {besoinPrenom && (
        <div style={{ fontFamily: sans, fontSize: 12.5, color: C.ambreClair, marginBottom: 14, paddingLeft: 4 }}>
          👆 Indique ton prénom pour pouvoir réagir (les autres verront qui a réagi).
        </div>
      )}

      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
        <div style={{ fontFamily: serif, fontSize: 18, fontWeight: 600, color: C.papier }}>🌐 Le mur de la bande</div>
        <button onClick={rafraichir} disabled={etat === "chargement"} className={"bd-refresh" + (etat === "chargement" ? " bd-spinning" : "")}>
          <span className="bd-refresh-ico">↻</span>{etat === "chargement" ? "Actualisation…" : "Rafraîchir"}
        </button>
      </div>

      {etat === "chargement" && <div style={{ fontFamily: sans, fontSize: 14, color: C.papierSombre, fontStyle: "italic", padding: "20px 0", textAlign: "center" }}>Chargement du mur…</div>}
      {etat === "echec" && <div style={{ fontFamily: sans, fontSize: 14, color: "#E8A88F", padding: "16px 0", textAlign: "center" }}>Impossible de charger le mur (réseau ?). Réessaie.</div>}
      {etat === "ok" && posts.length === 0 && (
        <div style={{ textAlign: "center", padding: "40px 24px", border: `1px solid ${C.bordure}`, borderRadius: 14, background: "linear-gradient(#191F15, #14180F)", fontFamily: sans, fontSize: 14, color: C.papierSombre, lineHeight: 1.6 }}>
          Le mur est encore vide.<br />Partage ta première observation depuis sa fiche (bouton « Partager au mur ») !
        </div>
      )}

      {etat === "ok" && posts.map((p) => (
        <div key={p.id} style={{ marginBottom: 14, border: `1px solid ${C.bordure}`, borderRadius: 12, overflow: "hidden", background: C.panneau, boxShadow: "0 2px 8px rgba(0,0,0,.25)" }}>
          <div onClick={() => setPostDetail(p)} style={{ cursor: "pointer" }}>
            {p.photo_url && <img src={p.photo_url} alt={p.espece} loading="lazy" style={{ width: "100%", maxHeight: 360, objectFit: "cover", display: "block" }} />}
            <div style={{ padding: "10px 14px 4px" }}>
              <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
                <span style={{ fontFamily: serif, fontSize: 17, fontWeight: 600, color: C.papier }}>{p.espece || "Spécimen non identifié"}</span>
                <BadgePourcent confiance={p.confiance} />
                <BadgeRarete count={raretes[cleEspeceMur(p)]} />
              </div>
              {p.espece_sci && <div style={{ fontFamily: serif, fontStyle: "italic", fontSize: 14, color: C.ambre }}>{p.espece_sci}</div>}
              {p.note && <div style={{ fontFamily: sans, fontSize: 13, color: C.papier, lineHeight: 1.5, marginTop: 6 }}>{p.note}</div>}
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 8, fontFamily: sans, fontSize: 12, color: C.papierSombre }}>
                <span>
                  {onOuvrirProfil && p.auteur
                    ? <button onClick={(e) => { e.stopPropagation(); onOuvrirProfil(p.auteur); }}
                        style={{ background: "none", border: "none", padding: 0, font: "inherit", color: C.ambreClair, cursor: "pointer", textDecoration: "underline" }}>{emblemeDe(p.auteur, profils)} {p.auteur}</button>
                    : <span>{emblemeDe(p.auteur, profils)} {p.auteur || "Anonyme"}</span>}
                  {p.lieu ? ` · ${p.lieu}` : ""}
                </span>
                <span>{p.created_at ? new Date(p.created_at).toLocaleDateString("fr-FR", { day: "numeric", month: "short" }) : ""}</span>
              </div>
              <div style={{ fontFamily: sans, fontSize: 11.5, color: C.ambre, marginTop: 6, opacity: 0.85 }}>Toucher pour en savoir plus →</div>
            </div>
          </div>
          <div style={{ display: "flex", gap: 6, padding: "8px 14px 2px", flexWrap: "wrap" }}>
            {REACTIONS.map((r) => {
              const liste = (reactions[p.id] && reactions[p.id][r.type]) || [];
              const n = liste.length;
              const jaiReagi = prenom && liste.map((x) => x.toLowerCase()).includes(prenom.trim().toLowerCase());
              return (
                <button key={r.type} onClick={() => surReaction(p.id, r.type)} title={n > 0 ? liste.join(", ") : r.titre}
                  style={{ display: "flex", alignItems: "center", gap: 4, padding: "5px 9px", borderRadius: 20, border: `1px solid ${jaiReagi ? C.ambre : (n > 0 ? "#A8863A" : C.bordure)}`, background: jaiReagi ? "linear-gradient(#3A4A2C, #2C3623)" : (n > 0 ? "linear-gradient(#2C3623, #232B1D)" : C.panneauClair), cursor: "pointer", fontFamily: sans, fontSize: 13 }}>
                  <span style={{ fontSize: 15 }}>{r.emoji}</span>
                  {n > 0 && <span style={{ fontWeight: 700, color: C.ambreClair, fontSize: 12 }}>{n}</span>}
                </button>
              );
            })}
          </div>
          {/* Qui a réagi */}
          {(() => {
            const parType = reactions[p.id] || {};
            const lignes = REACTIONS.filter((r) => (parType[r.type] || []).length > 0);
            if (lignes.length === 0) return null;
            return (
              <div style={{ padding: "6px 14px 2px", display: "flex", flexWrap: "wrap", gap: "2px 10px" }}>
                {lignes.map((r) => (
                  <span key={r.type} style={{ fontFamily: sans, fontSize: 11.5, color: C.papierSombre }}>
                    <span style={{ fontSize: 12 }}>{r.emoji}</span> {parType[r.type].join(", ")}
                  </span>
                ))}
              </div>
            );
          })()}
          <div style={{ padding: "0 14px 10px" }}>
            {confirmSuppr === p.id ? (
              <div style={{ display: "flex", gap: 8, alignItems: "center", marginTop: 6, paddingTop: 10, borderTop: `1px solid ${C.bordure}` }}>
                <span style={{ fontFamily: sans, fontSize: 12.5, color: C.papierSombre, flex: 1 }}>Supprimer cette publication ?</span>
                <button onClick={() => setConfirmSuppr(null)} disabled={supprEnCours === p.id}
                  style={{ fontFamily: sans, fontSize: 12, fontWeight: 600, padding: "5px 10px", borderRadius: 6, border: `1px solid ${C.bordure}`, background: C.panneauClair, color: C.papierSombre, cursor: "pointer" }}>Non</button>
                <button onClick={() => lancerSuppression(p)} disabled={supprEnCours === p.id}
                  style={{ fontFamily: sans, fontSize: 12, fontWeight: 600, padding: "5px 10px", borderRadius: 6, border: `1px solid ${C.rouge}`, background: "transparent", color: C.rouge, cursor: "pointer" }}>
                  {supprEnCours === p.id ? "Suppression…" : "Oui, supprimer"}</button>
              </div>
            ) : (
              <div style={{ display: "flex", justifyContent: "flex-end" }}>
                <button onClick={() => setConfirmSuppr(p.id)}
                  style={{ fontFamily: sans, fontSize: 12, padding: "4px 8px", borderRadius: 6, border: "none", background: "transparent", color: C.papierSombre, cursor: "pointer" }}
                  title="Supprimer cette publication" aria-label="Supprimer">🗑️</button>
              </div>
            )}
          </div>
        </div>
      ))}
      {postDetail && <DetailPost post={postDetail} reactions={reactions[postDetail.id] || {}} onReagir={(type) => surReaction(postDetail.id, type)} onFermer={() => setPostDetail(null)} monPrenom={prenom} onOuvrirProfil={onOuvrirProfil ? (nom) => { setPostDetail(null); onOuvrirProfil(nom); } : null} />}
    </div>
  );
}

// ---------- Mode jeu : cartes + combat solo ----------
function ModeCartes({ cartes, onOuvrir, observations, prenom, onDefinirPrenom, onDefier }) {
  const [sousVue, setSousVue] = useState("galerie"); // galerie | combat | ligue
  const [fOrdreC, setFOrdreC] = useState("");
  const [triCartes, setTriCartes] = useState("recentes"); // recentes | rarete | type
  const [montrerTypes, setMontrerTypes] = useState(false);
  const ordresCartes = ORDRES.map((o) => ({ ...o, n: cartes.filter((c) => deduireOrdre(c) === o.id).length })).filter((o) => o.n > 0);
  const nbAutresC = cartes.filter((c) => deduireOrdre(c) === "autres").length;
  const cartesFiltrees = fOrdreC ? cartes.filter((c) => deduireOrdre(c) === fOrdreC) : cartes;
  const rar = (c) => Number(c && c.carte && c.carte.rarete) || 0;
  const cartesAffichees = (() => {
    const liste = [...cartesFiltrees];
    if (triCartes === "rarete") liste.sort((a, b) => rar(b) - rar(a));
    else if (triCartes === "type") liste.sort((a, b) => {
      const t = ((a.carte && a.carte.element) || "").localeCompare((b.carte && b.carte.element) || "");
      return t !== 0 ? t : rar(b) - rar(a);
    });
    else liste.sort((a, b) => new Date(b.date || 0) - new Date(a.date || 0)); // récentes
    return liste;
  })();
  const sousOnglets = [["galerie", "🎴 Cartes"], ["combat", "⚔️ Combat"], ...(MUR_ACTIF ? [["ligue", "🏆 Ligue"]] : []), ["quiz", "🧠 Quiz"]];
  return (
    <div style={{ padding: 16, maxWidth: 560, margin: "0 auto" }}>
      <div style={{ display: "flex", gap: 6, marginBottom: 16 }}>
        {sousOnglets.map(([id, label]) => (
          <button key={id} className="bd-press" onClick={() => setSousVue(id)}
            style={{ flex: 1, fontFamily: sans, fontSize: 12.5, fontWeight: 700, padding: "9px 2px", borderRadius: 9, cursor: "pointer",
              border: `1px solid ${sousVue === id ? "#A8863A" : C.bordure}`,
              background: sousVue === id ? "linear-gradient(#2C3623, #232B1D)" : "transparent",
              color: sousVue === id ? C.ambreClair : C.papierSombre }}>
            {label}
          </button>
        ))}
      </div>

      {/* Bouton schéma des types (combat + ligue) */}
      {(sousVue === "combat" || sousVue === "ligue") && (
        <div style={{ marginBottom: 14 }}>
          <button onClick={() => setMontrerTypes((v) => !v)} style={{ width: "100%", fontFamily: sans, fontSize: 13, fontWeight: 700, padding: "9px 12px", borderRadius: 9, cursor: "pointer", border: `1px solid ${C.bordure}`, background: montrerTypes ? C.panneau : "transparent", color: C.ambreClair, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <span>🔰 Forces & faiblesses des types</span>
            <span style={{ color: C.papierSombre }}>{montrerTypes ? "▲" : "▼"}</span>
          </button>
          {montrerTypes && (
            <div style={{ marginTop: 10, padding: "12px", borderRadius: 10, background: "#0F130C", border: `1px solid ${C.bordure}` }}>
              <SchemaTypes />
            </div>
          )}
        </div>
      )}

      {sousVue === "galerie" && (ordresCartes.length + (nbAutresC > 0 ? 1 : 0)) > 1 && (
        <div style={{ display: "flex", gap: 7, overflowX: "auto", paddingBottom: 6, marginBottom: 14, WebkitOverflowScrolling: "touch" }}>
          <button onClick={() => setFOrdreC("")} style={{ flexShrink: 0, fontFamily: sans, fontSize: 12.5, fontWeight: 700, padding: "7px 13px", borderRadius: 18, cursor: "pointer", whiteSpace: "nowrap", border: `1px solid ${fOrdreC === "" ? C.ambre : C.bordure}`, background: fOrdreC === "" ? C.ambre : "transparent", color: fOrdreC === "" ? C.encre : C.papier }}>
            Toutes {cartes.length}
          </button>
          {ordresCartes.map((o) => (
            <button key={o.id} onClick={() => setFOrdreC(fOrdreC === o.id ? "" : o.id)} style={{ flexShrink: 0, fontFamily: sans, fontSize: 12.5, fontWeight: 700, padding: "7px 13px", borderRadius: 18, cursor: "pointer", whiteSpace: "nowrap", border: `1px solid ${fOrdreC === o.id ? C.ambre : C.bordure}`, background: fOrdreC === o.id ? C.ambre : "transparent", color: fOrdreC === o.id ? C.encre : C.papier }}>
              {o.emoji} {o.court} {o.n}
            </button>
          ))}
          {nbAutresC > 0 && (
            <button onClick={() => setFOrdreC(fOrdreC === "autres" ? "" : "autres")} style={{ flexShrink: 0, fontFamily: sans, fontSize: 12.5, fontWeight: 700, padding: "7px 13px", borderRadius: 18, cursor: "pointer", whiteSpace: "nowrap", border: `1px solid ${fOrdreC === "autres" ? C.ambre : C.bordure}`, background: fOrdreC === "autres" ? C.ambre : "transparent", color: fOrdreC === "autres" ? C.encre : C.papier }}>
              🔎 Autres {nbAutresC}
            </button>
          )}
        </div>
      )}

      {sousVue === "galerie" && cartes.length > 1 && (
        <div style={{ display: "flex", alignItems: "center", gap: 7, marginBottom: 14, flexWrap: "wrap" }}>
          <span style={{ fontFamily: sans, fontSize: 12, fontWeight: 700, color: C.papierSombre }}>Trier :</span>
          {[["recentes", "🕘 Récentes"], ["rarete", "🌟 Rareté"], ["type", "🎭 Type"]].map(([id, label]) => (
            <button key={id} onClick={() => setTriCartes(id)} style={{ fontFamily: sans, fontSize: 12.5, fontWeight: 700, padding: "6px 12px", borderRadius: 18, cursor: "pointer", border: `1px solid ${triCartes === id ? C.ambre : C.bordure}`, background: triCartes === id ? C.ambre : "transparent", color: triCartes === id ? C.encre : C.papier }}>
              {label}
            </button>
          ))}
        </div>
      )}

      {sousVue === "galerie" && (
        cartes.length === 0 ? (
          <div style={{ textAlign: "center", padding: "56px 24px", border: `1px solid ${C.bordure}`, borderRadius: 14, background: "linear-gradient(#191F15, #14180F)" }}>
            <div style={{ fontSize: 40, marginBottom: 12 }}>🎴</div>
            <div style={{ fontFamily: serif, fontSize: 19, fontWeight: 600, color: C.papier, marginBottom: 6 }}>Aucune carte forgée</div>
            <div style={{ fontFamily: sans, fontSize: 14, color: C.papierSombre, lineHeight: 1.5 }}>Ouvre une observation identifiée et forge sa carte depuis sa fiche.</div>
          </div>
        ) : (
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(155px, 1fr))", gap: 14 }}>
            {cartesAffichees.map((o) => (
              <CarteInsecte key={o.id} obs={o} onClick={() => onOuvrir(o.id)} />
            ))}
          </div>
        )
      )}

      {sousVue === "combat" && <Combat cartes={cartes} />}

      {sousVue === "ligue" && MUR_ACTIF && (
        <Ligue embarque observations={observations} prenom={prenom} onDefinirPrenom={onDefinirPrenom} onDefier={onDefier} />
      )}

      {sousVue === "quiz" && (
        <div>
          <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4 }}>
            <span style={{ fontSize: 22 }}>🧠</span>
            <span style={{ fontFamily: serif, fontSize: 19, fontWeight: 600, color: C.papier }}>Quiz du jour</span>
          </div>
          <div style={{ fontFamily: sans, fontSize: 12.5, color: C.papierSombre, marginBottom: 16, lineHeight: 1.5 }}>
            5 questions sur les insectes, un nouveau quiz chaque jour. Gagne des points, et vise le sans-faute !
          </div>
          <Quiz />
        </div>
      )}
    </div>
  );
}

// ═══════════════ MOTEUR DE COMBAT (façon Pokémon) ═══════════════
// 8 types d'insectes avec forces/faiblesses. Chaque type est fort contre 2 autres.
const TYPES_COMBAT = [
  { id: "volant", label: "Volant", emoji: "🦋", fort: ["rampant", "social"], couleur: "#5B9BD5" },
  { id: "cuirasse", label: "Cuirassé", emoji: "🪲", fort: ["volant", "venimeux"], couleur: "#8B6F3A" },
  { id: "rampant", label: "Rampant", emoji: "🐛", fort: ["aquatique", "cuirasse"], couleur: "#7FA84E" },
  { id: "bondissant", label: "Bondissant", emoji: "🦗", fort: ["rampant", "nocturne"], couleur: "#5FA88A" },
  { id: "venimeux", label: "Venimeux", emoji: "🕷️", fort: ["bondissant", "social"], couleur: "#A05BC4" },
  { id: "aquatique", label: "Aquatique", emoji: "💧", fort: ["cuirasse", "venimeux"], couleur: "#4A90B8" },
  { id: "social", label: "Social", emoji: "🐜", fort: ["aquatique", "nocturne"], couleur: "#D08A3E" },
  { id: "nocturne", label: "Nocturne", emoji: "🌙", fort: ["volant", "bondissant"], couleur: "#7A6BA8" },
];
function typeInfo(id) { return TYPES_COMBAT.find((t) => t.id === id) || TYPES_COMBAT[0]; }

// Les types faibles face à un type donné (ceux qui sont "fort" contre lui).
function faiblessesDe(id) {
  return TYPES_COMBAT.filter((t) => t.fort.includes(id)).map((t) => t.id);
}

// Multiplicateur d'efficacité d'un type attaquant contre un type défenseur.
function efficaciteType(typeAtt, typeDef) {
  const att = typeInfo(typeAtt);
  if (att.fort.includes(typeDef)) return 1.3;      // super efficace (adouci de 1.5)
  const def = typeInfo(typeDef);
  if (def.fort.includes(typeAtt)) return 0.8;      // peu efficace (adouci de 0.66)
  return 1;                                         // neutre
}

// Déduit le type de combat d'une carte existante à partir de ses infos (sans appel IA).
// Priorité : élément explicite déjà dans les 8 types > mots-clés du nom/espèce > biotope > défaut.
function deduireType(obs) {
  const carte = obs.carte || {};
  // 1) élément déjà l'un des 8 types ?
  const el = (carte.element || "").toLowerCase();
  const direct = TYPES_COMBAT.find((t) => t.id === el || t.label.toLowerCase() === el);
  if (direct) return direct.id;

  const texte = ((obs.nom || "") + " " + (obs.nomSci || "") + " " + (carte.element || "")).toLowerCase();
  const contient = (mots) => mots.some((m) => texte.includes(m));
  // 2) mots-clés d'espèces
  if (contient(["libellul", "papillon", "abeille", "mouche", "guêpe", "syrphe", "moustique", "coccinelle"])) {
    if (contient(["guêpe", "abeille"])) return "venimeux";
    return "volant";
  }
  if (contient(["araign", "scorpion", "veuve", "tégénaire", "épeire"])) return "venimeux";
  if (contient(["scarab", "hanneton", "bousier", "charançon", "lucane", "carabe"])) return "cuirasse";
  if (contient(["sauterelle", "criquet", "grillon"])) return "bondissant";
  if (contient(["fourmi", "termite", "abeille", "guêpe"])) return "social";
  if (contient(["chenille", "mille-patte", "iule", "ver", "limace"])) return "rampant";
  if (contient(["dytique", "notonecte", "gerris", "éphémère", "larve"])) return "aquatique";
  if (contient(["phalène", "noctuelle", "perce-oreille", "blatte", "cafard"])) return "nocturne";

  // 3) biotope
  const bio = obs.biotope || "";
  if (bio === "zone-humide" || bio === "riviere" || bio === "littoral") return "aquatique";
  if (bio === "foret") return "cuirasse";
  if (bio === "prairie" || bio === "lande") return "bondissant";
  if (bio === "urbain") return "nocturne";
  if (bio === "jardin") return "volant";

  // 4) défaut : dérivé de la stat dominante
  const a = carte.attaque || 50, d = carte.defense || 50, v = carte.vitesse || 50;
  if (v >= a && v >= d) return "volant";
  if (d >= a) return "cuirasse";
  return "rampant";
}

// Prépare un combattant à partir d'une carte engagée dans la ligue (données Supabase).
function prepCombattantLigue(carteLigue) {
  const defense = carteLigue.defense || 50;
  const pvMax = Math.round(150 + defense * 1.0);
  return {
    id: carteLigue.carte_id,
    nom: carteLigue.nom || "Champion",
    obs: null,
    photoUrlDistante: carteLigue.photo_url || "",
    type: carteLigue.type || "rampant",
    attaque: carteLigue.attaque || 50,
    defense,
    vitesse: carteLigue.vitesse || 50,
    pvMax, pv: pvMax,
    energie: 3, energieMax: 6,
    capacite: { nom: carteLigue.capacite_nom || "Coup spécial", effet: carteLigue.capacite_effet || "" },
    rarete: carteLigue.rarete || 30,
    ligue: carteLigue, // référence pour enregistrer le résultat
  };
}

// Prépare l'état de combat d'une carte (PV, énergie, type) à partir de l'observation.
function prepCombattant(obs) {
  const c = obs.carte || {};
  const attaque = c.attaque || 50;
  const defense = c.defense || 50;
  const vitesse = c.vitesse || 50;
  const type = deduireType(obs);
  // PV calibrés pour des combats de ~10-12 tours (testé)
  const pvMax = Math.round(150 + defense * 1.0); // ~200 pour défense 50
  return {
    id: obs.id,
    nom: obs.nom || "Spécimen",
    obs,
    type,
    attaque, defense, vitesse,
    pvMax, pv: pvMax,
    energie: 3, energieMax: 6, // commence à 3, +2/tour, plafonné
    capacite: c.capacite || { nom: "Coup spécial", effet: "" },
    rarete: c.rarete || 30,
  };
}

// Calcule les dégâts d'une attaque. base = puissance de l'attaque (1.0 = normale).
function calculerDegats(attaquant, defenseur, puissance) {
  const brut = attaquant.attaque * 0.32 * puissance; // facteur d'échelle pour des combats de plusieurs tours
  const reduction = defenseur.defense / (defenseur.defense + 100); // défense = mitigation douce
  const eff = efficaciteType(attaquant.type, defenseur.type);
  const variance = 0.9 + Math.random() * 0.2; // ±10%
  const degats = Math.max(1, Math.round(brut * (1 - reduction) * eff * variance));
  return { degats, efficacite: eff };
}

// Petit moteur de sons synthétisés (Web Audio), sans aucun fichier externe.
let _audioCtx = null;
function ctxAudio() {
  try {
    const AC = window.AudioContext || window.webkitAudioContext;
    if (!AC) return null;
    if (!_audioCtx) _audioCtx = new AC();
    if (_audioCtx.state === "suspended") _audioCtx.resume();
    return _audioCtx;
  } catch { return null; }
}
function bip(freq, duree, forme, gainMax, delai) {
  const ctx = ctxAudio();
  if (!ctx) return;
  try {
    const t0 = ctx.currentTime + (delai || 0);
    const osc = ctx.createOscillator();
    const g = ctx.createGain();
    osc.type = forme || "square";
    osc.frequency.setValueAtTime(freq, t0);
    g.gain.setValueAtTime(0.0001, t0);
    g.gain.linearRampToValueAtTime(gainMax || 0.14, t0 + 0.012);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + duree);
    osc.connect(g);
    g.connect(ctx.destination);
    osc.start(t0);
    osc.stop(t0 + duree + 0.03);
  } catch {}
}
function jouerSon(nom) {
  if (nom === "coup") bip(210, 0.12, "square", 0.13);
  else if (nom === "critique") { bip(330, 0.10, "sawtooth", 0.15); bip(500, 0.13, "sawtooth", 0.15, 0.05); bip(680, 0.16, "square", 0.13, 0.11); }
  else if (nom === "faible") bip(150, 0.11, "sine", 0.10);
  else if (nom === "capacite") { bip(430, 0.08, "sine", 0.12); bip(880, 0.18, "sine", 0.12, 0.06); }
  else if (nom === "apparition") { bip(300, 0.10, "triangle", 0.12); bip(400, 0.10, "triangle", 0.12, 0.09); bip(600, 0.16, "triangle", 0.12, 0.18); }
  else if (nom === "garde") { bip(150, 0.14, "sine", 0.12); bip(120, 0.16, "sine", 0.10, 0.06); }
  else if (nom === "poison") { bip(280, 0.10, "sawtooth", 0.08); bip(200, 0.16, "sawtooth", 0.08, 0.07); }
  else if (nom === "ko") { bip(190, 0.18, "sawtooth", 0.15); bip(115, 0.28, "sawtooth", 0.15, 0.10); bip(70, 0.34, "sawtooth", 0.13, 0.24); }
  else if (nom === "victoire") [523, 659, 784, 1047].forEach((f, i) => bip(f, 0.17, "square", 0.13, i * 0.11));
  else if (nom === "defaite") [392, 330, 262].forEach((f, i) => bip(f, 0.24, "triangle", 0.12, i * 0.15));
}

function Combat({ cartes, adversaireImpose, defieur, onResultatDefi }) {
  const jouables = cartes.filter((c) => c.carte);
  const [phase, setPhase] = useState("choix"); // choix | combat | fin
  const [moi, setMoi] = useState(null);
  const [adv, setAdv] = useState(null);
  const [journal, setJournal] = useState([]);
  const [tour, setTour] = useState(1);
  const [aMoi, setAMoi] = useState(true);
  const [anim, setAnim] = useState(false);
  const [auto, setAuto] = useState(false);
  const [animMoi, setAnimMoi] = useState("");   // "" | attaque | touche
  const [animAdv, setAnimAdv] = useState("");
  const [degatMoi, setDegatMoi] = useState(null); // {n, eff, id}
  const [degatAdv, setDegatAdv] = useState(null);
  const [flash, setFlash] = useState(false);
  const [sonActif, setSonActif] = useState(true);
  const [secousse, setSecousse] = useState(false);
  const [callout, setCallout] = useState(null); // { texte, ton, id }
  const [intro, setIntro] = useState(false);
  const [mode, setMode] = useState("libre"); // libre | arene
  const [manche, setManche] = useState(1);
  const [recordArene, setRecordArene] = useState(() => { try { return parseInt(localStorage.getItem("biodex_arene_record") || "0", 10) || 0; } catch { return 0; } });
  const son = (nom) => { if (sonActif) jouerSon(nom); };
  function effetImpact(eff) {
    if (eff >= 1.5) { son("critique"); setSecousse(true); setTimeout(() => setSecousse(false), 420); setCallout({ texte: "SUPER EFFICACE !", ton: "fort", id: Date.now() }); }
    else if (eff <= 0.7) { son("faible"); setCallout({ texte: "peu efficace…", ton: "faible", id: Date.now() }); }
    else son("coup");
    if (eff >= 1.5 || eff <= 0.7) setTimeout(() => setCallout(null), 1000);
  }
  const [resultatEnvoye, setResultatEnvoye] = useState(false);
  const journalRef = useRef(null);
  const estDefi = !!adversaireImpose;

  useEffect(() => {
    if (journalRef.current) journalRef.current.scrollTop = journalRef.current.scrollHeight;
  }, [journal]);

  // Fin d'un défi de ligue : on remonte le résultat une seule fois
  useEffect(() => {
    if (phase === "fin" && estDefi && !resultatEnvoye && moi && adv) {
      setResultatEnvoye(true);
      const jaiGagne = moi.pv > 0;
      if (onResultatDefi) onResultatDefi(jaiGagne);
    }
  }, [phase]);

  if (jouables.length < 1) {
    return (
      <div style={{ textAlign: "center", padding: "40px 24px", border: `1px solid ${C.bordure}`, borderRadius: 14, background: "linear-gradient(#191F15, #14180F)", fontFamily: sans, fontSize: 14, color: C.papierSombre, lineHeight: 1.6 }}>
        Il te faut au moins <b style={{ color: C.papier }}>1 carte</b> forgée pour combattre.<br />Tu en as {jouables.length}.
      </div>
    );
  }

  // Adversaire d'arène : stats qui montent à chaque manche.
  function adversaireArene(m) {
    const base = jouables[Math.floor(Math.random() * jouables.length)];
    const c = prepCombattant(base);
    const fStat = 0.6 + (m - 1) * 0.05; // départ à 60% (échauffement), +5%/manche
    const fPv = 1 + (m - 1) * 0.05;
    c.attaque = Math.round(c.attaque * fStat);
    c.defense = Math.round(c.defense * fStat);
    c.vitesse = Math.round(c.vitesse * fStat);
    c.pvMax = Math.round(c.pvMax * fPv);
    c.pv = c.pvMax;
    c.nom = c.nom + " ✦" + m;
    return c;
  }

  // Enchaîne la manche suivante en arène (le champion est soigné partiellement).
  function continuerArene() {
    const prochain = manche + 1;
    const soin = Math.round(moi.pvMax * 0.7);
    const c1 = { ...moi, pv: Math.min(moi.pvMax, moi.pv + soin), energie: 3, garde: false, poison: null };
    const c2 = adversaireArene(prochain);
    setMoi(c1); setAdv(c2);
    setManche(prochain);
    const premierMoi = c1.vitesse >= c2.vitesse;
    setAMoi(premierMoi);
    setTour(1);
    setAnim(false);
    setJournal([
      `🏟️ Manche ${prochain} ! ${c1.nom} (soigné de ${soin} PV) affronte ${c2.nom}.`,
      premierMoi ? `${c1.nom} est plus rapide et frappe en premier.` : `${c2.nom} est plus rapide et frappe en premier.`,
    ]);
    setPhase("combat");
    setIntro(true);
    son("apparition");
    setTimeout(() => setIntro(false), 1900);
    if (!premierMoi) setTimeout(() => tourIA(c1, c2), 2200);
  }

  // Met à jour le record d'arène à chaque victoire.
  useEffect(() => {
    if (phase === "fin" && mode === "arene" && moi && moi.pv > 0 && manche > recordArene) {
      setRecordArene(manche);
      try { localStorage.setItem("biodex_arene_record", String(manche)); } catch {}
    }
  }, [phase]);

  function demarrer(carteChoisie) {
    const c1 = prepCombattant(carteChoisie);
    let c2;
    if (estDefi) c2 = prepCombattantLigue(adversaireImpose);
    else if (mode === "arene") { setManche(1); c2 = adversaireArene(1); }
    else c2 = prepCombattant(jouables[Math.floor(Math.random() * jouables.length)]);
    setMoi(c1); setAdv(c2);
    const premierMoi = c1.vitesse >= c2.vitesse;
    setAMoi(premierMoi);
    setTour(1);
    setJournal([
      `${mode === "arene" && !estDefi ? "🏟️ Manche 1 ! " : ""}⚔️ ${c1.nom} affronte ${c2.nom}${estDefi ? " (" + adversaireImpose.proprietaire + ")" : ""} !`,
      premierMoi ? `${c1.nom} est plus rapide et frappe en premier.` : `${c2.nom} est plus rapide et frappe en premier.`,
    ]);
    setPhase("combat");
    setIntro(true);
    son("apparition");
    setTimeout(() => setIntro(false), 1900);
    if (!premierMoi) setTimeout(() => tourIA(c1, c2), 2200);
  }

  function ajouterJournal(lignes) {
    setJournal((j) => [...j, ...(Array.isArray(lignes) ? lignes : [lignes])]);
  }
  function texteEfficacite(eff) {
    if (eff >= 1.5) return " Super efficace !";
    if (eff <= 0.7) return " Peu efficace…";
    return "";
  }

  // Joue les animations d'une attaque : attaquant avance, cible secoue, dégât monte
  function animerAttaque(cibleEstAdv, degats, eff) {
    if (cibleEstAdv) {
      setAnimMoi("attaque");
      setTimeout(() => { setAnimMoi(""); setAnimAdv("touche"); setDegatAdv({ n: degats, eff, id: Date.now() }); setFlash(true); effetImpact(eff); }, 200);
      setTimeout(() => { setAnimAdv(""); setFlash(false); }, 700);
      setTimeout(() => setDegatAdv(null), 1200);
    } else {
      setAnimAdv("attaque");
      setTimeout(() => { setAnimAdv(""); setAnimMoi("touche"); setDegatMoi({ n: degats, eff, id: Date.now() }); setFlash(true); effetImpact(eff); }, 200);
      setTimeout(() => { setAnimMoi(""); setFlash(false); }, 700);
      setTimeout(() => setDegatMoi(null), 1200);
    }
  }

  function actionJoueur(type) {
    if (!aMoi || anim || intro || phase !== "combat") return;
    // On travaille sur l'énergie RÉELLEMENT affichée (pas de recharge anticipée)
    if (type === "capacite" && moi.energie < 4) return; // sécurité
    setAnim(true);
    let m = { ...moi }, a = { ...adv };
    if (type === "parade") {
      m.garde = true;
      m.energie = Math.min(m.energieMax, m.energie + 3);
      son("garde");
      ajouterJournal(`🛡️ ${m.nom} se met en garde : prochain coup réduit de moitié, +énergie.`);
      setMoi(m);
      setAMoi(false);
      setTimeout(() => tourIA(m, a), 1000);
      return;
    }
    let degats, efficacite;
    if (type === "capacite") {
      m.energie -= 4;
      son("capacite");
      ({ degats, efficacite } = calculerDegats(m, a, 1.8));
      a.pv = Math.max(0, a.pv - degats);
      ajouterJournal(`✨ ${m.nom} utilise ${m.capacite.nom} : ${degats} dégâts !${texteEfficacite(efficacite)}`);
      if (m.type === "venimeux" && a.pv > 0) { a.poison = { tours: 2, degats: Math.max(4, Math.round(m.attaque * 0.08)) }; ajouterJournal(`☠️ ${a.nom} est empoisonné !`); }
    } else {
      ({ degats, efficacite } = calculerDegats(m, a, 1.0));
      a.pv = Math.max(0, a.pv - degats);
      ajouterJournal(`⚔️ ${m.nom} attaque : ${degats} dégâts.${texteEfficacite(efficacite)}`);
    }
    animerAttaque(true, degats, efficacite);
    setMoi(m); setAdv(a);
    if (a.pv <= 0) {
      setTimeout(() => { son("ko"); setTimeout(() => son("victoire"), 260); ajouterJournal(`🏆 ${a.nom} est K.O. ! Victoire !`); setPhase("fin"); setAnim(false); }, 800);
      return;
    }
    setAMoi(false);
    setTimeout(() => tourIA(m, a), 1300);
  }

  // Décide l'action du joueur en mode auto (même tactique que l'IA)
  function actionAuto() {
    if (!moi || !adv) return;
    const eff = efficaciteType(moi.type, adv.type);
    const utiliseCapacite = moi.energie >= 4 && (eff >= 1.5 || adv.pv < adv.pvMax * 0.4 || Math.random() < 0.5);
    actionJoueur(utiliseCapacite ? "capacite" : "base");
  }

  // En mode auto : joue automatiquement quand c'est au tour du joueur
  useEffect(() => {
    if (auto && aMoi && !anim && phase === "combat") {
      const t = setTimeout(() => actionAuto(), 800);
      return () => clearTimeout(t);
    }
  }, [auto, aMoi, anim, phase]);

  function tourIA(m, a) {
    let adv2 = { ...a }, moi2 = { ...m };
    // Poison : tick au début du tour de l'adversaire
    if (adv2.poison && adv2.poison.tours > 0) {
      const dgt = adv2.poison.degats;
      adv2.pv = Math.max(0, adv2.pv - dgt);
      adv2.poison = { tours: adv2.poison.tours - 1, degats: dgt };
      son("poison");
      ajouterJournal(`☠️ ${adv2.nom} subit ${dgt} dégâts de poison.`);
      setAdv(adv2);
      if (adv2.pv <= 0) {
        setTimeout(() => { son("ko"); setTimeout(() => son("victoire"), 260); ajouterJournal(`🏆 ${adv2.nom} succombe au poison ! Victoire !`); setPhase("fin"); setAnim(false); }, 500);
        return;
      }
    }
    adv2.energie = Math.min(adv2.energieMax, adv2.energie + 2);
    const eff0 = efficaciteType(adv2.type, moi2.type);
    const veutCapacite = adv2.energie >= 4 && (eff0 >= 1.5 || moi2.pv < moi2.pvMax * 0.4 || Math.random() < 0.5);
    let degats, efficacite;
    if (veutCapacite) {
      adv2.energie -= 4;
      son("capacite");
      ({ degats, efficacite } = calculerDegats(adv2, moi2, 1.8));
    } else {
      ({ degats, efficacite } = calculerDegats(adv2, moi2, 1.0));
    }
    // Parade du joueur : le coup encaissé est réduit de moitié
    let parade = false;
    if (moi2.garde) { degats = Math.max(1, Math.round(degats * 0.5)); moi2.garde = false; parade = true; }
    moi2.pv = Math.max(0, moi2.pv - degats);
    if (veutCapacite) {
      ajouterJournal(`✨ ${adv2.nom} utilise ${adv2.capacite.nom} : ${degats} dégâts !${texteEfficacite(efficacite)}${parade ? " 🛡️ (parade !)" : ""}`);
      if (adv2.type === "venimeux" && moi2.pv > 0) { moi2.poison = { tours: 2, degats: Math.max(4, Math.round(adv2.attaque * 0.08)) }; ajouterJournal(`☠️ ${moi2.nom} est empoisonné !`); }
    } else {
      ajouterJournal(`⚔️ ${adv2.nom} attaque : ${degats} dégâts.${texteEfficacite(efficacite)}${parade ? " 🛡️ (parade !)" : ""}`);
    }
    animerAttaque(false, degats, efficacite);
    setMoi(moi2); setAdv(adv2);
    if (moi2.pv <= 0) {
      setTimeout(() => { son("ko"); setTimeout(() => son("defaite"), 260); ajouterJournal(`💀 ${moi2.nom} est K.O. ! ${adv2.nom} l'emporte…`); setPhase("fin"); setAnim(false); }, 800);
      return;
    }
    // Retour au joueur : recharge d'énergie + tick de poison (début de SON tour)
    setTimeout(() => {
      let mj = { ...moi2 };
      mj.energie = Math.min(mj.energieMax, mj.energie + 2);
      if (mj.poison && mj.poison.tours > 0) {
        const dgt = mj.poison.degats;
        mj.pv = Math.max(0, mj.pv - dgt);
        mj.poison = { tours: mj.poison.tours - 1, degats: dgt };
        son("poison");
        ajouterJournal(`☠️ ${mj.nom} subit ${dgt} dégâts de poison.`);
      }
      setMoi(mj);
      if (mj.pv <= 0) {
        setTimeout(() => { son("ko"); setTimeout(() => son("defaite"), 260); ajouterJournal(`💀 ${mj.nom} succombe au poison…`); setPhase("fin"); setAnim(false); }, 400);
        return;
      }
      setTour((t) => t + 1);
      setAMoi(true);
      setAnim(false);
    }, 700);
  }

  function rejouer() {
    setPhase("choix"); setMoi(null); setAdv(null); setJournal([]); setTour(1); setManche(1);
    setAMoi(true); setAnim(false); setAuto(false); setAnimMoi(""); setAnimAdv(""); setDegatMoi(null); setDegatAdv(null); setFlash(false);

        </div>

              </button>

          ) : (
            <div style={{ textAlign: "center", fontFamily: sans, fontSize: 13, color: C.papierSombre, fontStyle: "italic", padding: "14px" }}>
              {anim ? "⚔️ …" : "L'adversaire prépare son attaque…"}
            </div>
          )}
        </div>
      )}

      {phase === "fin" && (
        <div style={{ textAlign: "center", padding: "4px 0 2px" }}>
          {(() => {
            const gagne = moi && moi.pv > 0;
            const arene = mode === "arene" && !estDefi;
            return (
              <div>
                <div style={{ fontSize: 42, marginBottom: 2 }}>{gagne ? "🏆" : "💀"}</div>
                <div className={gagne ? "bd-victoire" : ""} style={{ fontFamily: serif, fontSize: 30, fontWeight: 700, letterSpacing: 1, color: gagne ? "#7FC24E" : "#E5603E", marginBottom: 8 }}>
                  {gagne ? "VICTOIRE !" : "DÉFAITE…"}
                </div>
                <div style={{ fontFamily: sans, fontSize: 13.5, color: C.papierSombre, lineHeight: 1.55, marginBottom: 16, padding: "0 6px" }}>
                  {arene
                    ? (gagne
                      ? `Manche ${manche} vaincue ! Série en cours : ${manche} 🔥 — Record : ${Math.max(recordArene, manche)}.`
                      : `Éliminé à la manche ${manche}. Série finale : ${manche - 1} victoire${manche - 1 > 1 ? "s" : ""}. 🏆 Record : ${recordArene}.`)
                    : (gagne
                      ? `${moi.nom} l'emporte en ${tour} tour${tour > 1 ? "s" : ""}, avec ${moi.pv}/${moi.pvMax} PV restants. Beau combat !`
                      : `${adv.nom} a eu le dernier mot en ${tour} tour${tour > 1 ? "s" : ""}. Il lui restait ${adv.pv}/${adv.pvMax} PV — ce sera pour la prochaine !`)}
                </div>
                {arene && gagne ? (
                  <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                    <button onClick={continuerArene} style={{ width: "100%", padding: "13px", borderRadius: 10, border: "none", background: "linear-gradient(#C9A24B, #B8912F)", color: "#2A2416", fontFamily: sans, fontWeight: 800, fontSize: 15, cursor: "pointer" }}>Continuer → manche {manche + 1}</button>
                    <button onClick={rejouer} style={{ width: "100%", padding: "11px", borderRadius: 10, border: `1px solid ${C.bordure}`, background: "transparent", color: C.papierSombre, fontFamily: sans, fontWeight: 700, fontSize: 13.5, cursor: "pointer" }}>Arrêter là</button>
                  </div>
                ) : (
                  <button onClick={rejouer} style={{ width: "100%", padding: "13px", borderRadius: 10, border: "none", background: "linear-gradient(#C9A24B, #B8912F)", color: "#2A2416", fontFamily: sans, fontWeight: 700, fontSize: 15, cursor: "pointer" }}>{arene ? "🏟️ Nouvelle arène" : "⚔️ Nouveau combat"}</button>
                )}
              </div>
            );
          })()}
        </div>
      )}
    </div>
  );
}



function BioDex() {
  const [vue, setVue] = useState("collection");
  const [observations, setObservations] = useState([]);
  const [selectionId, setSelectionId] = useState(null);
  const [chargement, setChargement] = useState(true);
  const [erreurGlobale, setErreurGlobale] = useState("");
  const [alerteStockage, setAlerteStockage] = useState("");
  const [majDispo, setMajDispo] = useState(false);
  const [installable, setInstallable] = useState(false);
  const [installRefusee, setInstallRefusee] = useState(() => { try { return localStorage.getItem("biodex_install_refusee") === "1"; } catch { return false; } });

  // --- Rappel de sauvegarde ---
  const [rappelSauvegarde, setRappelSauvegarde] = useState(false);
  const [exportEnCours, setExportEnCours] = useState(false);

  function verifierRappelSauvegarde() {
    try {
      const n = observations.length;
      if (n === 0) { setRappelSauvegarde(false); return; }
      const derniere = localStorage.getItem("biodex_derniere_sauvegarde");
      const countSauve = parseInt(localStorage.getItem("biodex_sauvegarde_count") || "0", 10);
      const refuseLe = localStorage.getItem("biodex_rappel_reporte");
      // Reporté récemment (< 2 jours) ? on se tait
      if (refuseLe && (Date.now() - new Date(refuseLe).getTime()) < 2 * 864e5) { setRappelSauvegarde(false); return; }
      // Jamais sauvegardé, ou +10 obs depuis, ou +7 jours
      const jamais = !derniere;
      const beaucoupDeNouveau = n - countSauve >= 10;
      const tropVieux = derniere && (Date.now() - new Date(derniere).getTime()) > 7 * 864e5;
      setRappelSauvegarde(jamais || beaucoupDeNouveau || tropVieux);
    } catch { setRappelSauvegarde(false); }
  }

  useEffect(() => { verifierRappelSauvegarde(); }, [observations]);
  useEffect(() => {
    const h = () => setRappelSauvegarde(false);
    window.addEventListener("biodex-sauvegarde-faite", h);
    return () => window.removeEventListener("biodex-sauvegarde-faite", h);
  }, []);

  async function exporterMaintenant() {
    if (exportEnCours) return;
    setExportEnCours(true);
    try {
      const toutes = await dbToutes();
      const obsExport = [];
      for (const o of toutes) {
        let photo64 = null;
        if (o.photo) {
          photo64 = await new Promise((res, rej) => {
            const r = new FileReader();
            r.onload = () => res(r.result);
            r.onerror = rej;
            r.readAsDataURL(o.photo);
          });
        }
        obsExport.push({ ...o, photo: photo64 });
      }
      const json = JSON.stringify({ app: "biodex", version: VERSION, exporteLe: new Date().toISOString(), observations: obsExport });
      const blob = new Blob([json], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "biodex-sauvegarde-" + new Date().toISOString().slice(0, 10) + ".json";
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 10000);
      try {
        localStorage.setItem("biodex_derniere_sauvegarde", new Date().toISOString());
        localStorage.setItem("biodex_sauvegarde_count", String(toutes.length));
        localStorage.removeItem("biodex_rappel_reporte");
      } catch {}
      setRappelSauvegarde(false);
    } catch {}
    setExportEnCours(false);
  }

  function reporterRappel() {
    try { localStorage.setItem("biodex_rappel_reporte", new Date().toISOString()); } catch {}
    setRappelSauvegarde(false);
  }

  useEffect(() => {
    // Déjà installée (mode standalone) : rien à proposer
    const standalone = window.matchMedia && window.matchMedia("(display-mode: standalone)").matches;

        <Ligue
          observations={observations}
          prenom={prenom}
          onDefinirPrenom={definirPrenom}
          onDefier={(carte) => { setCarteDefiee(carte); setVue("defi"); }}
          onFermer={() => setVue("collection")}
        />
      )}
      {vue === "classement" && (
        <Classement onFermer={() => setVue("collection")} onOuvrirProfil={ouvrirProfil} />
      )}
      {vue === "soutenir" && (
        <Soutenir onFermer={() => setVue("collection")} />
      )}
      {vue === "guide" && (
        <GuideObservation onFermer={() => setVue("collection")} />
      )}
      {vue === "refuge" && (
        <JardinRefuge onFermer={() => setVue("collection")} />
      )}
      {vue === "suivi" && (
        <SuiviEspeces onFermer={() => setVue("collection")} />
      )}
      {vue === "admin" && estAdmin && (
        <Administration onFermer={() => setVue("collection")} />
      )}
      {vue === "confidentialite" && (
        <Confidentialite onFermer={() => setVue("collection")} />
      )}
      {vue === "monprofil" && (
        <MonProfil prenom={prenom} onDefinirPrenom={definirPrenom} observations={observations} onFermer={() => setVue("collection")} />
      )}
      {vue === "profilpublic" && profilVu && (
        <ProfilPublic auteur={profilVu} onFermer={() => { setProfilVu(null); setVue(vueAvantProfil || "mur"); }} />
      )}
      {vue === "defi" && carteDefiee && (
        <div style={{ padding: 16, maxWidth: 560, margin: "0 auto" }}>
          <Bouton onClick={() => { setVue("cartes"); setCarteDefiee(null); }} style={{ marginBottom: 14 }}>← Retour à la ligue</Bouton>
          <div style={{ fontFamily: serif, fontSize: 20, fontWeight: 600, color: C.papier, marginBottom: 4 }}>⚔️ Défi contre {carteDefiee.nom}</div>
          <div style={{ fontFamily: sans, fontSize: 13, color: C.papierSombre, marginBottom: 16 }}>Carte de {carteDefiee.proprietaire}. Choisis ton champion !</div>
          <Combat
            cartes={observations}
            adversaireImpose={carteDefiee}
            defieur={prenom}
            onResultatDefi={(jaiGagne) => { enregistrerResultatDefi(carteDefiee, prenom, jaiGagne); }}
          />
        </div>
      )}
      <Celebrations />
      {montrerPresentation && (
        <Presentation prenomActuel={prenom} onDefinirPrenom={definirPrenom} onCommencer={() => { try { localStorage.setItem("biodex_presentation_vue", "1"); } catch {} setMontrerPresentation(false); }} />
      )}
      {centreOuvert && (
        <CentreNotifs
          notifs={notifs}
          onFermer={() => setCentreOuvert(false)}
          onAllerMur={() => { setCentreOuvert(false); if (MUR_ACTIF) setVue("mur"); }}
          onAllerIdees={() => { setCentreOuvert(false); if (MUR_ACTIF) setVue("idees"); }}
        />
      )}
      {menuOuvert && (
        <MenuPrincipal
          utilisateur={utilisateur}
          missionsNouv={0}
          ideesNouv={notifs.ideesNouvelles || 0}
          onFermer={() => setMenuOuvert(false)}
          onAller={(v) => setVue(v)}
          onRevoirPresentation={() => setMontrerPresentation(true)}
          estAdmin={estAdmin}
        />
      )}
      {vue === "cartes" && (
        <ModeCartes
          cartes={cartes}
          onOuvrir={(id) => { setSelectionId(id); setVue("detail"); }}
          observations={observations}
          prenom={prenom}
          onDefinirPrenom={definirPrenom}
          onDefier={(carte) => { setCarteDefiee(carte); setVue("defi"); }}
        />
      )}
      {vue === "stats" && <Stats observations={triees} raretes={raretesGlobal} onFermer={() => setVue("collection")} />}
      {vue === "atrier" && (
        <CaptureRapide aTrier={aTrier} onAjout={ajouterATrier}
          onOuvrir={(id) => { setSelectionId(id); setVue("completer"); }}
          onFermer={() => setVue("collection")} />
      )}
      {vue === "completer" && selection && (
        <NouvelleObservation base={selection} observations={observations} onSauver={completerObservation} onAnnuler={() => { setSelectionId(null); setVue("atrier"); }} />
      )}

      {vue === "aide" && <Aide onFermer={() => setVue("collection")} onImportTermine={chargerObservations} />}
      {vue === "connexion" && <Connexion onFermer={() => setVue("collection")} utilisateur={utilisateur} onDeconnexion={deconnexion} />}
      {vue === "nouvelle" && <NouvelleObservation observations={observations} onSauver={sauverObservation} onAnnuler={() => setVue("collection")} />}
      {vue === "edition" && selection && (
        <NouvelleObservation
          key={"edit-" + selection.id}
          base={selection}
          observations={observations}
          mode="edition"
          onSauver={enregistrerEdition}
          onAnnuler={() => setVue("detail")} />
      )}
      {vue === "carte" && (
        <Carte observations={triees} onOuvrirFiche={(id) => { setSelectionId(id); setVue("detail"); }} />
      )}
      {vue === "detail" && selection && (
        <Detail obs={selection} observations={observations}
          onFermer={() => { setSelectionId(null); setVue("collection"); }}
          onMajFiche={majFiche}
          onMajCarte={majCarte}
          onMajCadre={majCadre}
          prenom={prenom}
          onDefinirPrenom={definirPrenom}
          utilisateur={utilisateur}
          onAllerConnexion={() => setVue("connexion")}
          onModifier={(id) => { setSelectionId(id); setVue("edition"); }}
          onSupprimer={supprimerObservation} />
      )}

      {vue === "collection" && (
        <div style={{ padding: 16, maxWidth: 560, margin: "0 auto" }}>
          <ReveilSaisonnier />
          <LeSaviasTu />
          <div style={{ display: "flex", alignItems: "baseline", gap: 8, marginBottom: 10 }}>
            <span style={{ fontFamily: serif, color: C.ambre, fontWeight: 700, fontSize: 26 }}>{triees.length}</span>
            <span style={{ fontFamily: sans, fontSize: 13.5, color: C.papierSombre }}>
              spécimen{triees.length > 1 ? "s" : ""} épinglé{triees.length > 1 ? "s" : ""}
              {nbBiotopes > 0 && <span> · {nbBiotopes} biotope{nbBiotopes > 1 ? "s" : ""}</span>}
            </span>
          </div>

          {/* Onglets par ordre taxonomique */}
          {(ordresDispo.length + (nbAutres > 0 ? 1 : 0)) > 1 && (
            <div style={{ display: "flex", gap: 7, overflowX: "auto", paddingBottom: 6, marginBottom: 12, WebkitOverflowScrolling: "touch" }}>
              <button onClick={() => setFOrdre("")} style={{ flexShrink: 0, fontFamily: sans, fontSize: 12.5, fontWeight: 700, padding: "7px 13px", borderRadius: 18, cursor: "pointer", whiteSpace: "nowrap", border: `1px solid ${fOrdre === "" ? C.ambre : C.bordure}`, background: fOrdre === "" ? C.ambre : "transparent", color: fOrdre === "" ? C.encre : C.papier }}>
                Tous {triees.length}
              </button>
              {ordresDispo.map((o) => (
                <button key={o.id} onClick={() => setFOrdre(fOrdre === o.id ? "" : o.id)} style={{ flexShrink: 0, fontFamily: sans, fontSize: 12.5, fontWeight: 700, padding: "7px 13px", borderRadius: 18, cursor: "pointer", whiteSpace: "nowrap", border: `1px solid ${fOrdre === o.id ? C.ambre : C.bordure}`, background: fOrdre === o.id ? C.ambre : "transparent", color: fOrdre === o.id ? C.encre : C.papier }}>
                  {o.emoji} {o.court} {o.n}
                </button>
              ))}
              {nbAutres > 0 && (
                <button onClick={() => setFOrdre(fOrdre === "autres" ? "" : "autres")} style={{ flexShrink: 0, fontFamily: sans, fontSize: 12.5, fontWeight: 700, padding: "7px 13px", borderRadius: 18, cursor: "pointer", whiteSpace: "nowrap", border: `1px solid ${fOrdre === "autres" ? C.ambre : C.bordure}`, background: fOrdre === "autres" ? C.ambre : "transparent", color: fOrdre === "autres" ? C.encre : C.papier }}>
                  🔎 Autres {nbAutres}
                </button>
              )}
            </div>
          )}

          {/* Filtre espèces rares */}
          {nbRares > 0 && (
            <div style={{ marginBottom: 12 }}>
              <button onClick={() => setFRare((v) => !v)} style={{ fontFamily: sans, fontSize: 12.5, fontWeight: 700, padding: "7px 13px", borderRadius: 18, cursor: "pointer", whiteSpace: "nowrap", border: `1px solid ${fRare ? "#E5B84B" : C.bordure}`, background: fRare ? "#E5B84B" : "transparent", color: fRare ? C.encre : C.papier }}>
                🌟 Espèces rares {nbRares}
              </button>
            </div>
          )}

          {triees.length > 1 && (
            <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 12 }}>
              <span style={{ fontFamily: sans, fontSize: 12, color: C.lichen, fontWeight: 700, letterSpacing: 0.8, textTransform: "uppercase" }}>Tri</span>
              <select value={tri} onChange={(e) => changerTri(e.target.value)}
                style={{ flex: 1, maxWidth: 260, background: C.panneau, color: C.papier, border: `1px solid ${C.bordure}`, borderRadius: 8, padding: "8px 10px", fontFamily: sans, fontSize: 14, outline: "none" }}>
                {TRIS.map((t) => <option key={t.id} value={t.id}>{t.label}</option>)}
              </select>
            </div>
          )}

          {triees.length > 1 && (
            <div style={{ marginBottom: 16 }}>
              <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                <input value={fTexte} onChange={(e) => setFTexte(e.target.value)} placeholder="🔍 Rechercher un nom…"
                  style={{ flex: 1, boxSizing: "border-box", background: C.panneau, color: C.papier, border: `1px solid ${C.bordure}`, borderRadius: 9, padding: "10px 12px", fontFamily: sans, fontSize: 15, outline: "none" }} />
                <button className="bd-press" onClick={() => setMontrerFiltres((v) => !v)}
                  style={{ fontFamily: sans, fontSize: 14, fontWeight: 600, padding: "10px 12px", borderRadius: 9, cursor: "pointer", border: `1px solid ${filtresActifs || montrerFiltres ? "#A8863A" : C.bordure}`, background: filtresActifs || montrerFiltres ? "linear-gradient(#2C3623, #232B1D)" : C.panneau, color: filtresActifs ? C.ambreClair : C.papierSombre }}>
                  ⚙︎ Filtres{filtresActifs ? " •" : ""}
                </button>
              </div>

              {montrerFiltres && (
                <div style={{ marginTop: 10, padding: 12, background: C.panneau, border: `1px solid ${C.bordure}`, borderRadius: 10, display: "flex", flexDirection: "column", gap: 10 }}>
                  <div>
                    <div style={{ fontFamily: sans, fontSize: 11, fontWeight: 700, letterSpacing: 0.6, textTransform: "uppercase", color: C.lichen, marginBottom: 6 }}>Biotope</div>
                    <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                      {biotopesDispo.map((b) => (
                        <button key={b.id} onClick={() => setFBiotope(fBiotope === b.id ? "" : b.id)}
                          style={{ fontFamily: sans, fontSize: 12.5, padding: "6px 10px", borderRadius: 16, cursor: "pointer", border: `1px solid ${fBiotope === b.id ? C.ambre : C.bordure}`, background: fBiotope === b.id ? C.ambre : "transparent", color: fBiotope === b.id ? C.encre : C.papier, fontWeight: fBiotope === b.id ? 700 : 400 }}>
                          {b.emoji} {b.label}
                        </button>
                      ))}
                    </div>
                  </div>
                  {moisDispo.length > 1 && (
                    <div>
                      <div style={{ fontFamily: sans, fontSize: 11, fontWeight: 700, letterSpacing: 0.6, textTransform: "uppercase", color: C.lichen, marginBottom: 6 }}>Période</div>
                      <select value={fMois} onChange={(e) => setFMois(e.target.value)}
                        style={{ width: "100%", boxSizing: "border-box", background: C.fond, color: C.papier, border: `1px solid ${C.bordure}`, borderRadius: 8, padding: "9px 10px", fontFamily: sans, fontSize: 14, outline: "none" }}>
                        <option value="">Tous les mois</option>
                        {moisDispo.map((m) => <option key={m} value={m}>{moisLisible(m)}</option>)}
                      </select>
                    </div>
                  )}
                  {filtresActifs && (
                    <Bouton onClick={reinitFiltres} style={{ alignSelf: "flex-start" }}>Réinitialiser les filtres</Bouton>
                  )}
                </div>
              )}

              {filtresActifs && (
                <div style={{ fontFamily: sans, fontSize: 13, color: C.papierSombre, marginTop: 10 }}>
                  {listeFiltree.length} résultat{listeFiltree.length > 1 ? "s" : ""} sur {triees.length}
                </div>
              )}
            </div>
          )}

          {erreurGlobale && (
            <div style={{ marginBottom: 14, padding: "10px 12px", borderRadius: 8, background: "#3A241C", color: "#E8A88F", fontFamily: sans, fontSize: 14 }}>
              {erreurGlobale}
            </div>
          )}

          {alerteStockage && (
            <div style={{ marginBottom: 14, padding: "10px 12px", borderRadius: 8, background: "#3A2E1A", border: `1px solid #A8863A`, color: C.papier, fontFamily: sans, fontSize: 13, lineHeight: 1.5, display: "flex", gap: 10, alignItems: "flex-start" }}>
              <span style={{ flex: 1 }}>⚠️ {alerteStockage}</span>
              <button onClick={() => setAlerteStockage("")} style={{ background: "none", border: "none", color: C.papierSombre, fontSize: 16, cursor: "pointer", lineHeight: 1 }}>✕</button>
            </div>
          )}

          {chargement && (
            <div style={{ textAlign: "center", padding: 40, fontFamily: sans, color: C.papierSombre }}>Ouverture du tiroir…</div>
          )}

          {!chargement && triees.length === 0 && aTrier.length === 0 && !erreurGlobale && (
            <div style={{ textAlign: "center", padding: "56px 24px", border: `1px solid ${C.bordure}`, borderRadius: 14, background: "linear-gradient(#191F15, #14180F)", boxShadow: "0 2px 10px rgba(0,0,0,.25) inset" }}>
              <div style={{ fontSize: 40, marginBottom: 12, opacity: 0.9 }}>🦋</div>
              <div style={{ fontFamily: serif, fontSize: 19, fontWeight: 600, color: C.papier, marginBottom: 6 }}>Le tiroir est vide</div>
              <div style={{ fontFamily: sans, fontSize: 14, color: C.papierSombre, lineHeight: 1.5 }}>Appuie sur le bouton doré <b style={{ color: C.ambre }}>＋</b> en bas à droite pour épingler ta première observation.</div>
            </div>
          )}

          {!chargement && triees.length > 0 && listeFiltree.length === 0 && (
            <div style={{ textAlign: "center", padding: "40px 24px", border: `1px solid ${C.bordure}`, borderRadius: 14, background: "linear-gradient(#191F15, #14180F)" }}>
              <div style={{ fontFamily: serif, fontSize: 18, fontWeight: 600, color: C.papier, marginBottom: 6 }}>Aucun spécimen</div>
              <div style={{ fontFamily: sans, fontSize: 14, color: C.papierSombre }}>Aucune observation ne correspond à ces filtres.</div>
            </div>
          )}

          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(150px, 1fr))", gap: 14 }}>
            {trierObservations(listeFiltree, tri).map((o, i) => (
              <div key={o.id} className="bd-card bd-fade" onClick={() => { setSelectionId(o.id); setVue("detail"); }}
                style={{ background: "linear-gradient(#212A1B, #1A2015)", border: `1px solid ${C.bordure}`, borderRadius: 11, overflow: "hidden", cursor: "pointer", position: "relative", paddingTop: 16, boxShadow: "0 3px 10px rgba(0,0,0,.3), 0 1px 0 rgba(255,255,255,.03) inset", animationDelay: `${Math.min(i * 40, 400)}ms` }}>
                <div className="bd-pin-shaft" />
                <div className="bd-pin-head" />
                {(() => { const niv = niveauRarete(raretesGlobal[cleEspeceMur(o)]); return niv && niv.bonus > 0 ? (
                  <div style={{ position: "absolute", top: 6, right: 6, zIndex: 2, fontSize: 15, filter: "drop-shadow(0 1px 2px rgba(0,0,0,.6))" }} title={niv.label}>{niv.emoji}</div>
                ) : null; })()}
                <div style={{ margin: "0 6px", borderRadius: 7, overflow: "hidden", boxShadow: "0 1px 4px rgba(0,0,0,.4)" }}>
                  <PhotoBlob blob={o.photo} alt={o.nom} style={{ width: "100%", aspectRatio: "1", objectFit: "cover", display: "block" }} />
                </div>
                <div style={{ margin: "8px 6px 6px", borderRadius: 6, overflow: "hidden" }}>
                  <Etiquette obs={o} />
                </div>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

// ---------- Installation PWA (bouton "Installer l'appli") ----------
// Chrome Android propose l'installation via un événement qu'on capture ici,
// pour pouvoir la déclencher nous-mêmes avec un bouton dans l'appli.
window.__biodexInstall = null;
window.addEventListener("beforeinstallprompt", (e) => {
  e.preventDefault();
  window.__biodexInstall = e;
  window.dispatchEvent(new Event("bd-installable"));
});
window.addEventListener("appinstalled", () => {
  window.__biodexInstall = null;
  window.dispatchEvent(new Event("bd-installe"));
});

// On récupère d'abord la config (Supabase), puis on monte l'appli.
// Ainsi MUR_ACTIF est correct dès le premier rendu.
(async function demarrer() {
  await chargerConfig();
  ReactDOM.createRoot(document.getElementById("root")).render(<BioDex />);
})();

// Service worker (mode hors-ligne + installation + détection de mise à jour)
window.__biodexMaj = { dispo: false, registration: null };

function signalerMaj(reg) {
  window.__biodexMaj = { dispo: true, registration: reg };
  window.dispatchEvent(new CustomEvent("biodex-maj-dispo"));
}

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js").then((reg) => {
      // Si une version est déjà en attente au chargement
      if (reg.waiting && navigator.serviceWorker.controller) signalerMaj(reg);
      // Détection d'une nouvelle version qui s'installe
      reg.addEventListener("updatefound", () => {
        const nouveau = reg.installing;
        if (!nouveau) return;
        nouveau.addEventListener("statechange", () => {
          // installé + un SW contrôle déjà la page => c'est une MISE À JOUR (pas 1ère install)
          if (nouveau.state === "installed" && navigator.serviceWorker.controller) {
            signalerMaj(reg);
          }
        });
      });
      // Vérifie périodiquement s'il y a une nouvelle version déployée
      setInterval(() => reg.update().catch(() => {}), 60 * 60 * 1000);
    }).catch(() => {});

    // Quand le nouveau SW prend le contrôle, on recharge une seule fois
    let recharge = false;
    navigator.serviceWorker.addEventListener("controllerchange", () => {
      if (recharge) return;
      recharge = true;
      window.location.reload();
    });
  });
}

// Appelée par le bouton "Mettre à jour" de la bannière
function appliquerMajBiodex() {
  const reg = window.__biodexMaj.registration;
  if (reg && reg.waiting) reg.waiting.postMessage("ACTIVER_MAJ");
}
window.appliquerMajBiodex = appliquerMajBiodex;
</script>
