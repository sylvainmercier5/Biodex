  { id: "spot", emoji: "📍", titre: "Explorateur", texte: "Observe dans un lieu que tu as enregistré.", test: (o) => !!(o.spot && o.spot.trim()) },
];

// Numéro de semaine (ISO-ish) : sert à tirer les mêmes défis pour toute la bande.
function numeroSemaine(d = new Date()) {
  const date = new Date(d.getFullYear(), d.getMonth(), d.getDate());
  const jeudi = new Date(date);
  jeudi.setDate(date.getDate() + 3 - ((date.getDay() + 6) % 7));
  const debutAnnee = new Date(jeudi.getFullYear(), 0, 1);
  return { annee: jeudi.getFullYear(), semaine: 1 + Math.round(((jeudi - debutAnnee) / 864e5 - 3) / 7) };
}
// Début (lundi) de la semaine en cours.
function debutSemaine(d = new Date()) {
  const x = new Date(d.getFullYear(), d.getMonth(), d.getDate());
  x.setDate(x.getDate() - ((x.getDay() + 6) % 7));
  x.setHours(0, 0, 0, 0);
  return x;
}
// Les 3 défis de la semaine (identiques pour tout le monde, changent chaque lundi).
function defisDeLaSemaine(d = new Date()) {
  const { annee, semaine } = numeroSemaine(d);
  const graine = annee * 100 + semaine;
  const pioches = [];
  const dispo = [...DEFIS];
  let x = graine;
  for (let i = 0; i < 3 && dispo.length; i++) {
    x = (x * 1103515245 + 12345) & 0x7fffffff; // PRNG simple, déterministe
    const idx = x % dispo.length;
    pioches.push(dispo[idx]);
    dispo.splice(idx, 1);
  }
  return pioches;
}
// Un défi est-il rempli par les observations de la semaine ?
function defiRempli(defi, obsSemaine) {
  if (!obsSemaine.length) return false;
  if (defi.multi) return !!defi.multi(obsSemaine);
  return obsSemaine.some((o) => { try { return !!defi.test(o); } catch { return false; } });
}

function DefisSemaine({ observations, embarque }) {
  const defis = defisDeLaSemaine();
  const debut = debutSemaine();
  const obsSemaine = observations.filter((o) => o.date && new Date(o.date) >= debut);
  const faits = defis.filter((d) => defiRempli(d, obsSemaine));
  const tousFaits = faits.length === defis.length;

  // Célébration : on fête chaque défi nouvellement relevé (une seule fois).
  useEffect(() => {
    const cleSem = "biodex_defis_fetes_" + numeroSemaine().annee + "_" + numeroSemaine().semaine;
    let dejaFetes = [];
    try { dejaFetes = JSON.parse(localStorage.getItem(cleSem) || "[]"); } catch {}
    if (!Array.isArray(dejaFetes)) dejaFetes = [];
    const nouveaux = faits.filter((d) => !dejaFetes.includes(d.id));
    if (!nouveaux.length) return;
    nouveaux.forEach((d, i) => {
      setTimeout(() => celebrer({ emoji: d.emoji, titre: "Défi relevé !", texte: d.titre, ton: "defi" }), i * 900);
    });
    const maj = [...dejaFetes, ...nouveaux.map((d) => d.id)];
    try { localStorage.setItem(cleSem, JSON.stringify(maj)); } catch {}
    // Bonus : les 3 défis de la semaine !
    if (maj.length >= defis.length) {
      const cleAll = cleSem + "_all";
      try {
        if (!localStorage.getItem(cleAll)) {
          setTimeout(() => celebrer({ emoji: "🏆", titre: "Chasse au trésor complète !", texte: "Les 3 défis de la semaine sont relevés. Chapeau !", ton: "legendaire" }), nouveaux.length * 900 + 400);
          localStorage.setItem(cleAll, "1");
        }
      } catch {}
    }
  }, [observations]);

  return (
    <div style={{ padding: embarque ? 0 : 16, maxWidth: 560, margin: "0 auto" }}>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 4 }}>
        <div style={{ fontFamily: serif, fontSize: 19, fontWeight: 600, color: C.papier }}>🎯 Chasse au trésor</div>
        <div style={{ fontFamily: sans, fontSize: 12, fontWeight: 700, color: tousFaits ? "#8AAE6B" : C.ambreClair }}>
          {faits.length}/{defis.length}
        </div>
      </div>
      <div style={{ fontFamily: sans, fontSize: 12.5, color: C.papierSombre, marginBottom: 14, lineHeight: 1.5 }}>
        3 défis, la même semaine, pour toute la bande. Ils changent chaque lundi !
      </div>

      {tousFaits && (
        <div style={{ display: "flex", alignItems: "center", gap: 10, padding: "11px 13px", borderRadius: 10, background: "linear-gradient(#1F2A18, #182012)", border: "1px solid #5C8A3C", marginBottom: 12 }}>
          <span style={{ fontSize: 20 }}>🏆</span>
          <div style={{ fontFamily: sans, fontSize: 13, color: "#B7DA8E", fontWeight: 700, lineHeight: 1.4 }}>
            Les 3 défis de la semaine sont relevés. Chapeau !
          </div>
        </div>
      )}

      <div style={{ display: "grid", gap: 10 }}>
        {defis.map((d) => {
          const ok = defiRempli(d, obsSemaine);
          return (
            <div key={d.id} style={{ display: "flex", alignItems: "flex-start", gap: 12, padding: "13px 14px", borderRadius: 11,
              background: ok ? "linear-gradient(#1F2A18, #182012)" : C.panneau,
              border: `1px solid ${ok ? "#5C8A3C" : C.bordure}`, opacity: ok ? 1 : 0.95 }}>
              <span style={{ fontSize: 22, flexShrink: 0, filter: ok ? "none" : "grayscale(.35)" }}>{d.emoji}</span>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontFamily: serif, fontSize: 15.5, fontWeight: 600, color: ok ? "#B7DA8E" : C.papier, marginBottom: 2 }}>
                  {d.titre}
                </div>
                <div style={{ fontFamily: sans, fontSize: 12.5, color: C.papierSombre, lineHeight: 1.5 }}>{d.texte}</div>
              </div>
              <span style={{ fontSize: 18, flexShrink: 0, color: ok ? "#8AAE6B" : C.bordure }}>{ok ? "✓" : "○"}</span>
            </div>
          );
        })}
      </div>

      <div style={{ fontFamily: sans, fontSize: 11, color: C.papierSombre, marginTop: 12, lineHeight: 1.5, fontStyle: "italic", textAlign: "center" }}>
        Les défis se valident tout seuls dès qu'une de tes observations de la semaine correspond.
      </div>
    </div>
  );
}

function Missions({ observations, prenom, onDefinirPrenom, onFermer }) {
  const saison = saisonActuelle();
  const missions = missionsDe(saison.cle);
  const [validations, setValidations] = useState([]); // [{mission_id, auteur, auto}]
  const [etat, setEtat] = useState("chargement");
  const [saisiePrenom, setSaisiePrenom] = useState(prenom || "");
  const [enCours, setEnCours] = useState(null);

  async function rafraichir() {
    if (!MUR_ACTIF) { setEtat("inactif"); return; }
    setEtat("chargement");
    try { setValidations(await chargerValidations(saison.cle)); setEtat("ok"); }
    catch { setEtat("echec"); }
  }
  useEffect(() => { rafraichir(); }, []);

  // Validation auto : dès que la collection remplit une mission non encore validée par moi, on l'enregistre.
  useEffect(() => {
    if (etat !== "ok" || !MUR_ACTIF) return;
    const moi = (prenom || "").trim();
    if (!moi) return;
    missions.forEach(async (m) => {
      const dejaValidee = validations.some((v) => v.mission_id === m.id && (v.auteur || "").toLowerCase() === moi.toLowerCase());
      if (!dejaValidee && missionRemplie(m, observations, saison)) {
        try {
          await validerMission(saison.cle, m.id, moi, true);
          setValidations((prev) => [...prev, { mission_id: m.id, auteur: moi, auto: true }]);
          // Célébration : une seule fois, mémorisée en local (indépendant du serveur).
          const cleFete = "biodex_mission_fetee_" + saison.cle + "_" + m.id;
          try {
            if (!localStorage.getItem(cleFete)) {
              localStorage.setItem(cleFete, "1");
              celebrer({ emoji: m.emoji || "🎯", titre: "Mission accomplie !", texte: m.titre || "", ton: "mission" });
            }
          } catch {}
        } catch {}
      }
    });
  }, [etat, observations, prenom]);

  function quiAValide(missionId) {
    return validations.filter((v) => v.mission_id === missionId).map((v) => v.auteur);
  }
  function jaiValide(missionId) {
    const moi = (prenom || "").trim().toLowerCase();
    return validations.some((v) => v.mission_id === missionId && (v.auteur || "").toLowerCase() === moi);
  }

  async function basculerManuel(m) {
    const moi = (saisiePrenom || prenom || "").trim();
    if (!moi) { alert("Indique ton prénom en haut pour valider une mission."); return; }
    onDefinirPrenom(moi);
    setEnCours(m.id);
    try {
      if (jaiValide(m.id)) {
        await devaliderMission(saison.cle, m.id, moi);
        setValidations((prev) => prev.filter((v) => !(v.mission_id === m.id && (v.auteur || "").toLowerCase() === moi.toLowerCase())));
      } else {
        await validerMission(saison.cle, m.id, moi, false);
        setValidations((prev) => [...prev, { mission_id: m.id, auteur: moi, auto: false }]);
      }
    } catch {}
    setEnCours(null);
  }

  const mesValidees = missions.filter((m) => jaiValide(m.id)).length;

  return (
    <div style={{ padding: 16, maxWidth: 560, margin: "0 auto" }}>
      <Bouton onClick={onFermer} style={{ marginBottom: 14 }}>← Retour</Bouton>

      {/* Défis de la semaine (courts, ludiques, auto-validés) */}
      <DefisSemaine observations={observations} embarque={true} />

      <div style={{ display: "flex", alignItems: "center", gap: 10, margin: "26px auto 22px", width: "80%" }}>
        <div style={{ flex: 1, height: 1, background: `linear-gradient(90deg, transparent, ${C.bordure})` }} />
        <span style={{ color: C.bordure, fontSize: 11 }}>✦</span>
        <div style={{ flex: 1, height: 1, background: `linear-gradient(90deg, ${C.bordure}, transparent)` }} />
      </div>

      <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 6 }}>
        <span style={{ fontSize: 32 }}>{saison.emoji}</span>
        <div>
          <div style={{ fontFamily: serif, fontSize: 22, fontWeight: 600, color: C.papier, lineHeight: 1.1 }}>Missions · {saison.label}</div>
          <div style={{ fontFamily: sans, fontSize: 13, color: C.papierSombre }}>{mesValidees}/{missions.length} validée{mesValidees > 1 ? "s" : ""} par toi</div>
        </div>
      </div>
      <div style={{ fontFamily: sans, fontSize: 13, color: C.papierSombre, marginBottom: 16, lineHeight: 1.5 }}>
        Des défis d'observation qui changent à chaque saison, communs à toute la bande. Ils se valident tout seuls quand ta collection remplit les conditions — ou coche à la main en secours.
      </div>

      {MUR_ACTIF && (
        <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 16, padding: "10px 12px", background: C.panneau, border: `1px solid ${C.bordure}`, borderRadius: 10 }}>
          <span style={{ fontFamily: sans, fontSize: 13, color: C.papierSombre, whiteSpace: "nowrap" }}>Ton prénom :</span>
          <input value={saisiePrenom} onChange={(e) => setSaisiePrenom(e.target.value)} onBlur={() => onDefinirPrenom((saisiePrenom || "").trim())} placeholder="ex : Sylvain" maxLength={40}
            style={{ flex: 1, boxSizing: "border-box", background: C.fond, color: C.papier, border: `1px solid ${C.bordure}`, borderRadius: 8, padding: "7px 10px", fontFamily: sans, fontSize: 14, outline: "none" }} />
        </div>
      )}

      {!MUR_ACTIF && (
        <div style={{ padding: "14px", background: C.panneau, border: `1px solid ${C.bordure}`, borderRadius: 10, fontFamily: sans, fontSize: 14, color: C.papierSombre, marginBottom: 16 }}>
          Le partage des missions avec la bande n'est pas actif (service non configuré). Tes missions restent visibles mais la progression de la bande n'apparaît pas.
        </div>
      )}

      {etat === "chargement" && <div style={{ fontFamily: sans, fontSize: 14, color: C.papierSombre, fontStyle: "italic", textAlign: "center", padding: 16 }}>Chargement…</div>}
      {etat === "echec" && <div style={{ fontFamily: sans, fontSize: 14, color: "#E8A88F", textAlign: "center", padding: 16 }}>Impossible de charger les validations.</div>}

      {(etat === "ok" || etat === "inactif") && missions.map((m) => {
        const remplie = missionRemplie(m, observations, saison);
        const validee = jaiValide(m.id);
        const progres = missionProgres(m, observations, saison);
        const autres = quiAValide(m.id).filter((a) => (a || "").toLowerCase() !== (prenom || "").trim().toLowerCase());
        return (
          <div key={m.id} style={{ marginBottom: 12, padding: "14px", background: validee ? "linear-gradient(#1E2A18, #182213)" : C.panneau, border: `1px solid ${validee ? "#6F9450" : C.bordure}`, borderRadius: 12 }}>
            <div style={{ display: "flex", alignItems: "flex-start", gap: 12 }}>
              <span style={{ fontSize: 28, lineHeight: 1, opacity: validee ? 1 : 0.85 }}>{m.emoji}</span>
              <div style={{ flex: 1 }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: 8 }}>
                  <span style={{ fontFamily: sans, fontSize: 15, fontWeight: 700, color: C.papier }}>{m.titre}</span>
                  {validee && <span style={{ fontFamily: sans, fontSize: 12, fontWeight: 800, color: "#A6CC82" }}>✓ Validée</span>}
                </div>
                <div style={{ fontFamily: sans, fontSize: 13, color: C.papierSombre, lineHeight: 1.45, marginTop: 2 }}>{m.desc}</div>

                {progres && !validee && (
                  <div style={{ marginTop: 8 }}>
                    <div style={{ height: 6, borderRadius: 3, background: "#0F130C", overflow: "hidden" }}>
                      <div style={{ height: "100%", width: `${(progres.actuel / progres.cible) * 100}%`, background: `linear-gradient(90deg, ${C.ambre}, ${C.ambreClair})` }} />
                    </div>
                    <div style={{ fontFamily: sans, fontSize: 11, color: C.papierSombre, marginTop: 3 }}>{progres.actuel}/{progres.cible}</div>
                  </div>
                )}

                {/* Qui d'autre a validé */}
                {MUR_ACTIF && autres.length > 0 && (
                  <div style={{ display: "flex", flexWrap: "wrap", gap: 5, marginTop: 8 }}>
                    {autres.slice(0, 8).map((a, i) => (
                      <span key={i} style={{ fontFamily: sans, fontSize: 11, fontWeight: 600, color: C.ambreClair, background: "rgba(168,134,58,.15)", border: "1px solid rgba(168,134,58,.4)", borderRadius: 12, padding: "2px 8px" }}>🐛 {a}</span>
                    ))}
                    {autres.length > 8 && <span style={{ fontFamily: sans, fontSize: 11, color: C.papierSombre, padding: "2px 4px" }}>+{autres.length - 8}</span>}
                  </div>
                )}

                {/* Validation manuelle (secours) */}
                {MUR_ACTIF && (
                  <button onClick={() => basculerManuel(m)} disabled={enCours === m.id || (remplie && !validee)}
                    style={{ marginTop: 10, fontFamily: sans, fontSize: 12, fontWeight: 600, padding: "5px 11px", borderRadius: 7, cursor: (remplie && !validee) ? "default" : "pointer",
                      border: `1px solid ${validee ? C.bordure : "#A8863A"}`, background: validee ? "transparent" : "linear-gradient(#2C3623, #232B1D)", color: validee ? C.papierSombre : C.ambreClair }}>
                    {enCours === m.id ? "…" : validee ? "Retirer ma validation" : (remplie ? "✓ Remplie (validation auto)" : "Valider à la main")}
                  </button>
                )}
              </div>
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ---------- Vue : carte ----------
function Carte({ observations, onOuvrirFiche }) {
  const divRef = useRef(null);
  const [mode, setMode] = useState("moi"); // "moi" | "bande"
  const [postsBande, setPostsBande] = useState([]);
  const [etatBande, setEtatBande] = useState("idle"); // idle | chargement | ok | echec

  const avecGps = observations.filter((o) => o.gps);
  const sansGps = observations.length - avecGps.length;
  const postsAvecPos = postsBande.filter((p) => typeof p.lat === "number" && typeof p.lon === "number");

  // ---- Analyse du territoire de la bande ----
  // Découpe grossière en "zones" (grille de ~2 km) pour repérer les coins bien couverts.
  const CELLULE = 0.02; // ~2 km en latitude
  const zones = {};
  postsAvecPos.forEach((p) => {
    const cle = Math.round(p.lat / CELLULE) + "," + Math.round(p.lon / CELLULE);
    if (!zones[cle]) zones[cle] = { n: 0, especes: new Set(), auteurs: new Set(), lat: p.lat, lon: p.lon };
    zones[cle].n += 1;
    const e = cleEspeceMur(p);
    if (e) zones[cle].especes.add(e);
    if (p.auteur) zones[cle].auteurs.add(p.auteur);
  });
  const zonesTri = Object.values(zones).sort((a, b) => b.especes.size - a.especes.size || b.n - a.n);

  // Contributeurs
  const parAuteur = {};
  postsAvecPos.forEach((p) => { const a = (p.auteur || "").trim(); if (a) parAuteur[a] = (parAuteur[a] || 0) + 1; });
  const auteursTri = Object.entries(parAuteur).sort((a, b) => b[1] - a[1]);

  // Espèces que la bande a trouvées... mais pas toi ! (ça donne envie de sortir)
  const mesEspeces = new Set(observations.map(cleEspeceMur).filter(Boolean));
  const especesBande = {};
  postsBande.forEach((p) => {
    const c = cleEspeceMur(p);
    if (!c || mesEspeces.has(c)) return;
    if (!especesBande[c]) especesBande[c] = { nom: p.espece || p.espece_sci || "?", auteurs: new Set() };
    if (p.auteur) especesBande[c].auteurs.add(p.auteur);
  });
  const aChasser = Object.values(especesBande).slice(0, 8);

  // Étendue du territoire (distance max entre deux points, approx.)
  let etendue = 0;
  if (postsAvecPos.length >= 2) {
    const lats = postsAvecPos.map((p) => p.lat), lons = postsAvecPos.map((p) => p.lon);
    const dLat = (Math.max(...lats) - Math.min(...lats)) * 111;
    const dLon = (Math.max(...lons) - Math.min(...lons)) * 111 * Math.cos((lats[0] * Math.PI) / 180);
    etendue = Math.round(Math.sqrt(dLat * dLat + dLon * dLon));
  }

  // Charge les posts de la bande la première fois qu'on passe en mode "bande"
  useEffect(() => {
    if (mode === "bande" && etatBande === "idle" && MUR_ACTIF) {
      setEtatBande("chargement");
      chargerMur(200)
        .then((p) => { setPostsBande(p); setEtatBande("ok"); })
        .catch(() => setEtatBande("echec"));
    }
  }, [mode]);

  useEffect(() => {
    if (!divRef.current || typeof L === "undefined") return;
    const carte = L.map(divRef.current, { zoomControl: true });
    L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png", { maxZoom: 19, attribution: "© OpenStreetMap" }).addTo(carte);

    const urls = [];
    const points = [];

    if (mode === "moi") {
      // Mes observations (position précise, photo locale)
      avecGps.forEach((o) => {
        const pt = [o.gps.lat, o.gps.lon];
        points.push(pt);
        const m = L.circleMarker(pt, { radius: 9, color: "#2A2519", weight: 2, fillColor: "#C9A24B", fillOpacity: 0.95 }).addTo(carte);
        const conteneur = document.createElement("div");
        conteneur.style.width = "150px";
        let urlPhoto = null;
        if (o.photo) { urlPhoto = URL.createObjectURL(o.photo); urls.push(urlPhoto); }
        conteneur.innerHTML =
          (urlPhoto ? '<img src="' + urlPhoto + '" alt="Photo de l\'observation" style="width:100%;border-radius:6px;display:block;margin-bottom:6px;" />' : "") +
          '<div style="font-weight:700;font-size:13px;color:#2A2519;">' + (o.nom ? o.nom.replace(/</g, "&lt;") : "Spécimen non identifié") + "</div>" +
          '<div style="font-size:11px;color:#8A8065;margin-bottom:6px;">' +
          biotopeOf(o.biotope).emoji + " " + biotopeOf(o.biotope).label + " · " + new Date(o.date).toLocaleDateString("fr-FR") + "</div>";
        const btn = document.createElement("button");
        btn.textContent = "Voir la fiche";
        btn.style.cssText = "width:100%;padding:6px;border-radius:6px;border:none;background:#C9A24B;color:#2A2416;font-weight:700;font-size:13px;cursor:pointer;";
        btn.addEventListener("click", () => onOuvrirFiche(o.id));
        conteneur.appendChild(btn);
        m.bindPopup(conteneur);
      });
    } else {
      // Carte de la bande (photo distante). Chaque point respecte le niveau de précision choisi par son auteur.
      postsAvecPos.forEach((p) => {
        const pt = [p.lat, p.lon];
        points.push(pt);
        const exacte = p.precision === "exacte";
        // Cercle de zone seulement si la position est approximative
        if (!exacte) {
          L.circle(pt, { radius: 900, color: "#8AAE6B", weight: 1, fillColor: "#8AAE6B", fillOpacity: 0.08 }).addTo(carte);
        }
        const m = L.circleMarker(pt, { radius: 8, color: "#2A2519", weight: 2, fillColor: exacte ? "#C9A24B" : "#8AAE6B", fillOpacity: 0.95 }).addTo(carte);
        const conteneur = document.createElement("div");
        conteneur.style.width = "150px";
        conteneur.innerHTML =
          (p.photo_url ? '<img src="' + p.photo_url + '" alt="Photo partagée" style="width:100%;border-radius:6px;display:block;margin-bottom:6px;" />' : "") +
          '<div style="font-weight:700;font-size:13px;color:#2A2519;">' + (p.espece ? String(p.espece).replace(/</g, "&lt;") : "Spécimen non identifié") + "</div>" +
          '<div style="font-size:11px;color:#8A8065;">' +
          "🐛 " + (p.auteur ? String(p.auteur).replace(/</g, "&lt;") : "Anonyme") + (p.lieu ? " · " + String(p.lieu).replace(/</g, "&lt;") : "") + "</div>" +
          '<div style="font-size:10px;color:#A89A78;margin-top:4px;">' + (exacte ? "📍 Position exacte" : "🌫️ Zone approximative") + "</div>";
        m.bindPopup(conteneur);
      });
    }

    if (points.length > 0) {
      carte.fitBounds(L.latLngBounds(points), { padding: [40, 40], maxZoom: mode === "bande" ? 12 : 15 });
    } else {
      carte.setView([46.6, 2.4], 5);
    }

    return () => {
      carte.remove();
      urls.forEach((u) => URL.revokeObjectURL(u));
    };
  }, [observations, mode, postsBande]);

  return (
    <div style={{ padding: 16, maxWidth: 560, margin: "0 auto" }}>
      {/* Bascule Ma carte / Carte de la bande */}
      {MUR_ACTIF && (
        <div style={{ display: "flex", gap: 6, marginBottom: 12, background: C.panneau, padding: 4, borderRadius: 10, border: `1px solid ${C.bordure}` }}>
          <button onClick={() => setMode("moi")} style={{ flex: 1, padding: "8px 10px", borderRadius: 7, border: "none", cursor: "pointer", fontFamily: sans, fontSize: 13.5, fontWeight: 700, background: mode === "moi" ? "linear-gradient(#C9A24B, #B8912F)" : "transparent", color: mode === "moi" ? C.encre : C.papierSombre }}>🗃️ Ma carte</button>
          <button onClick={() => setMode("bande")} style={{ flex: 1, padding: "8px 10px", borderRadius: 7, border: "none", cursor: "pointer", fontFamily: sans, fontSize: 13.5, fontWeight: 700, background: mode === "bande" ? "linear-gradient(#8AAE6B, #6F9450)" : "transparent", color: mode === "bande" ? C.encre : C.papierSombre }}>🌐 La bande</button>
        </div>
      )}

      {mode === "moi" ? (
        <div style={{ fontFamily: sans, fontSize: 13, color: C.papierSombre, marginBottom: 10 }}>
          <span style={{ color: C.ambre, fontWeight: 800 }}>{avecGps.length}</span> observation{avecGps.length > 1 ? "s" : ""} positionnée{avecGps.length > 1 ? "s" : ""}
          {sansGps > 0 && <span> · {sansGps} sans position</span>}
        </div>
      ) : (
        <div style={{ fontFamily: sans, fontSize: 13, color: C.papierSombre, marginBottom: 10 }}>
          {etatBande === "chargement" && "Chargement des trouvailles de la bande…"}
          {etatBande === "echec" && <span style={{ color: "#E8A88F" }}>Impossible de charger la carte de la bande.</span>}
          {etatBande === "ok" && <span><span style={{ color: "#8AAE6B", fontWeight: 800 }}>{postsAvecPos.length}</span> trouvaille{postsAvecPos.length > 1 ? "s" : ""} de la bande · chacun choisit sa précision</span>}
        </div>
      )}

      {mode === "moi" && avecGps.length === 0 && (
        <div style={{ fontFamily: sans, fontSize: 14, color: C.papierSombre, marginBottom: 10, padding: "10px 12px", background: C.panneau, borderRadius: 8, border: `1px solid ${C.bordure}` }}>
          Aucune observation avec position GPS pour l'instant — la carte se remplira au fil de tes sorties.
        </div>
      )}
      {mode === "bande" && etatBande === "ok" && postsAvecPos.length === 0 && (
        <div style={{ fontFamily: sans, fontSize: 14, color: C.papierSombre, marginBottom: 10, padding: "10px 12px", background: C.panneau, borderRadius: 8, border: `1px solid ${C.bordure}` }}>
          Aucune trouvaille localisée sur le mur pour l'instant. Les positions n'apparaissent que pour les partages faits à partir de la v0.45.
        </div>
      )}
      <div ref={divRef} style={{ width: "100%", height: "62vh", borderRadius: 10, border: `1px solid ${C.bordure}`, overflow: "hidden" }} />

      {/* Analyse du territoire (mode bande) */}
      {mode === "bande" && etatBande === "ok" && postsAvecPos.length > 0 && (
        <div style={{ marginTop: 14 }}>
          {/* Vue d'ensemble */}
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 9, marginBottom: 12 }}>
            <div style={{ textAlign: "center", padding: "12px 6px", borderRadius: 10, background: C.panneau, border: `1px solid ${C.bordure}` }}>
              <div style={{ fontFamily: serif, fontSize: 22, fontWeight: 700, color: C.ambreClair }}>{postsAvecPos.length}</div>
              <div style={{ fontFamily: sans, fontSize: 9.5, textTransform: "uppercase", color: C.papierSombre, marginTop: 2 }}>Trouvailles</div>
            </div>
            <div style={{ textAlign: "center", padding: "12px 6px", borderRadius: 10, background: C.panneau, border: `1px solid ${C.bordure}` }}>
              <div style={{ fontFamily: serif, fontSize: 22, fontWeight: 700, color: C.ambreClair }}>{zonesTri.length}</div>
              <div style={{ fontFamily: sans, fontSize: 9.5, textTransform: "uppercase", color: C.papierSombre, marginTop: 2 }}>Zones explorées</div>
            </div>
            <div style={{ textAlign: "center", padding: "12px 6px", borderRadius: 10, background: C.panneau, border: `1px solid ${C.bordure}` }}>
              <div style={{ fontFamily: serif, fontSize: 22, fontWeight: 700, color: C.ambreClair }}>{etendue > 0 ? etendue : "—"}</div>
              <div style={{ fontFamily: sans, fontSize: 9.5, textTransform: "uppercase", color: C.papierSombre, marginTop: 2 }}>km de territoire</div>
            </div>
          </div>

          {/* Zone la plus riche */}
          {zonesTri.length > 0 && zonesTri[0].especes.size > 1 && (
            <div style={{ display: "flex", alignItems: "center", gap: 12, padding: "12px 14px", borderRadius: 11, background: "linear-gradient(#2A2417, #201B12)", border: "1px solid #6B5A2E", marginBottom: 12 }}>
              <span style={{ fontSize: 24 }}>🏅</span>
              <div style={{ flex: 1 }}>
                <div style={{ fontFamily: sans, fontSize: 10.5, textTransform: "uppercase", letterSpacing: 0.5, color: "#D2A24A" }}>Le coin le plus riche</div>
                <div style={{ fontFamily: sans, fontSize: 12.5, color: C.papierClair, marginTop: 3, lineHeight: 1.45 }}>
                  <b style={{ color: C.papier }}>{zonesTri[0].especes.size} espèces</b> y ont été trouvées, par {zonesTri[0].auteurs.size} membre{zonesTri[0].auteurs.size > 1 ? "s" : ""}. Un secteur à explorer !
                </div>
              </div>
            </div>
          )}

          {/* Contributeurs */}
          {auteursTri.length > 0 && (
            <div style={{ padding: 14, borderRadius: 12, background: C.panneau, border: `1px solid ${C.bordure}`, marginBottom: 12 }}>
              <div style={{ fontFamily: sans, fontSize: 11, fontWeight: 700, letterSpacing: 0.6, textTransform: "uppercase", color: C.lichen, marginBottom: 11 }}>
                Qui cartographie le territoire ?
              </div>
              {auteursTri.slice(0, 5).map(([a, n]) => (
                <div key={a} style={{ marginBottom: 8 }}>
                  <div style={{ display: "flex", justifyContent: "space-between", fontFamily: sans, fontSize: 13, color: C.papier, marginBottom: 4 }}>
                    <span>{a}</span>
                    <span style={{ color: C.papierSombre }}>{n} point{n > 1 ? "s" : ""}</span>
                  </div>
                  <div style={{ height: 6, borderRadius: 3, background: "#0F130C", overflow: "hidden" }}>
                    <div style={{ height: "100%", width: `${(n / auteursTri[0][1]) * 100}%`, borderRadius: 3, background: "linear-gradient(90deg, #6E8B4E, #A8C97E)" }} />
                  </div>
                </div>
              ))}
            </div>
          )}

          {/* Espèces que la bande a, mais pas toi */}
          {aChasser.length > 0 && (
            <div style={{ padding: 14, borderRadius: 12, background: "linear-gradient(135deg, #1A2820, #14201A)", border: "1px solid #2E4A3A" }}>
              <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4 }}>
                <span style={{ fontSize: 16 }}>🎯</span>
                <span style={{ fontFamily: sans, fontSize: 11, fontWeight: 800, letterSpacing: 0.6, textTransform: "uppercase", color: "#7FC79B" }}>À toi de les débusquer !</span>
              </div>
              <div style={{ fontFamily: sans, fontSize: 12.5, color: C.papierSombre, marginBottom: 11, lineHeight: 1.5 }}>
                La bande a trouvé ces espèces… mais pas toi. Elles sont dans le coin, à toi de jouer !
              </div>
              <div style={{ display: "flex", flexWrap: "wrap", gap: 7 }}>
                {aChasser.map((e, i) => (
                  <span key={i} style={{ fontFamily: sans, fontSize: 12.5, padding: "6px 11px", borderRadius: 18, background: C.panneau, border: `1px solid ${C.bordure}`, color: C.papier }}>
                    {e.nom} <span style={{ color: C.papierSombre, fontSize: 11 }}>· {[...e.auteurs][0]}</span>
                  </span>
                ))}
              </div>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// État de la dernière sauvegarde (date relative + niveau d'alerte).
function etatSauvegarde() {
  try {
    const iso = localStorage.getItem("biodex_derniere_sauvegarde");
    if (!iso) return { jamais: true, texte: "Aucune sauvegarde effectuée", niveau: "alerte" };
    const d = new Date(iso);
    if (isNaN(d)) return { jamais: true, texte: "Aucune sauvegarde effectuée", niveau: "alerte" };
    const jours = Math.floor((Date.now() - d.getTime()) / 864e5);
    const dateLisible = d.toLocaleDateString("fr-FR", { day: "numeric", month: "long", year: "numeric" });
    let quand;
    if (jours <= 0) quand = "aujourd'hui";
    else if (jours === 1) quand = "hier";
    else if (jours < 7) quand = `il y a ${jours} jours`;
    else if (jours < 31) { const s = Math.floor(jours / 7); quand = `il y a ${s} semaine${s > 1 ? "s" : ""}`; }
    else { const m = Math.floor(jours / 30); quand = `il y a ${m} mois`; }
    const niveau = jours >= 30 ? "alerte" : jours >= 14 ? "attention" : "ok";
    const count = parseInt(localStorage.getItem("biodex_sauvegarde_count") || "0", 10) || 0;
    return { jamais: false, jours, quand, dateLisible, niveau, count, texte: `Dernière sauvegarde : ${quand}` };
  } catch {
    return { jamais: true, texte: "Aucune sauvegarde effectuée", niveau: "alerte" };
  }
}

function Aide({ onFermer, onImportTermine }) {
  const p = { fontFamily: sans, fontSize: 14, color: C.papier, lineHeight: 1.6, marginBottom: 12 };
  const t = { fontFamily: sans, fontSize: 15, fontWeight: 800, color: C.ambre, margin: "18px 0 6px" };
  const [exportEtat, setExportEtat] = useState("");
  const [importEtat, setImportEtat] = useState("");
  const [sauve, setSauve] = useState(() => etatSauvegarde());
  useEffect(() => {
    const h = () => setSauve(etatSauvegarde());
    window.addEventListener("biodex-sauvegarde-faite", h);
    return () => window.removeEventListener("biodex-sauvegarde-faite", h);
  }, []);

  async function exporter() {
    setExportEtat("Préparation de la sauvegarde…");
    try {
      const toutes = await dbToutes();
      const obsExport = [];
      for (const o of toutes) {
        let photo64 = null;
        if (o.photo) {
          photo64 = await new Promise((res, rej) => {
            const r = new FileReader();
            r.onload = () => res(r.result);
            r.onerror = rej;
            r.readAsDataURL(o.photo);
          });
        }
        obsExport.push({ ...o, photo: photo64 });
      }
      const json = JSON.stringify({ app: "biodex", version: VERSION, exporteLe: new Date().toISOString(), observations: obsExport });
      const blob = new Blob([json], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "biodex-sauvegarde-" + new Date().toISOString().slice(0, 10) + ".json";
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 10000);
      setExportEtat("✓ " + toutes.length + " observation(s) exportée(s)");
      // Mémorise la sauvegarde pour le rappel
      try {
        localStorage.setItem("biodex_derniere_sauvegarde", new Date().toISOString());
        localStorage.setItem("biodex_sauvegarde_count", String(toutes.length));
        window.dispatchEvent(new Event("biodex-sauvegarde-faite"));
      } catch {}
    } catch {
      setExportEtat("Échec de l'export — réessaie.");
    }
  }

  async function importer(e) {
    const f = e.target.files && e.target.files[0];
    if (!f) return;
    setImportEtat("Lecture du fichier…");
    try {
      const d = JSON.parse(await f.text());
      if (!d || d.app !== "biodex" || !Array.isArray(d.observations)) throw new Error("format");
      let n = 0;
      for (const o of d.observations) {
        if (!o.id || !o.date) continue;
        let blob = null;
        if (o.photo && typeof o.photo === "string" && o.photo.indexOf("data:") === 0) {
          const r = await fetch(o.photo);
          blob = await r.blob();
        }
        await dbAjouter({ ...o, photo: blob });
        n++;
      }
      setImportEtat("✓ " + n + " observation(s) importée(s)");
      onImportTermine();
    } catch {
      setImportEtat("Fichier invalide — est-ce bien une sauvegarde BioDex ?");
    }
  }
  return (
    <div style={{ padding: 16, maxWidth: 560, margin: "0 auto" }}>
      <Bouton onClick={onFermer} style={{ marginBottom: 14 }}>← Retour</Bouton>
      <h2 style={{ fontFamily: serif, color: C.papier, fontSize: 24, margin: "4px 0 10px" }}>BioDex — le guide</h2>
      <p style={p}>
        BioDex est ton carnet de terrain entomologique : chaque insecte croisé devient un spécimen épinglé dans ta boîte de collection virtuelle, avec sa photo, son biotope, sa position GPS et la météo du moment. Touche une catégorie ci-dessous pour la déplier.
      </p>

      <SectionPliable titre="🔎 Observer & identifier" ouvertParDefaut>
        <div style={t}>➕ Ajouter une observation</div>
        <p style={p}>
          Appuie sur « Nouvelle observation », utilise « Appareil photo » pour capturer le spécimen sans quitter l'appli, ou « Galerie » pour reprendre un cliché existant. Astuce : pour les macros de haute qualité (zoom, mise au point fine), photographie d'abord avec ton appli photo native puis récupère le cliché via « Galerie ». La position GPS est capturée automatiquement si tu l'autorises, et la météo (ciel + température) est récupérée toute seule à partir de ta position — tu peux la corriger à la main si besoin. Seule la photo est obligatoire.
        </p>
        <div style={t}>📷 La caméra (zoom & netteté)</div>
        <p style={p}>
          Dans la caméra intégrée : touche l'écran à l'endroit de l'insecte pour faire la mise au point, utilise le curseur 🔍 pour zoomer, et le bouton 🔦 pour la torche (pratique en macro ou sous les feuilles). Ces contrôles dépendent de ton téléphone : s'ils n'apparaissent pas, c'est que ton appareil ne les permet pas dans le navigateur — dans ce cas, photographie avec ton appli photo native puis passe par la galerie.
        </p>
        <div style={t}>📍 Position (même sans GPS)</div>
        <p style={p}>
          Si tu importes une photo depuis ta galerie (sans coordonnées) ou si le GPS n'a rien capté, tu peux placer le lieu à la main : dans le bloc position, touche « Placer sur la carte » et pointe l'endroit de l'observation. Pratique pour situer une trouvaille faite sans réseau ou importée après coup.
        </p>
        <div style={t}>💡 Le savais-tu ?</div>
        <p style={p}>
          En haut de ta collection, une carte affiche une anecdote fascinante sur les insectes — une nouvelle chaque jour, et le bouton « 🔀 Une autre » pour en piocher d'autres. Toutes les anecdotes sont des faits fiables. Tu peux masquer la carte avec la croix (elle réapparaîtra à la prochaine ouverture).
        </p>
        <div style={t}>📥 À trier (import groupé)</div>
        <p style={p}>
          Tu reviens de balade avec plein de photos ? L'onglet « À trier » te permet de les <b>importer toutes d'un coup</b> depuis ta galerie. Chaque photo garde <b>sa propre date</b> et, si elle en contient une, <b>sa position d'origine</b> (lue dans les métadonnées de l'image) — sinon ta position actuelle sert de repli. La <b>météo du jour où la photo a été prise</b> est même récupérée automatiquement (température et ciel réels de ce moment-là, pas ceux d'aujourd'hui !), ainsi que le moment de la journée. Elles atterrissent dans une file d'attente : plus tard, au calme, touche une photo pour l'identifier et la classer dans ta collection — il ne te restera quasiment que le nom et le biotope à renseigner.
        </p>
        <div style={t}>✨ Identification précise (Claude)</div>
        <p style={p}>
          Une seule photo suffit pour démarrer : « 📷 Appareil photo » ouvre directement l'appareil de ton téléphone pour une meilleure qualité, ou « 🖼️ Galerie » pour reprendre un ou plusieurs clichés existants — tu peux en sélectionner plusieurs d'un coup dans ta galerie : le premier devient la photo principale, les suivants (jusqu'à 2) des vues complémentaires que l'IA croisera. Le bouton « Identifier cette zone » envoie ta photo à Claude via un petit serveur : il propose un nom français et latin avec un pourcentage de confiance. Avant chaque identification, un cadre s'affiche sur ta photo : place-le sur l'insecte pour que l'IA se concentre dessus — c'est surtout utile quand la bête est petite ou perdue dans le décor, et ça améliore nettement la précision. Si ta photo est déjà bien cadrée, un lien te permet d'identifier l'image entière directement. Le bouton « 🔍 Zoomer sur la photo » ouvre l'image en plein écran pour l'inspecter de près. Après une première proposition, si l'IA hésite, tu peux l'affiner de deux façons : « 📸 Ajouter une vue » te laisse importer depuis ta galerie un autre angle (dessus, profil, détail des ailes… jusqu'à 2 vues) que l'IA croise avec la première, exactement comme le ferait un entomologiste ; ou « 🔍 Affiner l'identification » te pose des questions ciblées. L'appli transmet aussi le contexte (biotope, saison, et une zone géographique large déduite du GPS — jamais ta position exacte), ce qui aide à privilégier la faune locale, partout dans le monde. Le niveau de certitude est affiché sous forme de pourcentage coloré (du rouge pour incertain au vert pour fiable), pour savoir d'un coup d'œil à quel point se fier à la proposition. Ce pourcentage apparaît aussi sur tes publications du mur. Si tu observes une espèce inattendue pour la zone (invasive, échappée, en expansion...), un encart 🌟 « Observation notable » le signale — c'est souvent une belle trouvaille ! Nécessite le réseau. Chaque identification coûte une fraction de centime.
        </p>
        <div style={t}>🌿 Pourquoi il compte</div>
        <p style={p}>
          Chaque fiche naturaliste met en avant le rôle écologique de l'insecte (pollinisation, recyclage, régulation, nourriture pour d'autres animaux…) dans un encart « Pourquoi il compte », et propose un geste simple pour l'aider (« Un geste pour l'aider »). Une façon de rappeler que même la plus petite bestiole a son utilité — et qu'on peut agir à son échelle.
        </p>
        <div style={t}>✍️ Noms & autocomplétion</div>
        <p style={p}>
          En saisissant le nom vernaculaire, l'appli propose des espèces correspondantes (base iNaturalist) : choisis-en une et le nom scientifique se remplit tout seul. Réseau requis ; sans lui, la saisie manuelle reste toujours possible. Les noms français ne couvrent pas 100% des espèces.
        </p>
      </SectionPliable>

      <SectionPliable titre="🗃️ Ma collection">
        <div style={t}>🗃️ Ta collection</div>
        <p style={p}>
          La grille présente tes spécimens comme dans une boîte entomologique, avec un menu de tri (récentes, anciennes, nom, biotope) dont le choix est mémorisé. Touche une carte pour la fiche complète — le lien 🗺️ de la position ouvre le point exact sur OpenStreetMap.
        </p>
        <div style={t}>✏️ Modifier une observation</div>
        <p style={p}>
          Depuis la fiche d'un spécimen, le bouton « ✏️ Modifier cette observation » permet de tout corriger après coup : le nom, le nom latin, le biotope, la météo, les notes, la position (via la carte) et même la photo (reprendre ou réimporter). Le bouton de suppression reste en bas de la fiche.
        </p>
        <div style={t}>🔍 Filtres & recherche</div>
        <p style={p}>
          Dans la collection, la barre de recherche retrouve un spécimen par son nom (français ou latin). Le bouton « Filtres » affine par biotope et par période. Le tri (récentes, anciennes, nom, biotope) reste dispo au-dessus.
        </p>
        <div style={t}>📊 Statistiques</div>
        <p style={p}>
          L'onglet Stats résume ta collection : nombre de spécimens, combien sont identifiés et localisés, la répartition par biotope et ton activité des derniers mois.
        </p>
        <div style={t}>🗺️ La carte</div>
        <p style={p}>
          L'onglet Carte affiche tes observations positionnées sur une carte OpenStreetMap. Touche un point ambré pour voir la miniature du spécimen et ouvrir sa fiche. En haut, bascule entre « 🗃️ Ma carte » (tes observations, position précise) et « 🌐 La bande » (les trouvailles partagées au mur par tout le monde). Sur la carte de la bande, chaque personne choisit au moment de partager le niveau de précision de sa position : exacte (point ambré), approximative (~1 km, zone verte) ou masquée (pas de point). Chacun est ainsi libre de montrer ou non l'endroit exact de sa trouvaille. La carte nécessite du réseau.
        </p>
        <div style={t}>📝 Brouillon automatique</div>
        <p style={p}>
          Tes saisies en cours (nom, biotope, notes…) sont mémorisées : si l'appli se ferme avant que tu épingles, elle te propose de reprendre le brouillon à la réouverture. La photo, elle, n'est pas conservée dans le brouillon — à reprendre si besoin.
        </p>
      </SectionPliable>

      <SectionPliable titre="🌐 La communauté">
        <div style={t}>🔔 Centre de notifications</div>
        <p style={p}>
          La cloche 🔔 en haut regroupe tout ce qui s'est passé depuis ta dernière visite, avec le détail : quelles nouvelles trouvailles (espèce + auteur) sur le mur, qui a réagi à tes photos et avec quelle réaction, quelles nouvelles idées et de qui, et un « Quoi de neuf » qui liste les nouveautés de l'appli. Une pastille rouge indique le nombre d'éléments non vus. Si tu as installé BioDex sur ton écran d'accueil, une pastille apparaît aussi sur l'icône de l'appli (selon ton téléphone). Note : cette pastille se met à jour quand l'appli tourne, pas en temps réel quand elle est fermée (ce ne sont pas des notifications push).
        </p>
        <div style={t}>👤 Connexion (facultative)</div>
        <p style={p}>
          Le bouton 👤 en haut permet de te connecter avec ton email : tu reçois un lien magique à cliquer, sans mot de passe. La connexion est facultative aujourd'hui ; elle prépare les fonctions sociales à venir (profil, collections des autres, classement). Sans compte, l'appli fonctionne normalement.
        </p>
        <div style={t}>🌐 Mur commun</div>
        <p style={p}>
          Si le mur est activé, un onglet 🌐 apparaît. Depuis la fiche d'une observation, « Partager au mur » publie ta photo, l'espèce et le biotope pour toute la bande (ta position exacte n'est jamais partagée). Avant de publier, tu peux recadrer ta photo (bouton ✂️) pour bien mettre l'insecte en valeur — ta photo d'origine reste intacte dans ta collection. Indique ton prénom une fois, il est mémorisé. Tu peux aussi personnaliser ton profil (menu ☰ → 🎨 Mon profil) : choisis ton emblème, écris ta devise, indique ton secteur de chasse et ton insecte fétiche — toute la bande le verra sur le mur, dans le classement et sur ton profil. Le mur affiche les dernières trouvailles de tout le monde. Chacun garde par ailleurs sa collection privée sur son téléphone. Une pastille rouge sur l'onglet 🌐 signale du nouveau depuis ta dernière visite.
        </p>
        <div style={t}>📖 Posts détaillés</div>
        <p style={p}>
          Sur le mur commun, touche n'importe quelle publication pour l'ouvrir en grand : tu y retrouves l'espèce, son nom latin, le biotope, la note d'observation, l'auteur et la date, plus un lien pour te renseigner sur l'espèce via iNaturalist. Une façon d'apprendre en parcourant les trouvailles de la bande.
        </p>
        <div style={t}>🔥 Réactions</div>
        <p style={p}>
          Sous chaque publication du mur, quatre réactions permettent d'encourager les trouvailles de la bande : 🔥 belle trouvaille, 😍 magnifique, 🤯 incroyable ou rare, 🔍 bien observé. Touche une réaction pour l'ajouter ou la retirer — et sous les boutons, tu vois maintenant le prénom de ceux qui ont réagi. Il faut avoir renseigné ton prénom pour réagir. Chaque personne ne peut mettre qu'une fois chaque réaction sur un post.
        </p>
        <div style={t}>🏆 Profil de collectionneur</div>
        <p style={p}>
          Une fois connecté, depuis une observation identifiée, « Ajouter cette espèce à mon profil » l'ajoute à ton profil public (espèce, date, biotope — jamais la photo ni la position). Retrouve et gère la liste dans l'écran 👤. C'est la base pour te comparer à la bande (classement à venir).
        </p>
        <div style={t}>🎯 Missions saisonnières</div>
        <p style={p}>
          Le bouton 🎯 en haut ouvre les missions de la saison : des défis d'observation communs à toute la bande (explorer un biotope, observer plusieurs espèces, repérer une notable…), qui changent à chaque saison. Ils se valident automatiquement quand ta collection remplit les conditions, avec une validation manuelle en secours. Tu vois aussi qui, dans la bande, a réussi chaque défi.
        </p>
        <div style={t}>🏅 Le classement des chasseurs</div>
        <p style={p}>
          Depuis le menu ☰, « Classement » établit le palmarès de la bande sur les 7 derniers jours (Semaine) ou 30 jours (Mois), à partir des trouvailles partagées sur le mur. Le système de points : +1 par trouvaille, +2 si l'espèce est nouvelle sur le mur (personne ne l'avait postée), et un bonus de rareté (+1 peu commune, +2 rare, +3 très rare). La rareté s'appuie sur le nombre d'observations mondiales dans iNaturalist — un bon indice, mais pas un statut de conservation officiel : une espèce discrète peut être peu observée sans être menacée. Les espèces rares affichent aussi un badge coloré (🌟 ✨ 🍃) partout dans l'appli : sur le mur, dans ta collection, sur la fiche détaillée, et un compteur dans les stats. Tu peux même filtrer ta collection sur « 🌟 Espèces rares ». Nécessite le réseau et le mur configuré.
        </p>
        <div style={t}>🏆 La Ligue</div>
        <p style={p}>
          Depuis le menu ☰, la Ligue te permet de défier les cartes de la bande. Engage jusqu'à 3 de tes cartes forgées (elles restent dans ta collection), et défie celles des autres : quand tu défies une carte, son propriétaire n'a pas besoin d'être connecté, l'appli la joue pour lui. Chaque défi met à jour le classement des joueurs (victoires/défaites) et les stats de chaque carte. Tu peux jouer le combat en manuel, en auto, ou juste voir le résultat. Pour que le jeu reste fair-play, chaque carte forgée est vérifiée : si la photo ne ressemble pas à une vraie photo d'insecte prise sur le terrain (capture d'écran, image trouvée sur internet, dessin), la carte est marquée « non vérifiée » et porte un badge visible dans la ligue. La carte reste jouable, mais tout le monde voit qu'elle est douteuse.
        </p>
        <div style={t}>💡 Boîte à idées</div>
        <p style={p}>
          Le bouton 💡 en haut ouvre la boîte à idées : un espace partagé où toute la bande peut proposer des améliorations, signaler un bug ou suggérer une fonctionnalité. Chaque idée est signée du prénom. Réagis aux idées (👍 bonne idée, ❤️ coup de cœur, 🚀 vivement !) pour montrer lesquelles t'emballent — ça aide à voir ce qui suscite le plus d'intérêt. Une idée réalisée peut être cochée « ✅ Réalisée » (visible par tous). Les meilleures finiront peut-être dans une prochaine version !
        </p>
      </SectionPliable>

      <SectionPliable titre="🎴 Jeu & cartes">
        <div style={t}>🎴 Cartes de collection</div>
        <p style={p}>
          Depuis la fiche d'un spécimen identifié, « Forger une carte » crée une carte de jeu : ses stats (attaque, défense, vitesse) et sa capacité spéciale sont générées par l'IA d'après la vraie biologie de l'insecte. La rareté de la carte (qui déclenche les cartes holographiques et légendaires scintillantes) s'appuie désormais sur les vraies données d'observation d'iNaturalist : plus une espèce est rare dans le monde, plus sa carte brille. Avec « 🖼️ Cadrer l'insecte », dessine un cadre sur la photo pour que la carte soit centrée pile sur la bête (sans le décor autour). Dans ta galerie de cartes, tu peux filtrer par ordre d'insecte et trier tes cartes par récentes, par rareté ou par type de combat. Tout le jeu est regroupé dans l'onglet 🎮 Jeu en bas : « 🎴 Cartes » (ta galerie), « ⚔️ Combat » (affronte l'IA), « 🏆 Ligue » (défie la bande) et « 🧠 Quiz » (5 questions par jour). Le combat propose deux modes : « Combat libre » (un affrontement contre un adversaire au hasard) et « 🏟️ Arène » (tu enchaînes des adversaires de plus en plus forts, ton insecte étant soigné entre les manches ; ta meilleure série est enregistrée comme record). En combat, chaque insecte a un type parmi 8 (🦋 Volant, 🪲 Cuirassé, 🐛 Rampant, 🦗 Bondissant, 🕷️ Venimeux, 💧 Aquatique, 🐜 Social, 🌙 Nocturne) avec des forces et faiblesses, des points de vie, de l'énergie qui se recharge, une attaque de base et une capacité spéciale qui coûte de l'énergie. Le bouton « 🔰 Forces & faiblesses des types » affiche le schéma complet de qui bat qui — un coup avec l'avantage de type fait ×1,3 de dégâts. Choisis ton insecte selon le type de l'adversaire ! En plus d'attaquer, tu peux te mettre en 🛡️ Parade (le prochain coup encaissé est réduit de moitié et tu regagnes de l'énergie) — utile pour charger ta capacité. Et les insectes de type Venimeux empoisonnent leur cible avec leur capacité : le poison inflige des dégâts pendant 2 tours (badge ☠️). Chaque forge coûte un appel (~0,8 centime).
        </p>
        <div style={t}>🔬 Science participative (iNaturalist)</div>
        <p style={p}>
          Sur la fiche d'un spécimen identifié, une section « Science participative » te permet de contribuer à la recherche : le bouton « 🔬 Contribuer sur iNaturalist » ouvre une nouvelle observation pré-remplie (espèce, lieu, date) — tu ajoutes ta photo et tu valides sur iNaturalist (compte gratuit). Une fois validée par la communauté, ton observation rejoint une base mondiale utilisée par de vrais chercheurs. Tu peux aussi « 🌍 Explorer cette espèce » ou voir les « 📍 Observations près d'ici ». La contribution reste manuelle (tu finalises sur iNaturalist) : c'est simple et sans configuration. De plus, si tu identifies une espèce suivie par une enquête nationale de l'OPIE (Lucane cerf-volant, Rosalie des Alpes), un encart 🇫🇷 spécial t'invite à la signaler directement à l'Office pour les insectes — ces observations sont validées par des experts et versées à l'INPN.
        </p>
        <div style={t}>🧠 Quiz du jour</div>
        <p style={p}>
          Dans l'onglet 🎮 Jeu, le sous-onglet « Quiz » propose chaque jour 5 questions sur les insectes (connaissances et reconnaissance par indices) — le même quiz pour toute la bande ce jour-là. Tu gagnes 1 point par bonne réponse, plus un bonus si tu fais un sans-faute. Un seul quiz par jour : reviens le lendemain pour de nouvelles questions ! Toutes les questions reposent sur des faits fiables.
        </p>
      </SectionPliable>

      <SectionPliable titre="⚙️ Réglages & appli">
        <div style={t}>📲 Installer l'appli</div>
        <p style={p}>
          Quand une bannière « Installe BioDex » apparaît en haut, touche « Installer » : c'est le plus simple. Sinon, dans le menu de ton navigateur, choisis « Ajouter à l'écran d'accueil » (ou « Installer l'application »). BioDex se lance alors comme une vraie appli, et fonctionne même hors connexion — pratique en pleine nature. Seule la météo auto nécessite du réseau. Quand une nouvelle version est déployée, une bannière « Nouvelle version disponible » apparaît en haut à l'ouverture : touche « Mettre à jour » et l'appli se recharge à jour, sans manipulation de cache.
        </p>
        <div style={t}>💾 Stockage & sauvegarde</div>
        <p style={p}>
          Tes observations sont sauvegardées sur ton téléphone (photos jusqu'à 2560 px). Elles ne sont PAS synchronisées entre appareils, et vider les données du navigateur les efface : sauvegarde régulièrement ! L'appli te le rappelle avec une bannière 💾 quand ça fait un moment ou que tu as ajouté beaucoup d'observations. L'export crée un fichier .json à ranger à l'abri (Drive, PC…). L'import restaure une sauvegarde — les observations déjà présentes sont conservées, les doublons écrasés proprement.
        </p>
        {/* État de la dernière sauvegarde */}
        {(() => {
          const coul = sauve.niveau === "alerte" ? { bord: "#8A4A2E", fond: "linear-gradient(#2E1F16, #241812)", txt: "#E8A07E", ico: "⚠️" }
                     : sauve.niveau === "attention" ? { bord: "#8A7A2E", fond: "linear-gradient(#2A2417, #201B12)", txt: "#E4C878", ico: "💾" }
                     : { bord: "#3E5A2E", fond: "linear-gradient(#1A2216, #161C12)", txt: "#A8C97E", ico: "✅" };
          return (
            <div style={{ display: "flex", alignItems: "center", gap: 11, padding: "11px 13px", borderRadius: 10, background: coul.fond, border: `1px solid ${coul.bord}`, marginTop: 12 }}>
              <span style={{ fontSize: 19 }}>{coul.ico}</span>
              <div style={{ flex: 1 }}>
                <div style={{ fontFamily: sans, fontSize: 13.5, fontWeight: 700, color: coul.txt }}>
                  {sauve.jamais ? "Aucune sauvegarde effectuée" : `Dernière sauvegarde : ${sauve.quand}`}
                </div>
                <div style={{ fontFamily: sans, fontSize: 11.5, color: C.papierSombre, marginTop: 2, lineHeight: 1.45 }}>
                  {sauve.jamais
                    ? "Ta collection n'existe que sur cet appareil. Exporte-la pour ne rien risquer !"
                    : `Le ${sauve.dateLisible}${sauve.count ? ` · ${sauve.count} observation${sauve.count > 1 ? "s" : ""} sauvegardée${sauve.count > 1 ? "s" : ""}` : ""}.`}
                </div>
              </div>
            </div>
          );
        })()}

        <div style={{ display: "flex", gap: 10, marginBottom: 8, marginTop: 10 }}>
          <Bouton variante="primaire" onClick={exporter} style={{ flex: 1 }}>📤 Exporter</Bouton>
          <div style={{ position: "relative", flex: 1 }}>
            <Bouton onClick={() => {}} style={{ width: "100%" }}>📥 Importer</Bouton>
            <input type="file" accept=".json,application/json" onChange={importer}
              style={{ position: "absolute", top: 0, left: 0, width: "100%", height: "100%", opacity: 0, cursor: "pointer" }} />
          </div>
        </div>
        {exportEtat && <p style={{ ...p, color: C.lichen, marginBottom: 4 }}>{exportEtat}</p>}
        {importEtat && <p style={{ ...p, color: C.lichen, marginBottom: 4 }}>{importEtat}</p>}

}

function Connexion({ onFermer, utilisateur, onDeconnexion }) {

              <div style={{ flex: 1 }}>

// ---------- Boîte à idées (vue) ----------
function BoiteIdees({ prenom, onDefinirPrenom, onFermer }) {
  const [idees, setIdees] = useState([]);
  const [reactions, setReactions] = useState({}); // toutes les réactions (reactions_detail groupées)
  const [besoinPrenom, setBesoinPrenom] = useState(false);
  const [etat, setEtat] = useState("chargement"); // chargement | ok | echec | inactif
  const [saisiePrenom, setSaisiePrenom] = useState(prenom || "");
  const [texte, setTexte] = useState("");
  const [envoiEtat, setEnvoiEtat] = useState(""); // "" | envoi | echec
  const [erreur, setErreur] = useState("");
  const [confirmSuppr, setConfirmSuppr] = useState(null);

  async function rafraichir() {
    if (!MUR_ACTIF) { setEtat("inactif"); return; }
    setEtat("chargement");
    try {
      const [lst, rx] = await Promise.all([chargerIdees(), chargerReactions().catch(() => ({}))]);
      setIdees(lst);
      setReactions(rx || {});
      setEtat("ok");
    } catch { setEtat("echec"); }
  }

  // Réagir à une idée (toggle) : maj locale immédiate puis serveur.
  async function surReactionIdee(ideeId, type) {
    const moi = (prenom || saisiePrenom || "").trim();
    if (!moi) { setBesoinPrenom(true); return; }
    const cle = cleReactionIdee(ideeId);
    const liste = (reactions[cle] && reactions[cle][type]) || [];
    const dejaReagi = liste.map((n) => n.toLowerCase()).includes(moi.toLowerCase());
    setReactions((prev) => {
      const copie = { ...prev };
      copie[cle] = { ...(copie[cle] || {}) };
      const l = [...(copie[cle][type] || [])];
      copie[cle][type] = dejaReagi ? l.filter((n) => n.toLowerCase() !== moi.toLowerCase()) : [...l, moi];
      return copie;
    });
    try { await reagir(cle, type, moi, dejaReagi); }
    catch { chargerReactions().then(setReactions).catch(() => {}); }
  }

  // Marquer une idée réalisée / à faire (partagé).
  async function basculerRealisee(it) {
    const nouveau = !it.realisee;
    setIdees((prev) => prev.map((x) => x.id === it.id ? { ...x, realisee: nouveau } : x));
    try { await marquerIdeeRealisee(it.id, nouveau); }
    catch { rafraichir(); }
  }

  useEffect(() => { rafraichir(); }, []);

  async function envoyer() {
    const auteur = (saisiePrenom || "").trim();
    const idee = texte.trim();
    if (!idee) { setErreur("Écris ton idée avant d'envoyer."); return; }
    if (!auteur) { setErreur("Indique ton prénom."); return; }
    onDefinirPrenom(auteur);
    setEnvoiEtat("envoi");
    setErreur("");
    try {
      await proposerIdee(auteur, idee);
      setTexte("");
      setEnvoiEtat("");
      rafraichir();
    } catch (e) {
      setErreur(String(e.message || "Envoi impossible") + ".");
      setEnvoiEtat("echec");
    }
  }

  async function supprimer(id) {
    try { await supprimerIdee(id); setIdees((prev) => prev.filter((x) => x.id !== id)); }
    catch { rafraichir(); }
    setConfirmSuppr(null);
  }

  if (!MUR_ACTIF) {
    return (
      <div style={{ padding: 16, maxWidth: 560, margin: "0 auto" }}>
        <div style={{ textAlign: "center", padding: "48px 24px", border: `1px solid ${C.bordure}`, borderRadius: 14, background: "linear-gradient(#191F15, #14180F)" }}>
          <div style={{ fontSize: 38, marginBottom: 12 }}>💡</div>
          <div style={{ fontFamily: serif, fontSize: 19, fontWeight: 600, color: C.papier, marginBottom: 6 }}>Boîte à idées non configurée</div>
          <div style={{ fontFamily: sans, fontSize: 14, color: C.papierSombre, lineHeight: 1.5 }}>La connexion au serveur n'est pas active.</div>
        </div>
      </div>
    );
  }

  return (
    <div style={{ padding: 16, maxWidth: 560, margin: "0 auto" }}>
      <Bouton onClick={onFermer} style={{ marginBottom: 14 }}>← Retour</Bouton>
      <div style={{ fontFamily: serif, fontSize: 20, fontWeight: 600, color: C.papier, marginBottom: 4 }}>💡 Boîte à idées</div>
      <div style={{ fontFamily: sans, fontSize: 13, color: C.papierSombre, marginBottom: 14, lineHeight: 1.5 }}>
        Une envie, une amélioration, un bug à signaler ? Partage-la avec la bande — les meilleures idées finiront peut-être dans l'appli !
      </div>

      {/* Formulaire */}
      <div style={{ padding: "12px 14px", background: C.panneau, border: `1px solid ${C.bordure}`, borderRadius: 10, marginBottom: 18 }}>
        <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: besoinPrenom ? 6 : 8 }}>
          <span style={{ fontFamily: sans, fontSize: 13, color: C.papierSombre, whiteSpace: "nowrap" }}>Ton prénom :</span>
          <input value={saisiePrenom} onChange={(e) => { setSaisiePrenom(e.target.value); if (e.target.value.trim()) setBesoinPrenom(false); }} placeholder="ex : Sylvain" maxLength={40}
            style={{ flex: 1, boxSizing: "border-box", background: C.fond, color: C.papier, border: `1px solid ${besoinPrenom ? C.ambre : C.bordure}`, borderRadius: 8, padding: "8px 10px", fontFamily: sans, fontSize: 14, outline: "none" }} />
        </div>
        {besoinPrenom && (
          <div style={{ fontFamily: sans, fontSize: 12, color: C.ambreClair, marginBottom: 8 }}>👆 Indique ton prénom pour réagir aux idées.</div>
        )}
        <textarea value={texte} onChange={(e) => setTexte(e.target.value)} placeholder="Ton idée…" maxLength={500} rows={3}
          style={{ width: "100%", boxSizing: "border-box", background: C.fond, color: C.papier, border: `1px solid ${C.bordure}`, borderRadius: 8, padding: "10px 12px", fontFamily: sans, fontSize: 14, outline: "none", resize: "vertical", marginBottom: 8 }} />
        <Bouton variante="primaire" onClick={envoyer} disabled={envoiEtat === "envoi"} style={{ width: "100%" }}>
          {envoiEtat === "envoi" ? "Envoi…" : "💡 Proposer mon idée"}
        </Bouton>
        {erreur && <div style={{ fontFamily: sans, fontSize: 13, color: "#E8A88F", marginTop: 8 }}>{erreur}</div>}
      </div>

      {/* Liste */}
      {etat === "chargement" && <div style={{ fontFamily: sans, fontSize: 14, color: C.papierSombre, fontStyle: "italic", textAlign: "center", padding: "16px 0" }}>Chargement…</div>}
      {etat === "echec" && <div style={{ fontFamily: sans, fontSize: 14, color: "#E8A88F", textAlign: "center", padding: "16px 0" }}>Impossible de charger les idées. Réessaie.</div>}
      {etat === "ok" && idees.length === 0 && (
        <div style={{ textAlign: "center", padding: "32px 24px", fontFamily: sans, fontSize: 14, color: C.papierSombre, lineHeight: 1.6 }}>
          Aucune idée pour l'instant.<br />Sois le premier à en proposer une !
        </div>
      )}
      {etat === "ok" && idees.map((it) => {
        const rx = reactions[cleReactionIdee(it.id)] || {};
        const moi = (prenom || saisiePrenom || "").trim().toLowerCase();
        return (
        <div key={it.id} style={{ marginBottom: 10, padding: "12px 14px", background: it.realisee ? "linear-gradient(#1A2216, #161C12)" : C.panneau, border: `1px solid ${it.realisee ? "#3E5A2E" : C.bordure}`, borderRadius: 10, opacity: it.realisee ? 0.85 : 1 }}>
          {it.realisee && (
            <div style={{ display: "inline-flex", alignItems: "center", gap: 5, fontFamily: sans, fontSize: 11, fontWeight: 800, letterSpacing: 0.4, textTransform: "uppercase", color: "#8AAE6B", marginBottom: 6 }}>✅ Réalisée</div>
          )}
          <div style={{ fontFamily: sans, fontSize: 14, color: C.papier, lineHeight: 1.5, whiteSpace: "pre-wrap" }}>{it.idee}</div>

          {/* Réactions d'intérêt */}
          <div style={{ display: "flex", gap: 6, marginTop: 10, flexWrap: "wrap" }}>
            {IDEE_REACTIONS.map((r) => {
              const liste = rx[r.type] || [];
              const n = liste.length;
              const jaiReagi = moi && liste.map((x) => x.toLowerCase()).includes(moi);
              return (
                <button key={r.type} onClick={() => surReactionIdee(it.id, r.type)} title={n > 0 ? liste.join(", ") : r.titre}
                  style={{ display: "flex", alignItems: "center", gap: 4, padding: "4px 9px", borderRadius: 16, border: `1px solid ${jaiReagi ? C.ambre : (n > 0 ? "#A8863A" : C.bordure)}`, background: jaiReagi ? "linear-gradient(#3A4A2C, #2C3623)" : (n > 0 ? "linear-gradient(#2C3623, #232B1D)" : C.panneauClair), cursor: "pointer", fontFamily: sans, fontSize: 12.5 }}>
                  <span style={{ fontSize: 14 }}>{r.emoji}</span>
                  {n > 0 && <span style={{ fontWeight: 700, color: C.ambreClair, fontSize: 11.5 }}>{n}</span>}
                </button>
              );
            })}
          </div>

          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 10, fontFamily: sans, fontSize: 12, color: C.papierSombre }}>
            <span>💡 {it.auteur || "Anonyme"} · {it.created_at ? new Date(it.created_at).toLocaleDateString("fr-FR", { day: "numeric", month: "short" }) : ""}</span>
            <span style={{ display: "flex", gap: 10, alignItems: "center" }}>
              <button onClick={() => basculerRealisee(it)} style={{ background: "none", border: `1px solid ${it.realisee ? "#5C8A3C" : C.bordure}`, color: it.realisee ? "#8AAE6B" : C.papierSombre, fontFamily: sans, fontSize: 11, fontWeight: 700, padding: "3px 9px", borderRadius: 14, cursor: "pointer" }}>
                {it.realisee ? "↩︎ À refaire" : "✅ Réalisée"}
              </button>
              {confirmSuppr === it.id ? (
                <span style={{ display: "flex", gap: 6, alignItems: "center" }}>
                  <button onClick={() => setConfirmSuppr(null)} style={{ fontFamily: sans, fontSize: 11, padding: "3px 8px", borderRadius: 6, border: `1px solid ${C.bordure}`, background: C.panneauClair, color: C.papierSombre, cursor: "pointer" }}>Non</button>
                  <button onClick={() => supprimer(it.id)} style={{ fontFamily: sans, fontSize: 11, padding: "3px 8px", borderRadius: 6, border: `1px solid ${C.rouge}`, background: "transparent", color: C.rouge, cursor: "pointer" }}>Supprimer</button>
                </span>
              ) : (
                <button onClick={() => setConfirmSuppr(it.id)} style={{ background: "none", border: "none", color: C.papierSombre, fontSize: 14, cursor: "pointer", padding: "0 4px" }} title="Supprimer">🗑️</button>
              )}
            </span>
          </div>
        </div>
        );
      })}
    </div>
  );
}
