const CRITERES = [
  { id: "attaque", label: "Attaque", emoji: "⚔️" },
  { id: "defense", label: "Défense", emoji: "🛡️" },
  { id: "vitesse", label: "Vitesse", emoji: "💨" },
];

function Combat({ cartes }) {
  const jouables = cartes.filter((c) => c.carte);
  const [etape, setEtape] = useState("choix"); // choix | resultat
  const [maCarte, setMaCarte] = useState(null);
  const [carteIA, setCarteIA] = useState(null);
  const [critere, setCritere] = useState(null);
  const [scores, setScores] = useState({ moi: 0, ia: 0 });
  const [manche, setManche] = useState(0);

  if (jouables.length < 2) {
    return (
      <div style={{ textAlign: "center", padding: "40px 24px", border: `1px solid ${C.bordure}`, borderRadius: 14, background: "linear-gradient(#191F15, #14180F)", fontFamily: sans, fontSize: 14, color: C.papierSombre, lineHeight: 1.6 }}>
        Il te faut au moins <b style={{ color: C.papier }}>2 cartes</b> forgées pour combattre.<br />Tu en as {jouables.length}.
      </div>
    );
  }

  function lancerManche(carteChoisie) {
    // l'IA pioche une carte au hasard (différente si possible)
    const autres = jouables.filter((c) => c.id !== carteChoisie.id);
    const ia = autres[Math.floor(Math.random() * autres.length)] || carteChoisie;
    // l'IA choisit le critère qui l'avantage
    let meilleur = CRITERES[0].id, ecart = -999;
    CRITERES.forEach((cr) => {
      const e = (ia.carte[cr.id] || 0) - (carteChoisie.carte[cr.id] || 0);
      if (e > ecart) { ecart = e; meilleur = cr.id; }
    });
    setMaCarte(carteChoisie);
    setCarteIA(ia);
    setCritere(meilleur);
    const maVal = carteChoisie.carte[meilleur] || 0;
    const iaVal = ia.carte[meilleur] || 0;
    const gagne = maVal >= iaVal; // égalité avantage joueur
    setScores((s) => ({ moi: s.moi + (gagne ? 1 : 0), ia: s.ia + (gagne ? 0 : 1) }));
    setManche((m) => m + 1);
    setEtape("resultat");
  }

  function rejouer() {
    setEtape("choix");
    setMaCarte(null); setCarteIA(null); setCritere(null);
  }
  function reset() {
    rejouer();
    setScores({ moi: 0, ia: 0 });
    setManche(0);
  }

  const critereInfo = CRITERES.find((c) => c.id === critere);
  const maVal = maCarte && critere ? (maCarte.carte[critere] || 0) : 0;
  const iaVal = carteIA && critere ? (carteIA.carte[critere] || 0) : 0;
  const gagne = maVal >= iaVal;

  return (
    <div>
      {/* Score */}
      <div style={{ display: "flex", justifyContent: "center", gap: 24, marginBottom: 16, fontFamily: sans }}>
        <div style={{ textAlign: "center" }}>
          <div style={{ fontSize: 22, fontWeight: 800, color: C.ambreClair }}>{scores.moi}</div>
          <div style={{ fontSize: 11, color: C.papierSombre, textTransform: "uppercase", letterSpacing: 0.5 }}>Toi</div>
        </div>
        <div style={{ fontSize: 22, color: C.papierSombre, alignSelf: "center" }}>·</div>
        <div style={{ textAlign: "center" }}>
          <div style={{ fontSize: 22, fontWeight: 800, color: C.papier }}>{scores.ia}</div>
          <div style={{ fontSize: 11, color: C.papierSombre, textTransform: "uppercase", letterSpacing: 0.5 }}>IA</div>
        </div>
        {manche > 0 && (
          <button onClick={reset} style={{ alignSelf: "center", fontFamily: sans, fontSize: 12, padding: "5px 10px", borderRadius: 6, border: `1px solid ${C.bordure}`, background: "transparent", color: C.papierSombre, cursor: "pointer" }}>Remettre à 0</button>
        )}
      </div>

      {etape === "choix" && (
        <div>
          <div style={{ fontFamily: sans, fontSize: 14, color: C.papier, textAlign: "center", marginBottom: 14 }}>Choisis ta carte pour cette manche :</div>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(120px, 1fr))", gap: 12 }}>
            {jouables.map((o) => (
              <CarteInsecte key={o.id} obs={o} taille="compact" onClick={() => lancerManche(o)} />
            ))}
          </div>
        </div>
      )}

      {etape === "resultat" && maCarte && carteIA && (
        <div>
          <div style={{ textAlign: "center", fontFamily: serif, fontSize: 20, fontWeight: 700, color: gagne ? C.ambreClair : C.rouge, marginBottom: 4 }}>
            {gagne ? "Manche gagnée !" : "Manche perdue"}
          </div>
          <div style={{ textAlign: "center", fontFamily: sans, fontSize: 13, color: C.papierSombre, marginBottom: 16 }}>
            Critère : {critereInfo.emoji} {critereInfo.label} — {maVal} contre {iaVal}
          </div>
          <div style={{ display: "flex", gap: 10, alignItems: "flex-start", justifyContent: "center" }}>
            <div style={{ flex: 1, maxWidth: 180 }}>
              <div style={{ fontFamily: sans, fontSize: 11, textTransform: "uppercase", letterSpacing: 0.5, color: C.ambreClair, textAlign: "center", marginBottom: 6 }}>Ta carte</div>
              <CarteInsecte obs={maCarte} taille="compact" />
            </div>
            <div style={{ alignSelf: "center", fontFamily: serif, fontSize: 20, color: C.papierSombre }}>VS</div>
            <div style={{ flex: 1, maxWidth: 180 }}>
              <div style={{ fontFamily: sans, fontSize: 11, textTransform: "uppercase", letterSpacing: 0.5, color: C.papierSombre, textAlign: "center", marginBottom: 6 }}>Carte IA</div>
              <CarteInsecte obs={carteIA} taille="compact" />
            </div>
          </div>
          <Bouton variante="primaire" onClick={rejouer} style={{ width: "100%", marginTop: 18 }}>Manche suivante</Bouton>
        </div>
      )}
    </div>
  );
}

function BioDex() {
  const [vue, setVue] = useState("collection");
  const [observations, setObservations] = useState([]);
  const [selectionId, setSelectionId] = useState(null);
  const [chargement, setChargement] = useState(true);
  const [erreurGlobale, setErreurGlobale] = useState("");
  const [alerteStockage, setAlerteStockage] = useState("");
  const [majDispo, setMajDispo] = useState(false);
  const [installable, setInstallable] = useState(false);
  const [installRefusee, setInstallRefusee] = useState(() => { try { return localStorage.getItem("biodex_install_refusee") === "1"; } catch { return false; } });

  useEffect(() => {
    // Déjà installée (mode standalone) : rien à proposer
    const standalone = window.matchMedia && window.matchMedia("(display-mode: standalone)").matches;
    if (standalone) return;
    if (window.__biodexInstall) setInstallable(true);
    const surInstallable = () => setInstallable(true);
    const surInstalle = () => setInstallable(false);
    window.addEventListener("bd-installable", surInstallable);
    window.addEventListener("bd-installe", surInstalle);
    return () => {
      window.removeEventListener("bd-installable", surInstallable);
      window.removeEventListener("bd-installe", surInstalle);
    };
  }, []);

  async function lancerInstallation() {
    const ev = window.__biodexInstall;
    if (!ev) return;
    try {
      ev.prompt();
      const choix = await ev.userChoice;
      if (choix && choix.outcome === "accepted") setInstallable(false);
    } catch {}
  }

  function refuserInstallation() {
    setInstallRefusee(true);
    try { localStorage.setItem("biodex_install_refusee", "1"); } catch {}
  }
  const [utilisateur, setUtilisateur] = useState(null);

  useEffect(() => {
    if (!MUR_ACTIF) return;
    // Récupère la session au démarrage
    utilisateurActuel().then((u) => setUtilisateur(u)).catch(() => {});
    // Écoute les changements de connexion (retour du lien magique, déconnexion)
    const sb = clientSupabase();
    if (sb && sb.auth && sb.auth.onAuthStateChange) {
      const { data } = sb.auth.onAuthStateChange((_evt, session) => {
        setUtilisateur(session ? session.user : null);
      });
      return () => { try { data.subscription.unsubscribe(); } catch {} };
    }
  }, []);

  async function deconnexion() {
    await seDeconnecter();
    setUtilisateur(null);
  }

  const [murNouveau, setMurNouveau] = useState(false);

  // Vérifie périodiquement s'il y a du nouveau sur le mur (pour la pastille de la nav)
  useEffect(() => {
    if (!MUR_ACTIF) return;
    let actif = true;
    async function verifier() {
      const dernier = await dernierPostMur();
      if (!actif || !dernier) return;
      let vu = null;
      try { vu = localStorage.getItem("biodex_mur_vu"); } catch {}
      setMurNouveau(!vu || new Date(dernier) > new Date(vu));
    }
    verifier();
    const intervalle = setInterval(verifier, 60000); // toutes les minutes
    const surVisible = () => { if (!document.hidden) verifier(); };
    document.addEventListener("visibilitychange", surVisible);
    return () => { actif = false; clearInterval(intervalle); document.removeEventListener("visibilitychange", surVisible); };
  }, []);

  // Quand on ouvre le mur, on marque tout comme vu
  useEffect(() => {
    if (vue === "mur" && MUR_ACTIF) {
      dernierPostMur().then((d) => {
        if (d) { try { localStorage.setItem("biodex_mur_vu", d); } catch {} }
        setMurNouveau(false);
      });
    }
  }, [vue]);
  const [prenom, setPrenom] = useState(() => { try { return localStorage.getItem("biodex_prenom") || ""; } catch { return ""; } });

  function definirPrenom(p) {
    const v = (p || "").trim();
    setPrenom(v);
    try { localStorage.setItem("biodex_prenom", v); } catch {}
  }

  const [notifs, setNotifs] = useState({ total: 0 });
  const [centreOuvert, setCentreOuvert] = useState(false);

  // Calcule les notifications périodiquement (mur, réactions reçues, idées, nouveautés)
  useEffect(() => {
    if (!MUR_ACTIF) {
      // Sans backend, on peut quand même signaler les nouveautés d'appli
      let vu = null; try { vu = localStorage.getItem("biodex_nouveautes_vu"); } catch {}
      const nv = NOUVEAUTES.length && vu !== NOUVEAUTES[0].v ? 1 : 0;
      setNotifs({ total: nv, nouvelleVersion: nv, versionRecente: NOUVEAUTES[0] ? NOUVEAUTES[0].v : "" });
      return;
    }
    let actif = true;
    async function verifier() {
      const n = await calculerNotifications(prenom);
      if (actif) setNotifs(n);
    }
    verifier();
    const intervalle = setInterval(verifier, 60000);
    const surVisible = () => { if (!document.hidden) verifier(); };
    document.addEventListener("visibilitychange", surVisible);
    return () => { actif = false; clearInterval(intervalle); document.removeEventListener("visibilitychange", surVisible); };
  }, [prenom, vue]);

  // Quand on ouvre le mur : marquer les réactions reçues comme vues (pour ne pas les re-signaler)
  useEffect(() => {
    if (vue === "mur" && MUR_ACTIF && prenom) {
      (async () => {
        try {
          const posts = await chargerMur(200);
          const mesPosts = posts.filter((p) => (p.auteur || "").trim().toLowerCase() === prenom.trim().toLowerCase());
          const reacts = await chargerReactions();
          let total = 0;
          for (const p of mesPosts) { const r = reacts[p.id] || {}; total += Object.values(r).reduce((a, b) => a + (b || 0), 0); }
          localStorage.setItem("biodex_reactions_vues", String(total));
        } catch {}
      })();
    }
  }, [vue, prenom]);

  // Quand on ouvre les idées : marquer comme vues
  useEffect(() => {
    if (vue === "idees" && MUR_ACTIF) {
      chargerIdees().then((idees) => {
        if (idees && idees.length && idees[0].created_at) {
          try { localStorage.setItem("biodex_idees_vu", idees[0].created_at); } catch {}
        }
      }).catch(() => {});
    }
  }, [vue]);

  useEffect(() => {
    if (window.__biodexMaj && window.__biodexMaj.dispo) setMajDispo(true);
    const h = () => setMajDispo(true);
    window.addEventListener("biodex-maj-dispo", h);
    return () => window.removeEventListener("biodex-maj-dispo", h);
  }, []);
  const [tri, setTri] = useState(() => {
    try { return localStorage.getItem("biodex:tri") || "recent"; } catch { return "recent"; }
  });
  const [fBiotope, setFBiotope] = useState("");
  const [fMois, setFMois] = useState("");
  const [fTexte, setFTexte] = useState("");
  const [montrerFiltres, setMontrerFiltres] = useState(false);

  function changerTri(t) {
    setTri(t);
    try { localStorage.setItem("biodex:tri", t); } catch {}
  }

  async function verifierStockage() {
    try {
      if (navigator.storage && navigator.storage.estimate) {
        const { usage, quota } = await navigator.storage.estimate();
        if (quota && usage / quota > 0.85) {
          const restantMo = Math.max(0, Math.round((quota - usage) / (1024 * 1024)));
          setAlerteStockage(`Stockage presque plein (~${restantMo} Mo restants). Pense à exporter ta collection et à supprimer d'anciennes observations pour continuer à ajouter des photos.`);
        }
      }
    } catch {}
  }

  async function chargerObservations() {
    try {
      const toutes = await dbToutes();
      toutes.sort((a, b) => (a.date < b.date ? 1 : -1));
      setObservations(toutes);
      verifierStockage();
    } catch {
      setErreurGlobale("Impossible d'ouvrir la base de données locale. Vérifie que tu n'es pas en navigation privée.");
    }
    setChargement(false);
  }

  useEffect(() => { chargerObservations(); }, []);

  async function sauverObservation(obs) {
    try {
      await dbAjouter(obs);
      setObservations((prev) => [obs, ...prev]);
      setVue("collection");
      verifierStockage();
      return true;
    } catch {
      return false;
    }
  }

  // Ajout rapide dans la file "à trier" (GPS/météo figés au moment de la capture)
  async function ajouterATrier(obs) {
    try {
      await dbAjouter(obs);
      setObservations((prev) => [obs, ...prev]);
      return true;
    } catch {
      return false;
    }
  }

  // Une observation "à trier" complétée passe en collection (statut retiré)
  async function completerObservation(obs) {
    const complete = { ...obs, statut: undefined };
    try {
      await dbAjouter(complete);
      setObservations((prev) => prev.map((o) => (o.id === complete.id ? complete : o)));
      setSelectionId(null);
      setVue("collection");
      return true;
    } catch {
      return false;
    }
  }

  async function enregistrerEdition(obs) {
    // On préserve le statut d'origine (a_trier ou non) et les champs annexes non touchés par le formulaire
    const ancienne = observations.find((o) => o.id === obs.id);
    const maj = { ...ancienne, ...obs };
    try {
      await dbAjouter(maj);
      setObservations((prev) => prev.map((o) => (o.id === maj.id ? maj : o)));
      setVue("detail"); // retour à la fiche mise à jour
      return true;
    } catch {
      return false;
    }
  }

  async function supprimerObservation(id) {
    try { await dbSupprimer(id); } catch {}
    setObservations((prev) => prev.filter((o) => o.id !== id));
    setSelectionId(null);
    setVue("collection");
  }

  async function majFiche(id, fiche) {
    const obs = observations.find((o) => o.id === id);
    if (!obs) return;
    const maj = { ...obs, fiche };
    try { await dbAjouter(maj); } catch {}
    setObservations((prev) => prev.map((o) => (o.id === id ? maj : o)));
  }

  async function majCarte(id, carte) {
    const obs = observations.find((o) => o.id === id);
    if (!obs) return;
    const maj = { ...obs, carte };
    try { await dbAjouter(maj); } catch {}
    setObservations((prev) => prev.map((o) => (o.id === id ? maj : o)));
  }

  async function majCadre(id, cadreCarte) {
    const obs = observations.find((o) => o.id === id);
    if (!obs) return;
    const maj = { ...obs, cadreCarte };
    try { await dbAjouter(maj); } catch {}
    setObservations((prev) => prev.map((o) => (o.id === id ? maj : o)));
  }

  const aTrier = observations.filter((o) => o.statut === "a_trier");
  const triees = observations.filter((o) => o.statut !== "a_trier");
  const cartes = triees.filter((o) => o.carte);

  const selection = observations.find((o) => o.id === selectionId) || null;
  const nbBiotopes = new Set(triees.map((o) => o.biotope)).size;
  const filtres = { biotope: fBiotope, mois: fMois, texte: fTexte };
  const filtresActifs = !!(fBiotope || fMois || fTexte);
  const listeFiltree = filtrerObservations(triees, filtres);
  const moisDispo = Array.from(new Set(triees.map((o) => moisDe(o.date)))).sort((a, b) => (a < b ? 1 : -1));
  const biotopesDispo = BIOTOPES.filter((b) => triees.some((o) => o.biotope === b.id));
  function reinitFiltres() { setFBiotope(""); setFMois(""); setFTexte(""); }

  return (
    <div style={{ minHeight: "100vh", background: C.fond, paddingBottom: "calc(96px + env(safe-area-inset-bottom))" }}>
      <header style={{ padding: "14px 16px 11px", borderBottom: "1px solid transparent", borderImage: `linear-gradient(90deg, ${C.bordure}, rgba(201,162,75,.35), ${C.bordure}) 1`, display: "flex", alignItems: "center", justifyContent: "space-between", maxWidth: 560, margin: "0 auto" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
          <img src="emblem.png" width="32" height="32" alt="" aria-hidden="true" style={{ flexShrink: 0, display: "block", filter: "drop-shadow(0 0 6px rgba(201,162,75,.45))" }} />
          <div style={{ display: "flex", alignItems: "baseline", gap: 8 }}>
            <span style={{ fontFamily: serif, fontSize: 27, fontWeight: 600, color: C.papier, letterSpacing: 0.3 }}>Bio<span style={{ color: C.ambre }}>Dex</span></span>
            <span style={{ fontFamily: sans, fontSize: 10, letterSpacing: 1, textTransform: "uppercase", color: C.papierSombre }}>{VERSION}</span>
          </div>
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <button className="bd-press" onClick={() => setCentreOuvert(true)}
            style={{ position: "relative", width: 32, height: 32, borderRadius: "50%", border: `1px solid ${C.bordure}`, background: C.panneau, cursor: "pointer", fontSize: 15 }}
            aria-label="Notifications" title="Notifications">
            🔔
            {notifs.total > 0 && (
              <span style={{ position: "absolute", top: -4, right: -4, minWidth: 17, height: 17, lineHeight: "17px", padding: "0 4px", borderRadius: 9, background: C.rouge, color: "#fff", fontFamily: sans, fontSize: 10.5, fontWeight: 800, boxSizing: "border-box" }}>{notifs.total > 9 ? "9+" : notifs.total}</span>
            )}
          </button>
          <button className="bd-press" onClick={() => setVue("missions")}
            style={{ width: 32, height: 32, borderRadius: "50%", border: `1px solid ${C.bordure}`, background: C.panneau, cursor: "pointer", fontSize: 15 }}
            aria-label="Missions saisonnières" title="Missions saisonnières">
            🎯
          </button>
          {MUR_ACTIF && (
            <button className="bd-press" onClick={() => setVue("idees")}
              style={{ width: 32, height: 32, borderRadius: "50%", border: `1px solid ${C.bordure}`, background: C.panneau, cursor: "pointer", fontSize: 15 }}
              aria-label="Boîte à idées" title="Boîte à idées">
              💡
            </button>
          )}
          {MUR_ACTIF && (
            <button className="bd-press" onClick={() => setVue("connexion")}
              style={{ height: 32, padding: utilisateur ? "0 12px" : 0, width: utilisateur ? "auto" : 32, borderRadius: utilisateur ? 16 : "50%", border: `1px solid ${utilisateur ? "#A8863A" : C.bordure}`, background: utilisateur ? "linear-gradient(#2C3623, #232B1D)" : C.panneau, color: utilisateur ? C.ambreClair : C.lichen, fontFamily: sans, fontSize: 14, fontWeight: 600, cursor: "pointer", display: "flex", alignItems: "center", gap: 5 }}
              aria-label="Connexion" title={utilisateur ? "Connecté" : "Se connecter"}>
              {utilisateur ? "🐛" : "👤"}{utilisateur && <span style={{ fontSize: 12 }}>Moi</span>}
            </button>
          )}
          <button className="bd-press" onClick={() => setVue("aide")}
            style={{ width: 32, height: 32, borderRadius: "50%", border: `1px solid ${C.bordure}`, background: C.panneau, color: C.lichen, fontFamily: serif, fontSize: 17, cursor: "pointer" }}
            aria-label="Aide">
            ?
          </button>
        </div>
      </header>

      {majDispo && (
        <div style={{ maxWidth: 560, margin: "0 auto", padding: "10px 16px 0" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10, padding: "10px 14px", borderRadius: 10, background: "linear-gradient(#2C3623, #232B1D)", border: `1px solid #A8863A`, boxShadow: "0 2px 8px rgba(0,0,0,.3)" }}>
            <span style={{ fontFamily: sans, fontSize: 13.5, color: C.papier, flex: 1, lineHeight: 1.4 }}>
              🆕 Une nouvelle version de BioDex est disponible.
            </span>
            <Bouton variante="primaire" onClick={() => { if (window.appliquerMajBiodex) window.appliquerMajBiodex(); }}>
              Mettre à jour
            </Bouton>
          </div>
        </div>
      )}

      {installable && !installRefusee && !majDispo && (
        <div style={{ maxWidth: 560, margin: "0 auto", padding: "10px 16px 0" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10, padding: "10px 14px", borderRadius: 10, background: "linear-gradient(#212A1B, #1A2015)", border: `1px solid ${C.bordure}`, boxShadow: "0 2px 8px rgba(0,0,0,.3)" }}>
            <span style={{ fontSize: 20, flexShrink: 0 }}>📲</span>
            <span style={{ fontFamily: sans, fontSize: 13, color: C.papier, flex: 1, lineHeight: 1.4 }}>
              Installe BioDex sur ton écran d'accueil, comme une vraie appli !
            </span>
            <button onClick={refuserInstallation} aria-label="Plus tard"
              style={{ background: "none", border: "none", color: C.papierSombre, fontFamily: sans, fontSize: 12, cursor: "pointer", padding: "4px 6px", flexShrink: 0 }}>
              Plus tard
            </button>
            <Bouton variante="primaire" onClick={lancerInstallation}>Installer</Bouton>
          </div>
        </div>
      )}

      {(() => {
        const navVisible = (vue === "collection" || vue === "carte" || vue === "stats" || vue === "atrier" || vue === "cartes" || vue === "mur");
        if (!navVisible) return null;
        const items = [["collection", "🗃️", "Boîte"], ["atrier", "📥", "Trier"], ["cartes", "🎴", "Cartes"], ...(MUR_ACTIF ? [["mur", "🌐", "Mur"]] : []), ["carte", "🗺️", "Carte"], ["stats", "📊", "Stats"]];
        return (
          <React.Fragment>
            <nav className="bd-nav" aria-label="Navigation principale">
              <div className="bd-nav-inner">
                {items.map(([id, ico, label]) => (
                  <button key={id} className={`bd-nav-item${vue === id ? " actif" : ""}`} onClick={() => setVue(id)} aria-label={label}>
                    <span className="bd-nav-ico">{ico}</span>
                    <span className="bd-nav-lbl">{label}</span>
                    {id === "atrier" && aTrier.length > 0 && (
                      <span className="bd-nav-badge" style={{ background: C.rouge, color: "#fff" }}>{aTrier.length}</span>
                    )}
                    {id === "cartes" && cartes.length > 0 && (
                      <span className="bd-nav-badge" style={{ background: C.ambre, color: C.encre }}>{cartes.length}</span>
                    )}
                    {id === "mur" && murNouveau && (
                      <span className="bd-nav-badge" style={{ background: C.rouge, minWidth: 10, width: 10, height: 10, padding: 0, right: "calc(50% - 18px)", top: 4 }} />
                    )}
                  </button>
                ))}
              </div>
            </nav>
            {vue === "collection" && (
              <button className="bd-fab" onClick={() => setVue("nouvelle")} aria-label="Nouvelle observation" title="Nouvelle observation">＋</button>
            )}
          </React.Fragment>
        );
      })()}

      {vue === "mur" && <MurCommun prenom={prenom} onDefinirPrenom={definirPrenom} />}
      {vue === "idees" && <BoiteIdees prenom={prenom} onDefinirPrenom={definirPrenom} onFermer={() => setVue("collection")} />}
      {vue === "missions" && <Missions observations={observations} prenom={prenom} onDefinirPrenom={definirPrenom} onFermer={() => setVue("collection")} />}
      {centreOuvert && (
        <CentreNotifs
          notifs={notifs}
          onFermer={() => setCentreOuvert(false)}
          onAllerMur={() => { setCentreOuvert(false); if (MUR_ACTIF) setVue("mur"); }}
          onAllerIdees={() => { setCentreOuvert(false); if (MUR_ACTIF) setVue("idees"); }}
        />
      )}
      {vue === "cartes" && (
        <ModeCartes cartes={cartes} onOuvrir={(id) => { setSelectionId(id); setVue("detail"); }} />
      )}
      {vue === "stats" && <Stats observations={triees} onFermer={() => setVue("collection")} />}
      {vue === "atrier" && (
        <CaptureRapide aTrier={aTrier} onAjout={ajouterATrier}
          onOuvrir={(id) => { setSelectionId(id); setVue("completer"); }}
          onFermer={() => setVue("collection")} />
      )}
      {vue === "completer" && selection && (
        <NouvelleObservation base={selection} onSauver={completerObservation} onAnnuler={() => { setSelectionId(null); setVue("atrier"); }} />
      )}

      {vue === "aide" && <Aide onFermer={() => setVue("collection")} onImportTermine={chargerObservations} />}
      {vue === "connexion" && <Connexion onFermer={() => setVue("collection")} utilisateur={utilisateur} onDeconnexion={deconnexion} />}
      {vue === "nouvelle" && <NouvelleObservation onSauver={sauverObservation} onAnnuler={() => setVue("collection")} />}
      {vue === "edition" && selection && (
        <NouvelleObservation
          key={"edit-" + selection.id}
          base={selection}
          mode="edition"
          onSauver={enregistrerEdition}
          onAnnuler={() => setVue("detail")} />
      )}
      {vue === "carte" && (
        <Carte observations={triees} onOuvrirFiche={(id) => { setSelectionId(id); setVue("detail"); }} />
      )}
      {vue === "detail" && selection && (
        <Detail obs={selection}
          onFermer={() => { setSelectionId(null); setVue("collection"); }}
          onMajFiche={majFiche}
          onMajCarte={majCarte}
          onMajCadre={majCadre}
          prenom={prenom}
          onDefinirPrenom={definirPrenom}
          utilisateur={utilisateur}
          onAllerConnexion={() => setVue("connexion")}
          onModifier={(id) => { setSelectionId(id); setVue("edition"); }}
          onSupprimer={supprimerObservation} />
      )}

      {vue === "collection" && (
        <div style={{ padding: 16, maxWidth: 560, margin: "0 auto" }}>
          <div style={{ display: "flex", alignItems: "baseline", gap: 8, marginBottom: 10 }}>
            <span style={{ fontFamily: serif, color: C.ambre, fontWeight: 700, fontSize: 26 }}>{triees.length}</span>
            <span style={{ fontFamily: sans, fontSize: 13.5, color: C.papierSombre }}>
              spécimen{triees.length > 1 ? "s" : ""} épinglé{triees.length > 1 ? "s" : ""}
              {nbBiotopes > 0 && <span> · {nbBiotopes} biotope{nbBiotopes > 1 ? "s" : ""}</span>}
            </span>
          </div>

          {triees.length > 1 && (
            <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 12 }}>
              <span style={{ fontFamily: sans, fontSize: 12, color: C.lichen, fontWeight: 700, letterSpacing: 0.8, textTransform: "uppercase" }}>Tri</span>
              <select value={tri} onChange={(e) => changerTri(e.target.value)}
                style={{ flex: 1, maxWidth: 260, background: C.panneau, color: C.papier, border: `1px solid ${C.bordure}`, borderRadius: 8, padding: "8px 10px", fontFamily: sans, fontSize: 14, outline: "none" }}>
                {TRIS.map((t) => <option key={t.id} value={t.id}>{t.label}</option>)}
              </select>
            </div>
          )}

          {triees.length > 1 && (
            <div style={{ marginBottom: 16 }}>
              <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                <input value={fTexte} onChange={(e) => setFTexte(e.target.value)} placeholder="🔍 Rechercher un nom…"
                  style={{ flex: 1, boxSizing: "border-box", background: C.panneau, color: C.papier, border: `1px solid ${C.bordure}`, borderRadius: 9, padding: "10px 12px", fontFamily: sans, fontSize: 15, outline: "none" }} />
                <button className="bd-press" onClick={() => setMontrerFiltres((v) => !v)}
                  style={{ fontFamily: sans, fontSize: 14, fontWeight: 600, padding: "10px 12px", borderRadius: 9, cursor: "pointer", border: `1px solid ${filtresActifs || montrerFiltres ? "#A8863A" : C.bordure}`, background: filtresActifs || montrerFiltres ? "linear-gradient(#2C3623, #232B1D)" : C.panneau, color: filtresActifs ? C.ambreClair : C.papierSombre }}>
                  ⚙︎ Filtres{filtresActifs ? " •" : ""}
                </button>
              </div>

              {montrerFiltres && (
                <div style={{ marginTop: 10, padding: 12, background: C.panneau, border: `1px solid ${C.bordure}`, borderRadius: 10, display: "flex", flexDirection: "column", gap: 10 }}>
                  <div>
                    <div style={{ fontFamily: sans, fontSize: 11, fontWeight: 700, letterSpacing: 0.6, textTransform: "uppercase", color: C.lichen, marginBottom: 6 }}>Biotope</div>
                    <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                      {biotopesDispo.map((b) => (
                        <button key={b.id} onClick={() => setFBiotope(fBiotope === b.id ? "" : b.id)}
                          style={{ fontFamily: sans, fontSize: 12.5, padding: "6px 10px", borderRadius: 16, cursor: "pointer", border: `1px solid ${fBiotope === b.id ? C.ambre : C.bordure}`, background: fBiotope === b.id ? C.ambre : "transparent", color: fBiotope === b.id ? C.encre : C.papier, fontWeight: fBiotope === b.id ? 700 : 400 }}>
                          {b.emoji} {b.label}
                        </button>
                      ))}
                    </div>
                  </div>
                  {moisDispo.length > 1 && (
                    <div>
                      <div style={{ fontFamily: sans, fontSize: 11, fontWeight: 700, letterSpacing: 0.6, textTransform: "uppercase", color: C.lichen, marginBottom: 6 }}>Période</div>
                      <select value={fMois} onChange={(e) => setFMois(e.target.value)}
                        style={{ width: "100%", boxSizing: "border-box", background: C.fond, color: C.papier, border: `1px solid ${C.bordure}`, borderRadius: 8, padding: "9px 10px", fontFamily: sans, fontSize: 14, outline: "none" }}>
                        <option value="">Tous les mois</option>
                        {moisDispo.map((m) => <option key={m} value={m}>{moisLisible(m)}</option>)}
                      </select>
                    </div>
                  )}
                  {filtresActifs && (
                    <Bouton onClick={reinitFiltres} style={{ alignSelf: "flex-start" }}>Réinitialiser les filtres</Bouton>
                  )}
                </div>
              )}

              {filtresActifs && (
                <div style={{ fontFamily: sans, fontSize: 13, color: C.papierSombre, marginTop: 10 }}>
                  {listeFiltree.length} résultat{listeFiltree.length > 1 ? "s" : ""} sur {triees.length}
                </div>
              )}
            </div>
          )}

          {erreurGlobale && (
            <div style={{ marginBottom: 14, padding: "10px 12px", borderRadius: 8, background: "#3A241C", color: "#E8A88F", fontFamily: sans, fontSize: 14 }}>
              {erreurGlobale}
            </div>
          )}

          {alerteStockage && (
            <div style={{ marginBottom: 14, padding: "10px 12px", borderRadius: 8, background: "#3A2E1A", border: `1px solid #A8863A`, color: C.papier, fontFamily: sans, fontSize: 13, lineHeight: 1.5, display: "flex", gap: 10, alignItems: "flex-start" }}>
              <span style={{ flex: 1 }}>⚠️ {alerteStockage}</span>
              <button onClick={() => setAlerteStockage("")} style={{ background: "none", border: "none", color: C.papierSombre, fontSize: 16, cursor: "pointer", lineHeight: 1 }}>✕</button>
            </div>
          )}

          {chargement && (
            <div style={{ textAlign: "center", padding: 40, fontFamily: sans, color: C.papierSombre }}>Ouverture du tiroir…</div>
          )}

          {!chargement && triees.length === 0 && aTrier.length === 0 && !erreurGlobale && (
            <div style={{ textAlign: "center", padding: "56px 24px", border: `1px solid ${C.bordure}`, borderRadius: 14, background: "linear-gradient(#191F15, #14180F)", boxShadow: "0 2px 10px rgba(0,0,0,.25) inset" }}>
              <div style={{ fontSize: 40, marginBottom: 12, opacity: 0.9 }}>🦋</div>
              <div style={{ fontFamily: serif, fontSize: 19, fontWeight: 600, color: C.papier, marginBottom: 6 }}>Le tiroir est vide</div>
              <div style={{ fontFamily: sans, fontSize: 14, color: C.papierSombre, lineHeight: 1.5 }}>Appuie sur le bouton doré <b style={{ color: C.ambre }}>＋</b> en bas à droite pour épingler ta première observation.</div>
            </div>
          )}

          {!chargement && triees.length > 0 && listeFiltree.length === 0 && (
            <div style={{ textAlign: "center", padding: "40px 24px", border: `1px solid ${C.bordure}`, borderRadius: 14, background: "linear-gradient(#191F15, #14180F)" }}>
              <div style={{ fontFamily: serif, fontSize: 18, fontWeight: 600, color: C.papier, marginBottom: 6 }}>Aucun spécimen</div>
              <div style={{ fontFamily: sans, fontSize: 14, color: C.papierSombre }}>Aucune observation ne correspond à ces filtres.</div>
            </div>
          )}

          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(150px, 1fr))", gap: 14 }}>
            {trierObservations(listeFiltree, tri).map((o, i) => (
              <div key={o.id} className="bd-card bd-fade" onClick={() => { setSelectionId(o.id); setVue("detail"); }}
                style={{ background: "linear-gradient(#212A1B, #1A2015)", border: `1px solid ${C.bordure}`, borderRadius: 11, overflow: "hidden", cursor: "pointer", position: "relative", paddingTop: 16, boxShadow: "0 3px 10px rgba(0,0,0,.3), 0 1px 0 rgba(255,255,255,.03) inset", animationDelay: `${Math.min(i * 40, 400)}ms` }}>
                <div className="bd-pin-shaft" />
                <div className="bd-pin-head" />
                <div style={{ margin: "0 6px", borderRadius: 7, overflow: "hidden", boxShadow: "0 1px 4px rgba(0,0,0,.4)" }}>
                  <PhotoBlob blob={o.photo} alt={o.nom} style={{ width: "100%", aspectRatio: "1", objectFit: "cover", display: "block" }} />
                </div>
                <div style={{ margin: "8px 6px 6px", borderRadius: 6, overflow: "hidden" }}>
                  <Etiquette obs={o} />
                </div>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

// ---------- Installation PWA (bouton "Installer l'appli") ----------
// Chrome Android propose l'installation via un événement qu'on capture ici,
// pour pouvoir la déclencher nous-mêmes avec un bouton dans l'appli.
window.__biodexInstall = null;
window.addEventListener("beforeinstallprompt", (e) => {
  e.preventDefault();
  window.__biodexInstall = e;
  window.dispatchEvent(new Event("bd-installable"));
});
window.addEventListener("appinstalled", () => {
  window.__biodexInstall = null;
  window.dispatchEvent(new Event("bd-installe"));
});

// On récupère d'abord la config (Supabase), puis on monte l'appli.
// Ainsi MUR_ACTIF est correct dès le premier rendu.
(async function demarrer() {
  await chargerConfig();
  ReactDOM.createRoot(document.getElementById("root")).render(<BioDex />);
})();

// Service worker (mode hors-ligne + installation + détection de mise à jour)
window.__biodexMaj = { dispo: false, registration: null };

function signalerMaj(reg) {
  window.__biodexMaj = { dispo: true, registration: reg };
  window.dispatchEvent(new CustomEvent("biodex-maj-dispo"));
}

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js").then((reg) => {
      // Si une version est déjà en attente au chargement
      if (reg.waiting && navigator.serviceWorker.controller) signalerMaj(reg);
      // Détection d'une nouvelle version qui s'installe
      reg.addEventListener("updatefound", () => {
        const nouveau = reg.installing;
        if (!nouveau) return;
        nouveau.addEventListener("statechange", () => {
          // installé + un SW contrôle déjà la page => c'est une MISE À JOUR (pas 1ère install)
          if (nouveau.state === "installed" && navigator.serviceWorker.controller) {
            signalerMaj(reg);
          }
        });
      });
      // Vérifie périodiquement s'il y a une nouvelle version déployée
      setInterval(() => reg.update().catch(() => {}), 60 * 60 * 1000);
    }).catch(() => {});

    // Quand le nouveau SW prend le contrôle, on recharge une seule fois
    let recharge = false;
    navigator.serviceWorker.addEventListener("controllerchange", () => {
      if (recharge) return;
      recharge = true;
      window.location.reload();
    });
  });
}

// Appelée par le bouton "Mettre à jour" de la bannière
function appliquerMajBiodex() {
  const reg = window.__biodexMaj.registration;
  if (reg && reg.waiting) reg.waiting.postMessage("ACTIVER_MAJ");
}
window.appliquerMajBiodex = appliquerMajBiodex;
</script>
