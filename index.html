// ---------- Vue : missions saisonnières ----------
function Missions({ observations, prenom, onDefinirPrenom, onFermer }) {
  const saison = saisonActuelle();
  const missions = missionsDe(saison.cle);
  const [validations, setValidations] = useState([]); // [{mission_id, auteur, auto}]
  const [etat, setEtat] = useState("chargement");
  const [saisiePrenom, setSaisiePrenom] = useState(prenom || "");
  const [enCours, setEnCours] = useState(null);

  async function rafraichir() {
    if (!MUR_ACTIF) { setEtat("inactif"); return; }
    setEtat("chargement");
    try { setValidations(await chargerValidations(saison.cle)); setEtat("ok"); }
    catch { setEtat("echec"); }
  }
  useEffect(() => { rafraichir(); }, []);

  // Validation auto : dès que la collection remplit une mission non encore validée par moi, on l'enregistre.
  useEffect(() => {
    if (etat !== "ok" || !MUR_ACTIF) return;
    const moi = (prenom || "").trim();
    if (!moi) return;
    missions.forEach(async (m) => {
      const dejaValidee = validations.some((v) => v.mission_id === m.id && (v.auteur || "").toLowerCase() === moi.toLowerCase());
      if (!dejaValidee && missionRemplie(m, observations, saison)) {
        try {
          await validerMission(saison.cle, m.id, moi, true);
          setValidations((prev) => [...prev, { mission_id: m.id, auteur: moi, auto: true }]);
        } catch {}
      }
    });
  }, [etat, observations, prenom]);

  function quiAValide(missionId) {
    return validations.filter((v) => v.mission_id === missionId).map((v) => v.auteur);
  }
  function jaiValide(missionId) {
    const moi = (prenom || "").trim().toLowerCase();
    return validations.some((v) => v.mission_id === missionId && (v.auteur || "").toLowerCase() === moi);
  }

  async function basculerManuel(m) {
    const moi = (saisiePrenom || prenom || "").trim();
    if (!moi) { alert("Indique ton prénom en haut pour valider une mission."); return; }
    onDefinirPrenom(moi);
    setEnCours(m.id);
    try {
      if (jaiValide(m.id)) {
        await devaliderMission(saison.cle, m.id, moi);
        setValidations((prev) => prev.filter((v) => !(v.mission_id === m.id && (v.auteur || "").toLowerCase() === moi.toLowerCase())));
      } else {
        await validerMission(saison.cle, m.id, moi, false);
        setValidations((prev) => [...prev, { mission_id: m.id, auteur: moi, auto: false }]);
      }
    } catch {}
    setEnCours(null);
  }

  const mesValidees = missions.filter((m) => jaiValide(m.id)).length;

  return (
    <div style={{ padding: 16, maxWidth: 560, margin: "0 auto" }}>
      <Bouton onClick={onFermer} style={{ marginBottom: 14 }}>← Retour</Bouton>

      <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 6 }}>
        <span style={{ fontSize: 32 }}>{saison.emoji}</span>
        <div>
          <div style={{ fontFamily: serif, fontSize: 22, fontWeight: 600, color: C.papier, lineHeight: 1.1 }}>Missions · {saison.label}</div>
          <div style={{ fontFamily: sans, fontSize: 13, color: C.papierSombre }}>{mesValidees}/{missions.length} validée{mesValidees > 1 ? "s" : ""} par toi</div>
        </div>
      </div>
      <div style={{ fontFamily: sans, fontSize: 13, color: C.papierSombre, marginBottom: 16, lineHeight: 1.5 }}>
        Des défis d'observation qui changent à chaque saison, communs à toute la bande. Ils se valident tout seuls quand ta collection remplit les conditions — ou coche à la main en secours.
      </div>

      {MUR_ACTIF && (
        <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 16, padding: "10px 12px", background: C.panneau, border: `1px solid ${C.bordure}`, borderRadius: 10 }}>
          <span style={{ fontFamily: sans, fontSize: 13, color: C.papierSombre, whiteSpace: "nowrap" }}>Ton prénom :</span>
          <input value={saisiePrenom} onChange={(e) => setSaisiePrenom(e.target.value)} onBlur={() => onDefinirPrenom((saisiePrenom || "").trim())} placeholder="ex : Sylvain" maxLength={40}
            style={{ flex: 1, boxSizing: "border-box", background: C.fond, color: C.papier, border: `1px solid ${C.bordure}`, borderRadius: 8, padding: "7px 10px", fontFamily: sans, fontSize: 14, outline: "none" }} />
        </div>
      )}

      {!MUR_ACTIF && (
        <div style={{ padding: "14px", background: C.panneau, border: `1px solid ${C.bordure}`, borderRadius: 10, fontFamily: sans, fontSize: 14, color: C.papierSombre, marginBottom: 16 }}>
          Le partage des missions avec la bande n'est pas actif (service non configuré). Tes missions restent visibles mais la progression de la bande n'apparaît pas.
        </div>
      )}

      {etat === "chargement" && <div style={{ fontFamily: sans, fontSize: 14, color: C.papierSombre, fontStyle: "italic", textAlign: "center", padding: 16 }}>Chargement…</div>}
      {etat === "echec" && <div style={{ fontFamily: sans, fontSize: 14, color: "#E8A88F", textAlign: "center", padding: 16 }}>Impossible de charger les validations.</div>}

      {(etat === "ok" || etat === "inactif") && missions.map((m) => {
        const remplie = missionRemplie(m, observations, saison);
        const validee = jaiValide(m.id);
        const progres = missionProgres(m, observations, saison);
        const autres = quiAValide(m.id).filter((a) => (a || "").toLowerCase() !== (prenom || "").trim().toLowerCase());
        return (
          <div key={m.id} style={{ marginBottom: 12, padding: "14px", background: validee ? "linear-gradient(#1E2A18, #182213)" : C.panneau, border: `1px solid ${validee ? "#6F9450" : C.bordure}`, borderRadius: 12 }}>
            <div style={{ display: "flex", alignItems: "flex-start", gap: 12 }}>
              <span style={{ fontSize: 28, lineHeight: 1, opacity: validee ? 1 : 0.85 }}>{m.emoji}</span>
              <div style={{ flex: 1 }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: 8 }}>
                  <span style={{ fontFamily: sans, fontSize: 15, fontWeight: 700, color: C.papier }}>{m.titre}</span>
                  {validee && <span style={{ fontFamily: sans, fontSize: 12, fontWeight: 800, color: "#A6CC82" }}>✓ Validée</span>}
                </div>
                <div style={{ fontFamily: sans, fontSize: 13, color: C.papierSombre, lineHeight: 1.45, marginTop: 2 }}>{m.desc}</div>

                {progres && !validee && (
                  <div style={{ marginTop: 8 }}>
                    <div style={{ height: 6, borderRadius: 3, background: "#0F130C", overflow: "hidden" }}>
                      <div style={{ height: "100%", width: `${(progres.actuel / progres.cible) * 100}%`, background: `linear-gradient(90deg, ${C.ambre}, ${C.ambreClair})` }} />
                    </div>
                    <div style={{ fontFamily: sans, fontSize: 11, color: C.papierSombre, marginTop: 3 }}>{progres.actuel}/{progres.cible}</div>
                  </div>
                )}

                {/* Qui d'autre a validé */}
                {MUR_ACTIF && autres.length > 0 && (
                  <div style={{ display: "flex", flexWrap: "wrap", gap: 5, marginTop: 8 }}>
                    {autres.slice(0, 8).map((a, i) => (
                      <span key={i} style={{ fontFamily: sans, fontSize: 11, fontWeight: 600, color: C.ambreClair, background: "rgba(168,134,58,.15)", border: "1px solid rgba(168,134,58,.4)", borderRadius: 12, padding: "2px 8px" }}>🐛 {a}</span>
                    ))}
                    {autres.length > 8 && <span style={{ fontFamily: sans, fontSize: 11, color: C.papierSombre, padding: "2px 4px" }}>+{autres.length - 8}</span>}
                  </div>
                )}

                {/* Validation manuelle (secours) */}
                {MUR_ACTIF && (
                  <button onClick={() => basculerManuel(m)} disabled={enCours === m.id || (remplie && !validee)}
                    style={{ marginTop: 10, fontFamily: sans, fontSize: 12, fontWeight: 600, padding: "5px 11px", borderRadius: 7, cursor: (remplie && !validee) ? "default" : "pointer",
                      border: `1px solid ${validee ? C.bordure : "#A8863A"}`, background: validee ? "transparent" : "linear-gradient(#2C3623, #232B1D)", color: validee ? C.papierSombre : C.ambreClair }}>
                    {enCours === m.id ? "…" : validee ? "Retirer ma validation" : (remplie ? "✓ Remplie (validation auto)" : "Valider à la main")}
                  </button>
                )}
              </div>
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ---------- Vue : carte ----------
function Carte({ observations, onOuvrirFiche }) {
  const divRef = useRef(null);
  const [mode, setMode] = useState("moi"); // "moi" | "bande"
  const [postsBande, setPostsBande] = useState([]);
  const [etatBande, setEtatBande] = useState("idle"); // idle | chargement | ok | echec

  const avecGps = observations.filter((o) => o.gps);
  const sansGps = observations.length - avecGps.length;
  const postsAvecPos = postsBande.filter((p) => typeof p.lat === "number" && typeof p.lon === "number");

  // Charge les posts de la bande la première fois qu'on passe en mode "bande"
  useEffect(() => {
    if (mode === "bande" && etatBande === "idle" && MUR_ACTIF) {
      setEtatBande("chargement");
      chargerMur(200)
        .then((p) => { setPostsBande(p); setEtatBande("ok"); })
        .catch(() => setEtatBande("echec"));
    }
  }, [mode]);

  useEffect(() => {
    if (!divRef.current || typeof L === "undefined") return;
    const carte = L.map(divRef.current, { zoomControl: true });
    L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png", { maxZoom: 19, attribution: "© OpenStreetMap" }).addTo(carte);

    const urls = [];
    const points = [];

    if (mode === "moi") {
      // Mes observations (position précise, photo locale)
      avecGps.forEach((o) => {
        const pt = [o.gps.lat, o.gps.lon];
        points.push(pt);
        const m = L.circleMarker(pt, { radius: 9, color: "#2A2519", weight: 2, fillColor: "#C9A24B", fillOpacity: 0.95 }).addTo(carte);
        const conteneur = document.createElement("div");
        conteneur.style.width = "150px";
        let urlPhoto = null;
        if (o.photo) { urlPhoto = URL.createObjectURL(o.photo); urls.push(urlPhoto); }
        conteneur.innerHTML =
          (urlPhoto ? '<img src="' + urlPhoto + '" style="width:100%;border-radius:6px;display:block;margin-bottom:6px;" />' : "") +
          '<div style="font-weight:700;font-size:13px;color:#2A2519;">' + (o.nom ? o.nom.replace(/</g, "&lt;") : "Spécimen non identifié") + "</div>" +
          '<div style="font-size:11px;color:#8A8065;margin-bottom:6px;">' +
          biotopeOf(o.biotope).emoji + " " + biotopeOf(o.biotope).label + " · " + new Date(o.date).toLocaleDateString("fr-FR") + "</div>";
        const btn = document.createElement("button");
        btn.textContent = "Voir la fiche";
        btn.style.cssText = "width:100%;padding:6px;border-radius:6px;border:none;background:#C9A24B;color:#2A2416;font-weight:700;font-size:13px;cursor:pointer;";
        btn.addEventListener("click", () => onOuvrirFiche(o.id));
        conteneur.appendChild(btn);
        m.bindPopup(conteneur);
      });
    } else {
      // Carte de la bande (positions approximatives ~1 km, photo distante)
      postsAvecPos.forEach((p) => {
        const pt = [p.lat, p.lon];
        points.push(pt);
        // Cercle de zone (pour montrer que la position est approximative)
        L.circle(pt, { radius: 900, color: "#8AAE6B", weight: 1, fillColor: "#8AAE6B", fillOpacity: 0.08 }).addTo(carte);
        const m = L.circleMarker(pt, { radius: 8, color: "#2A2519", weight: 2, fillColor: "#8AAE6B", fillOpacity: 0.95 }).addTo(carte);
        const conteneur = document.createElement("div");
        conteneur.style.width = "150px";
        conteneur.innerHTML =
          (p.photo_url ? '<img src="' + p.photo_url + '" style="width:100%;border-radius:6px;display:block;margin-bottom:6px;" />' : "") +
          '<div style="font-weight:700;font-size:13px;color:#2A2519;">' + (p.espece ? String(p.espece).replace(/</g, "&lt;") : "Spécimen non identifié") + "</div>" +
          '<div style="font-size:11px;color:#8A8065;">' +
          "🐛 " + (p.auteur ? String(p.auteur).replace(/</g, "&lt;") : "Anonyme") + (p.lieu ? " · " + String(p.lieu).replace(/</g, "&lt;") : "") + "</div>" +
          '<div style="font-size:10px;color:#A89A78;margin-top:4px;">Zone approximative</div>';
        m.bindPopup(conteneur);
      });
    }

    if (points.length > 0) {
      carte.fitBounds(L.latLngBounds(points), { padding: [40, 40], maxZoom: mode === "bande" ? 12 : 15 });
    } else {
      carte.setView([46.6, 2.4], 5);
    }

    return () => {
      carte.remove();
      urls.forEach((u) => URL.revokeObjectURL(u));
    };
  }, [observations, mode, postsBande]);

  return (
    <div style={{ padding: 16, maxWidth: 560, margin: "0 auto" }}>
      {/* Bascule Ma carte / Carte de la bande */}
      {MUR_ACTIF && (
        <div style={{ display: "flex", gap: 6, marginBottom: 12, background: C.panneau, padding: 4, borderRadius: 10, border: `1px solid ${C.bordure}` }}>
          <button onClick={() => setMode("moi")} style={{ flex: 1, padding: "8px 10px", borderRadius: 7, border: "none", cursor: "pointer", fontFamily: sans, fontSize: 13.5, fontWeight: 700, background: mode === "moi" ? "linear-gradient(#C9A24B, #B8912F)" : "transparent", color: mode === "moi" ? C.encre : C.papierSombre }}>🗃️ Ma carte</button>
          <button onClick={() => setMode("bande")} style={{ flex: 1, padding: "8px 10px", borderRadius: 7, border: "none", cursor: "pointer", fontFamily: sans, fontSize: 13.5, fontWeight: 700, background: mode === "bande" ? "linear-gradient(#8AAE6B, #6F9450)" : "transparent", color: mode === "bande" ? C.encre : C.papierSombre }}>🌐 La bande</button>
        </div>
      )}

      {mode === "moi" ? (
        <div style={{ fontFamily: sans, fontSize: 13, color: C.papierSombre, marginBottom: 10 }}>
          <span style={{ color: C.ambre, fontWeight: 800 }}>{avecGps.length}</span> observation{avecGps.length > 1 ? "s" : ""} positionnée{avecGps.length > 1 ? "s" : ""}
          {sansGps > 0 && <span> · {sansGps} sans position</span>}
        </div>
      ) : (
        <div style={{ fontFamily: sans, fontSize: 13, color: C.papierSombre, marginBottom: 10 }}>
          {etatBande === "chargement" && "Chargement des trouvailles de la bande…"}
          {etatBande === "echec" && <span style={{ color: "#E8A88F" }}>Impossible de charger la carte de la bande.</span>}
          {etatBande === "ok" && <span><span style={{ color: "#8AAE6B", fontWeight: 800 }}>{postsAvecPos.length}</span> trouvaille{postsAvecPos.length > 1 ? "s" : ""} de la bande · positions approximatives (~1 km)</span>}
        </div>
      )}

      {mode === "moi" && avecGps.length === 0 && (
        <div style={{ fontFamily: sans, fontSize: 14, color: C.papierSombre, marginBottom: 10, padding: "10px 12px", background: C.panneau, borderRadius: 8, border: `1px solid ${C.bordure}` }}>
          Aucune observation avec position GPS pour l'instant — la carte se remplira au fil de tes sorties.
        </div>
      )}
      {mode === "bande" && etatBande === "ok" && postsAvecPos.length === 0 && (
        <div style={{ fontFamily: sans, fontSize: 14, color: C.papierSombre, marginBottom: 10, padding: "10px 12px", background: C.panneau, borderRadius: 8, border: `1px solid ${C.bordure}` }}>
          Aucune trouvaille localisée sur le mur pour l'instant. Les positions n'apparaissent que pour les partages faits à partir de la v0.45.
        </div>
      )}
      <div ref={divRef} style={{ width: "100%", height: "62vh", borderRadius: 10, border: `1px solid ${C.bordure}`, overflow: "hidden" }} />
    </div>
  );
}

// ---------- Vue : aide ----------
// ---------- Section pliable (accordéon du guide) ----------
function SectionPliable({ titre, ouvertParDefaut, children }) {
  const [ouvert, setOuvert] = useState(!!ouvertParDefaut);
  return (
    <div style={{ marginBottom: 10, border: `1px solid ${C.bordure}`, borderRadius: 10, overflow: "hidden", background: C.panneau }}>
      <button onClick={() => setOuvert((v) => !v)}
        style={{ width: "100%", display: "flex", justifyContent: "space-between", alignItems: "center", gap: 8, padding: "13px 15px", background: "none", border: "none", cursor: "pointer", textAlign: "left" }}>
        <span style={{ fontFamily: sans, fontSize: 15.5, fontWeight: 700, color: C.papier }}>{titre}</span>
        <span style={{ fontFamily: sans, fontSize: 13, color: C.ambre, transform: ouvert ? "rotate(90deg)" : "none", transition: "transform .15s" }}>▶</span>
      </button>
      {ouvert && <div style={{ padding: "0 15px 12px" }}>{children}</div>}
    </div>
  );
}

function Aide({ onFermer, onImportTermine }) {
  const p = { fontFamily: sans, fontSize: 14, color: C.papier, lineHeight: 1.6, marginBottom: 12 };
  const t = { fontFamily: sans, fontSize: 15, fontWeight: 800, color: C.ambre, margin: "18px 0 6px" };
  const [exportEtat, setExportEtat] = useState("");
  const [importEtat, setImportEtat] = useState("");

  async function exporter() {
    setExportEtat("Préparation de la sauvegarde…");
    try {
      const toutes = await dbToutes();
      const obsExport = [];
      for (const o of toutes) {
        let photo64 = null;
        if (o.photo) {
          photo64 = await new Promise((res, rej) => {
            const r = new FileReader();
            r.onload = () => res(r.result);
            r.onerror = rej;
            r.readAsDataURL(o.photo);
          });
        }
        obsExport.push({ ...o, photo: photo64 });
      }
      const json = JSON.stringify({ app: "biodex", version: VERSION, exporteLe: new Date().toISOString(), observations: obsExport });
      const blob = new Blob([json], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "biodex-sauvegarde-" + new Date().toISOString().slice(0, 10) + ".json";
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 10000);
      setExportEtat("✓ " + toutes.length + " observation(s) exportée(s)");
    } catch {
      setExportEtat("Échec de l'export — réessaie.");
    }
  }

  async function importer(e) {
    const f = e.target.files && e.target.files[0];
    if (!f) return;
    setImportEtat("Lecture du fichier…");
    try {
      const d = JSON.parse(await f.text());
      if (!d || d.app !== "biodex" || !Array.isArray(d.observations)) throw new Error("format");
      let n = 0;
      for (const o of d.observations) {
        if (!o.id || !o.date) continue;
        let blob = null;
        if (o.photo && typeof o.photo === "string" && o.photo.indexOf("data:") === 0) {
          const r = await fetch(o.photo);
          blob = await r.blob();
        }
        await dbAjouter({ ...o, photo: blob });
        n++;
      }
      setImportEtat("✓ " + n + " observation(s) importée(s)");
      onImportTermine();
    } catch {
      setImportEtat("Fichier invalide — est-ce bien une sauvegarde BioDex ?");
    }
  }
  return (
    <div style={{ padding: 16, maxWidth: 560, margin: "0 auto" }}>
      <Bouton onClick={onFermer} style={{ marginBottom: 14 }}>← Retour</Bouton>
      <h2 style={{ fontFamily: serif, color: C.papier, fontSize: 24, margin: "4px 0 10px" }}>BioDex — le guide</h2>
      <p style={p}>
        BioDex est ton carnet de terrain entomologique : chaque insecte croisé devient un spécimen épinglé dans ta boîte de collection virtuelle, avec sa photo, son biotope, sa position GPS et la météo du moment. Touche une catégorie ci-dessous pour la déplier.
      </p>

      <SectionPliable titre="🔎 Observer & identifier" ouvertParDefaut>
        <div style={t}>➕ Ajouter une observation</div>
        <p style={p}>
          Appuie sur « Nouvelle observation », utilise « Appareil photo » pour capturer le spécimen sans quitter l'appli, ou « Galerie » pour reprendre un cliché existant. Astuce : pour les macros de haute qualité (zoom, mise au point fine), photographie d'abord avec ton appli photo native puis récupère le cliché via « Galerie ». La position GPS est capturée automatiquement si tu l'autorises, et la météo (ciel + température) est récupérée toute seule à partir de ta position — tu peux la corriger à la main si besoin. Seule la photo est obligatoire.
        </p>
        <div style={t}>📷 La caméra (zoom & netteté)</div>
        <p style={p}>
          Dans la caméra intégrée : touche l'écran à l'endroit de l'insecte pour faire la mise au point, utilise le curseur 🔍 pour zoomer, et le bouton 🔦 pour la torche (pratique en macro ou sous les feuilles). Ces contrôles dépendent de ton téléphone : s'ils n'apparaissent pas, c'est que ton appareil ne les permet pas dans le navigateur — dans ce cas, photographie avec ton appli photo native puis passe par la galerie.
        </p>
        <div style={t}>📍 Position (même sans GPS)</div>
        <p style={p}>
          Si tu importes une photo depuis ta galerie (sans coordonnées) ou si le GPS n'a rien capté, tu peux placer le lieu à la main : dans le bloc position, touche « Placer sur la carte » et pointe l'endroit de l'observation. Pratique pour situer une trouvaille faite sans réseau ou importée après coup.
        </p>
        <div style={t}>📥 À trier (capture rapide)</div>
        <p style={p}>
          Sur le terrain, l'onglet « À trier » te laisse photographier à la chaîne sans rien remplir : la position GPS et la météo sont figées au moment de la prise. Plus tard, au calme, touche une photo en attente pour compléter l'identification et la classer dans ta collection. Si tu shootes hors réseau, la position est quand même figée et la météo est rattrapée (au bon endroit) au moment du tri.
        </p>
        <div style={t}>✨ Identification précise (Claude)</div>
        <p style={p}>
          Le bouton « Identifier (précis) » envoie la photo à Claude via un petit serveur : bien plus fiable que le test local, il propose un nom français et latin avec un niveau de confiance. Pour affiner, l'appli transmet aussi le contexte (biotope, saison, et une zone géographique large déduite du GPS — jamais ta position exacte), ce qui aide à privilégier la faune locale, partout dans le monde. Le niveau de certitude est affiché sous forme de jauge claire (Fiable / Probable / À vérifier), pour savoir d'un coup d'œil à quel point se fier à la proposition. Si tu observes une espèce inattendue pour la zone (invasive, échappée, en expansion...), un encart 🌟 « Observation notable » le signale — c'est souvent une belle trouvaille ! Combinable avec le ciblage de zone. Nécessite le réseau. Chaque identification coûte une fraction de centime.
        </p>
        <div style={t}>🌿 Pourquoi il compte</div>
        <p style={p}>
          Chaque fiche naturaliste met en avant le rôle écologique de l'insecte (pollinisation, recyclage, régulation, nourriture pour d'autres animaux…) dans un encart « Pourquoi il compte », et propose un geste simple pour l'aider (« Un geste pour l'aider »). Une façon de rappeler que même la plus petite bestiole a son utilité — et qu'on peut agir à son échelle.
        </p>
        <div style={t}>🔬 Identification (test local)</div>
        <p style={p}>
          Après avoir ajouté une photo, appuie sur « Identifier (test local) » : une IA tourne directement dans ton navigateur (aucune donnée envoyée, aucun coût). C'est un modèle généraliste qui ne reconnaît qu'une trentaine de grands groupes (coccinelle, abeille, libellule, mante, araignée…) et reste au niveau du groupe, jamais de l'espèce précise. Astuce : avec « 🎯 Cibler la zone », dessine un cadre sur l'insecte pour que l'IA ignore le décor — ça améliore nettement le résultat quand la bête est petite dans l'image. Vois-le comme un jeu : parfois bluffant, souvent approximatif. Premier lancement : téléchargement du modèle (~15 Mo), réseau requis.
        </p>
        <div style={t}>✍️ Noms & autocomplétion</div>
        <p style={p}>
          En saisissant le nom vernaculaire, l'appli propose des espèces correspondantes (base iNaturalist) : choisis-en une et le nom scientifique se remplit tout seul. Réseau requis ; sans lui, la saisie manuelle reste toujours possible. Les noms français ne couvrent pas 100% des espèces.
        </p>
      </SectionPliable>

      <SectionPliable titre="🗃️ Ma collection">
        <div style={t}>🗃️ Ta collection</div>
        <p style={p}>
          La grille présente tes spécimens comme dans une boîte entomologique, avec un menu de tri (récentes, anciennes, nom, biotope) dont le choix est mémorisé. Touche une carte pour la fiche complète — le lien 🗺️ de la position ouvre le point exact sur OpenStreetMap.
        </p>
        <div style={t}>✏️ Modifier une observation</div>
        <p style={p}>
          Depuis la fiche d'un spécimen, le bouton « ✏️ Modifier cette observation » permet de tout corriger après coup : le nom, le nom latin, le biotope, la météo, les notes, la position (via la carte) et même la photo (reprendre ou réimporter). Le bouton de suppression reste en bas de la fiche.
        </p>
        <div style={t}>🔍 Filtres & recherche</div>
        <p style={p}>
          Dans la collection, la barre de recherche retrouve un spécimen par son nom (français ou latin). Le bouton « Filtres » affine par biotope et par période. Le tri (récentes, anciennes, nom, biotope) reste dispo au-dessus.
        </p>
        <div style={t}>📊 Statistiques</div>
        <p style={p}>
          L'onglet Stats résume ta collection : nombre de spécimens, combien sont identifiés et localisés, la répartition par biotope et ton activité des derniers mois.
        </p>
        <div style={t}>🗺️ La carte</div>
        <p style={p}>
          L'onglet Carte affiche tes observations positionnées sur une carte OpenStreetMap. Touche un point ambré pour voir la miniature du spécimen et ouvrir sa fiche. En haut, bascule entre « 🗃️ Ma carte » (tes observations, position précise) et « 🌐 La bande » (les trouvailles partagées au mur par tout le monde). Sur la carte de la bande, les positions sont volontairement approximatives (~1 km, matérialisées par une zone verte) pour protéger la vie privée de chacun : on voit le secteur d'une trouvaille, jamais l'endroit exact. La carte nécessite du réseau.
        </p>
        <div style={t}>📝 Brouillon automatique</div>
        <p style={p}>
          Tes saisies en cours (nom, biotope, notes…) sont mémorisées : si l'appli se ferme avant que tu épingles, elle te propose de reprendre le brouillon à la réouverture. La photo, elle, n'est pas conservée dans le brouillon — à reprendre si besoin.
        </p>
      </SectionPliable>

      <SectionPliable titre="🌐 La communauté">
        <div style={t}>🔔 Centre de notifications</div>
        <p style={p}>
          La cloche 🔔 en haut regroupe tout ce qui s'est passé depuis ta dernière visite : nouvelles trouvailles sur le mur, réactions reçues sur tes photos, nouvelles idées de la bande, et un « Quoi de neuf » qui liste les dernières nouveautés de l'appli. Une pastille rouge indique le nombre d'éléments non vus.
        </p>
        <div style={t}>👤 Connexion (facultative)</div>
        <p style={p}>

// ---------- Écran de connexion (lien magique) ----------
function Connexion({ onFermer, utilisateur, onDeconnexion }) {
  const [email, setEmail] = useState("");
  const [etat, setEtat] = useState(""); // "" | envoi | envoye | echec
  const [erreur, setErreur] = useState("");
  const [profil, setProfil] = useState([]);
  const [profilCharge, setProfilCharge] = useState(false);

  useEffect(() => {
    if (utilisateur) {
      listerMonProfil().then((p) => { setProfil(p); setProfilCharge(true); }).catch(() => setProfilCharge(true));
    }
  }, [utilisateur]);

  async function retirer(id) {
    try {
      await retirerDuProfil(id);
      setProfil((prev) => prev.filter((e) => e.id !== id));
    } catch {}
  }

  async function envoyer() {
    const e = email.trim();
    if (!e || !e.includes("@")) { setErreur("Entre une adresse email valide."); return; }
    setEtat("envoi");
    setErreur("");
    try {
      await envoyerLienMagique(e);
      setEtat("envoye");
    } catch (err) {
      setErreur(String(err.message || "Envoi impossible") + ".");
      setEtat("echec");
    }
  }

  return (
    <div style={{ padding: 16, maxWidth: 480, margin: "0 auto" }}>
      <Bouton onClick={onFermer} style={{ marginBottom: 18 }}>← Retour</Bouton>

      {utilisateur ? (
        <div>
          <div style={{ padding: "18px", background: "linear-gradient(#212A1B, #1A2015)", border: `1px solid ${C.bordure}`, borderRadius: 12, textAlign: "center", marginBottom: 18 }}>
            <div style={{ fontSize: 30, marginBottom: 8 }}>🐛</div>
            <div style={{ fontFamily: serif, fontSize: 18, fontWeight: 600, color: C.papier, marginBottom: 4 }}>Connecté</div>
            <div style={{ fontFamily: sans, fontSize: 13, color: C.ambreClair, marginBottom: 16, wordBreak: "break-all" }}>{utilisateur.email}</div>
            <Bouton variante="danger" onClick={onDeconnexion} style={{ width: "100%" }}>Se déconnecter</Bouton>
          </div>

          <div style={{ fontFamily: sans, fontSize: 12, fontWeight: 700, letterSpacing: 0.6, textTransform: "uppercase", color: C.lichen, marginBottom: 10 }}>
            🏆 Mon profil de collectionneur {profilCharge ? `· ${profil.length} espèce${profil.length > 1 ? "s" : ""}` : ""}
          </div>
          {!profilCharge && <div style={{ fontFamily: sans, fontSize: 13, color: C.papierSombre, fontStyle: "italic" }}>Chargement…</div>}
          {profilCharge && profil.length === 0 && (
            <div style={{ fontFamily: sans, fontSize: 13, color: C.papierSombre, lineHeight: 1.5, padding: "10px 0" }}>
              Ton profil est vide. Depuis une observation identifiée, utilise « Ajouter cette espèce à mon profil ».

          )}
          {profil.map((e) => (
            <div key={e.id} style={{ display: "flex", alignItems: "center", gap: 10, padding: "10px 12px", background: C.panneau, border: `1px solid ${C.bordure}`, borderRadius: 8, marginBottom: 8 }}>
              <div style={{ flex: 1 }}>
                <div style={{ fontFamily: sans, fontSize: 14, fontWeight: 600, color: C.papier }}>{e.espece || "—"}</div>
                <div style={{ fontFamily: serif, fontStyle: "italic", fontSize: 12, color: C.ambre }}>{e.espece_sci || ""}{e.biotope ? ` · ${e.biotope}` : ""}</div>
              </div>
              <button onClick={() => retirer(e.id)} style={{ background: "none", border: "none", color: C.papierSombre, fontSize: 16, cursor: "pointer" }} title="Retirer">✕</button>
            </div>
          ))}
        </div>
      ) : etat === "envoye" ? (
        <div style={{ padding: "20px 18px", background: "linear-gradient(#212A1B, #1A2015)", border: `1px solid #A8863A`, borderRadius: 12, textAlign: "center" }}>
          <div style={{ fontSize: 34, marginBottom: 10 }}>📬</div>
          <div style={{ fontFamily: serif, fontSize: 19, fontWeight: 600, color: C.papier, marginBottom: 8 }}>Vérifie tes emails !</div>

        </div>
      ) : (
        <div>
          <h2 style={{ fontFamily: serif, fontSize: 24, fontWeight: 600, color: C.papier, marginBottom: 6 }}>Se connecter</h2>
          <p style={{ fontFamily: sans, fontSize: 14, color: C.papierSombre, lineHeight: 1.5, marginBottom: 18 }}>
            Entre ton email : tu recevras un lien de connexion à cliquer, sans mot de passe. La connexion débloque ton profil de collectionneur (comparer tes espèces avec la bande). Elle est facultative — tu peux continuer à utiliser l'appli sans compte.

          <input value={email} onChange={(e) => setEmail(e.target.value)} type="email" placeholder="ton@email.fr" autoComplete="email"

function BoiteIdees({ prenom, onDefinirPrenom, onFermer }) {
  const [idees, setIdees] = useState([]);
  const [etat, setEtat] = useState("chargement"); // chargement | ok | echec | inactif
  const [saisiePrenom, setSaisiePrenom] = useState(prenom || "");
  const [texte, setTexte] = useState("");
  const [envoiEtat, setEnvoiEtat] = useState(""); // "" | envoi | echec
  const [erreur, setErreur] = useState("");
  const [confirmSuppr, setConfirmSuppr] = useState(null);

  async function rafraichir() {
    if (!MUR_ACTIF) { setEtat("inactif"); return; }
    setEtat("chargement");
    try { setIdees(await chargerIdees()); setEtat("ok"); }
    catch { setEtat("echec"); }
  }

  useEffect(() => { rafraichir(); }, []);

  async function envoyer() {
    const auteur = (saisiePrenom || "").trim();
    const idee = texte.trim();
    if (!idee) { setErreur("Écris ton idée avant d'envoyer."); return; }
    if (!auteur) { setErreur("Indique ton prénom."); return; }
    onDefinirPrenom(auteur);
    setEnvoiEtat("envoi");
    setErreur("");
    try {
      await proposerIdee(auteur, idee);
      setTexte("");
      setEnvoiEtat("");
      rafraichir();
    } catch (e) {
      setErreur(String(e.message || "Envoi impossible") + ".");
      setEnvoiEtat("echec");
    }
  }

  async function supprimer(id) {
    try { await supprimerIdee(id); setIdees((prev) => prev.filter((x) => x.id !== id)); }
    catch { rafraichir(); }
    setConfirmSuppr(null);
  }

  if (!MUR_ACTIF) {
    return (
      <div style={{ padding: 16, maxWidth: 560, margin: "0 auto" }}>
        <div style={{ textAlign: "center", padding: "48px 24px", border: `1px solid ${C.bordure}`, borderRadius: 14, background: "linear-gradient(#191F15, #14180F)" }}>
          <div style={{ fontSize: 38, marginBottom: 12 }}>💡</div>
          <div style={{ fontFamily: serif, fontSize: 19, fontWeight: 600, color: C.papier, marginBottom: 6 }}>Boîte à idées non configurée</div>
          <div style={{ fontFamily: sans, fontSize: 14, color: C.papierSombre, lineHeight: 1.5 }}>La connexion au serveur n'est pas active.</div>
        </div>
      </div>
    );
  }

  return (
    <div style={{ padding: 16, maxWidth: 560, margin: "0 auto" }}>
      <Bouton onClick={onFermer} style={{ marginBottom: 14 }}>← Retour</Bouton>
      <div style={{ fontFamily: serif, fontSize: 20, fontWeight: 600, color: C.papier, marginBottom: 4 }}>💡 Boîte à idées</div>
      <div style={{ fontFamily: sans, fontSize: 13, color: C.papierSombre, marginBottom: 14, lineHeight: 1.5 }}>
        Une envie, une amélioration, un bug à signaler ? Partage-la avec la bande — les meilleures idées finiront peut-être dans l'appli !
      </div>

      {/* Formulaire */}
      <div style={{ padding: "12px 14px", background: C.panneau, border: `1px solid ${C.bordure}`, borderRadius: 10, marginBottom: 18 }}>
        <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 8 }}>
          <span style={{ fontFamily: sans, fontSize: 13, color: C.papierSombre, whiteSpace: "nowrap" }}>Ton prénom :</span>
          <input value={saisiePrenom} onChange={(e) => setSaisiePrenom(e.target.value)} placeholder="ex : Sylvain" maxLength={40}
            style={{ flex: 1, boxSizing: "border-box", background: C.fond, color: C.papier, border: `1px solid ${C.bordure}`, borderRadius: 8, padding: "8px 10px", fontFamily: sans, fontSize: 14, outline: "none" }} />
        </div>
        <textarea value={texte} onChange={(e) => setTexte(e.target.value)} placeholder="Ton idée…" maxLength={500} rows={3}
          style={{ width: "100%", boxSizing: "border-box", background: C.fond, color: C.papier, border: `1px solid ${C.bordure}`, borderRadius: 8, padding: "10px 12px", fontFamily: sans, fontSize: 14, outline: "none", resize: "vertical", marginBottom: 8 }} />
        <Bouton variante="primaire" onClick={envoyer} disabled={envoiEtat === "envoi"} style={{ width: "100%" }}>
          {envoiEtat === "envoi" ? "Envoi…" : "💡 Proposer mon idée"}
        </Bouton>
        {erreur && <div style={{ fontFamily: sans, fontSize: 13, color: "#E8A88F", marginTop: 8 }}>{erreur}</div>}
      </div>

      {/* Liste */}
      {etat === "chargement" && <div style={{ fontFamily: sans, fontSize: 14, color: C.papierSombre, fontStyle: "italic", textAlign: "center", padding: "16px 0" }}>Chargement…</div>}
      {etat === "echec" && <div style={{ fontFamily: sans, fontSize: 14, color: "#E8A88F", textAlign: "center", padding: "16px 0" }}>Impossible de charger les idées. Réessaie.</div>}
      {etat === "ok" && idees.length === 0 && (
        <div style={{ textAlign: "center", padding: "32px 24px", fontFamily: sans, fontSize: 14, color: C.papierSombre, lineHeight: 1.6 }}>
          Aucune idée pour l'instant.<br />Sois le premier à en proposer une !
        </div>
      )}
      {etat === "ok" && idees.map((it) => (
        <div key={it.id} style={{ marginBottom: 10, padding: "12px 14px", background: C.panneau, border: `1px solid ${C.bordure}`, borderRadius: 10 }}>
          <div style={{ fontFamily: sans, fontSize: 14, color: C.papier, lineHeight: 1.5, whiteSpace: "pre-wrap" }}>{it.idee}</div>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 8, fontFamily: sans, fontSize: 12, color: C.papierSombre }}>
            <span>💡 {it.auteur || "Anonyme"} · {it.created_at ? new Date(it.created_at).toLocaleDateString("fr-FR", { day: "numeric", month: "short" }) : ""}</span>
            {confirmSuppr === it.id ? (
              <span style={{ display: "flex", gap: 6, alignItems: "center" }}>
                <button onClick={() => setConfirmSuppr(null)} style={{ fontFamily: sans, fontSize: 11, padding: "3px 8px", borderRadius: 6, border: `1px solid ${C.bordure}`, background: C.panneauClair, color: C.papierSombre, cursor: "pointer" }}>Non</button>
                <button onClick={() => supprimer(it.id)} style={{ fontFamily: sans, fontSize: 11, padding: "3px 8px", borderRadius: 6, border: `1px solid ${C.rouge}`, background: "transparent", color: C.rouge, cursor: "pointer" }}>Supprimer</button>
              </span>
            ) : (
              <button onClick={() => setConfirmSuppr(it.id)} style={{ background: "none", border: "none", color: C.papierSombre, fontSize: 14, cursor: "pointer", padding: "0 4px" }} title="Supprimer">🗑️</button>
            )}
          </div>
        </div>
      ))}
    </div>
  );
}

      setPosts((prev) => prev.filter((x) => x.id !== post.id));
    } catch (e) {
      // en cas d'échec, on rafraîchit pour refléter l'état réel
      rafraichir(true);
    }
    setSupprEnCours(null);
    setConfirmSuppr(null);
  }

  async function rafraichir(silencieux = false) {
    if (!MUR_ACTIF) { setEtat("inactif"); return; }
    if (!silencieux) setEtat("chargement");
    try {
      const p = await chargerMur(50);
      setPosts(p);
      chargerReactions().then(setReactions);
      setEtat("ok");
    } catch (e) {
      if (!silencieux) setEtat("echec");
    }
  }

  // Réagir à un post : incrémente en local tout de suite (réactif), puis envoie au serveur
  async function surReaction(postId, type) {
    setReactions((prev) => {
      const copie = { ...prev };
      copie[postId] = { ...(copie[postId] || {}) };
      copie[postId][type] = (copie[postId][type] || 0) + 1;
      return copie;
    });
    try { await reagir(postId, type); }
    catch { chargerReactions().then(setReactions); } // si échec, on resynchronise
  }

  useEffect(() => {
    rafraichir();
    // Rafraîchissement auto toutes les 20 s tant qu'on est sur le mur (silencieux)
    const intervalle = setInterval(() => { rafraichir(true); }, 20000);
    // Rafraîchit aussi quand l'app/l'onglet redevient visible (silencieux)
    const surVisibilite = () => { if (!document.hidden) rafraichir(true); };
    document.addEventListener("visibilitychange", surVisibilite);
    return () => {
      clearInterval(intervalle);
      document.removeEventListener("visibilitychange", surVisibilite);
    };
  }, []);

  if (!MUR_ACTIF) {
    return (
      <div style={{ padding: 16, maxWidth: 560, margin: "0 auto" }}>
        <div style={{ textAlign: "center", padding: "48px 24px", border: `1px solid ${C.bordure}`, borderRadius: 14, background: "linear-gradient(#191F15, #14180F)" }}>
          <div style={{ fontSize: 38, marginBottom: 12 }}>🌐</div>
          <div style={{ fontFamily: serif, fontSize: 19, fontWeight: 600, color: C.papier, marginBottom: 6 }}>Mur commun non configuré</div>
          <div style={{ fontFamily: sans, fontSize: 14, color: C.papierSombre, lineHeight: 1.5 }}>La clé de connexion n'est pas encore renseignée dans l'application.</div>
        </div>
      </div>
    );
  }

  return (
    <div style={{ padding: 16, maxWidth: 560, margin: "0 auto" }}>
      {/* Prénom de l'auteur */}
      <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 14, padding: "10px 12px", background: C.panneau, border: `1px solid ${C.bordure}`, borderRadius: 10 }}>
        <span style={{ fontFamily: sans, fontSize: 13, color: C.lichen, fontWeight: 600, whiteSpace: "nowrap" }}>Je poste en tant que</span>
        <input value={saisiePrenom} onChange={(e) => setSaisiePrenom(e.target.value)} onBlur={() => onDefinirPrenom(saisiePrenom.trim())}
          placeholder="ton prénom" maxLength={40}
          style={{ flex: 1, boxSizing: "border-box", background: C.fond, color: C.papier, border: `1px solid ${C.bordure}`, borderRadius: 8, padding: "8px 10px", fontFamily: sans, fontSize: 14, outline: "none" }} />
      </div>

      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
        <div style={{ fontFamily: serif, fontSize: 18, fontWeight: 600, color: C.papier }}>🌐 Le mur de la bande</div>
        <button onClick={rafraichir} disabled={etat === "chargement"} className={"bd-refresh" + (etat === "chargement" ? " bd-spinning" : "")}>
          <span className="bd-refresh-ico">↻</span>{etat === "chargement" ? "Actualisation…" : "Rafraîchir"}
        </button>
      </div>

      {etat === "chargement" && <div style={{ fontFamily: sans, fontSize: 14, color: C.papierSombre, fontStyle: "italic", padding: "20px 0", textAlign: "center" }}>Chargement du mur…</div>}
      {etat === "echec" && <div style={{ fontFamily: sans, fontSize: 14, color: "#E8A88F", padding: "16px 0", textAlign: "center" }}>Impossible de charger le mur (réseau ?). Réessaie.</div>}
      {etat === "ok" && posts.length === 0 && (
        <div style={{ textAlign: "center", padding: "40px 24px", border: `1px solid ${C.bordure}`, borderRadius: 14, background: "linear-gradient(#191F15, #14180F)", fontFamily: sans, fontSize: 14, color: C.papierSombre, lineHeight: 1.6 }}>
          Le mur est encore vide.<br />Partage ta première observation depuis sa fiche (bouton « Partager au mur ») !
        </div>
      )}

      {etat === "ok" && posts.map((p) => (
        <div key={p.id} style={{ marginBottom: 14, border: `1px solid ${C.bordure}`, borderRadius: 12, overflow: "hidden", background: C.panneau, boxShadow: "0 2px 8px rgba(0,0,0,.25)" }}>
          <div onClick={() => setPostDetail(p)} style={{ cursor: "pointer" }}>
            {p.photo_url && <img src={p.photo_url} alt={p.espece} loading="lazy" style={{ width: "100%", maxHeight: 360, objectFit: "cover", display: "block" }} />}
            <div style={{ padding: "10px 14px 4px" }}>

              {p.espece_sci && <div style={{ fontFamily: serif, fontStyle: "italic", fontSize: 14, color: C.ambre }}>{p.espece_sci}</div>}

      ))}

  );
}
