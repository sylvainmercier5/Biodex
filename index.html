                        background: fetiche === e ? C.ambre : C.fond,
                        color: fetiche === e ? C.encre : C.papier,
                        fontWeight: fetiche === e ? 700 : 400 }}>
                      {e}
                    </button>
                  ))}
                </div>
                {fetiche && (
                  <div style={{ fontFamily: sans, fontSize: 11.5, color: C.papierSombre, marginTop: 8, fontStyle: "italic" }}>
                    Retape dessus pour le retirer.
                  </div>
                )}
              </div>
            )}
          </div>

          {message && (
            <div style={{ fontFamily: sans, fontSize: 13, color: message.startsWith("✓") ? C.lichen : C.rouge, marginBottom: 12, padding: "9px 12px", background: C.panneau, borderRadius: 8, border: `1px solid ${C.bordure}`, lineHeight: 1.45 }}>
              {message}
            </div>
          )}

          <Bouton variante="primaire" onClick={sauver} disabled={enregistrement} style={{ width: "100%" }}>
            {enregistrement ? "Enregistrement…" : "✓ Enregistrer mon profil"}
          </Bouton>
          <div style={{ fontFamily: sans, fontSize: 11.5, color: C.papierSombre, textAlign: "center", marginTop: 10, lineHeight: 1.5 }}>
            Ton profil est visible par toute la bande (sur le mur et dans le classement).
          </div>
        </div>
      )}
    </div>
  );
}

// Profil public d'un membre : construit à partir de ses publications sur le mur.
// (Ne montre QUE ce que la personne a publié — sa collection perso reste privée.)
// ---------- Suivi collectif d'espèce (phénologie amateur) ----------
// Toutes les données viennent du mur : quand la bande voit telle espèce, où, qui.
// Plus il y a d'observations (et d'années), plus c'est parlant.
function SuiviEspeces({ onFermer }) {
  const [posts, setPosts] = useState([]);
  const [etat, setEtat] = useState("chargement");
  const [choisie, setChoisie] = useState(null); // clé d'espèce
  const [recherche, setRecherche] = useState("");
  const [fOrdre, setFOrdre] = useState("");      // filtre par ordre d'insecte
  const [fRares, setFRares] = useState(false);   // uniquement les espèces peu communes+
  const [tri, setTri] = useState("populaires");  // populaires | recentes | alpha

  useEffect(() => {
    let vivant = true;
    (async () => {
      try {
        const p = await chargerMur(300);
        if (!vivant) return;
        setPosts(p);
        setEtat("ok");
      } catch { if (vivant) setEtat("echec"); }
    })();
    return () => { vivant = false; };
  }, []);

  // Regroupement par espèce
  const especes = {};
  posts.forEach((p) => {
    const c = cleEspeceMur(p);
    if (!c) return;
    if (!especes[c]) especes[c] = { cle: c, nom: p.espece || p.espece_sci || "?", sci: p.espece_sci || "", posts: [] };
    especes[c].posts.push(p);
  });
  const listeEspeces = Object.values(especes);

  // Une espèce est-elle "rare" ? (cache iNaturalist, comme ailleurs dans l'appli)
  const estRare = (e) => {
    const c = litCacheRarete(e.cle);
    const n = c && typeof c.count === "number" ? niveauRarete(c.count) : null;
    return !!(n && n.bonus > 0);
  };
  const derniereDe = (e) => e.posts.reduce((max, p) => (new Date(p.created_at) > new Date(max.created_at) ? p : max), e.posts[0]);

  // Ordres présents (pour les onglets), avec compteur
  const ordresPresents = ORDRES
    .map((o) => ({ ...o, n: listeEspeces.filter((e) => deduireOrdre({ nom: e.nom, nomSci: e.sci }) === o.id).length }))
    .filter((o) => o.n > 0);
  const nbRares = listeEspeces.filter(estRare).length;

  // Filtrage
  let filtrees = listeEspeces;
  if (recherche.trim()) filtrees = filtrees.filter((e) => sansAccents(e.nom + " " + e.sci).includes(sansAccents(recherche)));
  if (fOrdre) filtrees = filtrees.filter((e) => deduireOrdre({ nom: e.nom, nomSci: e.sci }) === fOrdre);
  if (fRares) filtrees = filtrees.filter(estRare);

  // Tri
  filtrees = [...filtrees].sort((a, b) => {
    if (tri === "alpha") return a.nom.localeCompare(b.nom, "fr");
    if (tri === "recentes") return new Date(derniereDe(b).created_at) - new Date(derniereDe(a).created_at);
    return b.posts.length - a.posts.length; // populaires
  });

  const carte = { background: C.panneau, border: `1px solid ${C.bordure}`, borderRadius: 12, padding: 14 };
  const MOIS_C = ["J", "F", "M", "A", "M", "J", "J", "A", "S", "O", "N", "D"];
  const MOIS_L = ["janvier", "février", "mars", "avril", "mai", "juin", "juillet", "août", "septembre", "octobre", "novembre", "décembre"];

  // ── Fiche détaillée d'une espèce
  if (choisie && especes[choisie]) {
    const e = especes[choisie];
    const obs = e.posts;

    // Répartition par mois (toutes années confondues)
    const parMois = new Array(12).fill(0);
    obs.forEach((p) => { const d = new Date(p.created_at); if (!isNaN(d)) parMois[d.getMonth()] += 1; });
    const maxMois = Math.max(...parMois, 0);
    const pic = maxMois > 0 ? parMois.indexOf(maxMois) : -1;
    // Saison : premier et dernier mois où l'espèce apparaît
    const moisActifs = parMois.map((n, i) => (n > 0 ? i : -1)).filter((i) => i >= 0);

    // Première observation de chaque année (donnée phénologique clé !)
    const parAnnee = {};
    obs.forEach((p) => {
      const d = new Date(p.created_at);
      if (isNaN(d)) return;
      const a = d.getFullYear();
      if (!parAnnee[a] || d < new Date(parAnnee[a].created_at)) parAnnee[a] = p;
    });
    const premieres = Object.entries(parAnnee).sort((a, b) => b[0] - a[0]);

    // Qui l'a trouvée / où
    const auteurs = {};
    const biotopes = {};
    obs.forEach((p) => {
      const a = (p.auteur || "").trim();
      if (a) auteurs[a] = (auteurs[a] || 0) + 1;
      if (p.lieu) biotopes[p.lieu] = (biotopes[p.lieu] || 0) + 1;
    });
    const auteursTri = Object.entries(auteurs).sort((a, b) => b[1] - a[1]);
    const biotopesTri = Object.entries(biotopes).sort((a, b) => b[1] - a[1]);
    const rarete = litCacheRarete(e.cle);
    const niv = rarete && typeof rarete.count === "number" ? niveauRarete(rarete.count) : null;

    return (
      <div style={{ padding: 16, maxWidth: 560, margin: "0 auto" }}>
        <Bouton onClick={() => setChoisie(null)} style={{ marginBottom: 16 }}>← Toutes les espèces</Bouton>

        <div style={{ textAlign: "center", marginBottom: 18 }}>
          <div style={{ fontSize: 38 }}>{ordreInfo(deduireOrdre({ nom: e.nom, nomSci: e.sci })).emoji}</div>
          <h2 style={{ fontFamily: serif, fontSize: 24, fontWeight: 700, color: C.papier, marginTop: 4 }}>{e.nom}</h2>
          {e.sci && <div style={{ fontFamily: serif, fontStyle: "italic", fontSize: 15, color: C.ambre, marginTop: 2 }}>{e.sci}</div>}
          <div style={{ display: "flex", justifyContent: "center", gap: 8, marginTop: 8, flexWrap: "wrap" }}>
            <span style={{ fontFamily: sans, fontSize: 12, color: C.papierSombre, background: C.panneau, border: `1px solid ${C.bordure}`, borderRadius: 14, padding: "3px 10px" }}>
              {obs.length} observation{obs.length > 1 ? "s" : ""} par la bande
            </span>
            {niv && niv.bonus > 0 && <BadgeRarete count={rarete.count} />}
          </div>
        </div>

        {/* Calendrier de présence */}
        {maxMois > 0 && (
          <div style={{ ...carte, marginBottom: 14 }}>
            <div style={{ fontFamily: sans, fontSize: 11, fontWeight: 700, letterSpacing: 0.6, textTransform: "uppercase", color: C.lichen, marginBottom: 4 }}>
              Quand la bande la voit
            </div>
            {pic >= 0 && (
              <div style={{ fontFamily: sans, fontSize: 12.5, color: C.papierSombre, marginBottom: 14, lineHeight: 1.5 }}>
                Pic d'observation en <b style={{ color: C.ambreClair }}>{MOIS_L[pic]}</b>
                {moisActifs.length > 1 && <span> · présente de <b style={{ color: C.papier }}>{MOIS_L[moisActifs[0]]}</b> à <b style={{ color: C.papier }}>{MOIS_L[moisActifs[moisActifs.length - 1]]}</b></span>}
              </div>
            )}
            <div style={{ display: "flex", alignItems: "flex-end", gap: 3, height: 74 }}>
              {parMois.map((n, i) => (
                <div key={i} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 3 }}>
                  <span style={{ fontFamily: sans, fontSize: 9, color: n > 0 ? C.papierSombre : "transparent", height: 11 }}>{n || ""}</span>
                  <div style={{ width: "100%", height: `${maxMois ? (n / maxMois) * 42 : 0}px`, minHeight: n > 0 ? 3 : 0, borderRadius: "3px 3px 0 0",
                    background: i === pic ? "linear-gradient(#E4C878, #C9A24B)" : (n > 0 ? "linear-gradient(#6E8B4E, #4A5F35)" : "transparent") }} />
                  <span style={{ fontFamily: sans, fontSize: 9, color: i === pic ? C.ambreClair : C.papierSombre, fontWeight: i === pic ? 800 : 400 }}>{MOIS_C[i]}</span>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* Premières observations de l'année (phénologie !) */}
        {premieres.length > 0 && (
          <div style={{ ...carte, marginBottom: 14, background: "linear-gradient(135deg, #2A2417, #201B12)", border: "1px solid #6B5A2E" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4 }}>
              <span style={{ fontSize: 16 }}>🥇</span>
              <span style={{ fontFamily: sans, fontSize: 11, fontWeight: 800, letterSpacing: 0.6, textTransform: "uppercase", color: "#E0B341" }}>Première de l'année</span>
            </div>
            <div style={{ fontFamily: sans, fontSize: 12, color: C.papierSombre, marginBottom: 12, lineHeight: 1.5, fontStyle: "italic" }}>
              La date de première apparition est une donnée précieuse : elle bouge avec le climat.
            </div>
            {premieres.map(([annee, p]) => (
              <div key={annee} style={{ display: "flex", alignItems: "center", gap: 11, padding: "9px 11px", borderRadius: 9, background: "rgba(0,0,0,.25)", border: `1px solid ${C.bordure}`, marginBottom: 7 }}>
                <span style={{ fontFamily: serif, fontSize: 16, fontWeight: 700, color: C.ambreClair, minWidth: 42 }}>{annee}</span>
                <div style={{ flex: 1, fontFamily: sans, fontSize: 12.5, color: C.papierClair, lineHeight: 1.4 }}>
                  <b style={{ color: C.papier }}>{new Date(p.created_at).toLocaleDateString("fr-FR", { day: "numeric", month: "long" })}</b>
                  {p.auteur ? <span style={{ color: C.papierSombre }}> · par {p.auteur}</span> : null}
                </div>
              </div>
            ))}
          </div>
        )}

        {/* Qui l'a trouvée */}
        {auteursTri.length > 0 && (
          <div style={{ ...carte, marginBottom: 14 }}>
            <div style={{ fontFamily: sans, fontSize: 11, fontWeight: 700, letterSpacing: 0.6, textTransform: "uppercase", color: C.lichen, marginBottom: 11 }}>Qui l'a débusquée</div>
            <div style={{ display: "flex", flexWrap: "wrap", gap: 7 }}>
              {auteursTri.map(([a, n]) => (
                <span key={a} style={{ fontFamily: sans, fontSize: 12.5, padding: "6px 11px", borderRadius: 18, background: C.fond, border: `1px solid ${C.bordure}`, color: C.papier }}>
                  {a} <b style={{ color: C.ambreClair }}>×{n}</b>
                </span>
              ))}
            </div>
          </div>
        )}

        {/* Où */}
        {biotopesTri.length > 0 && (
          <div style={{ ...carte }}>
            <div style={{ fontFamily: sans, fontSize: 11, fontWeight: 700, letterSpacing: 0.6, textTransform: "uppercase", color: C.lichen, marginBottom: 11 }}>Où la bande la trouve</div>
            {biotopesTri.map(([b, n]) => (
              <div key={b} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "8px 11px", borderRadius: 9, background: C.fond, border: `1px solid ${C.bordure}`, marginBottom: 6 }}>
                <span style={{ fontFamily: sans, fontSize: 13, color: C.papier }}>{b}</span>
                <span style={{ fontFamily: sans, fontSize: 12, color: C.papierSombre }}>{n} fois</span>
              </div>
            ))}
          </div>
        )}
      </div>
    );
  }

  // ── Liste des espèces suivies
  return (
    <div style={{ padding: 16, maxWidth: 560, margin: "0 auto" }}>
      <Bouton onClick={onFermer} style={{ marginBottom: 16 }}>← Retour</Bouton>

      <div style={{ textAlign: "center", marginBottom: 6 }}><div style={{ fontSize: 38 }}>📈</div></div>
      <h2 style={{ fontFamily: serif, fontSize: 23, fontWeight: 700, color: C.papier, textAlign: "center", marginBottom: 4 }}>Suivi des espèces</h2>
      <div style={{ fontFamily: sans, fontSize: 12.5, color: C.papierSombre, textAlign: "center", lineHeight: 1.55, marginBottom: 18 }}>
        Quand la bande voit-elle telle espèce ? Qui l'a repérée en premier cette année ? De la phénologie amateur, construite par vos observations.
      </div>

      {etat === "chargement" && <div style={{ fontFamily: sans, fontSize: 14, color: C.papierSombre, fontStyle: "italic", textAlign: "center", padding: "30px 0" }}>Chargement du mur…</div>}
      {etat === "echec" && <div style={{ ...carte, textAlign: "center", fontFamily: sans, fontSize: 14, color: C.papierSombre }}>Impossible de charger les données (réseau ?).</div>}

      {etat === "ok" && listeEspeces.length === 0 && (
        <div style={{ ...carte, textAlign: "center", fontFamily: sans, fontSize: 13.5, color: C.papierSombre, lineHeight: 1.6 }}>
          Aucune espèce partagée sur le mur pour l'instant. 🐞<br />Publiez vos trouvailles, et les courbes se construiront !
        </div>
      )}

      {etat === "ok" && listeEspeces.length > 0 && (
        <div>
          <input value={recherche} onChange={(e) => setRecherche(e.target.value)} placeholder="🔍 Chercher une espèce…"
            style={{ width: "100%", boxSizing: "border-box", background: C.fond, border: `1px solid ${C.bordure}`, borderRadius: 9, padding: "10px 12px", fontFamily: sans, fontSize: 14, color: C.papier, outline: "none", marginBottom: 12 }} />

          {/* Filtre par ordre */}
          {ordresPresents.length > 1 && (
            <div style={{ display: "flex", gap: 7, overflowX: "auto", paddingBottom: 4, marginBottom: 9 }}>
              <button onClick={() => setFOrdre("")}
                style={{ flexShrink: 0, fontFamily: sans, fontSize: 12.5, fontWeight: fOrdre === "" ? 700 : 400, padding: "6px 12px", borderRadius: 18, cursor: "pointer",
                  border: `1px solid ${fOrdre === "" ? C.ambre : C.bordure}`, background: fOrdre === "" ? C.ambre : C.panneau, color: fOrdre === "" ? C.encre : C.papier }}>
                Tous {listeEspeces.length}
              </button>
              {ordresPresents.map((o) => (
                <button key={o.id} onClick={() => setFOrdre(o.id === fOrdre ? "" : o.id)}
                  style={{ flexShrink: 0, fontFamily: sans, fontSize: 12.5, fontWeight: fOrdre === o.id ? 700 : 400, padding: "6px 12px", borderRadius: 18, cursor: "pointer",
                    border: `1px solid ${fOrdre === o.id ? C.ambre : C.bordure}`, background: fOrdre === o.id ? C.ambre : C.panneau, color: fOrdre === o.id ? C.encre : C.papier }}>
                  {o.emoji} {o.n}
                </button>
              ))}
            </div>
          )}

          {/* Rares + tri */}
          <div style={{ display: "flex", gap: 7, alignItems: "center", flexWrap: "wrap", marginBottom: 14 }}>
            {nbRares > 0 && (
              <button onClick={() => setFRares((v) => !v)}
                style={{ fontFamily: sans, fontSize: 12.5, fontWeight: fRares ? 700 : 400, padding: "6px 12px", borderRadius: 18, cursor: "pointer",
                  border: `1px solid ${fRares ? "#E5B84B" : C.bordure}`, background: fRares ? "#E5B84B" : C.panneau, color: fRares ? C.encre : C.papier }}>
                🌟 Rares {nbRares}
              </button>
            )}
            <span style={{ flex: 1 }} />
            <span style={{ fontFamily: sans, fontSize: 11.5, fontWeight: 700, color: C.papierSombre }}>Trier :</span>
            {[["populaires", "🔥"], ["recentes", "🕘"], ["alpha", "🔤"]].map(([id, emo]) => (
              <button key={id} onClick={() => setTri(id)} title={id}
                style={{ fontFamily: sans, fontSize: 13, padding: "5px 10px", borderRadius: 16, cursor: "pointer",
                  border: `1px solid ${tri === id ? C.ambre : C.bordure}`, background: tri === id ? C.ambre : "transparent", color: tri === id ? C.encre : C.papier }}>
                {emo}
              </button>
            ))}
          </div>

          {filtrees.length === 0 && (
            <div style={{ ...carte, textAlign: "center", fontFamily: sans, fontSize: 13.5, color: C.papierSombre, lineHeight: 1.6 }}>
              Aucune espèce ne correspond à ces filtres. 🔍
            </div>
          )}

          <div style={{ display: "grid", gap: 9 }}>
            {filtrees.map((e) => {
              const rar = litCacheRarete(e.cle);
              const niv = rar && typeof rar.count === "number" ? niveauRarete(rar.count) : null;
              const derniere = e.posts.reduce((max, p) => (new Date(p.created_at) > new Date(max.created_at) ? p : max), e.posts[0]);
              return (
                <div key={e.cle} onClick={() => setChoisie(e.cle)}
                  style={{ display: "flex", alignItems: "center", gap: 12, padding: "12px 14px", borderRadius: 11, background: C.panneau, border: `1px solid ${C.bordure}`, cursor: "pointer" }}>
                  <span style={{ fontSize: 22, flexShrink: 0 }}>{ordreInfo(deduireOrdre({ nom: e.nom, nomSci: e.sci })).emoji}</span>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 7, flexWrap: "wrap" }}>
                      <span style={{ fontFamily: serif, fontSize: 15.5, fontWeight: 600, color: C.papier }}>{e.nom}</span>
                      {niv && niv.bonus > 0 && <span style={{ fontSize: 13 }}>{niv.emoji}</span>}
                    </div>
                    <div style={{ fontFamily: sans, fontSize: 11.5, color: C.papierSombre, marginTop: 2 }}>
                      {e.posts.length} obs. · vue le {new Date(derniere.created_at).toLocaleDateString("fr-FR")}
                    </div>
                  </div>
                  <span style={{ color: C.papierSombre, fontSize: 16, flexShrink: 0 }}>›</span>
                </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}

// Panneau d'administration. L'affichage est conditionné par le serveur,
// et CHAQUE action est re-vérifiée par Supabase (RLS) : pas de fausse sécurité.
function Administration({ onFermer }) {
  const [onglet, setOnglet] = useState("stats"); // stats | mur | idees | membres | maintenance
  const [posts, setPosts] = useState([]);
  const [idees, setIdees] = useState([]);
  const [etat, setEtat] = useState("chargement");
  const [message, setMessage] = useState("");
  const [occupe, setOccupe] = useState(null);

  const recharger = async () => {
    setEtat("chargement");
    try {
      const [p, i] = await Promise.all([chargerMur(300), chargerIdees().catch(() => [])]);
      setPosts(p);
      setIdees(Array.isArray(i) ? i : []);
      setEtat("ok");
    } catch { setEtat("echec"); }
  };
  useEffect(() => { recharger(); }, []);

  const supprimerPost = async (p) => {
    if (!window.confirm(`Supprimer définitivement la trouvaille « ${p.espece || "?"} » de ${p.auteur || "?"} ?\n\nCette action est irréversible.`)) return;
    setOccupe(p.id);
    try {
      await adminSupprimerPost(p.id);
      setPosts((l) => l.filter((x) => x.id !== p.id));
      setMessage("✓ Trouvaille supprimée.");
    } catch (e) { setMessage("❌ " + (e.message || "Échec")); }
    setOccupe(null);
    setTimeout(() => setMessage(""), 3500);
  };
  const supprimerIdee = async (i) => {
    if (!window.confirm("Supprimer définitivement cette idée ?\n\nCette action est irréversible.")) return;
    setOccupe(i.id);
    try {
      await adminSupprimerIdee(i.id);
      setIdees((l) => l.filter((x) => x.id !== i.id));
      setMessage("✓ Idée supprimée.");
    } catch (e) { setMessage("❌ " + (e.message || "Échec")); }
    setOccupe(null);
    setTimeout(() => setMessage(""), 3500);
  };

  // ── Stats globales
  const especes = new Set(posts.map(cleEspeceMur).filter(Boolean));
  const membres = {};
  posts.forEach((p) => { const a = (p.auteur || "").trim(); if (a) membres[a] = (membres[a] || 0) + 1; });
  const membresTri = Object.entries(membres).sort((a, b) => b[1] - a[1]);
  const now = Date.now();
  const posts7j = posts.filter((p) => now - new Date(p.created_at).getTime() < 7 * 864e5).length;
  const posts30j = posts.filter((p) => now - new Date(p.created_at).getTime() < 30 * 864e5).length;
  const actifs7j = new Set(posts.filter((p) => now - new Date(p.created_at).getTime() < 7 * 864e5).map((p) => p.auteur)).size;
  const idesNonRealisees = idees.filter((i) => !i.realisee).length;

  const carte = { background: C.panneau, border: `1px solid ${C.bordure}`, borderRadius: 12, padding: 14 };
  const ongletBtn = (id, label) => (
    <button key={id} onClick={() => setOnglet(id)}
      style={{ flexShrink: 0, fontFamily: sans, fontSize: 12.5, fontWeight: onglet === id ? 700 : 400, padding: "7px 13px", borderRadius: 18, cursor: "pointer",
        border: `1px solid ${onglet === id ? C.ambre : C.bordure}`, background: onglet === id ? C.ambre : C.panneau, color: onglet === id ? C.encre : C.papier }}>
      {label}
    </button>
  );

  return (
    <div style={{ padding: 16, maxWidth: 560, margin: "0 auto" }}>
      <Bouton onClick={onFermer} style={{ marginBottom: 14 }}>← Retour</Bouton>

      <div style={{ display: "flex", alignItems: "center", gap: 11, marginBottom: 6 }}>
        <span style={{ fontSize: 28 }}>🔐</span>
        <div>
          <div style={{ fontFamily: serif, fontSize: 21, fontWeight: 700, color: C.papier, lineHeight: 1.15 }}>Administration</div>
          <div style={{ fontFamily: sans, fontSize: 11.5, color: C.lichen }}>Accès vérifié par le serveur 🛡️</div>

                  </div>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {etat === "ok" && onglet === "maintenance" && (
        <div style={{ display: "grid", gap: 11 }}>
          <div style={{ ...carte }}>
            <div style={{ fontFamily: sans, fontSize: 13.5, fontWeight: 700, color: C.papier, marginBottom: 4 }}>♻️ Vider les caches de rareté</div>

            </div>
            <Bouton onClick={() => {
              let n = 0;
              try {
                Object.keys(localStorage).forEach((k) => { if (k.startsWith("biodex:rarete:")) { localStorage.removeItem(k); n++; } });
              } catch {}
              setMessage(`✓ ${n} rareté(s) purgée(s) — elles se recalculeront.`);
              setTimeout(() => setMessage(""), 3500);
            }} style={{ width: "100%" }}>Vider le cache des raretés</Bouton>
          </div>

          <div style={{ ...carte }}>
            <div style={{ fontFamily: sans, fontSize: 13.5, fontWeight: 700, color: C.papier, marginBottom: 4 }}>🎉 Réinitialiser les célébrations</div>
            <div style={{ fontFamily: sans, fontSize: 12, color: C.papierSombre, marginBottom: 11, lineHeight: 1.5 }}>
              Permet de re-tester les animations de réussite (défis, missions, paliers).
            </div>
            <Bouton onClick={() => {
              let n = 0;
              try {
                Object.keys(localStorage).forEach((k) => {
                  if (k.startsWith("biodex_defis_fetes_") || k.startsWith("biodex_mission_fetee_") || k.startsWith("biodex_refuge_palier_")) { localStorage.removeItem(k); n++; }
                });
              } catch {}
              setMessage(`✓ ${n} marqueur(s) effacé(s).`);
              setTimeout(() => setMessage(""), 3500);
            }} style={{ width: "100%" }}>Réinitialiser</Bouton>
          </div>

          <div style={{ ...carte }}>
            <div style={{ fontFamily: sans, fontSize: 13.5, fontWeight: 700, color: C.papier, marginBottom: 4 }}>🔄 Forcer la mise à jour de l'appli</div>
            <div style={{ fontFamily: sans, fontSize: 12, color: C.papierSombre, marginBottom: 11, lineHeight: 1.5 }}>
              Vide le cache du Service Worker et recharge. Utile si une nouvelle version ne s'installe pas.
            </div>
            <Bouton onClick={async () => {
              try {
                if ("caches" in window) { const cles = await caches.keys(); await Promise.all(cles.map((c) => caches.delete(c))); }
                if (navigator.serviceWorker) {
                  const regs = await navigator.serviceWorker.getRegistrations();
                  await Promise.all(regs.map((r) => r.unregister()));
                }
                window.location.reload(true);
              } catch { setMessage("❌ Échec du rechargement forcé."); }
            }} style={{ width: "100%" }}>Vider le cache et recharger</Bouton>
          </div>
        </div>
      )}
    </div>
  );
}

// Panneau d'administration : chargé au-dessus.
function ProfilPublic({ auteur, onFermer }) {
  const [posts, setPosts] = useState(null);
  const [raretes, setRaretes] = useState({});
  const [etat, setEtat] = useState("chargement");
  const [perso, setPerso] = useState(null); // profil personnalisé (emblème, bio…)

  useEffect(() => {
    let vivant = true;
    (async () => {
      try {
        chargerProfils().then((pf) => { if (vivant) setPerso(profilDe(auteur, pf)); }).catch(() => {});
        const tous = await chargerMur(200);
        if (!vivant) return;
        const cible = (auteur || "").trim().toLowerCase();
        const siens = tous.filter((p) => (p.auteur || "").trim().toLowerCase() === cible);
        setPosts(siens);
        setEtat("ok");
        // Raretés (best effort)
        const cles = [...new Set(siens.map(cleEspeceMur).filter(Boolean))];
        const acc = {};
        for (const c of cles.slice(0, 30)) {
          const n = await chargerRareteInat(c);
          if (!vivant) return;
          if (n != null) { acc[c] = n; setRaretes({ ...acc }); }
        }
      } catch (e) {
        if (vivant) setEtat("echec");
      }
    })();
    return () => { vivant = false; };
  }, [auteur]);

  const carte = { background: C.panneau, border: `1px solid ${C.bordure}`, borderRadius: 12, padding: 14 };
  const titre = { fontFamily: sans, fontSize: 11, fontWeight: 700, letterSpacing: 0.6, textTransform: "uppercase", color: C.lichen };

  if (etat === "chargement") {
    return (
      <div style={{ padding: 16, maxWidth: 560, margin: "0 auto" }}>
        <Bouton onClick={onFermer} style={{ marginBottom: 16 }}>← Retour</Bouton>
        <div style={{ fontFamily: sans, fontSize: 14, color: C.papierSombre, fontStyle: "italic", textAlign: "center", padding: "30px 0" }}>Chargement du profil…</div>
      </div>
    );
  }
  if (etat === "echec") {
    return (
      <div style={{ padding: 16, maxWidth: 560, margin: "0 auto" }}>
        <Bouton onClick={onFermer} style={{ marginBottom: 16 }}>← Retour</Bouton>
        <div style={{ ...carte, textAlign: "center", color: C.papierSombre, fontFamily: sans, fontSize: 14 }}>Profil indisponible (réseau ?).</div>
      </div>
    );
  }

  const total = posts.length;
  const especesSet = new Set(posts.map(cleEspeceMur).filter(Boolean));
  const nbEspeces = especesSet.size;

  // Ordres
  const parOrdre = {};
  posts.forEach((p) => { const id = deduireOrdre({ nom: p.espece, nomSci: p.espece_sci }); parOrdre[id] = (parOrdre[id] || 0) + 1; });
  const ordresTri = Object.entries(parOrdre).sort((a, b) => b[1] - a[1]);
  const maxOrdre = ordresTri.length ? ordresTri[0][1] : 0;
  const nbOrdres = Object.keys(parOrdre).filter((id) => id !== "autres").length;

  // Raretés
  const raresSet = new Set();
  posts.forEach((p) => {
    const k = cleEspeceMur(p);
    const niv = niveauRarete(raretes[k]);
    if (k && niv && niv.bonus > 0) raresSet.add(k);
  });

  // Points (même barème que le classement)
  const points = posts.reduce((s, p) => {
    const niv = niveauRarete(raretes[cleEspeceMur(p)]);
    return s + 1 + (niv ? niv.bonus : 0);
  }, 0);

  // Espèces uniques (une vignette par espèce, la plus récente)
  const parEspece = {};
  posts.forEach((p) => {
    const k = cleEspeceMur(p);
    if (!k) return;
    if (!parEspece[k] || new Date(p.created_at) > new Date(parEspece[k].created_at)) parEspece[k] = p;
  });
  const vignettes = Object.values(parEspece).sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

  const premier = posts.length ? posts.reduce((min, p) => (new Date(p.created_at) < new Date(min.created_at) ? p : min), posts[0]) : null;

  return (
    <div style={{ padding: 16, maxWidth: 560, margin: "0 auto" }}>
      <Bouton onClick={onFermer} style={{ marginBottom: 16 }}>← Retour</Bouton>

      {/* En-tête */}
      <div style={{ textAlign: "center", marginBottom: 18 }}>
        <div style={{ fontSize: 46, lineHeight: 1.1 }}>{(perso && perso.embleme) || "🐛"}</div>
        <div style={{ fontFamily: serif, fontSize: 26, fontWeight: 700, color: C.papier, marginTop: 2 }}>{auteur}</div>
        {perso && perso.region && (
          <div style={{ fontFamily: sans, fontSize: 12.5, color: C.lichen, marginTop: 3 }}>📍 {perso.region}</div>
        )}
        <div style={{ fontFamily: sans, fontSize: 12.5, color: C.papierSombre, marginTop: 3 }}>
          {total === 0 ? "Aucune trouvaille publiée pour l'instant" : `Chasseur d'insectes${premier ? " · depuis " + new Date(premier.created_at).toLocaleDateString("fr-FR", { month: "long", year: "numeric" }) : ""}`}
        </div>
        {perso && perso.bio && (
          <div style={{ fontFamily: serif, fontStyle: "italic", fontSize: 14, color: C.papier, marginTop: 10, lineHeight: 1.55, padding: "0 10px" }}>
            « {perso.bio} »
          </div>
        )}
        {perso && perso.fetiche && (
          <div style={{ display: "inline-flex", alignItems: "center", gap: 6, marginTop: 12, padding: "5px 12px", borderRadius: 18, background: "linear-gradient(#2A2417, #201B12)", border: "1px solid #6B5A2E", fontFamily: sans, fontSize: 12.5, color: C.ambreClair }}>
            🌟 Insecte fétiche : <b style={{ color: C.papier }}>{perso.fetiche}</b>
          </div>
        )}
      </div>

      {total === 0 ? (
        <div style={{ ...carte, textAlign: "center", fontFamily: sans, fontSize: 13.5, color: C.papierSombre, lineHeight: 1.6 }}>
          Cette personne n'a encore rien publié sur le mur. 🐞<br />À suivre !
        </div>
      ) : (
        <div>
          {/* Tuiles */}
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 9, marginBottom: 14 }}>
            <div style={{ ...carte, textAlign: "center", padding: "13px 6px" }}>
              <div style={{ fontFamily: serif, fontSize: 24, fontWeight: 700, color: C.ambreClair }}>{total}</div>
              <div style={{ fontFamily: sans, fontSize: 9.5, textTransform: "uppercase", color: C.papierSombre, marginTop: 2 }}>Trouvailles</div>
            </div>
            <div style={{ ...carte, textAlign: "center", padding: "13px 6px" }}>
              <div style={{ fontFamily: serif, fontSize: 24, fontWeight: 700, color: C.ambreClair }}>{nbEspeces}</div>
              <div style={{ fontFamily: sans, fontSize: 9.5, textTransform: "uppercase", color: C.papierSombre, marginTop: 2 }}>Espèces</div>
            </div>
            <div style={{ ...carte, textAlign: "center", padding: "13px 6px" }}>
              <div style={{ fontFamily: serif, fontSize: 24, fontWeight: 700, color: C.ambreClair }}>{points}</div>
              <div style={{ fontFamily: sans, fontSize: 9.5, textTransform: "uppercase", color: C.papierSombre, marginTop: 2 }}>Points</div>
            </div>
          </div>

          {/* Espèces rares */}
          {raresSet.size > 0 && (
            <div style={{ ...carte, marginBottom: 14, display: "flex", alignItems: "center", gap: 12, background: "linear-gradient(#2A2417, #201B12)", border: "1px solid #4A3E22" }}>
              <span style={{ fontSize: 28 }}>🌟</span>
              <div style={{ flex: 1 }}>
                <div style={{ fontFamily: sans, fontSize: 10.5, textTransform: "uppercase", color: "#D2A24A", letterSpacing: 0.5 }}>Espèces rares dénichées</div>
                <div style={{ fontFamily: sans, fontSize: 11.5, color: C.papierSombre, marginTop: 2 }}>peu communes à très rares</div>
              </div>
              <div style={{ fontFamily: serif, fontSize: 24, fontWeight: 700, color: "#E5B84B" }}>{raresSet.size}</div>
            </div>
          )}

          {/* Par ordre */}
          {ordresTri.length > 0 && (
            <div style={{ ...carte, marginBottom: 14 }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 12 }}>
                <span style={titre}>Ses ordres d'insectes</span>
                <span style={{ fontFamily: sans, fontSize: 12, fontWeight: 700, color: C.ambreClair }}>{nbOrdres} ordre{nbOrdres > 1 ? "s" : ""}</span>
              </div>
              {ordresTri.map(([id, n]) => {
                const info = ordreInfo(id);
                return (
                  <div key={id} style={{ marginBottom: 9 }}>
                    <div style={{ display: "flex", justifyContent: "space-between", fontFamily: sans, fontSize: 13, color: C.papier, marginBottom: 4 }}>
                      <span>{info.emoji} {info.label}</span>
                      <span style={{ color: C.papierSombre }}>{n} · {Math.round((n / total) * 100)}%</span>
                    </div>
                    <div style={{ height: 7, borderRadius: 4, background: "#0F130C", overflow: "hidden" }}>
                      <div style={{ height: "100%", width: `${(n / maxOrdre) * 100}%`, borderRadius: 4, background: "linear-gradient(90deg, #6E8B4E, #A8C97E)" }} />
                    </div>
                  </div>
                );
              })}
            </div>
          )}

          {/* Sa boîte publique */}
          <div style={{ ...carte }}>
            <div style={{ marginBottom: 12 }}><span style={titre}>Sa boîte ({nbEspeces} espèce{nbEspeces > 1 ? "s" : ""})</span></div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 9 }}>
              {vignettes.map((p) => {
                const niv = niveauRarete(raretes[cleEspeceMur(p)]);
                return (
                  <div key={p.id} style={{ position: "relative" }}>
                    {p.photo_url
                      ? <img src={p.photo_url} alt={p.espece || ""} style={{ width: "100%", aspectRatio: "1", objectFit: "cover", borderRadius: 9, border: `1px solid ${C.bordure}`, display: "block" }} />
                      : <div style={{ width: "100%", aspectRatio: "1", borderRadius: 9, border: `1px solid ${C.bordure}`, background: C.fond, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 24 }}>🐛</div>}
                    {niv && niv.bonus > 0 && (
                      <span style={{ position: "absolute", top: 5, right: 5, fontSize: 14, filter: "drop-shadow(0 1px 2px rgba(0,0,0,.7))" }}>{niv.emoji}</span>
                    )}
                    <div style={{ fontFamily: sans, fontSize: 10.5, color: C.papier, marginTop: 4, textAlign: "center", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                      {p.espece || "Spécimen"}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function Classement({ onFermer, onOuvrirProfil }) {
  const [profils, setProfils] = useState({});
  useEffect(() => { let v = true; chargerProfils().then((p) => { if (v) setProfils(p); }).catch(() => {}); return () => { v = false; }; }, []);
  const [periode, setPeriode] = useState("semaine");
  const [posts, setPosts] = useState(null);
  const [raretes, setRaretes] = useState({});
  const [etat, setEtat] = useState("chargement");
  const [montrerRegles, setMontrerRegles] = useState(false);

  useEffect(() => {
    let annule = false;
    (async () => {
      if (!MUR_ACTIF) { setEtat("inactif"); return; }
      try {
        const data = await chargerMur(300);
        if (annule) return;
        setPosts(data);
        setEtat("ok");
        const especesMap = {};
        data.forEach((p) => { const k = cleEspeceMur(p); if (k && !(k in especesMap)) especesMap[k] = p.espece_sci || p.espece || ""; });
        const map = {};
        Object.keys(especesMap).forEach((k) => { const c = litCacheRarete(k); if (c && typeof c.count === "number") map[k] = c.count; });
        if (!annule) setRaretes({ ...map });
        for (const k of Object.keys(especesMap)) {
          if (k in map) continue;
          const c = await chargerRareteInat(especesMap[k]);
          if (annule) return;
          map[k] = c;
          setRaretes({ ...map });
        }
      } catch { if (!annule) setEtat("echec"); }
    })();
    return () => { annule = true; };
  }, []);

  const classement = posts ? calculerClassement(posts, periode, raretes) : [];
  const chargementRaretes = posts && Object.keys(raretes).length < new Set(posts.map(cleEspeceMur).filter(Boolean)).size;
  const rangStyle = (i) => i === 0 ? { emoji: "🥇", coul: "#E5B84B" } : i === 1 ? { emoji: "🥈", coul: "#C7C7C7" } : i === 2 ? { emoji: "🥉", coul: "#CD8B4A" } : { emoji: `${i + 1}`, coul: C.papierSombre };

  return (
    <div style={{ padding: 16, maxWidth: 560, margin: "0 auto" }}>
      <Bouton onClick={onFermer} style={{ marginBottom: 14 }}>← Retour</Bouton>

      <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 4 }}>
        <span style={{ fontSize: 28 }}>🏆</span>
        <div style={{ fontFamily: serif, fontSize: 22, fontWeight: 600, color: C.papier }}>Classement des chasseurs</div>
      </div>
      <div style={{ fontFamily: sans, fontSize: 13, color: C.papierSombre, marginBottom: 14, lineHeight: 1.5 }}>
        Qui déniche le plus (et le plus rare) ? Les points viennent des trouvailles partagées sur le mur.
      </div>

      <div style={{ display: "flex", gap: 8, marginBottom: 14 }}>
        {[["semaine", "📅 Semaine"], ["mois", "🗓️ Mois"]].map(([id, label]) => (
          <button key={id} onClick={() => setPeriode(id)}
            style={{ flex: 1, fontFamily: sans, fontSize: 14, fontWeight: 700, padding: "9px 0", borderRadius: 9, cursor: "pointer",
              border: `1px solid ${periode === id ? "#A8863A" : C.bordure}`,
              background: periode === id ? "linear-gradient(#2C3623, #232B1D)" : "transparent",
              color: periode === id ? C.ambreClair : C.papierSombre }}>
            {label}
          </button>
        ))}
      </div>
      <div style={{ fontFamily: sans, fontSize: 11.5, color: C.papierSombre, marginBottom: 12, textAlign: "center" }}>
        {periode === "semaine" ? "7 derniers jours" : "30 derniers jours"}
      </div>

      {etat === "chargement" && <div style={{ textAlign: "center", padding: 30, fontFamily: sans, color: C.papierSombre }}>Chargement…</div>}
      {etat === "inactif" && <div style={{ textAlign: "center", padding: 30, fontFamily: sans, color: C.papierSombre }}>Le mur partagé n'est pas configuré.</div>}
      {etat === "echec" && <div style={{ textAlign: "center", padding: 30, fontFamily: sans, color: "#E5603E" }}>Impossible de charger le classement (réseau ?).</div>}

      {etat === "ok" && classement.length === 0 && (
        <div style={{ textAlign: "center", padding: "40px 20px", border: `1px solid ${C.bordure}`, borderRadius: 12, background: "linear-gradient(#191F15, #14180F)" }}>
          <div style={{ fontSize: 36, marginBottom: 10 }}>🦗</div>
          <div style={{ fontFamily: sans, fontSize: 14, color: C.papierSombre, lineHeight: 1.5 }}>Aucune trouvaille partagée sur cette période. Postez des observations sur le mur pour lancer le classement !</div>
        </div>
      )}

      {etat === "ok" && classement.length > 0 && (
        <div style={{ display: "grid", gap: 8 }}>
          {classement.map((c, i) => {
            const r = rangStyle(i);
            return (
              <div key={c.auteur} onClick={() => onOuvrirProfil && onOuvrirProfil(c.auteur)}
                style={{ display: "flex", alignItems: "center", gap: 12, padding: "12px 14px", borderRadius: 11, background: i < 3 ? "linear-gradient(#20281A, #1A2015)" : C.panneau, border: `1px solid ${i < 3 ? "#3A4A2C" : C.bordure}`, cursor: onOuvrirProfil ? "pointer" : "default" }}>
                <div style={{ minWidth: 30, textAlign: "center", fontFamily: serif, fontSize: i < 3 ? 22 : 16, fontWeight: 700, color: r.coul }}>{r.emoji}</div>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontFamily: serif, fontSize: 16, fontWeight: 600, color: C.papier, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{emblemeDe(c.auteur, profils)} {c.auteur}</div>
                  <div style={{ fontFamily: sans, fontSize: 12, color: C.papierSombre }}>{c.trouvailles} trouvaille{c.trouvailles > 1 ? "s" : ""}</div>
                </div>

                  <span style={{ fontFamily: serif, fontSize: 22, fontWeight: 700, color: C.ambre }}>{c.points}</span>

              </div>
            );
          })}
        </div>
      )}

      {chargementRaretes && etat === "ok" && (
        <div style={{ fontFamily: sans, fontSize: 11, color: C.papierSombre, textAlign: "center", marginTop: 10, fontStyle: "italic" }}>
          Calcul de la rareté en cours (iNaturalist)… les points peuvent encore s'ajuster.
        </div>
      )}

      <button onClick={() => setMontrerRegles((v) => !v)} style={{ width: "100%", marginTop: 16, fontFamily: sans, fontSize: 13, fontWeight: 700, padding: "9px 12px", borderRadius: 9, cursor: "pointer", border: `1px solid ${C.bordure}`, background: montrerRegles ? C.panneau : "transparent", color: C.ambreClair, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <span>❓ Comment sont calculés les points ?</span>
        <span style={{ color: C.papierSombre }}>{montrerRegles ? "▲" : "▼"}</span>
      </button>
      {montrerRegles && (
        <div style={{ marginTop: 10, padding: 14, borderRadius: 10, background: "#0F130C", border: `1px solid ${C.bordure}`, fontFamily: sans, fontSize: 13, color: C.papierClair, lineHeight: 1.6 }}>
          <div><b style={{ color: C.papier }}>+1</b> par trouvaille partagée sur le mur</div>
          <div><b style={{ color: C.papier }}>+2</b> si l'espèce est nouvelle sur le mur (jamais postée avant)</div>
          <div><b style={{ color: "#8AAE6B" }}>+1</b> espèce peu commune · <b style={{ color: "#D2A24A" }}>+2</b> rare · <b style={{ color: "#E5B84B" }}>+3</b> très rare</div>
          <div style={{ marginTop: 8, color: C.papierSombre, fontSize: 12 }}>
            La rareté s'appuie sur le nombre d'observations mondiales dans iNaturalist. C'est un bon indice, pas un statut de conservation officiel — une espèce discrète peut être peu observée sans être menacée. Si iNaturalist ne répond pas pour une espèce, on compte +1 si elle est rare dans la bande (postée ≤ 2 fois).
          </div>
        </div>
      )}
    </div>
  );
}

// Renvoie le conseil saisonnier du jour (change chaque jour, stable sur la journée).
function conseilSaison(d) {
  const date = d || new Date();
  const liste = SAISONS[date.getMonth()] || [];
  if (!liste.length) return null;
  const jour = Math.floor(date.getTime() / 864e5);
  return liste[jour % liste.length];
}

function ReveilSaisonnier() {
  const conseil = conseilSaison();
  const [ferme, setFerme] = useState(() => {
    try {
      const vu = localStorage.getItem("biodex_saison_vue");
      return vu === new Date().toDateString();
    } catch { return false; }
  });
  if (!conseil || ferme) return null;
  const fermer = () => {
    try { localStorage.setItem("biodex_saison_vue", new Date().toDateString()); } catch {}
    setFerme(true);
  };
  const doré = !!conseil.enquete;
  return (
    <div style={{ position: "relative", marginBottom: 16, padding: "14px 16px", borderRadius: 12,
      background: doré ? "linear-gradient(135deg, #2E2612, #221B0E)" : "linear-gradient(135deg, #1F2A18, #182012)",
      border: `1px solid ${doré ? "#8A6E2E" : "#3E5A2E"}`, boxShadow: "0 2px 10px rgba(0,0,0,.25)" }}>
      <button onClick={fermer} aria-label="Masquer pour aujourd'hui"
        style={{ position: "absolute", top: 8, right: 10, background: "none", border: "none", color: C.papierSombre, fontSize: 17, cursor: "pointer", lineHeight: 1, padding: 2 }}>×</button>
      <div style={{ display: "flex", alignItems: "center", gap: 7, marginBottom: 7 }}>
        <span style={{ fontSize: 17 }}>{conseil.emoji}</span>
        <span style={{ fontFamily: sans, fontSize: 11, fontWeight: 800, letterSpacing: 0.6, textTransform: "uppercase", color: doré ? "#E0B341" : "#A8C97E" }}>
          {doré ? "🇫🇷 Espèce suivie · à guetter maintenant" : "À guetter en ce moment"}
        </span>
      </div>
      <div style={{ fontFamily: serif, fontSize: 16, fontWeight: 600, color: C.papier, lineHeight: 1.35, marginBottom: 5, paddingRight: 14 }}>
        {conseil.titre}
      </div>
      <div style={{ fontFamily: sans, fontSize: 13, color: C.papierClair, lineHeight: 1.55 }}>
        {conseil.texte}
      </div>
    </div>
  );
}

function celebrer(detail) {
  try { window.dispatchEvent(new CustomEvent("biodex-celebration", { detail })); } catch {}
}

// Affiche les célébrations (bannière + confettis). À monter une seule fois, au niveau de l'app.
function Celebrations({ sonActif = true }) {
  const [file, setFile] = useState([]); // célébrations en attente/affichage

  useEffect(() => {
    const surEvent = (e) => {
      const d = (e && e.detail) || {};
      const item = { id: Date.now() + Math.random(), emoji: d.emoji || "🎉", titre: d.titre || "Bravo !", texte: d.texte || "", ton: d.ton || "defi" };
      setFile((f) => [...f, item]);
      if (sonActif) sonCelebration(item.ton);
      setTimeout(() => setFile((f) => f.filter((x) => x.id !== item.id)), 4200);
    };
    window.addEventListener("biodex-celebration", surEvent);
    return () => window.removeEventListener("biodex-celebration", surEvent);
  }, [sonActif]);

  if (!file.length) return null;

  // Confettis : petits éléments thématiques qui tombent
  const CONFETTIS = ["🦋", "🐞", "✨", "🍃", "🌟", "🪲"];

  return (
    <div style={{ position: "fixed", inset: 0, zIndex: 10050, pointerEvents: "none", overflow: "hidden" }}>
      {/* Confettis */}
      {file.length > 0 && Array.from({ length: 18 }).map((_, i) => {
        const gauche = (i * 5.5 + ((i * 37) % 9)) % 100;
        const delai = ((i * 13) % 10) / 10;
        const duree = 2.6 + ((i * 7) % 12) / 10;
        const taille = 14 + ((i * 11) % 12);
        return (
          <span key={i} className="bd-confetti"
            style={{ position: "absolute", top: -30, left: `${gauche}%`, fontSize: taille,
              animationDelay: `${delai}s`, animationDuration: `${duree}s` }}>
            {CONFETTIS[i % CONFETTIS.length]}
          </span>
        );
      })}

      {/* Bannières */}
      <div style={{ position: "absolute", top: 14, left: 0, right: 0, display: "flex", flexDirection: "column", alignItems: "center", gap: 8, padding: "0 14px" }}>
        {file.map((c) => {
          const doré = c.ton === "legendaire";
          return (
            <div key={c.id} className="bd-celebration"
              style={{ width: "100%", maxWidth: 420, display: "flex", alignItems: "center", gap: 13, padding: "13px 16px", borderRadius: 13,
                background: doré ? "linear-gradient(135deg, #3A2F14, #26200E)" : "linear-gradient(135deg, #24301B, #18220F)",
                border: `1px solid ${doré ? "#C9A24B" : "#6F9450"}`,
                boxShadow: `0 6px 26px rgba(0,0,0,.5), 0 0 22px ${doré ? "rgba(201,162,75,.28)" : "rgba(122,170,90,.2)"}` }}>
              <span style={{ fontSize: 30, flexShrink: 0 }}>{c.emoji}</span>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontFamily: serif, fontSize: 16.5, fontWeight: 700, color: doré ? "#E4C878" : "#B7DA8E", lineHeight: 1.25 }}>{c.titre}</div>
                {c.texte && <div style={{ fontFamily: sans, fontSize: 12.5, color: C.papierClair, marginTop: 2, lineHeight: 1.45 }}>{c.texte}</div>}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// PRNG déterministe (mulberry32) pour un tirage stable par jour.
function grainePRNG(seed) {
  let a = seed >>> 0;
  return function () {
    a |= 0; a = (a + 0x6D2B79F5) | 0;
    let t = Math.imul(a ^ (a >>> 15), 1 | a);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
function jourActuel() { return Math.floor(Date.now() / 864e5); }

// Sélectionne n questions de façon déterministe pour un jour donné (même quiz pour tous ce jour-là).
function questionsDuJour(jour, n = 5) {
  const rng = grainePRNG((jour * 2654435761) >>> 0);
  const idx = QUIZ_QUESTIONS.map((_, i) => i);
  for (let i = idx.length - 1; i > 0; i--) {
    const j = Math.floor(rng() * (i + 1));
    const tmp = idx[i]; idx[i] = idx[j]; idx[j] = tmp;
  }
  return idx.slice(0, n).map((i) => QUIZ_QUESTIONS[i]);
}

const QUIZ_BONUS = 3; // points bonus si sans faute

function Quiz() {
  const jour = jourActuel();
  const [questions] = useState(() => questionsDuJour(jour, 5));
  const [fait, setFait] = useState(() => { try { const b = localStorage.getItem("biodex:quiz:" + jour); return b ? JSON.parse(b) : null; } catch { return null; } });
  const [etape, setEtape] = useState(0);
  const [choix, setChoix] = useState(null);
  const [bonnes, setBonnes] = useState(0);
  const [total, setTotal] = useState(() => { try { return parseInt(localStorage.getItem("biodex:quiz:total") || "0", 10) || 0; } catch { return 0; } });

  function repondre(i) {
    if (choix !== null) return;
    setChoix(i);
    if (i === questions[etape].reponse) setBonnes((b) => b + 1);
  }
  function suivante() {
    if (etape + 1 < questions.length) { setEtape(etape + 1); setChoix(null); }
    else {
      const sansFaute = bonnes === questions.length;
      const points = bonnes + (sansFaute ? QUIZ_BONUS : 0);
      const res = { score: bonnes, sur: questions.length, sansFaute, points };
      try {
        localStorage.setItem("biodex:quiz:" + jour, JSON.stringify(res));
        const nt = total + points;
        localStorage.setItem("biodex:quiz:total", String(nt));
        setTotal(nt);
      } catch {}
      setFait(res);
    }
  }

  // Écran résultat (quiz terminé ou déjà fait aujourd'hui)
  if (fait) {
    return (
      <div style={{ padding: "8px 4px", textAlign: "center" }}>
        <div style={{ fontSize: 44, marginBottom: 8 }}>{fait.sansFaute ? "🏆" : fait.score >= 3 ? "🎉" : "🧠"}</div>
        <div style={{ fontFamily: serif, fontSize: 22, fontWeight: 600, color: C.papier, marginBottom: 4 }}>Quiz du jour terminé !</div>
        <div style={{ fontFamily: sans, fontSize: 15, color: C.papierSombre, marginBottom: 16 }}>
          {fait.score} / {fait.sur} bonne{fait.score > 1 ? "s" : ""} réponse{fait.score > 1 ? "s" : ""}
        </div>
        <div style={{ display: "inline-block", padding: "14px 22px", borderRadius: 12, background: "linear-gradient(#26301C, #1C2415)", border: "1px solid #3E4E2A", marginBottom: 16 }}>
          <div style={{ fontFamily: serif, fontSize: 30, fontWeight: 700, color: C.ambre }}>+{fait.points} pts</div>
          {fait.sansFaute && <div style={{ fontFamily: sans, fontSize: 12, fontWeight: 700, color: "#A8C97E", marginTop: 2 }}>✨ Sans faute ! (+{QUIZ_BONUS} bonus)</div>}
        </div>
        <div style={{ fontFamily: sans, fontSize: 13, color: C.papierSombre, marginBottom: 6 }}>Total accumulé : <b style={{ color: C.ambreClair }}>{total} pts</b></div>
        <div style={{ fontFamily: sans, fontSize: 12.5, color: C.papierSombre, fontStyle: "italic" }}>Reviens demain pour un nouveau quiz ! 🐞</div>
      </div>
    );
  }

  // Écran de jeu
  const q = questions[etape];
  const repondu = choix !== null;
  return (
    <div style={{ padding: "4px 2px" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
        <span style={{ fontFamily: sans, fontSize: 12, fontWeight: 700, color: C.papierSombre, letterSpacing: 0.5 }}>QUESTION {etape + 1} / {questions.length}</span>
        <span style={{ fontFamily: sans, fontSize: 12, fontWeight: 700, color: C.ambreClair }}>🧠 {bonnes} ✓</span>
      </div>
      {/* barre de progression */}
      <div style={{ height: 5, borderRadius: 3, background: "#0F130C", marginBottom: 18, overflow: "hidden" }}>
        <div style={{ height: "100%", width: `${((etape + (repondu ? 1 : 0)) / questions.length) * 100}%`, background: `linear-gradient(90deg, ${C.ambre}, ${C.ambreClair})`, borderRadius: 3, transition: "width .3s ease" }} />
      </div>

      <div style={{ fontFamily: serif, fontSize: 18, fontWeight: 600, color: C.papier, lineHeight: 1.4, marginBottom: 16 }}>{q.q}</div>

      <div style={{ display: "grid", gap: 9, marginBottom: 14 }}>
        {q.options.map((opt, i) => {
          const estBonne = i === q.reponse;
          const estChoix = i === choix;
          let bg = C.panneau, bord = C.bordure, coul = C.papier;
          if (repondu) {
            if (estBonne) { bg = "linear-gradient(#25361F, #1E2A18)"; bord = "#5C8A3C"; coul = "#B7DA8E"; }
            else if (estChoix) { bg = "linear-gradient(#3A241F, #2C1B18)"; bord = "#9A4A3C"; coul = "#E39A8E"; }
          }
          return (
            <button key={i} onClick={() => repondre(i)} disabled={repondu} className={repondu ? "" : "bd-press"}
              style={{ textAlign: "left", padding: "13px 15px", borderRadius: 10, border: `1px solid ${bord}`, background: bg, color: coul, fontFamily: sans, fontSize: 15, fontWeight: 600, cursor: repondu ? "default" : "pointer", display: "flex", justifyContent: "space-between", alignItems: "center", gap: 8 }}>
              <span>{opt}</span>
              {repondu && estBonne && <span>✓</span>}
              {repondu && estChoix && !estBonne && <span>✕</span>}
            </button>
          );
        })}
      </div>

      {repondu && q.indice && (
        <div style={{ fontFamily: sans, fontSize: 13, color: C.papierSombre, fontStyle: "italic", marginBottom: 14, padding: "8px 12px", background: C.panneau, borderRadius: 8, borderLeft: `3px solid ${C.ambre}` }}>
          💡 {q.indice}
        </div>
      )}

      {repondu && (
        <Bouton variante="primaire" onClick={suivante} style={{ width: "100%" }}>
          {etape + 1 < questions.length ? "Question suivante →" : "Voir mon résultat 🏁"}
        </Bouton>
      )}
    </div>
  );
}

// Construit les liens iNaturalist (contribution pré-remplie + exploration) pour une observation.
// Enquêtes nationales de sciences participatives de l'OPIE (espèces suivies).
// Facile à compléter si l'OPIE lance de nouvelles enquêtes.
const ENQUETES_OPIE = [
  { cles: ["lucanus cervus", "lucane cerf-volant", "lucane cerf volant", "lucane"], nom: "Lucane cerf-volant", url: "https://enquetes.insectes.org/#list-investigations" },
  { cles: ["rosalia alpina", "rosalie des alpes", "rosalie"], nom: "Rosalie des Alpes", url: "https://enquetes.insectes.org/#list-investigations" },
];
function enqueteOpiePour(obs) {
  if (!obs) return null;
  const n = sansAccents(obs.nom);
  const s = sansAccents(obs.nomSci);
  for (const e of ENQUETES_OPIE) {
    if (e.cles.some((c) => { const cc = sansAccents(c); return (n && n.includes(cc)) || (s && s.includes(cc)); })) return e;
  }
  return null;
}

function urlsInaturalist(obs) {
  const sci = (obs.nomSci || "").trim();
  const nom = (obs.nom || "").trim();
  const q = encodeURIComponent(sci || nom);
  const g = obs.gps && typeof obs.gps.lat === "number" && typeof obs.gps.lon === "number" ? obs.gps : null;
  let dateStr = "";
  try { if (obs.date) dateStr = new Date(obs.date).toISOString().slice(0, 10); } catch {}
  // Niveau 1 : contribuer (nouvelle observation pré-remplie)
  const p = [];
  if (sci) p.push("taxon_name=" + encodeURIComponent(sci));
  else if (nom) p.push("species_guess=" + encodeURIComponent(nom));
  if (g) { p.push("latitude=" + g.lat); p.push("longitude=" + g.lon); }
  if (dateStr) p.push("observed_on_string=" + dateStr);
  const contrib = "https://www.inaturalist.org/observations/new?" + p.join("&");
  // Niveau 3 : explorer l'espèce + observations à proximité
  const explore = "https://www.inaturalist.org/search?q=" + q;
  const proximite = g ? ("https://www.inaturalist.org/observations?taxon_name=" + encodeURIComponent(sci || nom) + "&lat=" + g.lat + "&lng=" + g.lon + "&radius=50&subview=map") : null;
  return { contrib, explore, proximite, aGps: !!g };
}

// Météo à une date/heure précise et à un lieu donné (Open-Meteo, gratuit, sans clé).
// - photo récente (< ~90 jours) : endpoint "forecast" avec past_days (données du modèle)
// - photo ancienne : endpoint "archive" (réanalyse ERA5, données depuis 1940)
// Renvoie { ciel, temp, meteoAuto } ou null.
async function meteoHistorique(gps, quand) {
  if (!gps || !quand) return null;
  const d = quand instanceof Date ? quand : new Date(quand);
  if (isNaN(d)) return null;
  const jours = Math.floor((Date.now() - d.getTime()) / 864e5);
  if (jours < 0) return null; // date dans le futur : on ne devine pas
  const jour = d.toISOString().slice(0, 10);
  const heureCible = d.getHours();
  try {
    let url;
    if (jours <= 90) {
      const past = Math.min(92, Math.max(1, jours + 1));
      url = `https://api.open-meteo.com/v1/forecast?latitude=${gps.lat}&longitude=${gps.lon}`
          + `&hourly=temperature_2m,weather_code&past_days=${past}&forecast_days=1&timezone=auto`;
    } else {
      url = `https://archive-api.open-meteo.com/v1/archive?latitude=${gps.lat}&longitude=${gps.lon}`
          + `&start_date=${jour}&end_date=${jour}&hourly=temperature_2m,weather_code&timezone=auto`;
    }
    const r = await fetch(url);
    if (!r.ok) return null;
    const data = await r.json();
    const h = data.hourly || {};
    const temps = h.time || [], tArr = h.temperature_2m || [], cArr = h.weather_code || [];
    if (!temps.length) return null;
    // On cherche l'heure la plus proche du moment de la photo
    let idx = -1, meilleur = Infinity;
    for (let i = 0; i < temps.length; i++) {
      const t = new Date(temps[i]);
      if (isNaN(t)) continue;
      const ecart = Math.abs(t.getTime() - d.getTime());
      if (ecart < meilleur) { meilleur = ecart; idx = i; }
    }
    if (idx < 0 || meilleur > 3 * 3600 * 1000) return null; // rien à moins de 3h : on renonce
    const temp = tArr[idx], code = cArr[idx];
    if (typeof temp !== "number" && typeof code !== "number") return null;
    return {
      ciel: typeof code === "number" ? wmoVersCiel(code) : "",
      temp: typeof temp === "number" ? String(Math.round(temp)) : "",
      meteoAuto: true,
    };
  } catch { return null; }
}

function CaptureRapide({ onAjout, onFermer, aTrier, onOuvrir }) {
  const [flash, setFlash] = useState("");
  const [enCours, setEnCours] = useState(null); // { fait, total }

  // Position actuelle (repli si la photo n'a pas de GPS dans ses métadonnées)
  function positionActuelle() {
    return new Promise((resolve) => {
      if (!navigator.geolocation) { resolve(null); return; }
      navigator.geolocation.getCurrentPosition(
        (pos) => resolve({
          lat: Math.round(pos.coords.latitude * 100000) / 100000,
          lon: Math.round(pos.coords.longitude * 100000) / 100000,
          precision: Math.round(pos.coords.accuracy),
        }),
        () => resolve(null),
        { enableHighAccuracy: true, timeout: 10000 }
      );
    });
  }

  // Importe plusieurs photos d'un coup : chacune garde SA date et SA position (via EXIF).
  async function importerPhotos(e) {
    const fichiers = Array.from(e.target.files || []);
    if (!fichiers.length) return;
    e.target.value = ""; // permet de réimporter les mêmes fichiers ensuite
    setEnCours({ fait: 0, total: fichiers.length });
    setFlash("");

    let posSecours; // position actuelle, demandée une seule fois si besoin
    let ajoutees = 0, echecs = 0, avecGps = 0, avecMeteo = 0;

    for (let i = 0; i < fichiers.length; i++) {
      const f = fichiers[i];
      setEnCours({ fait: i, total: fichiers.length });
      try {
        // 1) GPS : d'abord celui de la photo (EXIF), sinon la position actuelle
        let gps = null;
        try { gps = await lireGpsExif(f); } catch {}
        if (gps) avecGps++;
        else {
          if (posSecours === undefined) posSecours = await positionActuelle();
          gps = posSecours;
        }
        // 2) Date : celle de la photo si connue, sinon maintenant
        const quand = f.lastModified ? new Date(f.lastModified) : new Date();
        // 3) Compression
        const blob = await compresserImage(f);
        // 4) Météo du MOMENT DE LA PHOTO (historique si besoin), pas la météo actuelle
        const m = await meteoHistorique(gps, quand);
        if (m) avecMeteo++;

        const obs = {
          id: `${Date.now()}-${i}-${Math.floor(Math.random() * 9999)}`,
          statut: "a_trier",
          nom: "", nomSci: "", biotope: "", notes: "",
          ciel: m ? m.ciel : "", temp: m ? m.temp : "", meteoAuto: !!m,
          meteoARattraper: !m && !!gps, // réseau absent ? on retentera au moment du tri
          moment: momentDepuisDate(quand),
          gps: gps || null,
          date: quand.toISOString(),
          photo: blob,
        };
        const ok = await onAjout(obs);
        if (ok) ajoutees++; else echecs++;
      } catch {
        echecs++;
      }
    }

    setEnCours(null);
    const bits = [`${ajoutees} photo${ajoutees > 1 ? "s" : ""} ajoutée${ajoutees > 1 ? "s" : ""} à la file`];
    if (avecGps > 0) bits.push(`📍 ${avecGps} avec la position d'origine`);
    if (avecMeteo > 0) bits.push(`🌡️ ${avecMeteo} avec la météo du jour de la photo`);
    if (echecs > 0) bits.push(`⚠️ ${echecs} échec${echecs > 1 ? "s" : ""}`);
    setFlash("✓ " + bits.join(" · "));
    setTimeout(() => setFlash(""), 5500);
  }

  return (
    <div style={{ padding: 16, maxWidth: 560, margin: "0 auto" }}>
      <div style={{ fontFamily: sans, fontSize: 14, color: C.papierSombre, lineHeight: 1.55, marginBottom: 16 }}>
        Reviens de balade avec plein de photos ? <b style={{ color: C.papier }}>Importe-les toutes d'un coup</b> : chacune garde sa date et sa position d'origine. Tu les identifieras ensuite tranquillement, une par une.
      </div>

      {/* Import multiple */}
      <div style={{ position: "relative", marginBottom: 12 }}>
        <button disabled={!!enCours}
          style={{ width: "100%", boxSizing: "border-box", padding: "22px 16px", textAlign: "center", borderRadius: 12, cursor: enCours ? "default" : "pointer",
            border: `2px dashed ${enCours ? C.bordure : C.ambre}`, background: enCours ? C.panneau : "linear-gradient(#2A2417, #201B12)",
            color: enCours ? C.papierSombre : C.ambreClair, fontFamily: sans, fontSize: 15, fontWeight: 700 }}>
          {enCours
            ? `⏳ Import en cours… (${enCours.fait}/${enCours.total})`
            : "🖼️ Importer des photos de la galerie"}
          {!enCours && <div style={{ fontFamily: sans, fontSize: 11.5, fontWeight: 400, color: C.papierSombre, marginTop: 5 }}>Tu peux en sélectionner plusieurs à la fois</div>}
        </button>
        {!enCours && (
          <input type="file" accept="image/*" multiple onChange={importerPhotos}
            style={{ position: "absolute", top: 0, left: 0, width: "100%", height: "100%", opacity: 0, cursor: "pointer" }} />
        )}
      </div>

      {flash && (
        <div style={{ fontFamily: sans, fontSize: 13, color: C.lichen, marginBottom: 12, padding: "9px 12px", background: C.panneau, borderRadius: 8, border: `1px solid ${C.bordure}`, lineHeight: 1.45 }}>{flash}</div>
      )}

      {/* File d'attente */}
      <div style={{ fontFamily: sans, fontSize: 12, fontWeight: 700, letterSpacing: 0.8, textTransform: "uppercase", color: C.lichen, margin: "8px 0 12px" }}>
        En attente ({aTrier.length})
      </div>

      {aTrier.length === 0 ? (
        <div style={{ textAlign: "center", padding: "40px 24px", border: `1px solid ${C.bordure}`, borderRadius: 14, background: "linear-gradient(#191F15, #14180F)", fontFamily: sans, fontSize: 14, color: C.papierSombre, lineHeight: 1.6 }}>
          Aucune photo en attente.<br />Importe tes photos de balade, elles apparaîtront ici. 🐞
        </div>
      ) : (
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(150px, 1fr))", gap: 14 }}>
          {aTrier.map((o) => (
            <div key={o.id} className="bd-card" onClick={() => onOuvrir(o.id)}
              style={{ background: "linear-gradient(#212A1B, #1A2015)", border: `1px solid ${C.bordure}`, borderRadius: 11, overflow: "hidden", cursor: "pointer", position: "relative" }}>
              <PhotoBlob blob={o.photo} alt="à trier" style={{ width: "100%", aspectRatio: "1", objectFit: "cover", display: "block" }} />
              <div style={{ padding: "8px 10px", fontFamily: sans, fontSize: 11, color: C.papierSombre, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <span>{new Date(o.date).toLocaleDateString("fr-FR")}</span>
                <span>{o.gps ? "📍" : "—"}</span>
              </div>
              <div style={{ position: "absolute", top: 8, right: 8, background: "rgba(201,162,75,.92)", color: C.encre, fontFamily: sans, fontSize: 10, fontWeight: 700, padding: "3px 7px", borderRadius: 12 }}>À trier</div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}
